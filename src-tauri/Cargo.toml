[package]
name = "block-notes"
version = "0.1.0"
edition = "2021"
publish = false

[build-dependencies]
tauri-build = { version = "2", features = [] }

[dependencies]
tauri = { version = "2", features = [] }
tauri-plugin-shell = "2"
serde = { version = "1", features = ["derive"] }
serde_json = "1"
sqlx = { version = "0.8.6", features = ["runtime-tokio", "sqlite", "macros", "migrate"] }
thiserror = "2.0.18"
ulid = "1.2.1"
uuid = { version = "1.23.0", features = ["v4"] }
blake3 = "1.8.3"
chrono = { version = "0.4.44", features = ["serde"] }
tokio = { version = "1", features = ["sync"] }
regex = "1"
base64 = "0.22.1"

[dev-dependencies]
criterion = { version = "0.8.2", features = ["async_tokio"] }
tempfile = "3.27.0"
tokio = { version = "1", features = ["macros", "rt", "rt-multi-thread"] }

[lib]
name = "block_notes_lib"
crate-type = ["lib", "cdylib", "staticlib"]

[[bench]]
name = "hash_bench"
harness = false

[[bench]]
name = "op_log_bench"
harness = false

[[bench]]
name = "cache_bench"
harness = false

[[bench]]
name = "pagination_bench"
harness = false

[[bench]]
name = "soft_delete_bench"
harness = false

[[bench]]
name = "commands_bench"
harness = false
