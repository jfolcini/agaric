# Stdio ↔ MCP socket bridge binary shipped alongside the Tauri app.
# The main Tauri binary is `src/main.rs` (auto-detected); this extra bin is
# a small standalone forwarder that MCP clients spawn as a stdio subprocess.
[[bin]]
name = "agaric-mcp"
path = "src/bin/agaric-mcp.rs"

# #645 — the `audit_cross_space_refs` and `op_log_histogram` diagnostic
# bins were carved out of this crate into the `agaric-diagnostics`
# workspace member (`diagnostics/`). Moving them out of the app crate's
# `[[bin]]` scan was the session-738 NOTE's "proper resolution": a
# feature-gated bin can't be skipped because `tauri-bundler` scans every
# `[[bin]]` entry regardless of `required-features`, so the bins now live
# outside this manifest entirely. Run them with
# `cargo run -p agaric-diagnostics --bin <name>`.

# Phase 3 day-10 — `parity_report` bin deleted alongside the
# `merge_parity_log` table (migration `0057`).  The bin's reason for
# existing was the diffy-vs-Loro parity histogram during the Phase-2
# soak; with diffy gone the comparison surface no longer exists, the
# table got dropped, and the bin's queries would all be against a
# missing table.  Re-introduce from git history if a future sync
# audit ever needs an analogous tool.
