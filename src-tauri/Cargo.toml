[package]
name = "agaric"
version = "0.1.0"
edition = "2021"
license = "GPL-3.0-or-later"
publish = false

[package.metadata.cargo-machete]
ignored = [
    "chacha20poly1305",
    "hkdf",
    "mdns-sd",
    "qrcode",
    "rand",
    "rcgen",
    "rustls",
    "sha2",
    "tokio-tungstenite",
    "tokio-rustls",
    "futures-util",
    "x509-parser",
    # Android-only, unused on desktop targets (BUG-39)
    "jni",
    "ndk-context",
]

[lints.rust]
unsafe_code = "deny"
unexpected_cfgs = { level = "warn", check-cfg = ['cfg(tarpaulin_include)'] }

[lints.clippy]
cast_possible_truncation = "warn"
cast_sign_loss = "warn"
cast_possible_wrap = "warn"
fallible_impl_from = "deny"
needless_pass_by_value = "warn"
redundant_closure_for_method_calls = "warn"
manual_let_else = "warn"
large_futures = "warn"
default_trait_access = "warn"
cloned_instead_of_copied = "warn"
flat_map_option = "warn"

[build-dependencies]
tauri-build = { version = "2", features = [] }

[dependencies]
tauri = { version = "2", features = ["image-png"] }
tauri-plugin-shell = "2"
serde = { version = "1", features = ["derive"] }
serde_json = "1"
sqlx = { version = "0.8.6", default-features = false, features = ["runtime-tokio", "sqlite", "macros", "migrate"] }
thiserror = "2.0.18"
ulid = "1.2.1"
uuid = { version = "1.23.0", features = ["v4"] }
blake3 = "1.8.3"
chrono = { version = "0.4.44", features = ["serde"] }
tokio = { version = "1", features = ["sync", "macros", "rt", "net", "io-util", "io-std"] }
regex = "1"
base64 = "0.22.1"
specta = { version = "=2.0.0-rc.24", features = ["derive"] }
specta-typescript = "0.0.11"
tauri-specta = { version = "=2.0.0-rc.24", features = ["derive", "typescript"] }
rustc-hash = "2.1.2"
diffy = "0.4.2"
similar = "3"
zstd = "0.13"
ciborium = "0.2"
tracing = { version = "0.1.44", features = ["attributes"] }
tracing-subscriber = { version = "0.3.23", features = ["env-filter"] }

# Sync
tokio-tungstenite = { version = "0.29", features = ["rustls-tls-native-roots"] }
rustls = { version = "0.23", default-features = false, features = ["std", "tls12", "ring"] }
tokio-rustls = "0.26"
futures-util = { version = "0.3", default-features = false, features = ["sink"] }
rcgen = "0.14"
mdns-sd = "0.19"
qrcode = { version = "0.14", default-features = false, features = ["svg"] }
hkdf = "0.13"
sha2 = "0.11"
chacha20poly1305 = "0.10"
rand = "0.10"
x509-parser = "0.18.1"
tauri-plugin-updater = "2.10.0"
tracing-appender = "0.2.4"
reqwest = "0.13.2"
tauri-plugin-process = "2.3.1"

# FEAT-5b â€” Google Calendar OAuth 2.0 PKCE flow + keychain token storage.
# Coupled stack (see AGENTS.md Â§"Coupled Dependency Updates"): `oauth2`,
# `keyring`, `secrecy`, `tauri-plugin-oauth`, and `async-trait` all enter
# together.  `tauri-plugin-oauth` follows the same major as every other
# `tauri-plugin-*` crate â€” bump in lockstep with the Tauri stack.
#
# TLS-backend feature alignment (FEAT-5 parent Â§"Feature-flag alignment"):
# oauth2 v5.0 depends on `reqwest ^0.12`, while the repo pins `reqwest =
# "0.13.2"` â€” cargo resolves both (oauth2 pulls its own reqwest 0.12 copy
# for its `reqwest` feature).  We enable `rustls-tls` on oauth2 so that
# *its* reqwest uses rustls (matching the repo's rustls-everywhere posture
# â€” see `tokio-tungstenite`, `tokio-rustls`, `sqlx` on rustls).  The main
# reqwest 0.13 slice will be realigned to rustls by FEAT-5c; see that item
# for the plan.  The "two reqwest copies in Cargo.lock" state is expected
# until FEAT-5c lands and/or oauth2 tracks reqwest 0.13.
oauth2 = { version = "5", default-features = false, features = ["reqwest", "rustls-tls"] }
# keyring v3: enable every platform's native backend in one feature list.
# The per-platform deps (`security-framework`, `windows-sys`, `dbus-secret-service`)
# are gated on `cfg(target_os = "...")` inside keyring's own Cargo.toml, so a
# Linux build does not try to compile `security-framework`, and so on.
# `crypto-rust` selects pure-Rust crypto for the Secret Service backend â€”
# avoids pulling OpenSSL in the Linux build.
keyring = { version = "3", features = ["apple-native", "windows-native", "sync-secret-service", "crypto-rust"] }
secrecy = "0.10"
tauri-plugin-oauth = "2"
async-trait = "0.1"

[dev-dependencies]
criterion = { version = "0.8.2", features = ["async_tokio"] }
insta = { version = "1.47.0", features = ["yaml", "redactions"] }
proptest = "1.11.0"
tempfile = "3.27.0"
tokio = { version = "1", features = ["macros", "rt", "rt-multi-thread", "test-util"] }
# FEAT-5b â€” HTTP mocking for OAuth token endpoint tests.
wiremock = "0.6"

# Android-only dependencies (BUG-39: WiFi multicast lock via JNI).
# Gated on target_os = "android" so desktop builds do not pull in
# these transitive dependencies.
[target.'cfg(target_os = "android")'.dependencies]
jni = "0.22"
ndk-context = "0.1"

[profile.release]
lto = "thin"
codegen-units = 1
strip = "symbols"
debug = false

[lib]
name = "agaric_lib"
crate-type = ["lib", "cdylib", "staticlib"]

