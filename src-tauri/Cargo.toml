# FEAT-4a â€” stdio â†” MCP socket bridge binary shipped alongside the Tauri app.
# The main Tauri binary is `src/main.rs` (auto-detected); this extra bin is
# a small standalone forwarder that MCP clients spawn as a stdio subprocess.
[[bin]]
name = "agaric-mcp"
path = "src/bin/agaric-mcp.rs"
