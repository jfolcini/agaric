# cargo-nextest configuration
# See https://nexte.st/book/configuration.html

[profile.default]
# Fail-fast disabled: run all tests even if some fail
fail-fast = false
# Retry flaky tests once before reporting failure
retries = 1
# Generous per-test timeout (DB-backed tests may be slow on cold cache)
slow-timeout = { period = "30s", terminate-after = 2 }
# PEND-41 R25 — wait this long for subprocess cleanup before flagging a leak.
# sync_daemon tests spawn TCP listeners that occasionally need a moment to
# release sockets; 30s is generous enough to avoid false-positive leak reports.
leak-timeout = "30s"

# Headroom for the suite's heaviest DB-bound tests so full-suite CPU contention
# can't push them past the global 2×30s=60s terminate window and kill them on the
# first attempt — which surfaces as a spurious "flaky" (TRY 1 terminated, retry
# passes). These tests are correct and deterministic and have no internal
# wall-clock assertions; they're just slow by construction, so the fix is a longer
# leash (4×30s=120s), not trimming their coverage. Found while shipping #1987.
#
#   * apply_reproject_proptest::{b2,b3,b4} (#1683) — drive dozens of generated
#     op-chains through the full engine→SQL reprojection pipeline (a Loro engine +
#     DB pools per case); B4 runs ~30s even alone.
#   * perf26_draft_recovery_at_10k_ops_is_fast — seeds 10K op-log rows (~50s of
#     setup) before exercising indexed draft recovery; sat right under the 60s kill.
#   * replay_streams_all_rows_across_multiple_chunks_1574 — drives 205 full
#     import_and_project rounds (one per seeded inbox row, spanning 2 replay
#     chunks); ~50s alone on a dev box, so full-suite CPU contention pushes it
#     past the 60s kill on the first attempt.
#   * issue611_oversized_loro_snapshot_syncs_via_chunked_wire_path — pushes an
#     oversized Loro snapshot through the full chunked-wire catch-up path
#     (>30s under the full suite). It carried NO timeout override, so under the
#     `cargo-coverage` build's llvm-cov instrumentation (2-3× slower) it could
#     terminate on the first attempt and DROP the coverage of the large
#     snapshot-transfer path it exercises — a spurious `cargo-coverage` ratchet
#     failure whose likelihood shifts with nextest's per-run partition layout.
#     Give it (and `replay_streams`, previously only covered in the default
#     profile) the same extended leash under CI so coverage is stable.
[[profile.default.overrides]]
filter = 'test(/apply_reproject_proptest::/) | test(/perf26_draft_recovery_at_10k_ops_is_fast/) | test(/replay_streams_all_rows_across_multiple_chunks_1574/) | test(/issue611_oversized_loro_snapshot_syncs_via_chunked_wire_path/)'
slow-timeout = { period = "30s", terminate-after = 4 }

[profile.ci]
fail-fast = false
retries = 2
slow-timeout = { period = "60s", terminate-after = 2 }
leak-timeout = "30s"

# Same headroom in CI (3×60s=180s) — see the default-profile override above.
# Every test flagged SLOW (>30s) in a full-suite sweep is listed here so the
# llvm-cov `cargo-coverage` build (2-3× slower) can never terminate one on the
# first attempt and lose its coverage: apply_reproject_proptest,
# perf26_draft_recovery, replay_streams_all_rows…_1574, and
# issue611_oversized_loro_snapshot_syncs_via_chunked_wire_path.
[[profile.ci.overrides]]
filter = 'test(/apply_reproject_proptest::/) | test(/perf26_draft_recovery_at_10k_ops_is_fast/) | test(/replay_streams_all_rows_across_multiple_chunks_1574/) | test(/issue611_oversized_loro_snapshot_syncs_via_chunked_wire_path/)'
slow-timeout = { period = "60s", terminate-after = 3 }

# The SQL-only-fallback / reproject / recompute observability counters
# (`agaric_engine::apply::sql_only_fallback` and the coordinator's
# `reproject_call_spy` / `recompute_call_spy`) are process-global monotonic
# statics. The convergence / hydration / scaling handler tests assert on
# before/after counter DELTAS, which are only valid if no *other* test in the
# same process increments the same counter between the two reads. Under
# nextest's default all-core parallelism a sibling test in this set could
# corrupt a peer's delta (~1-2 spurious "flaky" reports per full-suite run,
# always passing on retry and in isolation). Pin the whole delta-asserting set
# to a single-threaded test-group so each measures its counter window in
# isolation; nextest keeps the other cores busy with ungrouped tests, so
# serialising just this DB-heavy subset costs little wall-clock. (The slow
# `apply_reproject_proptest` cases also carry the longer slow-timeout above —
# override settings from both entries layer.)
[test-groups.spy-counter-serial]
max-threads = 1

[[profile.default.overrides]]
filter = 'test(/materializer::handlers::(apply_reproject_proptest|create_edit_convergence_tests|delete_restore_convergence_tests|import_scaling_tests|move_convergence_tests|space_hydration_tests|tag_convergence_tests)::/)'
test-group = 'spy-counter-serial'

[[profile.ci.overrides]]
filter = 'test(/materializer::handlers::(apply_reproject_proptest|create_edit_convergence_tests|delete_restore_convergence_tests|import_scaling_tests|move_convergence_tests|space_hydration_tests|tag_convergence_tests)::/)'
test-group = 'spy-counter-serial'
