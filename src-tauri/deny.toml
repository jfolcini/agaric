# cargo-deny configuration for Agaric
# Docs: https://embarkstudios.github.io/cargo-deny/

[graph]
targets = [
    "x86_64-unknown-linux-gnu",
    "x86_64-pc-windows-msvc",
    "aarch64-apple-darwin",
    "aarch64-linux-android",
]
all-features = false
no-default-features = false

[output]
feature-depth = 1

# ── Advisories (RustSec) ────────────────────────────────────────────────────
[advisories]
ignore = [
    # GTK3 bindings — unmaintained, but required by Tauri on Linux (no alternative)
    { id = "RUSTSEC-2024-0411", reason = "Tauri transitive dep: gtk-rs GTK3 bindings" },
    { id = "RUSTSEC-2024-0412", reason = "Tauri transitive dep: gdk" },
    { id = "RUSTSEC-2024-0413", reason = "Tauri transitive dep: atk" },
    { id = "RUSTSEC-2024-0414", reason = "Tauri transitive dep: gtk" },
    { id = "RUSTSEC-2024-0415", reason = "Tauri transitive dep: pango" },
    { id = "RUSTSEC-2024-0416", reason = "Tauri transitive dep: atk-sys" },
    { id = "RUSTSEC-2024-0417", reason = "Tauri transitive dep: gdk-pixbuf-sys" },
    { id = "RUSTSEC-2024-0418", reason = "Tauri transitive dep: gdk-sys" },
    { id = "RUSTSEC-2024-0419", reason = "Tauri transitive dep: gio-sys" },
    { id = "RUSTSEC-2024-0420", reason = "Tauri transitive dep: gtk-sys" },
    # Other Tauri transitive unmaintained crates
    { id = "RUSTSEC-2024-0370", reason = "Tauri transitive dep: proc-macro-error" },
    { id = "RUSTSEC-2025-0057", reason = "Tauri transitive dep: fxhash (via selectors/kuchikiki)" },
    { id = "RUSTSEC-2025-0075", reason = "Tauri transitive dep: unic-char-range" },
    { id = "RUSTSEC-2025-0080", reason = "Tauri transitive dep: unic-common" },
    { id = "RUSTSEC-2025-0081", reason = "Tauri transitive dep: unic-char-property" },
    { id = "RUSTSEC-2025-0098", reason = "Tauri transitive dep: unic-ucd-version" },
    { id = "RUSTSEC-2025-0100", reason = "Tauri transitive dep: unic-ucd-ident" },
    { id = "RUSTSEC-2024-0436", reason = "Tauri transitive dep: paste (via serde_with, specta)" },
    { id = "RUSTSEC-2024-0429", reason = "Tauri GTK3 transitive dep: glib 0.18.5 unsound (sibling of GTK3 binding accept-list above)" },
    # Loro transitive unmaintained crate (atomic-polyfill via heapless → postcard → loro)
    { id = "RUSTSEC-2023-0089", reason = "Loro transitive dep: atomic-polyfill (via heapless → postcard)" },
    # sqlx transitive: rsa Marvin Attack timing side-channel via sqlx-mysql. Agaric
    # configures sqlx with default-features = false and only the sqlite/runtime-tokio/
    # macros/migrate features — the mysql driver is never invoked at runtime, but
    # sqlx 0.8.6 still pulls sqlx-mysql at compile time (it gates the driver enable
    # behind a Cargo feature, not behind dep pruning). The vulnerable RSA code path
    # only executes during MySQL auth handshake, which this app never reaches.
    { id = "RUSTSEC-2023-0071", reason = "sqlx-mysql transitive — Agaric is SQLite-only; the rsa Marvin Attack code path is in MySQL auth handshake which is never invoked" },
    # rand: deprecated `rand::thread_rng` is unsound on freshly-spawned threads.
    # Transitive via Tauri / Loro stack; Agaric's own code uses `rand::rngs::OsRng`.
    { id = "RUSTSEC-2026-0097", reason = "Transitive (Tauri/Loro stack); Agaric's own code uses OsRng, the deprecated thread_rng path is not exercised" },
]

# ── Licenses ────────────────────────────────────────────────────────────────
#
# PEND-41 R23 — GPL-3.0-or-later compatibility audit.
#
# The repo itself is licensed GPL-3.0-or-later (see `LICENSE`), so every
# entry below MUST be one-way-compatible with GPL-3.0-or-later (i.e.,
# can be linked into a GPL-3 work). The current list is all permissive
# (MIT, BSD, ISC, 0BSD, Unlicense, Zlib, Apache-2.0 + LLVM-exception)
# or weak-copyleft compatible (MPL-2.0, BSL-1.0). `MIT-0`, `Apache-2.0`,
# and `BSL-1.0` are GPL-3-compatible by their respective FSF analyses.
# `Unicode-3.0` / `Unicode-DFS-2016` are permissive Unicode license
# variants (FSF-compatible). `CDLA-Permissive-2.0` enters via the
# webpki-roots data bundle (see inline note below) — permissive data
# license, no copyleft.
#
# NOT ALLOWED here (and why): AGPL-3.0-* (incoming compatibility OK
# but the project license would then have to be AGPL to comply with
# AGPL's network-use clause — out of scope for a local-first app),
# GPL-2.0-only (one-way incompatibility), CDDL (incompatible per FSF),
# EPL-1.0/-2.0 (incompatible per FSF), CC-BY-NC-* (non-commercial
# clauses are not OSI-compatible), proprietary "source-available"
# pseudo-OSS licenses (BSL-1.1, SSPL, etc.).
#
# When a new transitive dep introduces a license not in this list,
# cargo-deny will fail at commit time — either swap the dep, fork it
# to a compatible license, or add to this list with a documented
# rationale.
[licenses]
allow = [
    "MIT",
    "MIT-0",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "BSL-1.0",
    "ISC",
    "Zlib",
    "0BSD",
    "Unicode-3.0",
    "Unicode-DFS-2016",
    "CC0-1.0",
    "Unlicense",
    "MPL-2.0",
    # CDLA-Permissive-2.0 enters via webpki-roots (→ hyper-rustls → reqwest 0.12
    # → oauth2 v5). It is an OSI-equivalent permissive data-commons license; no
    # copyleft. Safe to allow for the dual-root-cert bundle this repo already
    # ships through rustls-tls.
    "CDLA-Permissive-2.0",
]
confidence-threshold = 0.8
exceptions = []

[licenses.private]
ignore = true

# ── Bans ────────────────────────────────────────────────────────────────────
[bans]
multiple-versions = "warn"
wildcards = "deny"
highlight = "all"
workspace-default-features = "allow"
external-default-features = "allow"
allow = []
deny = [
    # OpenSSL is a maintenance and security burden; prefer rustls
    { crate = "openssl", reason = "use rustls instead" },
    { crate = "openssl-sys", reason = "use rustls instead" },
]
skip = []
skip-tree = []

# ── Sources ─────────────────────────────────────────────────────────────────
[sources]
unknown-registry = "deny"
unknown-git = "deny"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
allow-git = []
