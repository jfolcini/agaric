# cargo-deny configuration for Agaric
# Docs: https://embarkstudios.github.io/cargo-deny/

[graph]
targets = [
    "x86_64-unknown-linux-gnu",
    "x86_64-pc-windows-msvc",
    "aarch64-apple-darwin",
    "aarch64-linux-android",
]
all-features = false
no-default-features = false

[output]
feature-depth = 1

# ── Advisories (RustSec) ────────────────────────────────────────────────────
[advisories]
ignore = [
    # GTK3 bindings — unmaintained, but required by Tauri on Linux (no alternative)
    { id = "RUSTSEC-2024-0411", reason = "Tauri transitive dep: gtk-rs GTK3 bindings" },
    { id = "RUSTSEC-2024-0412", reason = "Tauri transitive dep: gdk" },
    { id = "RUSTSEC-2024-0413", reason = "Tauri transitive dep: atk" },
    { id = "RUSTSEC-2024-0414", reason = "Tauri transitive dep: gtk" },
    { id = "RUSTSEC-2024-0415", reason = "Tauri transitive dep: pango" },
    { id = "RUSTSEC-2024-0416", reason = "Tauri transitive dep: atk-sys" },
    { id = "RUSTSEC-2024-0417", reason = "Tauri transitive dep: gdk-pixbuf-sys" },
    { id = "RUSTSEC-2024-0418", reason = "Tauri transitive dep: gdk-sys" },
    { id = "RUSTSEC-2024-0419", reason = "Tauri transitive dep: gio-sys" },
    { id = "RUSTSEC-2024-0420", reason = "Tauri transitive dep: gtk-sys" },
    # Other Tauri transitive unmaintained crates
    { id = "RUSTSEC-2024-0370", reason = "Tauri transitive dep: proc-macro-error" },
    { id = "RUSTSEC-2025-0057", reason = "Tauri transitive dep: fxhash (via selectors/kuchikiki)" },
    { id = "RUSTSEC-2025-0075", reason = "Tauri transitive dep: unic-char-range" },
    { id = "RUSTSEC-2025-0080", reason = "Tauri transitive dep: unic-common" },
    { id = "RUSTSEC-2025-0081", reason = "Tauri transitive dep: unic-char-property" },
    { id = "RUSTSEC-2025-0098", reason = "Tauri transitive dep: unic-ucd-version" },
    { id = "RUSTSEC-2025-0100", reason = "Tauri transitive dep: unic-ucd-ident" },
    { id = "RUSTSEC-2024-0436", reason = "Tauri transitive dep: paste (via serde_with, specta)" },
]

# ── Licenses ────────────────────────────────────────────────────────────────
[licenses]
allow = [
    "MIT",
    "MIT-0",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "BSL-1.0",
    "ISC",
    "Zlib",
    "0BSD",
    "Unicode-3.0",
    "Unicode-DFS-2016",
    "CC0-1.0",
    "Unlicense",
    "MPL-2.0",
    # CDLA-Permissive-2.0 enters via webpki-roots (→ hyper-rustls → reqwest 0.12
    # → oauth2 v5). It is an OSI-equivalent permissive data-commons license; no
    # copyleft. Safe to allow for the dual-root-cert bundle this repo already
    # ships through rustls-tls.
    "CDLA-Permissive-2.0",
]
confidence-threshold = 0.8
exceptions = []

[licenses.private]
ignore = true

# ── Bans ────────────────────────────────────────────────────────────────────
[bans]
multiple-versions = "warn"
wildcards = "deny"
highlight = "all"
workspace-default-features = "allow"
external-default-features = "allow"
allow = []
deny = [
    # OpenSSL is a maintenance and security burden; prefer rustls
    { crate = "openssl", reason = "use rustls instead" },
    { crate = "openssl-sys", reason = "use rustls instead" },
]
skip = []
skip-tree = []

# ── Sources ─────────────────────────────────────────────────────────────────
[sources]
unknown-registry = "deny"
unknown-git = "deny"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
allow-git = []
