name: CodeQL

# Why this workflow exists:
#   * Closes Scorecard "SAST" check (alert #33, score 0/10 → 10/10): Scorecard
#     detects SAST by looking for `github/codeql-action` in a workflow. Since
#     this repo merges no PRs (solo, direct push to main), the PR-history
#     detection path can never fire — a workflow is the only signal.
#   * Adds a second independent static-analysis tool alongside zizmor / clippy
#     / oxlint. CodeQL ships GitHub's curated queries (CWE coverage,
#     supply-chain, taint analysis) that the others don't replicate.
#
# Why these triggers:
#   * push to main: re-scan immediately when shipping (matches scorecard.yml).
#   * pull_request to main: catch regressions before merge (future external
#     contributors).
#   * schedule (weekly): rescan against updated CodeQL query packs even when
#     code is idle. Tuesday 06:00 UTC — staggered from scorecard.yml's Monday.
#   * workflow_dispatch: manual re-run for debugging.
#
# Why ALL THREE languages every run (no PR-side "changed-language" gating):
#   code scanning diffs a PR's results against the base branch PER CONFIGURATION
#   (`/language:<lang>`). If a PR skips a language that `main` analyzes, the PR
#   check reports "N configurations present on main were not found" — a neutral
#   but noisy warning on every PR that doesn't touch that language. Skipping a
#   language on PRs also under-scans a security tool, which this workflow's own
#   fail-closed stance ("doubt always runs everything") rejects. build-mode:none
#   makes each analysis cheap enough (5–10 min, no Tauri system deps) that
#   always running all three is the right trade.
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: '0 6 * * 2'
  workflow_dispatch:

permissions:
  contents: read

# One in-flight run per PR (issue #814): every push to an open PR otherwise
# stacks the 3-job language matrix in parallel with the stale run. For push
# to main the group is keyed by ref (stable per-branch) rather than run_id,
# so a rapid merge stack collapses to a single scan of the latest main HEAD
# instead of N parallel 3-job matrices — the Security tab only ever reflects
# the tip of main anyway. schedule/dispatch runs share the ref group too.
concurrency:
  group: codeql-${{ github.event_name == 'pull_request' && github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  analyze:
    name: Analyze ${{ matrix.language }}
    runs-on: ubuntu-24.04
    # CodeQL JS/TS + Actions analyses typically run in 5–10 min on a repo this
    # size; Rust (build-mode: none) is similar. +50% headroom + round up → 30
    # min. Bump only if observed runs cross ~20 min.
    timeout-minutes: 30
    permissions:
      # Required: upload SARIF results to GitHub Code Scanning (Security tab).
      security-events: write
      # Required by codeql-action when analyzing the `actions` language so it
      # can resolve action references against their source repos.
      packages: read
      # Default: read the repo contents to analyze them.
      contents: read

    strategy:
      fail-fast: false
      matrix:
        # All three languages, every run — see the header comment for why PRs
        # do not gate on which files changed. build-mode: none lets CodeQL
        # analyze without invoking a build — avoids pulling Tauri's system deps
        # (libwebkit2gtk-4.1-dev, etc.) just to satisfy the extractor. Rust
        # GA'd build-mode:none in 2025.
        include:
          - language: actions
            build-mode: none
          - language: javascript-typescript
            build-mode: none
          - language: rust
            build-mode: none

    steps:
      - name: Checkout
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          persist-credentials: false

      - name: Initialize CodeQL
        uses: github/codeql-action/init@7188fc363630916deb702c7fdcf4e481b751f97a # v4.37.1
        with:
          languages: ${{ matrix.language }}
          build-mode: ${{ matrix.build-mode }}
          # security-and-quality = security-extended + maintainability/reliability
          # queries. The marginal noise on a small repo is acceptable; flip to
          # security-extended if the maintainability queries become noisy.
          queries: security-and-quality

      - name: Perform CodeQL analysis
        uses: github/codeql-action/analyze@7188fc363630916deb702c7fdcf4e481b751f97a # v4.37.1
        with:
          category: '/language:${{ matrix.language }}'
