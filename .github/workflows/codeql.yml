name: CodeQL

# Why this workflow exists:
#   * Closes Scorecard "SAST" check (alert #33, score 0/10 → 10/10): Scorecard
#     detects SAST by looking for `github/codeql-action` in a workflow. Since
#     this repo merges no PRs (solo, direct push to main), the PR-history
#     detection path can never fire — a workflow is the only signal.
#   * Adds a second independent static-analysis tool alongside zizmor / clippy
#     / oxlint. CodeQL ships GitHub's curated queries (CWE coverage,
#     supply-chain, taint analysis) that the others don't replicate.
#
# Why these triggers:
#   * push to main: re-scan immediately when shipping (matches scorecard.yml).
#   * pull_request to main: catch regressions before merge (future external
#     contributors).
#   * schedule (weekly): rescan against updated CodeQL query packs even when
#     code is idle. Tuesday 06:00 UTC — staggered from scorecard.yml's Monday.
#   * workflow_dispatch: manual re-run for debugging.
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: '0 6 * * 2'
  workflow_dispatch:

permissions:
  contents: read

# One in-flight run per PR (issue #814): every push to an open PR otherwise
# stacks the 3-job language matrix in parallel with the stale run. For push
# to main the group is keyed by ref (stable per-branch) rather than run_id,
# so a rapid merge stack collapses to a single scan of the latest main HEAD
# instead of N parallel 3-job matrices — the Security tab only ever reflects
# the tip of main anyway. schedule/dispatch runs share the ref group too.
concurrency:
  group: codeql-${{ github.event_name == 'pull_request' && github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  # detect — which languages does THIS event need to analyze?
  #   * pull_request: only the languages whose files changed, so a docs-only or
  #     single-language PR no longer spins all three analyses (rational CI, same
  #     per-category philosophy as _validate.yml's lint gating).
  #   * push / schedule / workflow_dispatch: ALWAYS all three — these feed the
  #     Security tab authoritatively and the weekly cron is the whole-tree
  #     backstop, so nothing rides on the PR-side gating being perfect.
  # FAIL-CLOSED: any inability to compute the PR diff (unresolved sha, git
  # error, empty diff) selects all languages. Under-scanning is the only failure
  # that matters for a security tool, so doubt always runs everything.
  detect:
    name: Detect changed languages
    runs-on: ubuntu-24.04
    timeout-minutes: 5
    outputs:
      languages: ${{ steps.pick.outputs.languages }}
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          # Need base+head to diff a PR; full history is the simplest robust way
          # (a shallow clone lacks the merge base). Cheap for a repo this size.
          fetch-depth: 0
          persist-credentials: false

      - name: Pick languages
        id: pick
        env:
          EVENT_NAME: ${{ github.event_name }}
          PR_BASE_SHA: ${{ github.event.pull_request.base.sha }}
          PR_HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        run: |
          set -euo pipefail
          all='["actions","javascript-typescript","rust"]'

          emit() { echo "languages=$1" >> "$GITHUB_OUTPUT"; echo "→ languages=$1"; }

          # Non-PR events always scan everything (see the job comment).
          if [ "$EVENT_NAME" != "pull_request" ]; then
            echo "Event '$EVENT_NAME' → all languages."
            emit "$all"; exit 0
          fi

          # Fail-closed three-dot diff (merge-base..head → the PR's own changes).
          if ! changed="$(git diff --name-only --diff-filter=ACMR \
              "$PR_BASE_SHA...$PR_HEAD_SHA" 2>/dev/null)"; then
            echo "Could not diff $PR_BASE_SHA...$PR_HEAD_SHA → all languages (fail-closed)."
            emit "$all"; exit 0
          fi
          if [ -z "$changed" ]; then
            echo "Empty diff → all languages (fail-closed)."
            emit "$all"; exit 0
          fi

          echo "Changed files:"
          while IFS= read -r f; do echo "  $f"; done <<<"$changed"

          # Per-language path patterns (OR semantics: a language is selected if
          # ANY changed file matches it):
          #   rust                  : *.rs, the crate manifests/lockfile.
          #   javascript-typescript : src/, e2e/, *.ts/tsx/js/jsx/mjs/cjs,
          #                           package[-lock].json.
          #   actions               : .github/workflows/ + .github/actions/
          #                           (CodeQL's `actions` extractor scans those).
          langs=()
          grep -qE '(\.rs$|(^|/)Cargo\.(toml|lock)$)' <<<"$changed" && langs+=('"rust"')
          grep -qE '(^src/|^e2e/|\.(ts|tsx|js|jsx|mjs|cjs)$|(^|/)package(-lock)?\.json$)' <<<"$changed" && langs+=('"javascript-typescript"')
          grep -qE '^\.github/(workflows|actions)/' <<<"$changed" && langs+=('"actions"')

          if [ "${#langs[@]}" -eq 0 ]; then
            echo "No CodeQL-analyzable language changed → empty matrix (analyze skipped)."
            emit "[]"; exit 0
          fi

          emit "[$(IFS=,; echo "${langs[*]}")]"

  analyze:
    name: Analyze ${{ matrix.language }}
    needs: detect
    # Skip the whole job (no runner) when no analyzable language changed.
    if: ${{ needs.detect.outputs.languages != '[]' }}
    runs-on: ubuntu-24.04
    # CodeQL JS/TS + Actions analyses typically run in 5–10 min on a repo this
    # size; Rust (build-mode: none) is similar. +50% headroom + round up → 30
    # min. Bump only if observed runs cross ~20 min.
    timeout-minutes: 30
    permissions:
      # Required: upload SARIF results to GitHub Code Scanning (Security tab).
      security-events: write
      # Required by codeql-action when analyzing the `actions` language so it
      # can resolve action references against their source repos.
      packages: read
      # Default: read the repo contents to analyze them.
      contents: read

    strategy:
      fail-fast: false
      matrix:
        # Only the languages `detect` selected. All use build-mode: none, which
        # lets CodeQL analyze without invoking a build — avoids pulling Tauri's
        # system deps (libwebkit2gtk-4.1-dev, etc.) just to satisfy the
        # extractor. Rust GA'd build-mode:none in 2025.
        language: ${{ fromJson(needs.detect.outputs.languages) }}

    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Initialize CodeQL
        uses: github/codeql-action/init@7188fc363630916deb702c7fdcf4e481b751f97a # v4.37.1
        with:
          languages: ${{ matrix.language }}
          build-mode: none
          # security-and-quality = security-extended + maintainability/reliability
          # queries. The marginal noise on a small repo is acceptable; flip to
          # security-extended if the maintainability queries become noisy.
          queries: security-and-quality

      - name: Perform CodeQL analysis
        uses: github/codeql-action/analyze@7188fc363630916deb702c7fdcf4e481b751f97a # v4.37.1
        with:
          category: '/language:${{ matrix.language }}'
