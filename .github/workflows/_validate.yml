name: Validate (prek-equivalent)

# Reusable workflow that runs the same checks as `prek run --all-files`
# locally, plus the full vitest + cargo nextest + Playwright suites and the
# externalBin / sqlx-offline-cache smoke checks.
#
# Invoked by ci.yml (every push/PR) and release.yml (every tag).
#
# PEND-39 C3 + C5 + C8 split the historical monolithic `validate` job into
# parallel workers; later passes (PEND-86, #833) grew that into nine jobs,
# fanned out from a `detect-changes` per-category classifier that is
# fail-closed (an unrecognized or undiffable path runs everything):
#   - detect-changes — classifies the diff into docs_only/frontend/backend/ci.
#   - verify-version-agreement — always-on 5-way version mutual-agreement
#                        check (#2975); no path gating, no docs-only skip.
#   - lint            — the full prek hook suite (clippy, cargo-deny,
#                        cargo-audit, zizmor, sqlx-prepare, …); skipped on a
#                        provably docs-only diff.
#   - docs-lint       — a cheap doc-only hook subset (markdownlint, the
#                        markdown link/citation checks, typos, lychee); runs
#                        ONLY on a docs-only diff (exactly one of
#                        lint/docs-lint runs per push/PR).
#   - vitest          — the full frontend suite as a single job (coverage,
#                        production build, bundle-size gate); gated on
#                        frontend changes.
#   - playwright      — the e2e suite, sharded 3 ways; gated on frontend
#                        changes.
#   - cargo-tests     — backend `cargo nextest` + llvm-cov instrumentation,
#                        sharded 2 ways; gated on backend changes.
#   - cargo-coverage  — merges the cargo-tests shard coverage into one
#                        report; gated on backend changes like cargo-tests
#                        (`validate-all` requires success/allowed-skip), but
#                        its own steps are glob-guarded and its coverage
#                        ratchet is explicitly non-blocking, so it practically
#                        only fails on a genuine merge/upload breakage.
#   - mcp-tests       — `agaric-mcp` sidecar release build + UDS smoke +
#                        externalBin verify; gated on backend changes.
#   - validate-all    — a trivial aggregate so branch-protection rules have
#                        one stable check name to depend on; fail-closed
#                        per category (a skipped sibling job is accepted
#                        only when its category was genuinely absent from
#                        the diff).
# Per-job timeout ceilings run 3-35 min, sized for slow-mirror apt/runner
# variance rather than typical run time — `cargo-tests` and `playwright`
# are usually the long poles (see each job's own comments for observed
# wall-clock notes). Callers that `needs: validate` on the workflow-call as
# a whole continue to work — GitHub propagates per-job failures up to the
# caller.

on:
  workflow_call:
  # Manual runs from the Actions tab (e.g. re-validating main after an
  # ecosystem change without pushing a commit). Reusable-only workflows
  # get no "Run workflow" button — workflow_dispatch adds it.
  workflow_dispatch:

# Read-only by default. The workers only check out the code, run prek + the
# full test suites, and upload the playwright report on failure (which uses
# its own scoped token via actions/upload-artifact).
permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always

jobs:
  # ---------------------------------------------------------------------------
  # detect-changes (#833, extended) — per-category change classifier.
  # Emits four OR-semantics booleans from a fail-closed three-dot diff:
  #   docs_only : every path matches the docs allowlist (drives lint/docs-lint).
  #   frontend  : any src/, e2e/, *.ts/tsx/js/jsx/css, package*.json, vite/
  #               vitest/tailwind/postcss/tsconfig config, index.html.
  #   backend   : any src-tauri/, *.rs, Cargo.*, migrations, .sqlx/.
  #   ci        : any .github/, prek.toml, .taplo.toml, lychee.toml, .gitleaks.toml.
  # A path may match several; a backend change that regenerates src/lib/bindings.ts
  # also flips frontend (bindings-drift / mock-parity tests run) — keep that.
  # SECURITY (read with validate-all): this classifier is the ONLY thing that lets
  # a skipped sibling pass the gate, so it is allowlist-based and FAIL-CLOSED — any
  # diff-compute error makes full_suite emit docs_only=false + frontend/backend/
  # ci=true (run everything), and validate-all also fails closed if this job is not
  # success. A classifier error only ever costs CI minutes, never weakens the gate.
  # ---------------------------------------------------------------------------
  detect-changes:
    runs-on: ubuntu-24.04
    timeout-minutes: 3
    outputs:
      docs_only: ${{ steps.classify.outputs.docs_only }}
      docs: ${{ steps.classify.outputs.docs }}
      frontend: ${{ steps.classify.outputs.frontend }}
      backend: ${{ steps.classify.outputs.backend }}
      ci: ${{ steps.classify.outputs.ci }}
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          # Full history so the three-dot `base...head` diff can resolve the
          # merge-base for PRs whose head sits behind `main` (same rationale
          # as ci.yml's detect-changes).
          fetch-depth: 0
          persist-credentials: false
      - id: classify
        shell: bash
        env:
          EVENT_NAME: ${{ github.event_name }}
          PR_BASE_SHA: ${{ github.event.pull_request.base.sha }}
          PR_HEAD_SHA: ${{ github.event.pull_request.head.sha }}
          PUSH_BEFORE: ${{ github.event.before }}
          PUSH_AFTER: ${{ github.sha }}
        run: |
          set -euo pipefail

          # Helper: emit the "run everything" classification and exit 0. Used
          # for every fail-closed branch so the full suite runs whenever we are
          # not 100% certain what the diff touches. docs_only=false keeps the
          # heavy `lint` job on; frontend/backend/ci=true force every
          # category's heavy jobs to run. A classifier error costs CI minutes,
          # never a weakened gate.
          full_suite() {
            echo "$1"
            {
              echo "docs_only=false"
              echo "docs=true"
              echo "frontend=true"
              echo "backend=true"
              echo "ci=true"
            } >> "$GITHUB_OUTPUT"
            exit 0
          }

          if [ "$EVENT_NAME" = "pull_request" ]; then
            base="$PR_BASE_SHA"
            head="$PR_HEAD_SHA"
          else
            # push (feature branch / main) or tag (release.yml). The
            # release tag path almost never resolves a meaningful `before`
            # and is never docs-only anyway — fail-closed handles it.
            base="$PUSH_BEFORE"
            head="$PUSH_AFTER"
          fi

          # New-branch / orphan-push: github.event.before is all-zeros and
          # there is nothing to diff against → fail closed (full suite).
          if [ -z "$base" ] || [ "$base" = "0000000000000000000000000000000000000000" ]; then
            full_suite "Base sha unresolved — running full validate suite (fail-closed)."
          fi

          # Force-push rewrote the old tip out of the runner clone, or a tag
          # push has no reachable predecessor → fail closed (full suite).
          if ! git cat-file -e "$base" 2>/dev/null; then
            full_suite "Base sha $base unreachable — running full validate suite (fail-closed)."
          fi

          # Three-dot (symmetric-difference) diff: ONLY the files this branch
          # changed relative to the merge-base, never files where `main`
          # moved ahead while the branch sat behind. A two-dot diff would
          # report those base-side changes too and could mislabel a real
          # code PR as docs-only when main had unrelated doc churn — exactly
          # the bypass we must avoid. Capture into a variable and check the
          # exit code explicitly: a failed diff MUST fail closed, not be
          # swallowed by a process substitution under `set -euo pipefail`.
          if ! diff_out=$(git diff --name-only "$base"..."$head"); then
            full_suite "::warning::git diff $base...$head failed — running full validate suite (fail-closed)."
          fi

          changed=()
          if [ -n "$diff_out" ]; then
            mapfile -t changed <<< "$diff_out"
          fi

          # An empty diff is NOT treated as docs-only. There is nothing to
          # fast-path (no docs changed either) and a zero-file diff is more
          # likely a base/head confusion than an intentional no-op PR, so we
          # fail closed and run the full suite.
          if [ "${#changed[@]}" -eq 0 ]; then
            full_suite "Empty diff — running full validate suite (fail-closed)."
          fi

          echo "Changed files:"
          printf '  %s\n' "${changed[@]}"

          # Conservative docs allowlist, anchored at repo root. A path is
          # "docs" iff it matches one of these. Deliberately narrow — when in
          # doubt, a path is NOT docs and the full suite runs.
          #   - any Markdown file anywhere (READMEs, session logs, **/*.md)
          #   - anything under docs/
          #   - the LICENSE / NOTICE / AUTHORS / CHANGELOG text files
          # NOT included (intentionally): lockfiles, .toml/.yml/.yaml config,
          # source under src/ or src-tauri/, workflow YAML, prek.toml, AGENTS.md
          # changes that also touch code, etc. ANY of those ⇒ docs_only=false.
          docs_re='^(docs/|.*\.md$|LICENSE([.-].*)?$|NOTICE$|AUTHORS$|CHANGELOG$)'

          # Per-category regexes (OR semantics: a file may match several; each
          # category flips true if ANY changed file matches). Anchored where a
          # root anchor is meaningful. Note `^src-tauri/` already subsumes the
          # Cargo/migrations alternatives, but they are listed explicitly so
          # the intent is legible and robust to future anchor tweaks.
          backend_re='(^src-tauri/|\.rs$|^src-tauri/Cargo\.(toml|lock)$|src-tauri/migrations/|\.sqlx/)'
          frontend_re='(^src/|^e2e/|\.(ts|tsx|js|jsx|css)$|^package(-lock)?\.json$|^(vite|vitest|tailwind|postcss)\.config\.|^tsconfig.*\.json$|^index\.html$)'
          ci_re='(^\.github/|^prek\.toml$|^\.taplo\.toml$|^lychee\.toml$|^\.gitleaks\.toml$)'

          # Single pass over the changed set. docs_only stays true only while
          # EVERY path matches the docs allowlist; the three category flags are
          # sticky-true once any matching path is seen. No `break` — every path
          # must be inspected for the category flags even after docs_only flips.
          #
          # FAIL-CLOSED default for UNRECOGNIZED non-docs paths: a changed file
          # that is neither docs NOR any known category (frontend/backend/ci) —
          # e.g. rust-toolchain.toml, .cargo/config.toml, rustfmt.toml, a root
          # Justfile / Dockerfile / flake.nix / *.sh — is a build/toolchain
          # change we cannot attribute to a suite. Under per-category gating,
          # BOTH vitest and cargo-tests would skip and it could merge with no
          # heavy suite at all (a strictness regression vs the pre-#833 gate,
          # which ran EVERYTHING on any non-docs change). So we pin
          # frontend=backend=ci=true for such a path, genuinely restoring
          # "anything we don't explicitly recognize runs the full suite" — ci
          # too, so a build/toolchain script (e.g. scripts/*.sh) still runs the
          # shell-lint + skip-ci-verify guards. Recognized-but-unsuited
          # categories (a pure `ci` change like a workflow/prek.toml edit) do
          # NOT trip this — `lint` (incl. zizmor) already covers them.
          docs_only=true
          docs=false
          frontend=false
          backend=false
          ci=false
          for f in "${changed[@]}"; do
            # Did this path match ANY known non-docs category?
            matched_cat=false
            if [[ "$f" =~ $docs_re ]]; then docs=true; fi
            if [[ "$f" =~ $frontend_re ]]; then frontend=true; matched_cat=true; fi
            if [[ "$f" =~ $backend_re ]]; then backend=true; matched_cat=true; fi
            if [[ "$f" =~ $ci_re ]]; then ci=true; matched_cat=true; fi
            if [[ ! "$f" =~ $docs_re ]]; then
              if [ "$docs_only" = "true" ]; then
                echo "Non-docs path detected: $f → docs_only=false (full lint suite)."
              fi
              docs_only=false
              if [ "$matched_cat" = "false" ]; then
                echo "Unrecognized non-docs path: $f → pinning frontend=backend=ci=true (fail-closed full suite)."
                frontend=true
                backend=true
                ci=true
              fi
            fi
          done

          echo "docs_only=$docs_only docs=$docs frontend=$frontend backend=$backend ci=$ci"
          {
            echo "docs_only=$docs_only"
            echo "docs=$docs"
            echo "frontend=$frontend"
            echo "backend=$backend"
            echo "ci=$ci"
          } >> "$GITHUB_OUTPUT"

  # ---------------------------------------------------------------------------
  # verify-version-agreement (#2975) — the 5-way version mutual-agreement
  # check, always-on (no detect-changes gating, no docs-only fast path).
  # Extracted from release.yml's `verify-version` job, which only runs on a
  # tag push — so version drift between the manifests was previously caught
  # mid-release instead of at PR time. This job reuses the EXACT SAME
  # extraction expressions and runs them on every PR/push, but checks only
  # that the five manifests agree with EACH OTHER — there is no tag yet at
  # PR time, so the tag-equality half of release.yml's check does not apply
  # here and is intentionally NOT duplicated. release.yml's `verify-version`
  # job is unchanged and still separately asserts the tag matches the
  # manifests at release time; this job does not replace it.
  # ---------------------------------------------------------------------------
  verify-version-agreement:
    runs-on: ubuntu-24.04
    # Trivial jq / grep / awk over the 5 manifests + fail-fast comparison —
    # same budget as release.yml's verify-version job.
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          persist-credentials: false
      - name: Verify the 5 version manifests mutually agree
        run: |
          set -euo pipefail
          CONF=$(jq -r .version src-tauri/tauri.conf.json)
          CARGO=$(grep -m1 '^version' src-tauri/Cargo.toml | cut -d'"' -f2)
          PKG=$(jq -r .version package.json)
          PKG_LOCK=$(jq -r .version package-lock.json)
          CARGO_LOCK=$(awk '/^name = "agaric"$/{getline; print; exit}' src-tauri/Cargo.lock | cut -d'"' -f2)
          echo "conf=$CONF cargo=$CARGO cargo.lock=$CARGO_LOCK pkg=$PKG pkg.lock=$PKG_LOCK"
          fail=0
          for v in "$CARGO" "$CARGO_LOCK" "$PKG" "$PKG_LOCK"; do
            if [ "$v" != "$CONF" ]; then fail=1; fi
          done
          if [ "$fail" -ne 0 ]; then
            echo "::error::Version drift — tauri.conf.json=$CONF, Cargo.toml=$CARGO, Cargo.lock=$CARGO_LOCK, package.json=$PKG, package-lock.json=$PKG_LOCK. Bump all of them in lockstep."
            exit 1
          fi

  # ---------------------------------------------------------------------------
  # lint — prek hook suite (excluding vitest/cargo-test/no-commit-to-branch),
  # npm audit signatures (warn-only), cargo audit (blocking — see PEND-41 R5), and the sqlx
  # offline-cache drift check. Needs the full Node + Rust + mold + cargo
  # plugins stack because prek's hooks invoke clippy, cargo-deny, sqruff,
  # zizmor, etc.
  # ---------------------------------------------------------------------------
  lint:
    needs: detect-changes
    # #833: the FULL lint job (clippy, cargo-deny, cargo-audit, sqlx-prepare,
    # zizmor, the whole prek suite + the heavy Rust/Node toolchain it needs)
    # is skipped on a provably docs-only diff. Docs are still linted by the
    # lightweight `docs-lint` job below, which runs the cheap doc-only hooks
    # (typos, markdownlint, lychee) with no toolchain. Fail-closed: an
    # uncertain classification ⇒ docs_only=false ⇒ this full job runs.
    #
    # This is the CROSS-CUTTING guard: clippy / oxfmt / bindings-parity / zizmor
    # all live here and must run on ANY non-docs change, so it stays gated on
    # `docs_only != 'true'` (NOT on a single category) — the prek hooks
    # self-filter by file type, so it is cheap-ish on a small diff.
    if: needs.detect-changes.outputs.docs_only != 'true'
    runs-on: ubuntu-24.04
    # PEND-41 R1 — observed wall-clock 11.2 min (run 25966040732, 2026-05-16,
    # n=1 post-PEND-39-split). +50% headroom + round up to nearest 5 → 20 min.
    # 20 → 30 (#1458): the `Install system dependencies` apt step can crawl to
    # ~12 min on a slow Ubuntu mirror (same root cause as the playwright cap
    # bump), which ran this job out the 20-min budget mid-clippy. The deb
    # re-download itself is tracked as #1464; 30 min absorbs the variance.
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          # gitleaks (run via prek) inspects git history, so we need the
          # full commit graph rather than the default shallow checkout.
          fetch-depth: 0
          persist-credentials: false

      - name: Prepare apt (free dpkg lock, bound downloads)
        uses: ./.github/actions/prepare-apt

      # Shared across every job that installs the same Tauri system deps
      # (lint, cargo-tests, mcp-tests) and across runs (#1464): on a hit the
      # `apt-get install` below resolves from the cached .debs instead of the
      # slow Ubuntu mirror. Bump the `-v1` suffix when the package list changes.
      - name: Cache apt archives (Tauri system deps)
        # ci/path-conditional-jobs: these Tauri webkit/gtk/mold .debs exist
        # solely to compile the Rust/Tauri crates, so caching them is gated with
        # the install below — a backend-less PR skips both.
        if: needs.detect-changes.outputs.backend == 'true'
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: /var/cache/apt/archives/*.deb
          key: apt-tauri-${{ runner.os }}-v1

      - name: Install system dependencies
        # ci/path-conditional-jobs: the webkit/gtk/ssl/rsvg/soup libs + mold are
        # only needed to compile the Rust/Tauri crates, so this is skipped on a
        # backend-less PR (the whole-tree non-Rust hooks below need none of them).
        # Fail-closed: an unrecognized path pins backend=true, so Rust still runs.
        if: needs.detect-changes.outputs.backend == 'true'
        # `mold` is added to speed up the linker step on the Rust builds
        # (clippy, cargo-deny, sqlx prepare's compile pass, etc).
        # Activated via the .cargo/config.toml under the linux runner.
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            libssl-dev \
            librsvg2-dev \
            libsoup-3.0-dev \
            pkg-config \
            mold

      - name: Enable mold linker (CI-only .cargo/config.toml)
        # ci/path-conditional-jobs: mold is a Rust linker config, only meaningful
        # when the cargo hooks compile — skipped on a backend-less PR.
        if: needs.detect-changes.outputs.backend == 'true'
        # Project ships `.cargo/config.toml.example` staged so local builds
        # don't break if a contributor hasn't installed mold yet; CI always
        # has mold available (apt step above), so we materialise the
        # active config at runtime.
        run: |
          mkdir -p .cargo
          cp .cargo/config.toml.example .cargo/config.toml

      - name: Install Rust toolchain
        # ci/path-conditional-jobs: the toolchain (rustc/cargo/clippy/rustfmt)
        # is only needed by the cargo-invoking prek hooks + the cargo/sqlx steps
        # below, all of which are skipped on a backend-less PR. Fail-closed:
        # unrecognized paths pin backend=true (see detect-changes), so any Rust
        # diff installs the toolchain and keeps the cargo hooks running.
        if: needs.detect-changes.outputs.backend == 'true'
        uses: dtolnay/rust-toolchain@4cda84d5c5c54efe2404f9d843567869ab1699d4 # stable
        with:
          # #640: exact toolchain pin — keep in lockstep with
          # rust-toolchain.toml and src-tauri/Cargo.toml `rust-version`.
          # Without an explicit `toolchain:` this SHA-pinned action
          # installs the floating latest stable, and rustup would then
          # re-download the rust-toolchain.toml pin at first cargo run.
          toolchain: 1.95.0
          # The prek hooks below run `cargo clippy -- -D warnings` and
          # `cargo fmt --check`. dtolnay installs with `--profile minimal`,
          # which ships neither component; the floating-`stable` setup only
          # worked because the runner image's preinstalled full-profile
          # stable already had them. rust-toolchain.toml also lists these
          # (covering local dev); installing them here keeps the failure
          # mode at setup time instead of mid-hook.
          components: clippy,rustfmt

      - name: Rust cache
        # ci/path-conditional-jobs: the cargo build/target cache is only useful
        # when the cargo hooks + cargo/sqlx steps compile, so it is gated with
        # the toolchain — a backend-less PR skips it.
        if: needs.detect-changes.outputs.backend == 'true'
        uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
        with:
          workspaces: src-tauri
          # Cache `~/.cargo/bin/` so cargo-installed plugins (prek, sqlx-cli)
          # persist across runs.
          cache-bin: 'true'
          # Per-job-class key (issue #813): rust-cache keeps ONE immutable
          # entry per (os, shared-key, lockfile), so the old `rust-deps`
          # key shared across lint / cargo-tests / mcp-tests / ci.yml's
          # build meant only the first finisher's `target/` tree survived
          # and the others recompiled from scratch every run. This job's
          # clippy/cargo-deny/sqlx-prepare tree gets its own `rust-lint`
          # key; the siblings use `rust-cov` (llvm-cov instrumented),
          # `rust-mcp` (release + debug smoke), and `rust-release`
          # (ci.yml's desktop build). The Android job in ci.yml keeps its
          # separate `rust-android` key (cross-compile targets).
          shared-key: rust-lint
          # `save-if` gates which runs write to the cache. Only `main`
          # populates it; feature branches read from main's cache and
          # write only an ephemeral layer on top (expires at the standard
          # 7-day GH cache TTL). Prevents every feature branch from
          # poisoning the shared cache.
          save-if: ${{ github.ref == 'refs/heads/main' }}

      - name: Install Node.js
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: 24
          cache: npm

      - name: Install npm dependencies
        run: npm ci

      - name: Verify npm package provenance signatures
        # Requires Node 22.5+; rejects packages whose registry-side Sigstore
        # provenance attestation is missing or invalid. Catches the
        # "compromised maintainer republishes from a different machine"
        # class of attack (Sigstore signs at publish time from CI, so a
        # local laptop republish has no valid attestation). Mode is `audit`
        # not `install` so missing attestations log a warning rather than
        # failing the build — many transitive deps don't yet publish with
        # provenance and we don't want to gate CI on that today.
        run: npm audit signatures || echo "::warning::npm audit signatures had findings (warn-only mode); review the log above"

      - name: Prepare externalBin placeholder (FEAT-4f)
        # ci/path-conditional-jobs: these placeholders exist only to satisfy
        # Tauri's build.rs during cargo invocations, so they are gated with the
        # toolchain — a backend-less PR runs no cargo and needs none of them.
        if: needs.detect-changes.outputs.backend == 'true'
        # Tauri's build.rs validates externalBin paths on every cargo
        # invocation — clippy, cargo-deny, machete all trigger it.
        run: node scripts/prepare-external-bins.mjs --placeholder-only

      # ci/path-conditional-jobs: this taiki-e step is SPLIT so a backend-less PR
      # still gets the tools the whole-tree NON-Rust hooks and the prek runner
      # itself need. This first (UNGATED) install carries prek (runs the whole
      # suite), zizmor (workflow security audit), taplo-cli (TOML lint/fmt),
      # typos-cli (typo check), and sqruff (SQL-migration lint). None invoke
      # cargo (sqruff/typos/taplo run standalone binaries), and all must run on
      # every non-docs PR — so they are installed regardless of the backend flag.
      - name: Install prek + non-Rust lint tools via prebuilt binaries
        uses: taiki-e/install-action@a6b2e2dcd845ddd7f509ce4f3ed3d922b80cc5d9 # v2.84.0
        with:
          # sqruff pinned: unpinned resolves to latest via cargo-binstall's
          # from-source fallback, and sqruff >=0.39 requires rustc 1.96 while
          # this repo pins 1.95.0 (rust-toolchain.toml) — reds the whole lint
          # job. 0.38.x supports rustc 1.94/1.95. Bump when the rustc pin moves.
          tool: prek,zizmor,taplo-cli,typos-cli,sqruff@0.38.0

      # ci/path-conditional-jobs: the cargo-* plugins are invoked only by the
      # Rust prek hooks (cargo-deny/cargo-machete) + the cargo-audit step below,
      # so they are gated on backend == 'true'. A backend-less PR SKIPs those
      # hooks (see the Run prek step) and never needs these installed.
      - name: Install cargo plugins via prebuilt binaries (PEND-39 C1)
        if: needs.detect-changes.outputs.backend == 'true'
        # taiki-e/install-action pulls prebuilt binaries from the upstream
        # GitHub Releases of each tool, side-stepping the per-binary
        # `cargo install` compile that previously dominated cold-cache
        # runs. Unlike `cargo install`, the binary cache here is not
        # invalidated by `Cargo.lock` changes — only by the explicit `@v2`
        # tag bump or a tool-version pin change. cargo-nextest lives on
        # the cargo-tests job (the only consumer); this job needs the
        # lint/audit set.
        uses: taiki-e/install-action@a6b2e2dcd845ddd7f509ce4f3ed3d922b80cc5d9 # v2.84.0
        with:
          tool: cargo-deny,cargo-machete,cargo-audit

      - name: Install sqlx-cli (custom features, cargo fallback)
        # ci/path-conditional-jobs: sqlx-cli compiles from source and is used
        # only by the sqlx offline-cache-check steps below, so it is gated on
        # backend == 'true' — a backend-less PR skips those checks.
        if: needs.detect-changes.outputs.backend == 'true'
        # sqlx-cli with the right features set isn't covered by
        # taiki-e/install-action's binary list — has to compile from source.
        # Cached across runs via Swatinem/rust-cache's cache-bin: 'true';
        # only recompiles when Cargo.lock invalidates that cache.
        run: |
          if ! command -v cargo-sqlx >/dev/null; then cargo install --locked sqlx-cli --no-default-features --features rustls,sqlite; fi

      - name: Install lychee (prebuilt binary)
        # The `lychee` pre-commit hook (prek.toml `[[repos.hooks]] id = "lychee"`)
        # is a `local` hook calling the system `lychee` binary, since the
        # upstream `lycheeverse/lychee` pre-commit repo is broken on a
        # normal dev box (see commit bd3dc79c for the failure modes).
        # That means CI must put a `lychee` binary on PATH explicitly —
        # `taiki-e/install-action` doesn't manifest lychee, so we pull the
        # official prebuilt release directly. Fast (~1s) and avoids the
        # slow `cargo install` compile.
        run: |
          set -euo pipefail
          VERSION=lychee-v0.24.2
          DIR=lychee-x86_64-unknown-linux-gnu
          TARBALL="${DIR}.tar.gz"
          # Known-good SHA256 of the linux-gnu tarball for VERSION above — the
          # published release checksum (the sibling `${TARBALL}.sha256` asset),
          # independently reproducible with `sha256sum`. GitHub release assets
          # are mutable under a tag, so the version pin alone does not prevent
          # asset replacement; this is the only unverified-binary gap in an
          # otherwise SHA-pinned toolchain. MUST be updated in the same PR that
          # bumps VERSION or the `sha256sum -c` below fails the job.
          SHA256=1f4e0ef7f6554a6ed33dd7ac144fb2e1bbed98598e7af973042fc5cd43951c9a
          curl -fsSL -o /tmp/lychee.tar.gz \
            "https://github.com/lycheeverse/lychee/releases/download/${VERSION}/${TARBALL}"
          echo "${SHA256}  /tmp/lychee.tar.gz" | sha256sum -c -
          mkdir -p "${HOME}/.local/bin"
          tar -xzf /tmp/lychee.tar.gz -C /tmp "${DIR}/lychee"
          install -m 0755 "/tmp/${DIR}/lychee" "${HOME}/.local/bin/lychee"
          echo "${HOME}/.local/bin" >> "${GITHUB_PATH}"
          "${HOME}/.local/bin/lychee" --version

      - name: Restore lychee link-check cache
        # Persist the lychee URL cache across runs so we don't re-hit the
        # same github.com / crates.io / npm URLs from cold every time.
        # Key on the markdown file set so a doc edit invalidates as expected;
        # restore-keys lets a partial cache survive when the key misses.
        # node_modules/ is excluded from the hash (#819 (3)): this step
        # runs after `npm ci`, so dependency markdown churn (READMEs,
        # CHANGELOGs) was invalidating the key on every unrelated dep
        # bump even though lychee only ever checks tracked docs.
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: .lycheecache
          key: lychee-${{ runner.os }}-${{ hashFiles('**/*.md', '!node_modules/**') }}
          restore-keys: |
            lychee-${{ runner.os }}-

      - name: Compute prek SKIP (per changed category)
        # ci/path-conditional-jobs: build the prek SKIP list from the
        # detect-changes category flags so each hook runs ONLY when its
        # category is in the diff. A category is ABSENT when its output is not
        # exactly 'true' (fail-closed: detect-changes pins frontend=backend=true
        # on any unrecognized non-docs path, so those hooks stay ON in doubt).
        # Security / hygiene hooks (gitleaks, typos, trailing-whitespace,
        # detect-private-key, large-files, shebang/exec, line-ending,
        # merge-conflict) are NEVER added — they run on every non-docs PR.
        # The binding-boundary guards (tauri-*-parity, snapshot-redaction,
        # no-retired-pending-doc-refs) skip ONLY when BOTH frontend and backend
        # are absent, so any change to either side of the IPC surface re-runs
        # them.
        env:
          FRONTEND: ${{ needs.detect-changes.outputs.frontend }}
          BACKEND: ${{ needs.detect-changes.outputs.backend }}
          CI: ${{ needs.detect-changes.outputs.ci }}
          DOCS: ${{ needs.detect-changes.outputs.docs }}
        run: |
          set -euo pipefail

          # Present-flags. `docs` is the ANY-docs-changed flag (not docs_only):
          # a mixed code+docs PR reaches this job (docs_only != 'true') and must
          # still lint its markdown, so the doc hooks are skipped only when NO
          # doc file changed.
          fe=false; be=false; ci=false; docs=false
          if [ "$FRONTEND" = "true" ]; then fe=true; fi
          if [ "$BACKEND" = "true" ]; then be=true; fi
          if [ "$CI" = "true" ]; then ci=true; fi
          if [ "$DOCS" = "true" ]; then docs=true; fi

          # Base: pre-push-only / dedicated-sibling-job hooks. Always skipped.
          skips=(no-commit-to-branch vitest cargo-test)

          # Single-category: skip a category's hooks when it is ABSENT.
          if [ "$fe" != true ]; then
            skips+=(oxlint oxfmt tsc no-hsl-rgb-var-wrap no-direct-sonner-import \
              no-ui-store-imports no-legacy-react-apis check-elevation-tiers \
              check-elevation-tiers-self-test import-cycles store-layering \
              axe-presence test-file-naming ipc-error-path-coverage \
              ipc-error-path-coverage-selftest no-raw-invoke no-raw-invoke-selftest \
              no-raw-local-storage no-raw-local-storage-selftest \
              trace-interactions-named trace-interactions-named-selftest \
              license-checker)
          fi
          if [ "$be" != true ]; then
            skips+=(cargo-fmt cargo-clippy cargo-deny cargo-machete sqruff \
              tauri-command-sanitize tauri-command-instrumented \
              tauri-command-instrumented-selftest check-raw-tx \
              check-raw-tx-self-test check-dynamic-sql check-dynamic-sql-self-test \
              check-command-arity check-command-arity-self-test \
              check-space-filter-drift unsafe-allowlist audit-toml-in-sync \
              migrations-immutable migrations-strict-tables \
              migrations-rebuild-cascade)
          fi
          if [ "$ci" != true ]; then
            skips+=(actionlint zizmor shellcheck skip-ci-verify-guard)
          fi
          if [ "$docs" != true ]; then
            skips+=(markdownlint md-link-targets doc-vs-code-paths \
              session-log-numbering)
          fi

          # Compound (AND) rules: a shared hook is skipped only when EVERY
          # category that can dirty its inputs is absent.
          if [ "$ci" != true ] && [ "$be" != true ]; then
            skips+=(taplo-fmt taplo-lint)
          fi
          if [ "$fe" != true ] && [ "$be" != true ]; then
            skips+=(tauri-mock-parity tauri-bindings-parity snapshot-redaction \
              no-retired-pending-doc-refs)
          fi
          if [ "$docs" != true ] && [ "$fe" != true ] && [ "$be" != true ]; then
            skips+=(architecture-citations)
          fi
          if [ "$fe" != true ] && [ "$ci" != true ]; then
            skips+=(check-json)
          fi
          if [ "$be" != true ] && [ "$ci" != true ]; then
            skips+=(check-toml)
          fi
          if [ "$ci" != true ]; then
            skips+=(check-yaml)
          fi

          skip_csv=$(IFS=,; printf '%s' "${skips[*]}")
          printf 'Computed prek SKIP: %s\n' "$skip_csv"
          printf 'SKIP=%s\n' "$skip_csv" >> "$GITHUB_ENV"

      - name: Run prek (same as `prek run --all-files` locally)
        env:
          # SKIP is computed by the preceding "Compute prek SKIP" step and
          # exported via $GITHUB_ENV. It always carries the pre-push-only /
          # sibling-job hooks (no-commit-to-branch, vitest, cargo-test) and
          # appends a category's hooks only when that category is absent from
          # the diff (see that step for the per-category + compound AND rules).
          # Security / hygiene hooks are never in it, so they always run here.
          SKIP: ${{ env.SKIP }}
          # Lychee reads GITHUB_TOKEN automatically. Without this, lychee
          # makes unauthenticated requests to github.com and gets rate-
          # limited (~60 req/hour) — bursty Dependabot PR runs blow the
          # budget and surface as transient lint failures even with 429 +
          # 5xx accepted in `lychee.toml`.
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: prek run --all-files

      - name: Run cargo clippy (backend PRs)
        # cargo-clippy is staged `pre-push` in prek.toml, so the pre-commit-stage
        # `prek run --all-files` above never executes it — clippy would not gate
        # PRs at all without this step. Invoke the hook explicitly (mirrors the
        # npm-audit step) so its exact config runs: `cargo clippy --workspace
        # --all-targets -- -D warnings`. Gated on backend == 'true' — the Rust
        # toolchain is installed under the same condition; skipped on
        # frontend/docs/ci-only PRs (fail-closed: unrecognized paths pin
        # backend=true, so any Rust diff keeps clippy on).
        if: needs.detect-changes.outputs.backend == 'true'
        run: prek run --all-files --hook-stage pre-push cargo-clippy

      - name: Run npm-audit advisory scan (pre-push-staged hook)
        # ci/path-conditional-jobs: npm-audit is a Node/frontend advisory scan,
        # gated on frontend == 'true' — a backend/ci-only PR has no npm surface
        # to audit (fail-closed: unrecognized paths pin frontend=true).
        # npm-audit is staged `pre-push` in prek.toml (#1087: it hits the
        # registry advisory endpoint over the network, which doesn't belong on
        # the commit path), so the `prek run --all-files` above — which runs
        # only pre-commit-stage hooks — does NOT execute it. Invoke it
        # explicitly with `--hook-stage pre-push` (mirrors the lychee step in
        # the docs-lint job) so the advisory vulnerability scan stays in CI.
        # `npm audit signatures` above is a different, warn-only provenance
        # check and does not cover advisories.
        if: needs.detect-changes.outputs.frontend == 'true'
        run: prek run --all-files --hook-stage pre-push npm-audit

      - name: Run knip (dead-code / unused-dependency analysis)
        # ci/path-conditional-jobs: knip is a Node/frontend dead-code analysis,
        # gated on frontend == 'true' — no npm surface on a backend/ci-only PR.
        # knip is staged `pre-push` in prek.toml (it is a whole-repo analysis
        # that goes red on stale branches for diffs unrelated to the commit, so
        # it doesn't belong on the commit path). Unlike npm-audit / lychee, the
        # `prek run --all-files --hook-stage pre-push knip` selector SKIPS with
        # "no files to check" (knip declares `pass_filenames = false` with a
        # `types` filter, which prek resolves to an empty set under --all-files),
        # so routing through prek here would be a silent false-green. Invoke the
        # underlying command (the hook's own `entry`) directly instead — the
        # `npm ci` above provides node_modules. This closes the gap where knip
        # ran only on local pre-push and drifted red on main unnoticed.
        if: needs.detect-changes.outputs.frontend == 'true'
        run: npx knip

      - name: Migrations append-only backstop (#806)
        # `prek run --all-files` cannot enforce the append-only
        # invariant — the migrations-immutable hook's staged-index scan
        # is empty on a fresh CI checkout, so a one-time local
        # `--no-verify` bypass would be permanent without this. Re-run
        # the same script in `--range` mode over the PR / push range so
        # any M/D/R/C/T under src-tauri/migrations/*.sql fails CI.
        # Checkout above uses fetch-depth: 0, so the base sha resolves.
        env:
          EVENT_NAME: ${{ github.event_name }}
          PR_BASE_SHA: ${{ github.event.pull_request.base.sha }}
          PUSH_BEFORE: ${{ github.event.before }}
        run: |
          set -euo pipefail
          if [ "$EVENT_NAME" = "pull_request" ]; then
            base="$PR_BASE_SHA"
          else
            base="$PUSH_BEFORE"
          fi
          # New branch / tag push / orphan: nothing to diff against.
          # The commit-time hook (always_run) remains the enforcement
          # point; this backstop only covers ranges it can resolve.
          if [ -z "$base" ] || [ "$base" = "0000000000000000000000000000000000000000" ] \
            || ! git cat-file -e "$base" 2>/dev/null; then
            echo "Base sha unresolved — skipping range backstop."
            exit 0
          fi
          bash scripts/check-migrations-immutable.sh --range "$base...HEAD"

      - name: Cargo audit (RustSec advisory check, blocking)
        # ci/path-conditional-jobs: `cargo audit` needs the toolchain + the
        # cargo-audit plugin (both gated above), and only advises on the Rust
        # dependency tree, so it is skipped on a backend-less PR. Fail-closed:
        # any Cargo.lock/Rust change pins backend=true, so advisories still run.
        if: needs.detect-changes.outputs.backend == 'true'
        # Complements `cargo deny check` (in the prek run above) by hitting
        # the upstream RustSec advisory DB directly — catches advisories
        # published since `deny.toml`'s ignore list was last triaged.
        #
        # PEND-41 R5 — promoted from warn-only to blocking. A new advisory
        # surfaces here exactly once; the maintainer must either fix the
        # underlying dep or add an explicit entry to
        # `src-tauri/deny.toml [advisories].ignore` with a `reason` field
        # documenting why the call-site is unaffected. The .nsprc-style
        # explicit-waiver discipline applies; same pattern used by the
        # npm-side audit step.
        working-directory: src-tauri
        run: cargo audit

      - name: sqlx offline cache check
        # ci/path-conditional-jobs: sqlx `prepare --check` compiles the crate
        # against its committed .sqlx/ cache — Rust-only, and .sqlx/ changes pin
        # backend=true — so it is skipped on a backend-less PR.
        if: needs.detect-changes.outputs.backend == 'true'
        # Reusable composite action (#2621 layered-workspace split): each
        # workspace crate that carries `query!`/`query_as!` macros — and so
        # its own committed `.sqlx/` cache — gets its own lane by calling
        # this action with a distinct working-directory + database-url. The
        # sqlx-0.9.x `prepare --check` rationale and the `-- --tests`
        # default (query drift in `#[cfg(test)]` modules must not slip
        # through — prek.toml MAINT-227) live in the action itself. Three
        # crates now carry a cache: `agaric` (this lane), `agaric-store`, and
        # `agaric-engine` (the lanes below).
        uses: ./.github/actions/sqlx-offline-check
        with:
          working-directory: src-tauri
          database-url: 'sqlite:ci-sqlx-prepare.db'

      - name: sqlx offline cache check (agaric-store)
        # ci/path-conditional-jobs: same as the app-crate lane above — Rust-only
        # sqlx compile, skipped on a backend-less PR (backend != 'true').
        if: needs.detect-changes.outputs.backend == 'true'
        # #2621 wave S3b-ii: op_log's `query!`/`query_as!` macros moved into
        # agaric-store, which now carries its own committed `.sqlx/` cache.
        # A `../migrations` symlink under the crate lets both this action's
        # `cargo sqlx migrate run` and `sqlx::migrate!` resolve the shared
        # workspace migrations.
        #
        # The `database-url` MUST be absolute for a NON-root workspace member.
        # `cargo sqlx database create` runs in `working-directory`
        # (src-tauri/agaric-store), but `sqlx::query!` resolves a *relative*
        # sqlite path at compile time from rustc's CWD — the WORKSPACE ROOT
        # (src-tauri), not the crate dir — so a relative url has the DB created
        # under agaric-store/ yet looked for under src-tauri/, failing every
        # query with "unable to open database file". The app lane above works
        # with a relative url only because the app crate IS the workspace root.
        uses: ./.github/actions/sqlx-offline-check
        with:
          working-directory: src-tauri/agaric-store
          database-url: 'sqlite:${{ runner.temp }}/agaric-store-sqlx-prepare.db'

      - name: sqlx offline cache check (agaric-engine)
        # ci/path-conditional-jobs: same as the app-crate lane above — Rust-only
        # sqlx compile, skipped on a backend-less PR (backend != 'true').
        if: needs.detect-changes.outputs.backend == 'true'
        # #2621 wave E1: loro's `query!`/`query_scalar!` macros moved into
        # agaric-engine, which now carries its own committed `.sqlx/` cache.
        # A `../migrations` symlink under the crate lets both this action's
        # `cargo sqlx migrate run` and `sqlx::migrate!` resolve the shared
        # workspace migrations.
        #
        # The `database-url` MUST be absolute for a NON-root workspace member —
        # see the agaric-store lane's comment above for the relative-path
        # failure mode (rustc resolves relative sqlite paths from the workspace
        # root, not the crate dir).
        uses: ./.github/actions/sqlx-offline-check
        with:
          working-directory: src-tauri/agaric-engine
          database-url: 'sqlite:${{ runner.temp }}/agaric-engine-sqlx-prepare.db'

      - name: sqlx offline cache check (agaric-sync)
        # ci/path-conditional-jobs: same as the app-crate lane above — Rust-only
        # sqlx compile, skipped on a backend-less PR (backend != 'true').
        if: needs.detect-changes.outputs.backend == 'true'
        # #2621 Sync-D: the net/protocol/daemon/files + snapshot cluster's
        # `query!`/`query_as!`/`query_scalar!` macros moved into agaric-sync,
        # which now carries its own committed `.sqlx/` cache. A `../migrations`
        # symlink under the crate lets both this action's `cargo sqlx migrate
        # run` and `sqlx::migrate!` resolve the shared workspace migrations.
        #
        # The `database-url` MUST be absolute for a NON-root workspace member —
        # see the agaric-store lane's comment above for the relative-path
        # failure mode (rustc resolves relative sqlite paths from the workspace
        # root, not the crate dir).
        uses: ./.github/actions/sqlx-offline-check
        with:
          working-directory: src-tauri/agaric-sync
          database-url: 'sqlite:${{ runner.temp }}/agaric-sync-sqlx-prepare.db'

  # ---------------------------------------------------------------------------
  # docs-lint (#833) — the docs-only counterpart to `lint`. Runs ONLY on a
  # provably docs-only diff (the full `lint` job is skipped then) and runs
  # just the cheap doc-relevant prek hooks — markdownlint, the markdown
  # link/citation checks, typos, and lychee — with no Rust toolchain,
  # clippy, cargo-deny, cargo-audit, or sqlx-prepare. This keeps docs
  # actually linted on the fast path instead of waving them through.
  #
  # EXACTLY ONE of {lint, docs-lint} runs per PR (they have opposite
  # docs_only conditions). validate-all requires BOTH (a skipped sibling is
  # accepted only under docs_only — see that job), so whichever one ran must
  # have succeeded for the gate to pass. The prek config is NOT modified:
  # the reduced set is selected by passing hook ids on the command line.
  # ---------------------------------------------------------------------------
  docs-lint:
    needs: detect-changes
    if: needs.detect-changes.outputs.docs_only == 'true'
    runs-on: ubuntu-24.04
    # Cheap: Node + three prebuilt binaries + a handful of doc hooks. No
    # Rust compile. Generous 10-min ceiling (lychee hits the network).
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          # markdownlint/typos/lychee only need the working tree, but keep a
          # full clone so prek's local hooks behave identically to the `lint`
          # job (no shallow-clone surprises).
          fetch-depth: 0
          persist-credentials: false

      - name: Install Node.js
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: 24
          cache: npm

      - name: Install npm dependencies
        # markdownlint runs via `npx markdownlint-cli2`; the md-link-targets
        # and doc-vs-code-paths hooks are node scripts. All resolve from
        # node_modules, so `npm ci` is required.
        run: npm ci

      - name: Install prek + typos via prebuilt binaries
        # Only the tools the reduced doc-hook set needs — no cargo-deny /
        # sqruff / zizmor / taplo / cargo-audit (those gate code, which a
        # docs-only diff does not touch).
        uses: taiki-e/install-action@a6b2e2dcd845ddd7f509ce4f3ed3d922b80cc5d9 # v2.84.0
        with:
          tool: prek,typos-cli

      - name: Install lychee (prebuilt binary)
        # The `lychee` prek hook is a `local` hook calling the system
        # binary; install it the same way the full `lint` job does.
        run: |
          set -euo pipefail
          VERSION=lychee-v0.24.2
          DIR=lychee-x86_64-unknown-linux-gnu
          TARBALL="${DIR}.tar.gz"
          # Known-good SHA256 of the linux-gnu tarball for VERSION above — the
          # published release checksum (the sibling `${TARBALL}.sha256` asset),
          # independently reproducible with `sha256sum`. GitHub release assets
          # are mutable under a tag, so the version pin alone does not prevent
          # asset replacement; this is the only unverified-binary gap in an
          # otherwise SHA-pinned toolchain. MUST be updated in the same PR that
          # bumps VERSION or the `sha256sum -c` below fails the job.
          SHA256=1f4e0ef7f6554a6ed33dd7ac144fb2e1bbed98598e7af973042fc5cd43951c9a
          curl -fsSL -o /tmp/lychee.tar.gz \
            "https://github.com/lycheeverse/lychee/releases/download/${VERSION}/${TARBALL}"
          echo "${SHA256}  /tmp/lychee.tar.gz" | sha256sum -c -
          mkdir -p "${HOME}/.local/bin"
          tar -xzf /tmp/lychee.tar.gz -C /tmp "${DIR}/lychee"
          install -m 0755 "/tmp/${DIR}/lychee" "${HOME}/.local/bin/lychee"
          echo "${HOME}/.local/bin" >> "${GITHUB_PATH}"
          "${HOME}/.local/bin/lychee" --version

      - name: Restore lychee link-check cache
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: .lycheecache
          key: lychee-${{ runner.os }}-${{ hashFiles('**/*.md', '!node_modules/**') }}
          restore-keys: |
            lychee-${{ runner.os }}-

      - name: Run doc-only prek hooks (markdownlint, link/citation, typos)
        # Pass the hook ids positionally so prek runs ONLY this reduced set —
        # the prek.toml config itself is untouched (#833 constraint).
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: prek run --all-files markdownlint md-link-targets doc-vs-code-paths typos

      - name: Run lychee link check (pre-push-staged hook)
        # lychee is staged `pre-push` in prek.toml, so it needs the explicit
        # `--hook-stage pre-push` selector (the run above is the default
        # pre-commit stage). GITHUB_TOKEN avoids github.com rate-limiting.
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: prek run --all-files --hook-stage pre-push lychee

  # ---------------------------------------------------------------------------
  # vitest — frontend unit + integration suite (PEND-86: single job).
  # Previously a 3-shard matrix + a separate merge job; consolidated into one
  # full-suite run. Three ~3-min shards in parallel cost three runner slots and
  # still needed a 4th (merge) job, while the critical path was gated by the
  # 16-min cargo-tests long pole anyway. One full run (~8-9 min with v8
  # coverage) frees two runner slots, drops the merge job, and produces the
  # coverage report directly — no cross-shard istanbul merge to maintain.
  # Node-only; no Rust toolchain or apt deps needed.
  # ---------------------------------------------------------------------------
  vitest:
    needs: detect-changes
    # Run the frontend unit/integration suite iff the diff touches frontend
    # files (src/, e2e/, .ts/.tsx/.js/.jsx/.css, package[-lock].json, the
    # vite/vitest/tailwind/postcss configs, tsconfig*.json, index.html). Fail-
    # open is impossible: the classifier fails CLOSED (frontend=true on any
    # diff error), and a classifier failure fails the gate outright.
    if: needs.detect-changes.outputs.frontend == 'true'
    runs-on: ubuntu-24.04
    # PEND-41 R1 — full-suite wall-clock was ~3×2.2 min of test work split
    # across shards; run as one job that's ~6-7 min of tests + ~2 min v8
    # instrumentation, plus the ~1-2 min production build below (issue
    # #812). ~10-11 min observed-equivalent; +50% headroom + round up to
    # nearest 5 → 20 min.
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          persist-credentials: false

      - name: Install Node.js
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: 24
          cache: npm

      - name: Install npm dependencies
        run: npm ci

      - name: Vitest (full suite, with coverage)
        # #749: `vitest.config.ts` is the SINGLE source of truth for the
        # coverage thresholds (lines 90 / functions 89 / branches 80 /
        # statements 89). This step no longer overrides them to 0 — the
        # config thresholds now actually gate here, at zero marginal cost
        # (the suite already runs with coverage). Measured full-suite
        # coverage clears all four with headroom (lines 91.6 / functions
        # 90.9 / branches 82.0 / statements 89.8), so enabling the gate
        # does not red an otherwise-green PR; it stops a new untested module
        # from silently dropping below the OSPS-Silver line. The old three
        # contradictory versions (config 90/89/80/89, the `=0` override
        # here, and a `>=80%/>=75%` step-summary string) are reconciled to
        # this one. Writes the json summary to `coverage-merged/` for the
        # summary step + artifact.
        run: |
          npx vitest run \
            --coverage \
            --coverage.reportsDirectory=coverage-merged \
            --coverage.reporter=json \
            --coverage.reporter=json-summary

      - name: Production build (tsc -b && vite build)
        # Issue #812: nothing else on the PR path runs the production
        # bundler — Playwright uses the dev server, prek's tsc covers types
        # only, and `cargo tauri build` is path-gated away from
        # frontend-only diffs. Without this (~1-2 min) step, a change that
        # breaks rolldown/lightningcss production bundling (dynamic
        # imports, env handling, chunking) passes every PR check and
        # surfaces first at release-tag time.
        run: npm run build

      - name: Bundle-size budget gate (#750)
        # Zero new CI minutes — the production `dist/` from the build step
        # above is already on disk. The gate measures each PERF-24-tuned
        # chunk's gzip size against the checked-in budgets and fails on a
        # regression (e.g. a heavy lib pulled onto the entry path via a new
        # static import). Budgets are measured + 10% headroom; re-baseline
        # with `node scripts/check-bundle-budget.mjs --update`.
        run: node scripts/check-bundle-budget.mjs

      - name: Coverage summary
        if: hashFiles('coverage-merged/coverage-summary.json') != ''
        run: |
          {
            echo "## Coverage (vitest, full suite)"
            echo
            echo "| Metric | % | Covered / Total |"
            echo "| --- | --- | --- |"
            jq -r '
              .total |
              "| Lines      | \(.lines.pct)% | \(.lines.covered) / \(.lines.total) |",
              "| Statements | \(.statements.pct)% | \(.statements.covered) / \(.statements.total) |",
              "| Functions  | \(.functions.pct)% | \(.functions.covered) / \(.functions.total) |",
              "| Branches   | \(.branches.pct)% | \(.branches.covered) / \(.branches.total) |"
            ' coverage-merged/coverage-summary.json
            echo
            echo "_Gated against \`vitest.config.ts\` thresholds (#749, single source of truth): lines >= 90%, functions >= 89%, branches >= 80%, statements >= 88%. The vitest step above fails the job if any metric drops below its threshold._"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Coverage ratchet (#648, non-blocking)
        if: hashFiles('coverage-merged/coverage-summary.json') != ''
        # Non-blocking patch-level signal: compares this run's total line
        # coverage against the checked-in baseline (scripts/coverage-
        # baseline.json) and surfaces a drop in the step summary. ALWAYS
        # exits 0 — coverage is deliberately not gated here (#648); the
        # config thresholds above are the only vitest gate. Zero new CI
        # minutes (the summary already exists).
        run: node scripts/coverage-ratchet.mjs --summary coverage-merged/coverage-summary.json --key vitest

      - name: Upload coverage artifact
        # Kept the `vitest-coverage-merged` name so any downstream Codecov /
        # badge tooling that referenced it keeps working after the merge
        # job was removed.
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: vitest-coverage-merged
          path: coverage-merged/
          if-no-files-found: error
          retention-days: 30

  # ---------------------------------------------------------------------------
  # playwright — E2E browser tests, sharded 3-ways. Per-shard report uploaded
  # on failure (artifact name includes the shard number so the shards don't
  # collide). No merge step yet — deferred per the plan.
  # ---------------------------------------------------------------------------
  playwright:
    needs: detect-changes
    # Run the E2E browser suite iff the diff touches frontend files (same
    # `frontend` category as vitest). Fail-closed classifier — see
    # detect-changes.
    if: needs.detect-changes.outputs.frontend == 'true'
    runs-on: ubuntu-24.04
    # The e2e suite outgrew the 2-shard split: shard 2 ran 10.5 min and shard 1
    # hit the old 15-min cap (run 27705633920). Re-sharded 2 → 3 (per-shard
    # back to ~8-9 min) and raised the cap 15 → 20 min for headroom against
    # runner variance (matches the cargo-tests / vitest jobs).
    #
    # 20 → 30 (#1458): the cap is a JOB cap covering setup + tests, and apt
    # `install-deps` is slow-mirror-bound — it ran 760s (12.7 min) on a slow
    # Ubuntu mirror in run 27718957382 even after the prepare-apt lock fix,
    # leaving an ~9-min shard only ~7 min before the cap cancelled it mid-run.
    # `prepare-apt` removes the lock stall but cannot speed a genuinely slow
    # download; 30 min absorbs a pathological setup + a full shard. (The deb
    # re-download cost itself is tracked separately as an apt-cache optimization.)
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        shard: [1, 2, 3]
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          persist-credentials: false

      - name: Install Node.js
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: 24
          cache: npm

      - name: Install npm dependencies
        run: npm ci

      - name: Restore Playwright browser cache
        # Browser binaries live in ~/.cache/ms-playwright and are stable
        # for a given playwright version. Keying on package-lock.json's
        # hash catches the version pin; restore-keys lets a partial hit
        # serve as a base layer (`playwright install` below is idempotent
        # and pulls only what's missing, so a stale restore is safe).
        id: playwright-cache
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('package-lock.json') }}
          restore-keys: |
            playwright-${{ runner.os }}-

      - name: Prepare apt (free dpkg lock, bound downloads)
        uses: ./.github/actions/prepare-apt

      # Cache the Playwright system-dep .debs (#1464): `install-deps` apt-pulls
      # ~33 MB of libs/fonts each run; on a hit apt resolves from the cache
      # instead of the mirror. Keyed on package-lock so a Playwright bump busts
      # it; restore-keys lets a stale set seed a partial hit.
      - name: Cache apt archives (Playwright system deps)
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: /var/cache/apt/archives/*.deb
          key: apt-playwright-${{ runner.os }}-${{ hashFiles('package-lock.json') }}
          restore-keys: apt-playwright-${{ runner.os }}-

      - name: Install Playwright system deps (always)
        # `install-deps` apt-installs ~33 MB of system libs/fonts each run (not
        # on the base image; the .debs are now cached by the step above, #1464).
        # The earlier flake source was the
        # runner's `unattended-upgrades`/`apt-daily` holding the dpkg lock at
        # boot: this step queued behind a ~6-min background job and ran out the
        # 20-min budget during SETUP, never reaching the suite (runs
        # 27708752343 / 27711626771). `prepare-apt` above stops those jobs,
        # waits for the lock, and bounds mirror stalls; here we just retry once
        # more after re-clearing the lock, in case a straggler grabbed it.
        run: |
          for attempt in 1 2; do
            if npx playwright install-deps chromium; then
              exit 0
            fi
            echo "::warning::playwright install-deps attempt ${attempt} failed; waiting for apt lock before retry"
            for _ in $(seq 1 60); do
              sudo fuser /var/lib/dpkg/lock-frontend >/dev/null 2>&1 || break
              sleep 3
            done
            sudo dpkg --configure -a || true
          done
          echo "::error::playwright install-deps failed after 2 attempts"
          exit 1

      - name: Install Playwright browser binaries (on cache miss)
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: |
          for attempt in 1 2 3; do
            if timeout 360 npx playwright install chromium; then
              exit 0
            fi
            echo "::warning::playwright install chromium attempt ${attempt} stalled/failed; retrying"
            sleep 15
          done
          echo "::error::playwright install chromium failed after 3 attempts"
          exit 1

      - name: Playwright E2E tests (shard ${{ matrix.shard }}/3)
        id: playwright
        run: npx playwright test --shard ${{ matrix.shard }}/3

      - name: Upload Playwright report (on failure)
        if: failure() && steps.playwright.outcome == 'failure'
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          # `${{ matrix.shard }}` keeps shard artifacts from colliding —
          # GitHub rejects duplicate artifact names within a workflow run.
          name: playwright-report-shard-${{ matrix.shard }}
          path: |
            playwright-report/
            test-results/
          retention-days: 14
          if-no-files-found: ignore

  # ---------------------------------------------------------------------------
  # cargo-tests — full Rust test suite (nextest) with cargo-llvm-cov
  # source-based coverage. Uses its own `rust-cov` Swatinem cache key
  # (issue #813) — the instrumented tree shares nothing with the lint /
  # mcp / release trees. MCP build + UDS smoke + externalBin verify live
  # in their own `mcp-tests` job so a coverage-suite slowdown doesn't
  # gate the MCP-sidecar signal (and vice versa).
  # ---------------------------------------------------------------------------
  cargo-tests:
    needs: detect-changes
    # Run the Rust nextest+coverage suite iff the diff touches backend files
    # (src-tauri/, .rs, Cargo.toml/lock, migrations, .sqlx/). Fail-closed
    # classifier — see detect-changes. cargo-coverage `needs: cargo-tests`, so
    # it skips transitively when this job is skipped.
    if: needs.detect-changes.outputs.backend == 'true'
    runs-on: ubuntu-24.04
    # PEND-86: split into a 2-shard matrix via nextest `--partition count:N/2`.
    # The single-job full suite + llvm-cov was the ~16-min critical-path long
    # pole; sharding halves the test+instrument time per cell (each shard
    # compiles the instrumented tree once — the compile isn't halved, but the
    # test+coverage execution is — so expect ~9-11 min/cell). Each shard emits
    # a PARTIAL lcov + json summary; the `cargo-coverage` job below merges
    # them. Coverage stays informational (not gated) — see that job.
    # PEND-41 R1 — pre-split observed wall-clock 22.6 min (run 25966040732).
    # Per-shard is roughly half the test work on the same compile; keep a
    # generous 35-min budget until we have instrumented per-shard samples.
    timeout-minutes: 35
    strategy:
      fail-fast: false
      matrix:
        shard: [1, 2]
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          persist-credentials: false

      - name: Free disk space on runner
        # Run 26569299876 failed with `System.IO.IOException: No space left
        # on device` (annotation on job 78272043133) during the cargo-llvm-cov
        # instrumented compile. The instrumented build tree plus the rust-deps
        # Swatinem cache restore are the heavy consumers; this job uses none
        # of the preinstalled .NET / Haskell / Android / Swift toolchains, so
        # deleting them frees the headroom needed before cargo runs. `df -h`
        # is logged before+after so future tightening can size against real
        # numbers instead of a guess.
        run: |
          set -euo pipefail
          echo "Before:" && df -h /
          sudo rm -rf /usr/share/dotnet \
                      /usr/local/lib/android \
                      /opt/ghc \
                      /usr/local/share/boost \
                      /usr/local/share/powershell \
                      /usr/share/swift \
                      "$AGENT_TOOLSDIRECTORY"
          echo "After:" && df -h /

      - name: Prepare apt (free dpkg lock, bound downloads)
        uses: ./.github/actions/prepare-apt

      # Shared with the other Tauri-dep jobs (lint, cargo-tests, mcp-tests) and
      # reused across runs (#1464): on a hit `apt-get install` resolves from the
      # cached .debs instead of the slow Ubuntu mirror. Bump `-v1` if the list
      # below changes.
      - name: Cache apt archives (Tauri system deps)
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: /var/cache/apt/archives/*.deb
          key: apt-tauri-${{ runner.os }}-v1

      - name: Install system dependencies
        # Same apt list as the `lint` sibling — both jobs compile Rust and
        # need the webkit/gtk/ssl/rsvg/soup stack plus mold for fast linking.
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            libssl-dev \
            librsvg2-dev \
            libsoup-3.0-dev \
            pkg-config \
            mold

      - name: Enable mold linker (CI-only .cargo/config.toml)
        run: |
          mkdir -p .cargo
          cp .cargo/config.toml.example .cargo/config.toml

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@4cda84d5c5c54efe2404f9d843567869ab1699d4 # stable
        with:
          # #640: exact toolchain pin — keep in lockstep with
          # rust-toolchain.toml and src-tauri/Cargo.toml `rust-version`.
          # Without an explicit `toolchain:` this SHA-pinned action
          # installs the floating latest stable, and rustup would then
          # re-download the rust-toolchain.toml pin at first cargo run.
          toolchain: 1.95.0

      - name: Rust cache
        uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
        with:
          workspaces: src-tauri
          cache-bin: 'true'
          # Per-job-class key (issue #813): the llvm-cov instrumented tree
          # (coverage RUSTFLAGS) shares no artifacts with the lint / mcp /
          # release trees, so under the old shared `rust-deps` key it lost
          # the single cache slot to a faster sibling and recompiled from
          # scratch every PR. See the matching comment in the `lint` job.
          shared-key: rust-cov
          save-if: ${{ github.ref == 'refs/heads/main' }}

      - name: Install Node.js
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: 24
          cache: npm

      - name: Install npm dependencies
        # Needed for `scripts/prepare-external-bins.mjs` below (it imports
        # from node_modules to resolve the host triple).
        run: npm ci

      - name: Prepare externalBin placeholder (FEAT-4f)
        # Tauri's build.rs validates externalBin paths on every cargo
        # invocation — including nextest. The full-release agaric-mcp
        # build below replaces this placeholder with the real binary.
        run: node scripts/prepare-external-bins.mjs --placeholder-only

      - name: Install cargo-nextest + cargo-llvm-cov via prebuilt binary (PEND-39 C1)
        # `cargo-llvm-cov` wraps LLVM's source-based coverage instrumentation
        # — the gold standard for Rust coverage. It composes with
        # `cargo nextest` natively (`cargo llvm-cov nextest ...`), so we
        # don't have to swap runners. Output is lcov (industry standard,
        # consumable by Codecov / coveralls / VSCode coverage gutters) plus
        # a JSON summary the step below renders as a markdown table.
        uses: taiki-e/install-action@a6b2e2dcd845ddd7f509ce4f3ed3d922b80cc5d9 # v2.84.0
        with:
          tool: cargo-nextest,cargo-llvm-cov

      - name: Cargo test (nextest, shard ${{ matrix.shard }}/2, with llvm-cov)
        working-directory: src-tauri
        # Run THIS shard's deterministic partition under llvm-cov, then emit a
        # PARTIAL lcov for the lines this shard's tests exercised. The
        # `cargo-coverage` job below unions the two partials. `--partition
        # count:N/2` is nextest's stable hash partition (forwarded through
        # `cargo llvm-cov nextest`). `--no-fail-fast` mirrors plain nextest so
        # the coverage map shape is pass/fail-independent.
        #
        # `--workspace` (#2817): without it, only the ROOT package's tests ran
        # under llvm-cov — and since this is CI's only Rust unit/integration
        # job, the #2621 library crates' suites (agaric-core/store/engine)
        # were silently not executing in CI at all, and every module wave
        # showed a phantom coverage drop as its tests left the measured set.
        run: |
          cargo llvm-cov nextest --workspace --profile ci --no-fail-fast \
            --partition count:${{ matrix.shard }}/2 --no-report
          cargo llvm-cov report --lcov \
            --output-path coverage-${{ matrix.shard }}.lcov

      - name: Cargo test --doc (executable doc-comment examples)
        # nextest (the step above) does NOT run doc-tests — they compile as
        # their own per-example binaries outside the nextest harness. Without
        # this step a broken `/// ```` example on a pure helper would rot
        # silently (#2555). Run only on shard 1 (doc-tests aren't partitioned,
        # so running on both shards would just duplicate the work). Cheap while
        # there are few doc-tests; the per-example binary is the real cost as
        # adoption grows, which is why the convention is pure helpers only.
        if: matrix.shard == 1
        working-directory: src-tauri
        run: cargo test --doc --workspace

      - name: Upload shard coverage artifact
        # Partial lcov for this shard. Retained 7 days — the merged artifact
        # the `cargo-coverage` job publishes is the long-lived one.
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: rust-coverage-shard-${{ matrix.shard }}
          path: src-tauri/coverage-${{ matrix.shard }}.lcov
          if-no-files-found: error
          retention-days: 7

  # ---------------------------------------------------------------------------
  # cargo-coverage — union-merge the two cargo-tests shards' partial lcov
  # reports into the canonical `rust-coverage-lcov` artifact + a step-summary.
  # INFORMATIONAL: deliberately NOT in `validate-all`'s needs, so a merge
  # hiccup (or an lcov-tool quirk) never gates a push — exactly like the
  # vitest coverage was non-gating. `if: !cancelled()` so partial coverage
  # still publishes if a shard went red.
  # ---------------------------------------------------------------------------
  cargo-coverage:
    runs-on: ubuntu-24.04
    needs: cargo-tests
    # `success() || failure()` (i.e. cargo-tests actually ran) — NOT
    # `!cancelled()`, because a backend-absent PR SKIPS cargo-tests, and a
    # skipped upstream would otherwise let this job run and then fail
    # downloading shard artifacts that were never produced. Skipping coverage
    # when no Rust changed is correct and consistent with the `backend`
    # category gate on cargo-tests: this job stays paired with cargo-tests and
    # runs iff cargo-tests ran.
    if: ${{ (success() || failure()) && needs.cargo-tests.result != 'cancelled' }}
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          persist-credentials: false

      - name: Install lcov
        run: sudo apt-get update && sudo apt-get install -y lcov

      - name: Download shard coverage artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          pattern: rust-coverage-shard-*
          path: ./rust-coverage-shards
          merge-multiple: true

      - name: Union-merge the shard lcovs
        # `lcov --add-tracefile` takes the union of covered lines across the
        # two partition reports — the correct combine (concatenation would
        # duplicate records). `--ignore-errors` keeps the merge resilient to
        # llvm-cov/lcov-2.x format strictness; this job is non-gating so a
        # merge that still fails surfaces here without blocking the gate.
        #
        # Glob whatever shard artifacts actually exist (#819 (2)): the
        # shard upload step is success-gated, so when one cargo-tests
        # shard fails its lcov never uploads and hardcoding both paths
        # turned every shard failure into a SECOND spurious red here.
        # Partial (or zero) coverage publishes whatever is available;
        # the real failure signal stays on the cargo-tests shard itself.
        run: |
          set -euo pipefail
          shopt -s nullglob
          shards=(rust-coverage-shards/*.lcov)
          if [ "${#shards[@]}" -eq 0 ]; then
            echo "No shard lcov artifacts found (all shards failed before upload) — skipping merge."
            exit 0
          fi
          echo "Merging ${#shards[@]} shard lcov(s): ${shards[*]}"
          args=()
          for f in "${shards[@]}"; do
            args+=(--add-tracefile "$f")
          done
          lcov --ignore-errors inconsistent,unused,empty,format \
            "${args[@]}" \
            --output-file coverage.lcov

      - name: Coverage summary (rust, merged)
        if: hashFiles('coverage.lcov') != ''
        run: |
          {
            echo "## Coverage (rust, merged across 2 cargo-tests shards)"
            echo
            echo '```'
            lcov --summary coverage.lcov 2>&1 | grep -E 'lines|functions' || true
            echo '```'
            echo
            echo "_LLVM source-based coverage; the two nextest partitions' lcovs union-merged via \`lcov --add-tracefile\`._"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Install Node.js (for the coverage ratchet)
        if: hashFiles('coverage.lcov') != ''
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: 24

      - name: Coverage ratchet (#648, non-blocking)
        if: hashFiles('coverage.lcov') != ''
        # Non-blocking: compares total Rust line coverage (summed LF/LH from
        # the merged lcov) against the checked-in baseline and surfaces a
        # drop in the step summary. ALWAYS exits 0 — this job is already
        # informational/non-gating, and #648 deliberately does not gate
        # coverage. The `rust` baseline key is seeded from the first main
        # run via `--update` (no cargo-llvm-cov is available off-CI to
        # measure it locally).
        run: node scripts/coverage-ratchet.mjs --lcov coverage.lcov --key rust --gate

      - name: Upload merged rust coverage artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        if: hashFiles('coverage.lcov') != ''
        with:
          name: rust-coverage-lcov
          path: coverage.lcov
          if-no-files-found: error
          retention-days: 30

  # ---------------------------------------------------------------------------
  # mcp-tests — agaric-mcp sidecar build, UDS smoke test, and externalBin
  # staging verification. Split out of cargo-tests so MCP-sidecar failures
  # surface on a dedicated check (and vice versa: a flaky coverage run
  # doesn't gate MCP signal). Uses its own `rust-mcp` Swatinem cache key
  # (issue #813) — its release + debug-smoke tree matches neither the
  # lint tree nor the llvm-cov instrumented tree.
  # ---------------------------------------------------------------------------
  mcp-tests:
    needs: detect-changes
    # Run the MCP sidecar build + UDS smoke iff the diff touches backend files
    # (same `backend` category as cargo-tests). Fail-closed classifier — see
    # detect-changes.
    if: needs.detect-changes.outputs.backend == 'true'
    runs-on: ubuntu-24.04
    # MCP build + smoke is much lighter than the full nextest+llvm-cov
    # run on cargo-tests. 20 min covers the cold-cache compile of
    # `src-tauri` for the `agaric-mcp` bin + smoke test + the release-
    # mode rebuild that prepare-external-bins.mjs runs.
    # 20 → 30 (#1458): a slow-mirror apt `Install system dependencies` step
    # (~12 min, same root cause as the playwright/lint cap bumps) ran this job
    # out the 20-min budget. Deb re-download tracked as #1464; 30 min absorbs it.
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          persist-credentials: false

      - name: Prepare apt (free dpkg lock, bound downloads)
        uses: ./.github/actions/prepare-apt

      # Shared with the other Tauri-dep jobs (lint, cargo-tests, mcp-tests) and
      # reused across runs (#1464): on a hit `apt-get install` resolves from the
      # cached .debs instead of the slow Ubuntu mirror. Bump `-v1` if the list
      # below changes.
      - name: Cache apt archives (Tauri system deps)
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: /var/cache/apt/archives/*.deb
          key: apt-tauri-${{ runner.os }}-v1

      - name: Install system dependencies
        # Same apt list as cargo-tests / lint — the agaric-mcp crate
        # links against the webkit/gtk/ssl/rsvg/soup stack via its
        # transitive deps, and mold accelerates the link step.
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            libssl-dev \
            librsvg2-dev \
            libsoup-3.0-dev \
            pkg-config \
            mold

      - name: Enable mold linker (CI-only .cargo/config.toml)
        run: |
          mkdir -p .cargo
          cp .cargo/config.toml.example .cargo/config.toml

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@4cda84d5c5c54efe2404f9d843567869ab1699d4 # stable
        with:
          # #640: exact toolchain pin — keep in lockstep with
          # rust-toolchain.toml and src-tauri/Cargo.toml `rust-version`.
          # Without an explicit `toolchain:` this SHA-pinned action
          # installs the floating latest stable, and rustup would then
          # re-download the rust-toolchain.toml pin at first cargo run.
          toolchain: 1.95.0

      - name: Rust cache
        uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
        with:
          workspaces: src-tauri
          cache-bin: 'true'
          # Per-job-class key (issue #813): this job compiles a release
          # `agaric-mcp` plus a debug nextest smoke tree — neither matches
          # the lint tree nor cargo-tests' llvm-cov instrumented tree, so
          # sharing one `rust-deps` slot just meant the first finisher
          # evicted everyone else. See the matching comment in `lint`.
          shared-key: rust-mcp
          save-if: ${{ github.ref == 'refs/heads/main' }}

      - name: Install Node.js
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: 24
          cache: npm

      - name: Install npm dependencies
        # Needed for `scripts/prepare-external-bins.mjs` (it imports from
        # node_modules to resolve the host triple for the released binary).
        run: npm ci

      - name: Install cargo-nextest via prebuilt binary (PEND-39 C1)
        # nextest is the test runner for the UDS smoke test below. Prebuilt
        # binary via taiki-e/install-action keeps cold-cache cost tiny.
        uses: taiki-e/install-action@a6b2e2dcd845ddd7f509ce4f3ed3d922b80cc5d9 # v2.84.0
        with:
          tool: cargo-nextest

      - name: Prepare externalBin placeholder (FEAT-4f)
        # Tauri's build.rs validates externalBin paths on every cargo
        # invocation. The full-release rebuild below overwrites this
        # placeholder with the real binary.
        run: node scripts/prepare-external-bins.mjs --placeholder-only

      - name: Build agaric-mcp stub binary (FEAT-4f)
        # Build the release binary first so the I-MCP-9 smoke test below
        # can exec it (the test searches `target/{debug,release}/` for
        # the binary; we used to debug-build and then release-build in
        # series — ~3:48 wasted re-compiling the same code with a
        # different profile). The release build also satisfies the
        # FEAT-4f externalBin staging check at the end.
        run: node scripts/prepare-external-bins.mjs

      - name: MCP stub-binary smoke test (I-MCP-9)
        working-directory: src-tauri
        run: cargo nextest run --features ci-smoke --profile ci -E 'test(stub_binary_roundtrips_initialize_over_uds)'

      - name: Verify agaric-mcp smoke (--version)
        run: src-tauri/target/release/agaric-mcp --version

      - name: Verify externalBin artifact exists
        run: test -x src-tauri/binaries/agaric-mcp-x86_64-unknown-linux-gnu

  # ---------------------------------------------------------------------------
  # validate-all — the single required aggregate gate (branch protection + the
  # ci.yml / release.yml callers depend on this one context, so adding/removing
  # siblings never churns the protected-check list).
  #
  # SECURITY-SENSITIVE (#805 strict gate + #833 per-category fast-path). Read
  # slowly. `if: always()` is load-bearing: a plain needs: would SKIP this job on
  # a sibling failure, and a skipped REQUIRED check counts as PASSING — a red
  # sibling would stay mergeable. It always runs and decides from sibling results:
  #   - detect-changes must have SUCCEEDED; else pin frontend=backend=true,
  #     docs_only=false and fail (fail-closed).
  #   - success always OK; failure/cancelled NEVER OK; skipped OK only when the
  #     job's category is absent — lint iff docs_only; vitest/playwright iff
  #     !frontend; cargo-tests/cargo-coverage/mcp-tests iff !backend; docs-lint is
  #     the complement (success iff docs_only, else skipped).
  # INVARIANT: under classifier failure or any category true, that category's
  # heavy jobs MUST be success — no code change rides in on a skip (classifier is
  # allowlist-based + fail-closed; a backend change that regenerates bindings also
  # flips frontend). Full truth table in the PR body.
  # ---------------------------------------------------------------------------
  validate-all:
    needs: [detect-changes, verify-version-agreement, lint, docs-lint, vitest, playwright, cargo-tests, cargo-coverage, mcp-tests]
    if: always()
    runs-on: ubuntu-24.04
    # PEND-41 R1 — trivial jq/bash assertion (~2s observed); 5-min floor.
    timeout-minutes: 5
    steps:
      - name: Assert validate gate (per-category, fail-closed)
        env:
          # The full needs context, e.g. {"lint": {"result": "success"}, ...}.
          # Passed via env (not inline interpolation) so the JSON can never
          # be parsed as shell.
          NEEDS_JSON: ${{ toJSON(needs) }}
          # Read the classifier category outputs directly (NOT from NEEDS_JSON
          # — outputs live under .outputs there, but reading the resolved value
          # here is clearer). Each is passed via env, never inline-interpolated
          # into the script body. Empty/anything-but-"true" is treated as the
          # category being ABSENT (i.e. not docs-only / no frontend / no
          # backend); the gate normalises them below.
          DOCS_ONLY: ${{ needs.detect-changes.outputs.docs_only }}
          FRONTEND: ${{ needs.detect-changes.outputs.frontend }}
          BACKEND: ${{ needs.detect-changes.outputs.backend }}
        run: |
          set -euo pipefail

          fail=0
          gate_fail() { echo "::error::$1"; fail=1; }

          result_of() { jq -r --arg k "$1" '.[$k].result // "missing"' <<< "$NEEDS_JSON"; }

          # check_job JOB SKIP_OK: success is always OK; skipped is OK only when
          # SKIP_OK=="true" (that job's category is absent); failure/cancelled/
          # anything-else is NEVER OK. `fail` is a global mutated via gate_fail.
          check_job() {
            local j="$1" skip_ok="$2" r
            r="$(result_of "$j")"
            if [ "$r" = "success" ]; then
              return 0
            fi
            if [ "$r" = "skipped" ] && [ "$skip_ok" = "true" ]; then
              echo "$j skipped (allowed: category absent)."
              return 0
            fi
            gate_fail "job '$j' result=$r is not acceptable (skip_ok=$skip_ok)."
          }

          classifier="$(result_of detect-changes)"
          echo "detect-changes result=$classifier docs_only=${DOCS_ONLY:-<empty>} frontend=${FRONTEND:-<empty>} backend=${BACKEND:-<empty>}"

          # ---- Resolve category booleans, fail-closed -----------------------
          # On a SUCCESSFUL classifier, trust its outputs (normalised so only
          # the literal string "true" counts as present). Otherwise we cannot
          # trust any category: PIN frontend=true, backend=true, docs_only=false
          # (require/run everything) and fail the gate — a classifier that did
          # not succeed can never let a heavy job pass on a skip.
          docs_only="false"
          frontend="true"
          backend="true"
          if [ "$classifier" = "success" ]; then
            docs_only="false"; if [ "$DOCS_ONLY" = "true" ]; then docs_only="true"; fi
            frontend="false"; if [ "$FRONTEND" = "true" ]; then frontend="true"; fi
            backend="false"; if [ "$BACKEND" = "true" ]; then backend="true"; fi
          else
            gate_fail "detect-changes did not succeed (result=$classifier) — failing gate (fail-closed); pinning frontend=backend=true, docs_only=false."
          fi
          echo "resolved: docs_only=$docs_only frontend=$frontend backend=$backend"

          # verify-version-agreement is always-on (#2975) — no category gates
          # it, so a skip is never acceptable.
          check_job verify-version-agreement "false"

          # ---- Per-category acceptance --------------------------------------
          # lint is CROSS-CUTTING: it runs on any non-docs change, so its skip
          # is allowed only when docs_only.
          lint_skip_ok="false"; if [ "$docs_only" = "true" ]; then lint_skip_ok="true"; fi
          check_job lint "$lint_skip_ok"

          # frontend suite: skip allowed only when the frontend category is
          # absent from the diff.
          fe_skip_ok="false"; if [ "$frontend" != "true" ]; then fe_skip_ok="true"; fi
          check_job vitest "$fe_skip_ok"
          check_job playwright "$fe_skip_ok"

          # backend suite (+ its transitive coverage): skip allowed only when
          # the backend category is absent from the diff.
          be_skip_ok="false"; if [ "$backend" != "true" ]; then be_skip_ok="true"; fi
          check_job cargo-tests "$be_skip_ok"
          check_job cargo-coverage "$be_skip_ok"
          check_job mcp-tests "$be_skip_ok"

          # ---- docs-lint: the complement (runs on docs-only PRs) ------------
          # success → OK only under docs_only (it should have run)
          # skipped → OK only under !docs_only (it is path-gated off)
          dl="$(result_of docs-lint)"
          if [ "$docs_only" = "true" ]; then
            if [ "$dl" != "success" ]; then
              gate_fail "docs-lint result=$dl but a docs-only PR requires it to pass."
            fi
          else
            if [ "$dl" != "skipped" ]; then
              gate_fail "docs-lint result=$dl but a non-docs PR expects it skipped."
            fi
          fi

          if [ "$fail" -ne 0 ]; then
            echo "::error::validate-all gate FAILED (see above)."
            exit 1
          fi
          echo "validate-all gate PASSED (docs_only=$docs_only frontend=$frontend backend=$backend)."
