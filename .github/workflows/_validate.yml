name: Validate (prek-equivalent)

# Reusable workflow that runs the same checks as `prek run --all-files`
# locally, plus the full vitest + cargo nextest + Playwright suites and the
# externalBin / sqlx-offline-cache smoke checks.
#
# Invoked by ci.yml (every push/PR) and release.yml (every tag).
#
# PEND-39 C3 + C5 + C8: the historical monolithic `validate` job was split
# into five parallel worker jobs (lint, vitest [3-shard matrix], playwright
# [2-shard matrix], cargo-tests [nextest + llvm-cov], mcp-tests [agaric-mcp
# build + UDS smoke + externalBin verify]) plus a trivial `validate-all`
# aggregate whose only job is to give branch-protection rules a single
# stable check name to depend on. Wall clock drops from ~25-30 min
# sequential to ~7-10 min (limited by the slowest single job, typically
# cargo-tests). Callers that `needs: validate` on the workflow-call as a
# whole continue to work — GitHub propagates per-job failures up to the
# caller.

on:
  workflow_call:

# Read-only by default. The workers only check out the code, run prek + the
# full test suites, and upload the playwright report on failure (which uses
# its own scoped token via actions/upload-artifact).
permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always

jobs:
  # ---------------------------------------------------------------------------
  # lint — prek hook suite (excluding vitest/cargo-test/no-commit-to-branch),
  # npm audit signatures (warn-only), cargo audit (blocking — see PEND-41 R5), and the sqlx
  # offline-cache drift check. Needs the full Node + Rust + mold + cargo
  # plugins stack because prek's hooks invoke clippy, cargo-deny, sqruff,
  # zizmor, etc.
  # ---------------------------------------------------------------------------
  lint:
    runs-on: ubuntu-24.04
    # PEND-41 R1 — observed wall-clock 11.2 min (run 25966040732, 2026-05-16,
    # n=1 post-PEND-39-split). +50% headroom + round up to nearest 5 → 20 min.
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          # gitleaks (run via prek) inspects git history, so we need the
          # full commit graph rather than the default shallow checkout.
          fetch-depth: 0
          persist-credentials: false

      - name: Install system dependencies
        # `mold` is added to speed up the linker step on the Rust builds
        # (clippy, cargo-deny, sqlx prepare's compile pass, etc).
        # Activated via the .cargo/config.toml under the linux runner.
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            libssl-dev \
            librsvg2-dev \
            libsoup-3.0-dev \
            pkg-config \
            mold

      - name: Enable mold linker (CI-only .cargo/config.toml)
        # Project ships `.cargo/config.toml.example` staged so local builds
        # don't break if a contributor hasn't installed mold yet; CI always
        # has mold available (apt step above), so we materialise the
        # active config at runtime.
        run: |
          mkdir -p .cargo
          cp .cargo/config.toml.example .cargo/config.toml

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable

      - name: Rust cache
        uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
        with:
          workspaces: src-tauri
          # Cache `~/.cargo/bin/` so cargo-installed plugins (prek, sqlx-cli)
          # persist across runs.
          cache-bin: 'true'
          # PEND-39 C6: shared key with ci.yml's Linux desktop build job
          # and the cargo-tests sibling here (same `shared-key: rust-deps`).
          # Swatinem segregates internally by profile (test/release) and by
          # runner.os, so the Linux validate + Linux build slots dedupe
          # without colliding with macOS / Windows build slots or the
          # Android job (which uses a different shared-key for its
          # cross-compile target).
          shared-key: rust-deps
          # `save-if` gates which runs write to the cache. Only `main`
          # populates it; feature branches read from main's cache and
          # write only an ephemeral layer on top (expires at the standard
          # 7-day GH cache TTL). Prevents every feature branch from
          # poisoning the shared cache.
          save-if: ${{ github.ref == 'refs/heads/main' }}

      - name: Install Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 24
          cache: npm

      - name: Install npm dependencies
        run: npm ci

      - name: Verify npm package provenance signatures
        # Requires Node 22.5+; rejects packages whose registry-side Sigstore
        # provenance attestation is missing or invalid. Catches the
        # "compromised maintainer republishes from a different machine"
        # class of attack (Sigstore signs at publish time from CI, so a
        # local laptop republish has no valid attestation). Mode is `audit`
        # not `install` so missing attestations log a warning rather than
        # failing the build — many transitive deps don't yet publish with
        # provenance and we don't want to gate CI on that today.
        run: npm audit signatures || echo "::warning::npm audit signatures had findings (warn-only mode); review the log above"

      - name: Prepare externalBin placeholder (FEAT-4f)
        # Tauri's build.rs validates externalBin paths on every cargo
        # invocation — clippy, cargo-deny, machete all trigger it.
        run: node scripts/prepare-external-bins.mjs --placeholder-only

      - name: Install Rust-based dev tools via prebuilt binaries (PEND-39 C1)
        # taiki-e/install-action pulls prebuilt binaries from the upstream
        # GitHub Releases of each tool, side-stepping the per-binary
        # `cargo install` compile that previously dominated cold-cache
        # runs. Unlike `cargo install`, the binary cache here is not
        # invalidated by `Cargo.lock` changes — only by the explicit `@v2`
        # tag bump or a tool-version pin change. cargo-nextest lives on
        # the cargo-tests job (the only consumer); this job needs the
        # lint/audit set. `prek` joined the manifest list upstream so it
        # moved off the cargo-install fallback below.
        uses: taiki-e/install-action@8f531eaecd1898bc3da7d104ad91bee98d1b97bd # v2.79.9
        with:
          tool: cargo-deny,cargo-machete,cargo-audit,sqruff,typos-cli,zizmor,taplo-cli,prek

      - name: Install sqlx-cli (custom features, cargo fallback)
        # sqlx-cli with the right features set isn't covered by
        # taiki-e/install-action's binary list — has to compile from source.
        # Cached across runs via Swatinem/rust-cache's cache-bin: 'true';
        # only recompiles when Cargo.lock invalidates that cache.
        run: |
          if ! command -v cargo-sqlx >/dev/null; then cargo install --locked sqlx-cli --no-default-features --features rustls,sqlite; fi

      - name: Install lychee (prebuilt binary)
        # The `lychee` pre-commit hook (prek.toml `[[repos.hooks]] id = "lychee"`)
        # is a `local` hook calling the system `lychee` binary, since the
        # upstream `lycheeverse/lychee` pre-commit repo is broken on a
        # normal dev box (see commit bd3dc79c for the failure modes).
        # That means CI must put a `lychee` binary on PATH explicitly —
        # `taiki-e/install-action` doesn't manifest lychee, so we pull the
        # official prebuilt release directly. Fast (~1s) and avoids the
        # slow `cargo install` compile.
        run: |
          set -euo pipefail
          VERSION=lychee-v0.24.2
          DIR=lychee-x86_64-unknown-linux-gnu
          TARBALL="${DIR}.tar.gz"
          curl -fsSL -o /tmp/lychee.tar.gz \
            "https://github.com/lycheeverse/lychee/releases/download/${VERSION}/${TARBALL}"
          mkdir -p "${HOME}/.local/bin"
          tar -xzf /tmp/lychee.tar.gz -C /tmp "${DIR}/lychee"
          install -m 0755 "/tmp/${DIR}/lychee" "${HOME}/.local/bin/lychee"
          echo "${HOME}/.local/bin" >> "${GITHUB_PATH}"
          "${HOME}/.local/bin/lychee" --version

      - name: Restore lychee link-check cache
        # Persist the lychee URL cache across runs so we don't re-hit the
        # same github.com / crates.io / npm URLs from cold every time.
        # Key on the markdown file set so a doc edit invalidates as expected;
        # restore-keys lets a partial cache survive when the key misses.
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5
        with:
          path: .lycheecache
          key: lychee-${{ runner.os }}-${{ hashFiles('**/*.md') }}
          restore-keys: |
            lychee-${{ runner.os }}-

      - name: Run prek (same as `prek run --all-files` locally)
        env:
          # `no-commit-to-branch` is a pre-push guard for local dev only.
          # `vitest` and `cargo-test` here run only the related test subset
          # (`scripts/test-related-*.sh`); the full suites run as dedicated
          # sibling jobs (vitest, cargo-tests) so a CI run never silently
          # misses tests outside the diff window.
          SKIP: no-commit-to-branch,vitest,cargo-test
          # Lychee reads GITHUB_TOKEN automatically. Without this, lychee
          # makes unauthenticated requests to github.com and gets rate-
          # limited (~60 req/hour) — bursty Dependabot PR runs blow the
          # budget and surface as transient lint failures even with 429 +
          # 5xx accepted in `lychee.toml`.
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: prek run --all-files

      - name: Cargo audit (RustSec advisory check, blocking)
        # Complements `cargo deny check` (in the prek run above) by hitting
        # the upstream RustSec advisory DB directly — catches advisories
        # published since `deny.toml`'s ignore list was last triaged.
        #
        # PEND-41 R5 — promoted from warn-only to blocking. A new advisory
        # surfaces here exactly once; the maintainer must either fix the
        # underlying dep or add an explicit entry to
        # `src-tauri/deny.toml [advisories].ignore` with a `reason` field
        # documenting why the call-site is unaffected. The .nsprc-style
        # explicit-waiver discipline applies; same pattern used by the
        # npm-side audit step.
        working-directory: src-tauri
        run: cargo audit

      - name: sqlx offline cache check
        # `-- --tests` matches the local pre-push hook + the
        # MAINT-227 closure note in prek.toml: without it, query
        # drift in `#[cfg(test)]` modules slips through CI silently
        # (caught 5 such drifts in session 679's PEND-18 work).
        #
        # `DATABASE_URL` is required by sqlx-cli 0.8.x even in
        # `--check` mode (the CLI verifies the env var before
        # delegating to `cargo check` with `SQLX_OFFLINE=true`). A
        # placeholder `sqlite::memory:` is enough — the actual query
        # validation happens against the committed `.sqlx/` cache, not
        # against this URL. Locally the same env comes from
        # `src-tauri/.env` (`DATABASE_URL=sqlite:dev.db`); CI gets the
        # placeholder explicitly so the check no longer hard-fails on
        # a fresh sqlx-cli install with no env wired in.
        working-directory: src-tauri
        env:
          DATABASE_URL: 'sqlite::memory:'
        run: cargo sqlx prepare --check -- --tests

  # ---------------------------------------------------------------------------
  # vitest — frontend unit + integration suite, sharded 3-ways (PEND-39 C3).
  # Each shard pays its own jsdom-env-setup cost, so near-linear scaling.
  # Node-only; no Rust toolchain or apt deps needed.
  # ---------------------------------------------------------------------------
  vitest:
    runs-on: ubuntu-24.04
    # PEND-41 R1 — per-shard wall-clock 2.2 min max (run 25966040732, n=1
    # post-PEND-39-split). +50% headroom + 5-min floor → 5 min. All three
    # shards now run with `--coverage` so the post-shards merge job has
    # complete data to aggregate; v8 instrumentation adds ~2 min per
    # shard, so each cell gets the 8-min budget that was previously
    # shard-1-only.
    timeout-minutes: 8
    strategy:
      fail-fast: false
      matrix:
        shard: [1, 2, 3]
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Install Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 24
          cache: npm

      - name: Install npm dependencies
        run: npm ci

      - name: Vitest (shard ${{ matrix.shard }}/3, with coverage)
        # Every shard runs with `--coverage` writing into a per-shard
        # output directory; the `vitest-coverage` job below downloads
        # all three and merges them into a unified summary. Thresholds
        # in `vitest.config.ts` apply to FULL-suite runs; on a partial
        # shard ~⅔ of the codebase is unreached by design, so we
        # override each threshold to 0 here — the gate runs against the
        # merged report, not against individual shards.
        run: |
          npx vitest run --shard ${{ matrix.shard }}/3 \
            --coverage \
            --coverage.reportsDirectory=coverage-shard-${{ matrix.shard }} \
            --coverage.reporter=json \
            --coverage.reporter=json-summary \
            --coverage.thresholds.lines=0 \
            --coverage.thresholds.functions=0 \
            --coverage.thresholds.statements=0 \
            --coverage.thresholds.branches=0

      - name: Upload shard coverage artifact
        # Each shard's raw coverage-final.json is what `merge-vitest-coverage.mjs`
        # consumes via `istanbul-lib-coverage`'s CoverageMap.merge() — the
        # canonical way to combine v8/istanbul-shape JSONs without
        # double-counting overlapping lines. The merge job below picks
        # all three up as a single download.
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: vitest-coverage-shard-${{ matrix.shard }}
          path: coverage-shard-${{ matrix.shard }}/coverage-final.json
          if-no-files-found: error
          retention-days: 7

  # ---------------------------------------------------------------------------
  # vitest-coverage — merge the three vitest shards' coverage maps into one,
  # render a step-summary table, and re-upload the aggregate so downstream
  # tooling (future Codecov, gh-pages badge, etc.) can consume a single artifact.
  # `if: !cancelled()` runs even if a shard failed — partial coverage is
  # better than no coverage when a single shard's tests went red.
  # ---------------------------------------------------------------------------
  vitest-coverage:
    runs-on: ubuntu-24.04
    needs: vitest
    if: ${{ !cancelled() && needs.vitest.result != 'cancelled' }}
    # PEND-41 R1 — pure download + node merge + jq render. No instrumentation,
    # no test execution. 5-min budget is generous.
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Install Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 24
          cache: npm

      - name: Install npm dependencies
        # `merge-vitest-coverage.mjs` depends on `istanbul-lib-coverage`
        # (transitive via `@vitest/coverage-v8`). `npm ci` brings the
        # full devDependency tree so the script can resolve it.
        run: npm ci

      - name: Download per-shard coverage artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          pattern: vitest-coverage-shard-*
          path: ./coverage-shards
          merge-multiple: false

      - name: Merge coverage maps
        id: merge
        run: |
          node scripts/merge-vitest-coverage.mjs \
            coverage-shards/vitest-coverage-shard-1/coverage-final.json \
            coverage-shards/vitest-coverage-shard-2/coverage-final.json \
            coverage-shards/vitest-coverage-shard-3/coverage-final.json

      - name: Coverage summary (merged)
        if: hashFiles('coverage-merged/coverage-summary.json') != ''
        run: |
          {
            echo "## Coverage (merged across vitest shards)"
            echo
            echo "| Metric | % | Covered / Total |"
            echo "| --- | --- | --- |"
            jq -r '
              .total |
              "| Lines      | \(.lines.pct)% | \(.lines.covered) / \(.lines.total) |",
              "| Statements | \(.statements.pct)% | \(.statements.covered) / \(.statements.total) |",
              "| Functions  | \(.functions.pct)% | \(.functions.covered) / \(.functions.total) |",
              "| Branches   | \(.branches.pct)% | \(.branches.covered) / \(.branches.total) |"
            ' coverage-merged/coverage-summary.json
            echo
            echo "_Thresholds in \`vitest.config.ts\`: lines/functions/statements >= 80%, branches >= 75%._"
            echo "_Merged from 3 vitest shards via \`scripts/merge-vitest-coverage.mjs\` (istanbul-lib-coverage CoverageMap.merge)._"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Upload merged coverage artifact
        # The merged artifact is what downstream Codecov / badge tooling
        # would consume. Retained 30 days (vs 7 for the per-shard
        # inputs) because cross-run trend comparisons live longer than
        # the inputs that produced them.
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: vitest-coverage-merged
          path: coverage-merged/
          if-no-files-found: error
          retention-days: 30

  # ---------------------------------------------------------------------------
  # playwright — E2E browser tests, sharded 2-ways (PEND-39 C8). Per-shard
  # report uploaded on failure (artifact name includes the shard number so
  # the two shards don't collide). No merge step yet — deferred per the plan.
  # ---------------------------------------------------------------------------
  playwright:
    runs-on: ubuntu-24.04
    # PEND-41 R1 — per-shard wall-clock 7.9 min max (run 25966040732, n=1
    # post-PEND-39-split). +50% headroom + round up → 15 min.
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        shard: [1, 2]
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Install Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 24
          cache: npm

      - name: Install npm dependencies
        run: npm ci

      - name: Restore Playwright browser cache
        # Browser binaries live in ~/.cache/ms-playwright and are stable
        # for a given playwright version. Keying on package-lock.json's
        # hash catches the version pin; restore-keys lets a partial hit
        # serve as a base layer (`playwright install` below is idempotent
        # and pulls only what's missing, so a stale restore is safe).
        id: playwright-cache
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('package-lock.json') }}
          restore-keys: |
            playwright-${{ runner.os }}-

      - name: Install Playwright system deps (always)
        # `install-deps` is apt-side state which the actions/cache above
        # doesn't (and shouldn't) persist — fast (~10s) on a warm apt
        # cache. Browser binaries are handled separately by the next step
        # so a cache hit skips that ~30-60s download entirely.
        run: npx playwright install-deps chromium

      - name: Install Playwright browser binaries (on cache miss)
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: npx playwright install chromium

      - name: Playwright E2E tests (shard ${{ matrix.shard }}/2)
        id: playwright
        run: npx playwright test --shard ${{ matrix.shard }}/2

      - name: Upload Playwright report (on failure)
        if: failure() && steps.playwright.outcome == 'failure'
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          # `${{ matrix.shard }}` keeps shard artifacts from colliding —
          # GitHub rejects duplicate artifact names within a workflow run.
          name: playwright-report-shard-${{ matrix.shard }}
          path: |
            playwright-report/
            test-results/
          retention-days: 14
          if-no-files-found: ignore

  # ---------------------------------------------------------------------------
  # cargo-tests — full Rust test suite (nextest) with cargo-llvm-cov
  # source-based coverage. Shares the `rust-deps` Swatinem cache key with
  # the `lint` sibling, the `mcp-tests` sibling below, and the Linux
  # desktop build job in ci.yml. MCP build + UDS smoke + externalBin
  # verify live in their own `mcp-tests` job so a coverage-suite slowdown
  # doesn't gate the MCP-sidecar signal (and vice versa).
  # ---------------------------------------------------------------------------
  cargo-tests:
    runs-on: ubuntu-24.04
    # PEND-41 R1 — observed wall-clock 22.6 min (run 25966040732, 2026-05-16,
    # n=1 post-PEND-39-split). Slowest single validate job; cargo nextest
    # dominates. +50% headroom + round up → 35 min. cargo-llvm-cov adds
    # ~30% instrumentation overhead on top of plain nextest, so bump to
    # 45 min to keep the headroom margin. Tighten back to 35 once we have
    # n>=5 instrumented runs to size against.
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Free disk space on runner
        # Run 26569299876 failed with `System.IO.IOException: No space left
        # on device` (annotation on job 78272043133) during the cargo-llvm-cov
        # instrumented compile. The instrumented build tree plus the rust-deps
        # Swatinem cache restore are the heavy consumers; this job uses none
        # of the preinstalled .NET / Haskell / Android / Swift toolchains, so
        # deleting them frees the headroom needed before cargo runs. `df -h`
        # is logged before+after so future tightening can size against real
        # numbers instead of a guess.
        run: |
          set -euo pipefail
          echo "Before:" && df -h /
          sudo rm -rf /usr/share/dotnet \
                      /usr/local/lib/android \
                      /opt/ghc \
                      /usr/local/share/boost \
                      /usr/local/share/powershell \
                      /usr/share/swift \
                      "$AGENT_TOOLSDIRECTORY"
          echo "After:" && df -h /

      - name: Install system dependencies
        # Same apt list as the `lint` sibling — both jobs compile Rust and
        # need the webkit/gtk/ssl/rsvg/soup stack plus mold for fast linking.
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            libssl-dev \
            librsvg2-dev \
            libsoup-3.0-dev \
            pkg-config \
            mold

      - name: Enable mold linker (CI-only .cargo/config.toml)
        run: |
          mkdir -p .cargo
          cp .cargo/config.toml.example .cargo/config.toml

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable

      - name: Rust cache
        uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
        with:
          workspaces: src-tauri
          cache-bin: 'true'
          # PEND-39 C6: shared with the `lint` sibling and ci.yml's Linux
          # desktop build. See the matching comment in the `lint` job for
          # the per-OS / per-profile segregation logic.
          shared-key: rust-deps
          save-if: ${{ github.ref == 'refs/heads/main' }}

      - name: Install Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 24
          cache: npm

      - name: Install npm dependencies
        # Needed for `scripts/prepare-external-bins.mjs` below (it imports
        # from node_modules to resolve the host triple).
        run: npm ci

      - name: Prepare externalBin placeholder (FEAT-4f)
        # Tauri's build.rs validates externalBin paths on every cargo
        # invocation — including nextest. The full-release agaric-mcp
        # build below replaces this placeholder with the real binary.
        run: node scripts/prepare-external-bins.mjs --placeholder-only

      - name: Install cargo-nextest + cargo-llvm-cov via prebuilt binary (PEND-39 C1)
        # `cargo-llvm-cov` wraps LLVM's source-based coverage instrumentation
        # — the gold standard for Rust coverage. It composes with
        # `cargo nextest` natively (`cargo llvm-cov nextest ...`), so we
        # don't have to swap runners. Output is lcov (industry standard,
        # consumable by Codecov / coveralls / VSCode coverage gutters) plus
        # a JSON summary the step below renders as a markdown table.
        uses: taiki-e/install-action@8f531eaecd1898bc3da7d104ad91bee98d1b97bd # v2.79.9
        with:
          tool: cargo-nextest,cargo-llvm-cov

      - name: Cargo test (nextest, full suite, with llvm-cov)
        working-directory: src-tauri
        # `--lcov --output-path coverage.lcov` writes the canonical lcov
        # report for downstream consumers; `--json --summary-only` to a
        # second path drives the step-summary table without re-reading
        # the lcov. `--no-fail-fast` mirrors plain `nextest`'s behaviour
        # (don't abort the suite on first failure) so the coverage map
        # we produce is the same shape regardless of pass/fail.
        run: |
          cargo llvm-cov nextest --profile ci --no-fail-fast --no-report
          cargo llvm-cov report --lcov --output-path coverage.lcov
          cargo llvm-cov report --json --summary-only --output-path coverage-summary.json

      - name: Coverage summary (rust)
        if: hashFiles('src-tauri/coverage-summary.json') != ''
        working-directory: src-tauri
        run: |
          {
            echo "## Coverage (rust, full suite via cargo-llvm-cov)"
            echo
            echo "| Metric | % | Covered / Total |"
            echo "| --- | --- | --- |"
            jq -r '
              .data[0].totals |
              "| Lines      | \(.lines.percent)% | \(.lines.covered) / \(.lines.count) |",
              "| Functions  | \(.functions.percent)% | \(.functions.covered) / \(.functions.count) |",
              "| Regions    | \(.regions.percent)% | \(.regions.covered) / \(.regions.count) |"
            ' coverage-summary.json
            echo
            echo "_LLVM source-based coverage (\`cargo llvm-cov\` over \`cargo nextest run --profile ci\`)._"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Upload rust coverage artifact
        # lcov is the canonical interchange format (Codecov, coveralls,
        # VSCode coverage gutters, lcov-summary tooling all consume it).
        # Retained 30 days for cross-run trend comparison.
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        if: hashFiles('src-tauri/coverage.lcov') != ''
        with:
          name: rust-coverage-lcov
          path: |
            src-tauri/coverage.lcov
            src-tauri/coverage-summary.json
          if-no-files-found: error
          retention-days: 30

  # ---------------------------------------------------------------------------
  # mcp-tests — agaric-mcp sidecar build, UDS smoke test, and externalBin
  # staging verification. Split out of cargo-tests so MCP-sidecar failures
  # surface on a dedicated check (and vice versa: a flaky coverage run
  # doesn't gate MCP signal). Shares the `rust-deps` Swatinem cache key
  # with cargo-tests + lint so the compile of `src-tauri` is amortised
  # across all three jobs.
  # ---------------------------------------------------------------------------
  mcp-tests:
    runs-on: ubuntu-24.04
    # MCP build + smoke is much lighter than the full nextest+llvm-cov
    # run on cargo-tests. 20 min covers the cold-cache compile of
    # `src-tauri` for the `agaric-mcp` bin + smoke test + the release-
    # mode rebuild that prepare-external-bins.mjs runs.
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Install system dependencies
        # Same apt list as cargo-tests / lint — the agaric-mcp crate
        # links against the webkit/gtk/ssl/rsvg/soup stack via its
        # transitive deps, and mold accelerates the link step.
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            libssl-dev \
            librsvg2-dev \
            libsoup-3.0-dev \
            pkg-config \
            mold

      - name: Enable mold linker (CI-only .cargo/config.toml)
        run: |
          mkdir -p .cargo
          cp .cargo/config.toml.example .cargo/config.toml

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable

      - name: Rust cache
        uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
        with:
          workspaces: src-tauri
          cache-bin: 'true'
          # Same `rust-deps` shared-key as the cargo-tests sibling — the
          # compile of src-tauri's dependency graph is the same on both
          # jobs. Swatinem dedupes inside the cache key.
          shared-key: rust-deps
          save-if: ${{ github.ref == 'refs/heads/main' }}

      - name: Install Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 24
          cache: npm

      - name: Install npm dependencies
        # Needed for `scripts/prepare-external-bins.mjs` (it imports from
        # node_modules to resolve the host triple for the released binary).
        run: npm ci

      - name: Install cargo-nextest via prebuilt binary (PEND-39 C1)
        # nextest is the test runner for the UDS smoke test below. Prebuilt
        # binary via taiki-e/install-action keeps cold-cache cost tiny.
        uses: taiki-e/install-action@8f531eaecd1898bc3da7d104ad91bee98d1b97bd # v2.79.9
        with:
          tool: cargo-nextest

      - name: Prepare externalBin placeholder (FEAT-4f)
        # Tauri's build.rs validates externalBin paths on every cargo
        # invocation. The full-release rebuild below overwrites this
        # placeholder with the real binary.
        run: node scripts/prepare-external-bins.mjs --placeholder-only

      - name: Build agaric-mcp stub binary (FEAT-4f)
        # Build the release binary first so the I-MCP-9 smoke test below
        # can exec it (the test searches `target/{debug,release}/` for
        # the binary; we used to debug-build and then release-build in
        # series — ~3:48 wasted re-compiling the same code with a
        # different profile). The release build also satisfies the
        # FEAT-4f externalBin staging check at the end.
        run: node scripts/prepare-external-bins.mjs

      - name: MCP stub-binary smoke test (I-MCP-9)
        working-directory: src-tauri
        run: cargo nextest run --features ci-smoke --profile ci -E 'test(stub_binary_roundtrips_initialize_over_uds)'

      - name: Verify agaric-mcp smoke (--version)
        run: src-tauri/target/release/agaric-mcp --version

      - name: Verify externalBin artifact exists
        run: test -x src-tauri/binaries/agaric-mcp-x86_64-unknown-linux-gnu

  # ---------------------------------------------------------------------------
  # validate-all — trivial aggregate. Branch protection rules and the
  # ci.yml / release.yml callers should treat this as the single "did all
  # validate work pass?" gate. Required so adding/removing a sibling job
  # doesn't churn the protected-check list. `needs:` declares the
  # dependency; GitHub fails this job automatically if any sibling fails
  # (or is skipped/cancelled), so the echo only runs on full green.
  # ---------------------------------------------------------------------------
  validate-all:
    needs: [lint, vitest, playwright, cargo-tests, mcp-tests]
    runs-on: ubuntu-24.04
    # PEND-41 R1 — trivial echo job (~2s observed); 5-min floor for sanity.
    timeout-minutes: 5
    steps:
      - name: All validate jobs passed
        run: echo "all validate jobs passed"
