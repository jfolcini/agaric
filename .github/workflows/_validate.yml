name: Validate (prek-equivalent)

# Reusable workflow that runs the same checks as `prek run --all-files`
# locally, plus the full vitest + cargo nextest + Playwright suites and the
# externalBin / sqlx-offline-cache smoke checks.
#
# Invoked by ci.yml (every push/PR) and release.yml (every tag).
#
# PEND-39 C3 + C5 + C8: the historical monolithic `validate` job was split
# into five parallel worker jobs (lint, vitest [3-shard matrix], playwright
# [2-shard matrix], cargo-tests [nextest + llvm-cov], mcp-tests [agaric-mcp
# build + UDS smoke + externalBin verify]) plus a trivial `validate-all`
# aggregate whose only job is to give branch-protection rules a single
# stable check name to depend on. Wall clock drops from ~25-30 min
# sequential to ~7-10 min (limited by the slowest single job, typically
# cargo-tests). Callers that `needs: validate` on the workflow-call as a
# whole continue to work — GitHub propagates per-job failures up to the
# caller.

on:
  workflow_call:

# Read-only by default. The workers only check out the code, run prek + the
# full test suites, and upload the playwright report on failure (which uses
# its own scoped token via actions/upload-artifact).
permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always

jobs:
  # ---------------------------------------------------------------------------
  # detect-docs-only (#833) — docs-only fast-path classifier.
  #
  # Emits a single boolean output `docs_only`. It is `true` ONLY when EVERY
  # path changed by this branch matches the conservative docs allowlist
  # below; ANY non-docs path (a `.rs`/`.ts`, a lockfile, a non-doc workflow
  # change, etc.) forces `docs_only=false` and the full validate suite runs.
  #
  # SECURITY CONTRACT (co-designed with #805's strict gate — read this with
  # the `validate-all` job at the bottom of the file):
  #   - This classifier is the ONLY thing that lets a `skipped` sibling job
  #     pass `validate-all`. If it is wrong in the `true` direction, a code
  #     change could ride in with its heavy jobs skipped. So it is:
  #       * allowlist-based: a path must AFFIRMATIVELY match a docs pattern;
  #         the default for any unmatched path is "not docs" → docs_only=false.
  #       * FAIL-CLOSED (#810 contract): on ANY inability to compute the diff
  #         (unresolved/unreachable base sha, a failed `git diff`), it emits
  #         `docs_only=false` so the full suite runs. A classifier error can
  #         only ever cost extra CI minutes, never weaken the gate.
  #   - `validate-all` ALSO independently fails-closed: if this job itself
  #     does not succeed, its result != 'success' trips the #805 assertion.
  #
  # Mirrors the fail-closed `git diff` shape of ci.yml's `detect-changes`.
  # ---------------------------------------------------------------------------
  detect-docs-only:
    runs-on: ubuntu-24.04
    timeout-minutes: 3
    outputs:
      docs_only: ${{ steps.classify.outputs.docs_only }}
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          # Full history so the three-dot `base...head` diff can resolve the
          # merge-base for PRs whose head sits behind `main` (same rationale
          # as ci.yml's detect-changes).
          fetch-depth: 0
          persist-credentials: false
      - id: classify
        shell: bash
        env:
          EVENT_NAME: ${{ github.event_name }}
          PR_BASE_SHA: ${{ github.event.pull_request.base.sha }}
          PR_HEAD_SHA: ${{ github.event.pull_request.head.sha }}
          PUSH_BEFORE: ${{ github.event.before }}
          PUSH_AFTER: ${{ github.sha }}
        run: |
          set -euo pipefail

          # Helper: emit docs_only=false and exit 0. Used for every
          # fail-closed branch so the full suite runs whenever we are not
          # 100% certain the diff is docs-only.
          full_suite() {
            echo "$1"
            echo "docs_only=false" >> "$GITHUB_OUTPUT"
            exit 0
          }

          if [ "$EVENT_NAME" = "pull_request" ]; then
            base="$PR_BASE_SHA"
            head="$PR_HEAD_SHA"
          else
            # push (feature branch / main) or tag (release.yml). The
            # release tag path almost never resolves a meaningful `before`
            # and is never docs-only anyway — fail-closed handles it.
            base="$PUSH_BEFORE"
            head="$PUSH_AFTER"
          fi

          # New-branch / orphan-push: github.event.before is all-zeros and
          # there is nothing to diff against → fail closed (full suite).
          if [ -z "$base" ] || [ "$base" = "0000000000000000000000000000000000000000" ]; then
            full_suite "Base sha unresolved — running full validate suite (fail-closed)."
          fi

          # Force-push rewrote the old tip out of the runner clone, or a tag
          # push has no reachable predecessor → fail closed (full suite).
          if ! git cat-file -e "$base" 2>/dev/null; then
            full_suite "Base sha $base unreachable — running full validate suite (fail-closed)."
          fi

          # Three-dot (symmetric-difference) diff: ONLY the files this branch
          # changed relative to the merge-base, never files where `main`
          # moved ahead while the branch sat behind. A two-dot diff would
          # report those base-side changes too and could mislabel a real
          # code PR as docs-only when main had unrelated doc churn — exactly
          # the bypass we must avoid. Capture into a variable and check the
          # exit code explicitly: a failed diff MUST fail closed, not be
          # swallowed by a process substitution under `set -euo pipefail`.
          if ! diff_out=$(git diff --name-only "$base"..."$head"); then
            full_suite "::warning::git diff $base...$head failed — running full validate suite (fail-closed)."
          fi

          changed=()
          if [ -n "$diff_out" ]; then
            mapfile -t changed <<< "$diff_out"
          fi

          # An empty diff is NOT treated as docs-only. There is nothing to
          # fast-path (no docs changed either) and a zero-file diff is more
          # likely a base/head confusion than an intentional no-op PR, so we
          # fail closed and run the full suite.
          if [ "${#changed[@]}" -eq 0 ]; then
            full_suite "Empty diff — running full validate suite (fail-closed)."
          fi

          echo "Changed files:"
          printf '  %s\n' "${changed[@]}"

          # Conservative docs allowlist, anchored at repo root. A path is
          # "docs" iff it matches one of these. Deliberately narrow — when in
          # doubt, a path is NOT docs and the full suite runs.
          #   - any Markdown file anywhere (READMEs, session logs, **/*.md)
          #   - anything under docs/
          #   - the LICENSE / NOTICE / AUTHORS / CHANGELOG text files
          # NOT included (intentionally): lockfiles, .toml/.yml/.yaml config,
          # source under src/ or src-tauri/, workflow YAML, prek.toml, AGENTS.md
          # changes that also touch code, etc. ANY of those ⇒ docs_only=false.
          docs_re='^(docs/|.*\.md$|LICENSE([.-].*)?$|NOTICE$|AUTHORS$|CHANGELOG$)'

          docs_only=true
          for f in "${changed[@]}"; do
            if [[ ! "$f" =~ $docs_re ]]; then
              echo "Non-docs path detected: $f → docs_only=false (full suite)."
              docs_only=false
              break
            fi
          done

          echo "docs_only=$docs_only"
          echo "docs_only=$docs_only" >> "$GITHUB_OUTPUT"

  # ---------------------------------------------------------------------------
  # lint — prek hook suite (excluding vitest/cargo-test/no-commit-to-branch),
  # npm audit signatures (warn-only), cargo audit (blocking — see PEND-41 R5), and the sqlx
  # offline-cache drift check. Needs the full Node + Rust + mold + cargo
  # plugins stack because prek's hooks invoke clippy, cargo-deny, sqruff,
  # zizmor, etc.
  # ---------------------------------------------------------------------------
  lint:
    needs: detect-docs-only
    # #833: the FULL lint job (clippy, cargo-deny, cargo-audit, sqlx-prepare,
    # zizmor, the whole prek suite + the heavy Rust/Node toolchain it needs)
    # is skipped on a provably docs-only diff. Docs are still linted by the
    # lightweight `docs-lint` job below, which runs the cheap doc-only hooks
    # (typos, markdownlint, lychee) with no toolchain. Fail-closed: an
    # uncertain classification ⇒ docs_only=false ⇒ this full job runs.
    if: needs.detect-docs-only.outputs.docs_only != 'true'
    runs-on: ubuntu-24.04
    # PEND-41 R1 — observed wall-clock 11.2 min (run 25966040732, 2026-05-16,
    # n=1 post-PEND-39-split). +50% headroom + round up to nearest 5 → 20 min.
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          # gitleaks (run via prek) inspects git history, so we need the
          # full commit graph rather than the default shallow checkout.
          fetch-depth: 0
          persist-credentials: false

      - name: Install system dependencies
        # `mold` is added to speed up the linker step on the Rust builds
        # (clippy, cargo-deny, sqlx prepare's compile pass, etc).
        # Activated via the .cargo/config.toml under the linux runner.
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            libssl-dev \
            librsvg2-dev \
            libsoup-3.0-dev \
            pkg-config \
            mold

      - name: Enable mold linker (CI-only .cargo/config.toml)
        # Project ships `.cargo/config.toml.example` staged so local builds
        # don't break if a contributor hasn't installed mold yet; CI always
        # has mold available (apt step above), so we materialise the
        # active config at runtime.
        run: |
          mkdir -p .cargo
          cp .cargo/config.toml.example .cargo/config.toml

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
        with:
          # #640: exact toolchain pin — keep in lockstep with
          # rust-toolchain.toml and src-tauri/Cargo.toml `rust-version`.
          # Without an explicit `toolchain:` this SHA-pinned action
          # installs the floating latest stable, and rustup would then
          # re-download the rust-toolchain.toml pin at first cargo run.
          toolchain: 1.95.0
          # The prek hooks below run `cargo clippy -- -D warnings` and
          # `cargo fmt --check`. dtolnay installs with `--profile minimal`,
          # which ships neither component; the floating-`stable` setup only
          # worked because the runner image's preinstalled full-profile
          # stable already had them. rust-toolchain.toml also lists these
          # (covering local dev); installing them here keeps the failure
          # mode at setup time instead of mid-hook.
          components: clippy,rustfmt

      - name: Rust cache
        uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
        with:
          workspaces: src-tauri
          # Cache `~/.cargo/bin/` so cargo-installed plugins (prek, sqlx-cli)
          # persist across runs.
          cache-bin: 'true'
          # Per-job-class key (issue #813): rust-cache keeps ONE immutable
          # entry per (os, shared-key, lockfile), so the old `rust-deps`
          # key shared across lint / cargo-tests / mcp-tests / ci.yml's
          # build meant only the first finisher's `target/` tree survived
          # and the others recompiled from scratch every run. This job's
          # clippy/cargo-deny/sqlx-prepare tree gets its own `rust-lint`
          # key; the siblings use `rust-cov` (llvm-cov instrumented),
          # `rust-mcp` (release + debug smoke), and `rust-release`
          # (ci.yml's desktop build). The Android job in ci.yml keeps its
          # separate `rust-android` key (cross-compile targets).
          shared-key: rust-lint
          # `save-if` gates which runs write to the cache. Only `main`
          # populates it; feature branches read from main's cache and
          # write only an ephemeral layer on top (expires at the standard
          # 7-day GH cache TTL). Prevents every feature branch from
          # poisoning the shared cache.
          save-if: ${{ github.ref == 'refs/heads/main' }}

      - name: Install Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 24
          cache: npm

      - name: Install npm dependencies
        run: npm ci

      - name: Verify npm package provenance signatures
        # Requires Node 22.5+; rejects packages whose registry-side Sigstore
        # provenance attestation is missing or invalid. Catches the
        # "compromised maintainer republishes from a different machine"
        # class of attack (Sigstore signs at publish time from CI, so a
        # local laptop republish has no valid attestation). Mode is `audit`
        # not `install` so missing attestations log a warning rather than
        # failing the build — many transitive deps don't yet publish with
        # provenance and we don't want to gate CI on that today.
        run: npm audit signatures || echo "::warning::npm audit signatures had findings (warn-only mode); review the log above"

      - name: Prepare externalBin placeholder (FEAT-4f)
        # Tauri's build.rs validates externalBin paths on every cargo
        # invocation — clippy, cargo-deny, machete all trigger it.
        run: node scripts/prepare-external-bins.mjs --placeholder-only

      - name: Install Rust-based dev tools via prebuilt binaries (PEND-39 C1)
        # taiki-e/install-action pulls prebuilt binaries from the upstream
        # GitHub Releases of each tool, side-stepping the per-binary
        # `cargo install` compile that previously dominated cold-cache
        # runs. Unlike `cargo install`, the binary cache here is not
        # invalidated by `Cargo.lock` changes — only by the explicit `@v2`
        # tag bump or a tool-version pin change. cargo-nextest lives on
        # the cargo-tests job (the only consumer); this job needs the
        # lint/audit set. `prek` joined the manifest list upstream so it
        # moved off the cargo-install fallback below.
        uses: taiki-e/install-action@15449e3094499af05d8d964a1c884208e4b8b595 # v2.81.11
        with:
          tool: cargo-deny,cargo-machete,cargo-audit,sqruff,typos-cli,zizmor,taplo-cli,prek

      - name: Install sqlx-cli (custom features, cargo fallback)
        # sqlx-cli with the right features set isn't covered by
        # taiki-e/install-action's binary list — has to compile from source.
        # Cached across runs via Swatinem/rust-cache's cache-bin: 'true';
        # only recompiles when Cargo.lock invalidates that cache.
        run: |
          if ! command -v cargo-sqlx >/dev/null; then cargo install --locked sqlx-cli --no-default-features --features rustls,sqlite; fi

      - name: Install lychee (prebuilt binary)
        # The `lychee` pre-commit hook (prek.toml `[[repos.hooks]] id = "lychee"`)
        # is a `local` hook calling the system `lychee` binary, since the
        # upstream `lycheeverse/lychee` pre-commit repo is broken on a
        # normal dev box (see commit bd3dc79c for the failure modes).
        # That means CI must put a `lychee` binary on PATH explicitly —
        # `taiki-e/install-action` doesn't manifest lychee, so we pull the
        # official prebuilt release directly. Fast (~1s) and avoids the
        # slow `cargo install` compile.
        run: |
          set -euo pipefail
          VERSION=lychee-v0.24.2
          DIR=lychee-x86_64-unknown-linux-gnu
          TARBALL="${DIR}.tar.gz"
          curl -fsSL -o /tmp/lychee.tar.gz \
            "https://github.com/lycheeverse/lychee/releases/download/${VERSION}/${TARBALL}"
          mkdir -p "${HOME}/.local/bin"
          tar -xzf /tmp/lychee.tar.gz -C /tmp "${DIR}/lychee"
          install -m 0755 "/tmp/${DIR}/lychee" "${HOME}/.local/bin/lychee"
          echo "${HOME}/.local/bin" >> "${GITHUB_PATH}"
          "${HOME}/.local/bin/lychee" --version

      - name: Restore lychee link-check cache
        # Persist the lychee URL cache across runs so we don't re-hit the
        # same github.com / crates.io / npm URLs from cold every time.
        # Key on the markdown file set so a doc edit invalidates as expected;
        # restore-keys lets a partial cache survive when the key misses.
        # node_modules/ is excluded from the hash (#819 (3)): this step
        # runs after `npm ci`, so dependency markdown churn (READMEs,
        # CHANGELOGs) was invalidating the key on every unrelated dep
        # bump even though lychee only ever checks tracked docs.
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5
        with:
          path: .lycheecache
          key: lychee-${{ runner.os }}-${{ hashFiles('**/*.md', '!node_modules/**') }}
          restore-keys: |
            lychee-${{ runner.os }}-

      - name: Run prek (same as `prek run --all-files` locally)
        env:
          # `no-commit-to-branch` is a pre-push guard for local dev only.
          # `vitest` and `cargo-test` here run only the related test subset
          # (`scripts/test-related-*.sh`); the full suites run as dedicated
          # sibling jobs (vitest, cargo-tests) so a CI run never silently
          # misses tests outside the diff window.
          SKIP: no-commit-to-branch,vitest,cargo-test
          # Lychee reads GITHUB_TOKEN automatically. Without this, lychee
          # makes unauthenticated requests to github.com and gets rate-
          # limited (~60 req/hour) — bursty Dependabot PR runs blow the
          # budget and surface as transient lint failures even with 429 +
          # 5xx accepted in `lychee.toml`.
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: prek run --all-files

      - name: Run npm-audit advisory scan (pre-push-staged hook)
        # npm-audit is staged `pre-push` in prek.toml (#1087: it hits the
        # registry advisory endpoint over the network, which doesn't belong on
        # the commit path), so the `prek run --all-files` above — which runs
        # only pre-commit-stage hooks — does NOT execute it. Invoke it
        # explicitly with `--hook-stage pre-push` (mirrors the lychee step in
        # the docs-lint job) so the advisory vulnerability scan stays in CI.
        # `npm audit signatures` above is a different, warn-only provenance
        # check and does not cover advisories.
        run: prek run --all-files --hook-stage pre-push npm-audit

      - name: Migrations append-only backstop (#806)
        # `prek run --all-files` cannot enforce the append-only
        # invariant — the migrations-immutable hook's staged-index scan
        # is empty on a fresh CI checkout, so a one-time local
        # `--no-verify` bypass would be permanent without this. Re-run
        # the same script in `--range` mode over the PR / push range so
        # any M/D/R/C/T under src-tauri/migrations/*.sql fails CI.
        # Checkout above uses fetch-depth: 0, so the base sha resolves.
        env:
          EVENT_NAME: ${{ github.event_name }}
          PR_BASE_SHA: ${{ github.event.pull_request.base.sha }}
          PUSH_BEFORE: ${{ github.event.before }}
        run: |
          set -euo pipefail
          if [ "$EVENT_NAME" = "pull_request" ]; then
            base="$PR_BASE_SHA"
          else
            base="$PUSH_BEFORE"
          fi
          # New branch / tag push / orphan: nothing to diff against.
          # The commit-time hook (always_run) remains the enforcement
          # point; this backstop only covers ranges it can resolve.
          if [ -z "$base" ] || [ "$base" = "0000000000000000000000000000000000000000" ] \
            || ! git cat-file -e "$base" 2>/dev/null; then
            echo "Base sha unresolved — skipping range backstop."
            exit 0
          fi
          bash scripts/check-migrations-immutable.sh --range "$base...HEAD"

      - name: Cargo audit (RustSec advisory check, blocking)
        # Complements `cargo deny check` (in the prek run above) by hitting
        # the upstream RustSec advisory DB directly — catches advisories
        # published since `deny.toml`'s ignore list was last triaged.
        #
        # PEND-41 R5 — promoted from warn-only to blocking. A new advisory
        # surfaces here exactly once; the maintainer must either fix the
        # underlying dep or add an explicit entry to
        # `src-tauri/deny.toml [advisories].ignore` with a `reason` field
        # documenting why the call-site is unaffected. The .nsprc-style
        # explicit-waiver discipline applies; same pattern used by the
        # npm-side audit step.
        working-directory: src-tauri
        run: cargo audit

      - name: sqlx offline cache check
        # `-- --tests` matches the local pre-push hook + the
        # MAINT-227 closure note in prek.toml: without it, query
        # drift in `#[cfg(test)]` modules slips through CI silently
        # (caught 5 such drifts in session 679's PEND-18 work).
        #
        # sqlx-cli 0.9.x's `prepare --check` CONNECTS to `DATABASE_URL`
        # to re-derive every query's metadata and diff it against the
        # committed `.sqlx/` cache — it does NOT honor `SQLX_OFFLINE` for
        # `--check`. The old `sqlite::memory:` placeholder is therefore an
        # *empty* schema and every query fails with "no such table" (the
        # error then cascades into ~hundreds of misleading `str` E0277
        # errors). So we create + migrate a throwaway file DB first; the
        # committed cache is still what's diffed, but against a real
        # schema. Locally the same comes from `src-tauri/.env`
        # (`DATABASE_URL=sqlite:dev.db`, already migrated).
        working-directory: src-tauri
        env:
          DATABASE_URL: 'sqlite:ci-sqlx-prepare.db'
        run: |
          cargo sqlx database create
          cargo sqlx migrate run
          cargo sqlx prepare --check -- --tests

  # ---------------------------------------------------------------------------
  # docs-lint (#833) — the docs-only counterpart to `lint`. Runs ONLY on a
  # provably docs-only diff (the full `lint` job is skipped then) and runs
  # just the cheap doc-relevant prek hooks — markdownlint, the markdown
  # link/citation checks, typos, and lychee — with no Rust toolchain,
  # clippy, cargo-deny, cargo-audit, or sqlx-prepare. This keeps docs
  # actually linted on the fast path instead of waving them through.
  #
  # EXACTLY ONE of {lint, docs-lint} runs per PR (they have opposite
  # docs_only conditions). validate-all requires BOTH (a skipped sibling is
  # accepted only under docs_only — see that job), so whichever one ran must
  # have succeeded for the gate to pass. The prek config is NOT modified:
  # the reduced set is selected by passing hook ids on the command line.
  # ---------------------------------------------------------------------------
  docs-lint:
    needs: detect-docs-only
    if: needs.detect-docs-only.outputs.docs_only == 'true'
    runs-on: ubuntu-24.04
    # Cheap: Node + three prebuilt binaries + a handful of doc hooks. No
    # Rust compile. Generous 10-min ceiling (lychee hits the network).
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          # markdownlint/typos/lychee only need the working tree, but keep a
          # full clone so prek's local hooks behave identically to the `lint`
          # job (no shallow-clone surprises).
          fetch-depth: 0
          persist-credentials: false

      - name: Install Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 24
          cache: npm

      - name: Install npm dependencies
        # markdownlint runs via `npx markdownlint-cli2`; the md-link-targets
        # and doc-vs-code-paths hooks are node scripts. All resolve from
        # node_modules, so `npm ci` is required.
        run: npm ci

      - name: Install prek + typos via prebuilt binaries
        # Only the tools the reduced doc-hook set needs — no cargo-deny /
        # sqruff / zizmor / taplo / cargo-audit (those gate code, which a
        # docs-only diff does not touch).
        uses: taiki-e/install-action@15449e3094499af05d8d964a1c884208e4b8b595 # v2.81.11
        with:
          tool: prek,typos-cli

      - name: Install lychee (prebuilt binary)
        # The `lychee` prek hook is a `local` hook calling the system
        # binary; install it the same way the full `lint` job does.
        run: |
          set -euo pipefail
          VERSION=lychee-v0.24.2
          DIR=lychee-x86_64-unknown-linux-gnu
          TARBALL="${DIR}.tar.gz"
          curl -fsSL -o /tmp/lychee.tar.gz \
            "https://github.com/lycheeverse/lychee/releases/download/${VERSION}/${TARBALL}"
          mkdir -p "${HOME}/.local/bin"
          tar -xzf /tmp/lychee.tar.gz -C /tmp "${DIR}/lychee"
          install -m 0755 "/tmp/${DIR}/lychee" "${HOME}/.local/bin/lychee"
          echo "${HOME}/.local/bin" >> "${GITHUB_PATH}"
          "${HOME}/.local/bin/lychee" --version

      - name: Restore lychee link-check cache
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5
        with:
          path: .lycheecache
          key: lychee-${{ runner.os }}-${{ hashFiles('**/*.md', '!node_modules/**') }}
          restore-keys: |
            lychee-${{ runner.os }}-

      - name: Run doc-only prek hooks (markdownlint, link/citation, typos)
        # Pass the hook ids positionally so prek runs ONLY this reduced set —
        # the prek.toml config itself is untouched (#833 constraint).
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: prek run --all-files markdownlint md-link-targets doc-vs-code-paths typos

      - name: Run lychee link check (pre-push-staged hook)
        # lychee is staged `pre-push` in prek.toml, so it needs the explicit
        # `--hook-stage pre-push` selector (the run above is the default
        # pre-commit stage). GITHUB_TOKEN avoids github.com rate-limiting.
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: prek run --all-files --hook-stage pre-push lychee

  # ---------------------------------------------------------------------------
  # vitest — frontend unit + integration suite (PEND-86: single job).
  # Previously a 3-shard matrix + a separate merge job; consolidated into one
  # full-suite run. Three ~3-min shards in parallel cost three runner slots and
  # still needed a 4th (merge) job, while the critical path was gated by the
  # 16-min cargo-tests long pole anyway. One full run (~8-9 min with v8
  # coverage) frees two runner slots, drops the merge job, and produces the
  # coverage report directly — no cross-shard istanbul merge to maintain.
  # Node-only; no Rust toolchain or apt deps needed.
  # ---------------------------------------------------------------------------
  vitest:
    needs: detect-docs-only
    # #833: skip the frontend suite when the diff is provably docs-only.
    # Fail-open is impossible here — the classifier fails CLOSED, so an
    # uncertain classification yields docs_only=false and this job runs.
    if: needs.detect-docs-only.outputs.docs_only != 'true'
    runs-on: ubuntu-24.04
    # PEND-41 R1 — full-suite wall-clock was ~3×2.2 min of test work split
    # across shards; run as one job that's ~6-7 min of tests + ~2 min v8
    # instrumentation, plus the ~1-2 min production build below (issue
    # #812). ~10-11 min observed-equivalent; +50% headroom + round up to
    # nearest 5 → 20 min.
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false

      - name: Install Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 24
          cache: npm

      - name: Install npm dependencies
        run: npm ci

      - name: Vitest (full suite, with coverage)
        # #749: `vitest.config.ts` is the SINGLE source of truth for the
        # coverage thresholds (lines 90 / functions 89 / branches 80 /
        # statements 89). This step no longer overrides them to 0 — the
        # config thresholds now actually gate here, at zero marginal cost
        # (the suite already runs with coverage). Measured full-suite
        # coverage clears all four with headroom (lines 91.6 / functions
        # 90.9 / branches 82.0 / statements 89.8), so enabling the gate
        # does not red an otherwise-green PR; it stops a new untested module
        # from silently dropping below the OSPS-Silver line. The old three
        # contradictory versions (config 90/89/80/89, the `=0` override
        # here, and a `>=80%/>=75%` step-summary string) are reconciled to
        # this one. Writes the json summary to `coverage-merged/` for the
        # summary step + artifact.
        run: |
          npx vitest run \
            --coverage \
            --coverage.reportsDirectory=coverage-merged \
            --coverage.reporter=json \
            --coverage.reporter=json-summary

      - name: Production build (tsc -b && vite build)
        # Issue #812: nothing else on the PR path runs the production
        # bundler — Playwright uses the dev server, prek's tsc covers types
        # only, and `cargo tauri build` is path-gated away from
        # frontend-only diffs. Without this (~1-2 min) step, a change that
        # breaks rolldown/lightningcss production bundling (dynamic
        # imports, env handling, chunking) passes every PR check and
        # surfaces first at release-tag time.
        run: npm run build

      - name: Bundle-size budget gate (#750)
        # Zero new CI minutes — the production `dist/` from the build step
        # above is already on disk. The gate measures each PERF-24-tuned
        # chunk's gzip size against the checked-in budgets and fails on a
        # regression (e.g. a heavy lib pulled onto the entry path via a new
        # static import). Budgets are measured + 10% headroom; re-baseline
        # with `node scripts/check-bundle-budget.mjs --update`.
        run: node scripts/check-bundle-budget.mjs

      - name: Coverage summary
        if: hashFiles('coverage-merged/coverage-summary.json') != ''
        run: |
          {
            echo "## Coverage (vitest, full suite)"
            echo
            echo "| Metric | % | Covered / Total |"
            echo "| --- | --- | --- |"
            jq -r '
              .total |
              "| Lines      | \(.lines.pct)% | \(.lines.covered) / \(.lines.total) |",
              "| Statements | \(.statements.pct)% | \(.statements.covered) / \(.statements.total) |",
              "| Functions  | \(.functions.pct)% | \(.functions.covered) / \(.functions.total) |",
              "| Branches   | \(.branches.pct)% | \(.branches.covered) / \(.branches.total) |"
            ' coverage-merged/coverage-summary.json
            echo
            echo "_Gated against \`vitest.config.ts\` thresholds (#749, single source of truth): lines >= 90%, functions >= 89%, branches >= 80%, statements >= 88%. The vitest step above fails the job if any metric drops below its threshold._"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Coverage ratchet (#648, non-blocking)
        if: hashFiles('coverage-merged/coverage-summary.json') != ''
        # Non-blocking patch-level signal: compares this run's total line
        # coverage against the checked-in baseline (scripts/coverage-
        # baseline.json) and surfaces a drop in the step summary. ALWAYS
        # exits 0 — coverage is deliberately not gated here (#648); the
        # config thresholds above are the only vitest gate. Zero new CI
        # minutes (the summary already exists).
        run: node scripts/coverage-ratchet.mjs --summary coverage-merged/coverage-summary.json --key vitest

      - name: Upload coverage artifact
        # Kept the `vitest-coverage-merged` name so any downstream Codecov /
        # badge tooling that referenced it keeps working after the merge
        # job was removed.
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: vitest-coverage-merged
          path: coverage-merged/
          if-no-files-found: error
          retention-days: 30

  # ---------------------------------------------------------------------------
  # playwright — E2E browser tests, sharded 3-ways. Per-shard report uploaded
  # on failure (artifact name includes the shard number so the shards don't
  # collide). No merge step yet — deferred per the plan.
  # ---------------------------------------------------------------------------
  playwright:
    needs: detect-docs-only
    # #833: skip the E2E suite on a provably docs-only diff (fail-closed
    # classifier — see detect-docs-only).
    if: needs.detect-docs-only.outputs.docs_only != 'true'
    runs-on: ubuntu-24.04
    # The e2e suite outgrew the 2-shard split: shard 2 ran 10.5 min and shard 1
    # hit the old 15-min cap (run 27705633920). Re-sharded 2 → 3 (per-shard
    # back to ~8-9 min) and raised the cap 15 → 20 min for headroom against
    # runner variance (matches the cargo-tests / vitest jobs).
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        shard: [1, 2, 3]
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false

      - name: Install Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 24
          cache: npm

      - name: Install npm dependencies
        run: npm ci

      - name: Restore Playwright browser cache
        # Browser binaries live in ~/.cache/ms-playwright and are stable
        # for a given playwright version. Keying on package-lock.json's
        # hash catches the version pin; restore-keys lets a partial hit
        # serve as a base layer (`playwright install` below is idempotent
        # and pulls only what's missing, so a stale restore is safe).
        id: playwright-cache
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('package-lock.json') }}
          restore-keys: |
            playwright-${{ runner.os }}-

      - name: Install Playwright system deps (always)
        # `install-deps` apt-installs ~33 MB of system libs/fonts each run
        # (not on the base image, not cacheable). The real flake source: a
        # stalling Ubuntu/Azure mirror made apt crawl at ~6 min/package with
        # no timeout, eating the whole 20-min job before tests even started
        # (runs 27708752343 / 27711626771 — a random shard cascaded to the cap
        # in *setup*, never reaching the suite). Harden apt: bound each
        # download (fail a stalled mirror fast) + retry, then wrap the step in
        # a bounded retry loop so a transient stall recovers instead of
        # cascading.
        run: |
          sudo tee /etc/apt/apt.conf.d/99-ci-resilience >/dev/null <<'APT'
          Acquire::Retries "5";
          Acquire::http::Timeout "30";
          Acquire::https::Timeout "30";
          APT
          for attempt in 1 2 3; do
            if timeout 360 npx playwright install-deps chromium; then
              exit 0
            fi
            echo "::warning::playwright install-deps attempt ${attempt} stalled/failed; retrying"
            sleep 15
          done
          echo "::error::playwright install-deps failed after 3 attempts"
          exit 1

      - name: Install Playwright browser binaries (on cache miss)
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: |
          for attempt in 1 2 3; do
            if timeout 360 npx playwright install chromium; then
              exit 0
            fi
            echo "::warning::playwright install chromium attempt ${attempt} stalled/failed; retrying"
            sleep 15
          done
          echo "::error::playwright install chromium failed after 3 attempts"
          exit 1

      - name: Playwright E2E tests (shard ${{ matrix.shard }}/3)
        id: playwright
        run: npx playwright test --shard ${{ matrix.shard }}/3

      - name: Upload Playwright report (on failure)
        if: failure() && steps.playwright.outcome == 'failure'
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          # `${{ matrix.shard }}` keeps shard artifacts from colliding —
          # GitHub rejects duplicate artifact names within a workflow run.
          name: playwright-report-shard-${{ matrix.shard }}
          path: |
            playwright-report/
            test-results/
          retention-days: 14
          if-no-files-found: ignore

  # ---------------------------------------------------------------------------
  # cargo-tests — full Rust test suite (nextest) with cargo-llvm-cov
  # source-based coverage. Uses its own `rust-cov` Swatinem cache key
  # (issue #813) — the instrumented tree shares nothing with the lint /
  # mcp / release trees. MCP build + UDS smoke + externalBin verify live
  # in their own `mcp-tests` job so a coverage-suite slowdown doesn't
  # gate the MCP-sidecar signal (and vice versa).
  # ---------------------------------------------------------------------------
  cargo-tests:
    needs: detect-docs-only
    # #833: skip the Rust nextest+coverage suite on a provably docs-only
    # diff (fail-closed classifier — see detect-docs-only). cargo-coverage
    # `needs: cargo-tests`, so it skips transitively; that job is already
    # informational/non-gating (not in validate-all's needs).
    if: needs.detect-docs-only.outputs.docs_only != 'true'
    runs-on: ubuntu-24.04
    # PEND-86: split into a 2-shard matrix via nextest `--partition count:N/2`.
    # The single-job full suite + llvm-cov was the ~16-min critical-path long
    # pole; sharding halves the test+instrument time per cell (each shard
    # compiles the instrumented tree once — the compile isn't halved, but the
    # test+coverage execution is — so expect ~9-11 min/cell). Each shard emits
    # a PARTIAL lcov + json summary; the `cargo-coverage` job below merges
    # them. Coverage stays informational (not gated) — see that job.
    # PEND-41 R1 — pre-split observed wall-clock 22.6 min (run 25966040732).
    # Per-shard is roughly half the test work on the same compile; keep a
    # generous 35-min budget until we have instrumented per-shard samples.
    timeout-minutes: 35
    strategy:
      fail-fast: false
      matrix:
        shard: [1, 2]
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false

      - name: Free disk space on runner
        # Run 26569299876 failed with `System.IO.IOException: No space left
        # on device` (annotation on job 78272043133) during the cargo-llvm-cov
        # instrumented compile. The instrumented build tree plus the rust-deps
        # Swatinem cache restore are the heavy consumers; this job uses none
        # of the preinstalled .NET / Haskell / Android / Swift toolchains, so
        # deleting them frees the headroom needed before cargo runs. `df -h`
        # is logged before+after so future tightening can size against real
        # numbers instead of a guess.
        run: |
          set -euo pipefail
          echo "Before:" && df -h /
          sudo rm -rf /usr/share/dotnet \
                      /usr/local/lib/android \
                      /opt/ghc \
                      /usr/local/share/boost \
                      /usr/local/share/powershell \
                      /usr/share/swift \
                      "$AGENT_TOOLSDIRECTORY"
          echo "After:" && df -h /

      - name: Install system dependencies
        # Same apt list as the `lint` sibling — both jobs compile Rust and
        # need the webkit/gtk/ssl/rsvg/soup stack plus mold for fast linking.
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            libssl-dev \
            librsvg2-dev \
            libsoup-3.0-dev \
            pkg-config \
            mold

      - name: Enable mold linker (CI-only .cargo/config.toml)
        run: |
          mkdir -p .cargo
          cp .cargo/config.toml.example .cargo/config.toml

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
        with:
          # #640: exact toolchain pin — keep in lockstep with
          # rust-toolchain.toml and src-tauri/Cargo.toml `rust-version`.
          # Without an explicit `toolchain:` this SHA-pinned action
          # installs the floating latest stable, and rustup would then
          # re-download the rust-toolchain.toml pin at first cargo run.
          toolchain: 1.95.0

      - name: Rust cache
        uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
        with:
          workspaces: src-tauri
          cache-bin: 'true'
          # Per-job-class key (issue #813): the llvm-cov instrumented tree
          # (coverage RUSTFLAGS) shares no artifacts with the lint / mcp /
          # release trees, so under the old shared `rust-deps` key it lost
          # the single cache slot to a faster sibling and recompiled from
          # scratch every PR. See the matching comment in the `lint` job.
          shared-key: rust-cov
          save-if: ${{ github.ref == 'refs/heads/main' }}

      - name: Install Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 24
          cache: npm

      - name: Install npm dependencies
        # Needed for `scripts/prepare-external-bins.mjs` below (it imports
        # from node_modules to resolve the host triple).
        run: npm ci

      - name: Prepare externalBin placeholder (FEAT-4f)
        # Tauri's build.rs validates externalBin paths on every cargo
        # invocation — including nextest. The full-release agaric-mcp
        # build below replaces this placeholder with the real binary.
        run: node scripts/prepare-external-bins.mjs --placeholder-only

      - name: Install cargo-nextest + cargo-llvm-cov via prebuilt binary (PEND-39 C1)
        # `cargo-llvm-cov` wraps LLVM's source-based coverage instrumentation
        # — the gold standard for Rust coverage. It composes with
        # `cargo nextest` natively (`cargo llvm-cov nextest ...`), so we
        # don't have to swap runners. Output is lcov (industry standard,
        # consumable by Codecov / coveralls / VSCode coverage gutters) plus
        # a JSON summary the step below renders as a markdown table.
        uses: taiki-e/install-action@15449e3094499af05d8d964a1c884208e4b8b595 # v2.81.11
        with:
          tool: cargo-nextest,cargo-llvm-cov

      - name: Cargo test (nextest, shard ${{ matrix.shard }}/2, with llvm-cov)
        working-directory: src-tauri
        # Run THIS shard's deterministic partition under llvm-cov, then emit a
        # PARTIAL lcov for the lines this shard's tests exercised. The
        # `cargo-coverage` job below unions the two partials. `--partition
        # count:N/2` is nextest's stable hash partition (forwarded through
        # `cargo llvm-cov nextest`). `--no-fail-fast` mirrors plain nextest so
        # the coverage map shape is pass/fail-independent.
        run: |
          cargo llvm-cov nextest --profile ci --no-fail-fast \
            --partition count:${{ matrix.shard }}/2 --no-report
          cargo llvm-cov report --lcov \
            --output-path coverage-${{ matrix.shard }}.lcov

      - name: Upload shard coverage artifact
        # Partial lcov for this shard. Retained 7 days — the merged artifact
        # the `cargo-coverage` job publishes is the long-lived one.
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: rust-coverage-shard-${{ matrix.shard }}
          path: src-tauri/coverage-${{ matrix.shard }}.lcov
          if-no-files-found: error
          retention-days: 7

  # ---------------------------------------------------------------------------
  # cargo-coverage — union-merge the two cargo-tests shards' partial lcov
  # reports into the canonical `rust-coverage-lcov` artifact + a step-summary.
  # INFORMATIONAL: deliberately NOT in `validate-all`'s needs, so a merge
  # hiccup (or an lcov-tool quirk) never gates a push — exactly like the
  # vitest coverage was non-gating. `if: !cancelled()` so partial coverage
  # still publishes if a shard went red.
  # ---------------------------------------------------------------------------
  cargo-coverage:
    runs-on: ubuntu-24.04
    needs: cargo-tests
    # `success() || failure()` (i.e. cargo-tests actually ran) — NOT
    # `!cancelled()`, because a docs-only diff (#833) SKIPS cargo-tests, and
    # a skipped upstream would otherwise let this job run and then fail
    # downloading shard artifacts that were never produced. Skipping
    # coverage on docs-only is correct (no Rust changed) and harmless: this
    # job is informational and not in validate-all's needs.
    if: ${{ (success() || failure()) && needs.cargo-tests.result != 'cancelled' }}
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false

      - name: Install lcov
        run: sudo apt-get update && sudo apt-get install -y lcov

      - name: Download shard coverage artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          pattern: rust-coverage-shard-*
          path: ./rust-coverage-shards
          merge-multiple: true

      - name: Union-merge the shard lcovs
        # `lcov --add-tracefile` takes the union of covered lines across the
        # two partition reports — the correct combine (concatenation would
        # duplicate records). `--ignore-errors` keeps the merge resilient to
        # llvm-cov/lcov-2.x format strictness; this job is non-gating so a
        # merge that still fails surfaces here without blocking the gate.
        #
        # Glob whatever shard artifacts actually exist (#819 (2)): the
        # shard upload step is success-gated, so when one cargo-tests
        # shard fails its lcov never uploads and hardcoding both paths
        # turned every shard failure into a SECOND spurious red here.
        # Partial (or zero) coverage publishes whatever is available;
        # the real failure signal stays on the cargo-tests shard itself.
        run: |
          set -euo pipefail
          shopt -s nullglob
          shards=(rust-coverage-shards/*.lcov)
          if [ "${#shards[@]}" -eq 0 ]; then
            echo "No shard lcov artifacts found (all shards failed before upload) — skipping merge."
            exit 0
          fi
          echo "Merging ${#shards[@]} shard lcov(s): ${shards[*]}"
          args=()
          for f in "${shards[@]}"; do
            args+=(--add-tracefile "$f")
          done
          lcov --ignore-errors inconsistent,unused,empty,format \
            "${args[@]}" \
            --output-file coverage.lcov

      - name: Coverage summary (rust, merged)
        if: hashFiles('coverage.lcov') != ''
        run: |
          {
            echo "## Coverage (rust, merged across 2 cargo-tests shards)"
            echo
            echo '```'
            lcov --summary coverage.lcov 2>&1 | grep -E 'lines|functions' || true
            echo '```'
            echo
            echo "_LLVM source-based coverage; the two nextest partitions' lcovs union-merged via \`lcov --add-tracefile\`._"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Install Node.js (for the coverage ratchet)
        if: hashFiles('coverage.lcov') != ''
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 24

      - name: Coverage ratchet (#648, non-blocking)
        if: hashFiles('coverage.lcov') != ''
        # Non-blocking: compares total Rust line coverage (summed LF/LH from
        # the merged lcov) against the checked-in baseline and surfaces a
        # drop in the step summary. ALWAYS exits 0 — this job is already
        # informational/non-gating, and #648 deliberately does not gate
        # coverage. The `rust` baseline key is seeded from the first main
        # run via `--update` (no cargo-llvm-cov is available off-CI to
        # measure it locally).
        run: node scripts/coverage-ratchet.mjs --lcov coverage.lcov --key rust --gate

      - name: Upload merged rust coverage artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        if: hashFiles('coverage.lcov') != ''
        with:
          name: rust-coverage-lcov
          path: coverage.lcov
          if-no-files-found: error
          retention-days: 30

  # ---------------------------------------------------------------------------
  # mcp-tests — agaric-mcp sidecar build, UDS smoke test, and externalBin
  # staging verification. Split out of cargo-tests so MCP-sidecar failures
  # surface on a dedicated check (and vice versa: a flaky coverage run
  # doesn't gate MCP signal). Uses its own `rust-mcp` Swatinem cache key
  # (issue #813) — its release + debug-smoke tree matches neither the
  # lint tree nor the llvm-cov instrumented tree.
  # ---------------------------------------------------------------------------
  mcp-tests:
    needs: detect-docs-only
    # #833: skip the MCP sidecar build + UDS smoke on a provably docs-only
    # diff (fail-closed classifier — see detect-docs-only).
    if: needs.detect-docs-only.outputs.docs_only != 'true'
    runs-on: ubuntu-24.04
    # MCP build + smoke is much lighter than the full nextest+llvm-cov
    # run on cargo-tests. 20 min covers the cold-cache compile of
    # `src-tauri` for the `agaric-mcp` bin + smoke test + the release-
    # mode rebuild that prepare-external-bins.mjs runs.
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false

      - name: Install system dependencies
        # Same apt list as cargo-tests / lint — the agaric-mcp crate
        # links against the webkit/gtk/ssl/rsvg/soup stack via its
        # transitive deps, and mold accelerates the link step.
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            libssl-dev \
            librsvg2-dev \
            libsoup-3.0-dev \
            pkg-config \
            mold

      - name: Enable mold linker (CI-only .cargo/config.toml)
        run: |
          mkdir -p .cargo
          cp .cargo/config.toml.example .cargo/config.toml

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
        with:
          # #640: exact toolchain pin — keep in lockstep with
          # rust-toolchain.toml and src-tauri/Cargo.toml `rust-version`.
          # Without an explicit `toolchain:` this SHA-pinned action
          # installs the floating latest stable, and rustup would then
          # re-download the rust-toolchain.toml pin at first cargo run.
          toolchain: 1.95.0

      - name: Rust cache
        uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
        with:
          workspaces: src-tauri
          cache-bin: 'true'
          # Per-job-class key (issue #813): this job compiles a release
          # `agaric-mcp` plus a debug nextest smoke tree — neither matches
          # the lint tree nor cargo-tests' llvm-cov instrumented tree, so
          # sharing one `rust-deps` slot just meant the first finisher
          # evicted everyone else. See the matching comment in `lint`.
          shared-key: rust-mcp
          save-if: ${{ github.ref == 'refs/heads/main' }}

      - name: Install Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 24
          cache: npm

      - name: Install npm dependencies
        # Needed for `scripts/prepare-external-bins.mjs` (it imports from
        # node_modules to resolve the host triple for the released binary).
        run: npm ci

      - name: Install cargo-nextest via prebuilt binary (PEND-39 C1)
        # nextest is the test runner for the UDS smoke test below. Prebuilt
        # binary via taiki-e/install-action keeps cold-cache cost tiny.
        uses: taiki-e/install-action@15449e3094499af05d8d964a1c884208e4b8b595 # v2.81.11
        with:
          tool: cargo-nextest

      - name: Prepare externalBin placeholder (FEAT-4f)
        # Tauri's build.rs validates externalBin paths on every cargo
        # invocation. The full-release rebuild below overwrites this
        # placeholder with the real binary.
        run: node scripts/prepare-external-bins.mjs --placeholder-only

      - name: Build agaric-mcp stub binary (FEAT-4f)
        # Build the release binary first so the I-MCP-9 smoke test below
        # can exec it (the test searches `target/{debug,release}/` for
        # the binary; we used to debug-build and then release-build in
        # series — ~3:48 wasted re-compiling the same code with a
        # different profile). The release build also satisfies the
        # FEAT-4f externalBin staging check at the end.
        run: node scripts/prepare-external-bins.mjs

      - name: MCP stub-binary smoke test (I-MCP-9)
        working-directory: src-tauri
        run: cargo nextest run --features ci-smoke --profile ci -E 'test(stub_binary_roundtrips_initialize_over_uds)'

      - name: Verify agaric-mcp smoke (--version)
        run: src-tauri/target/release/agaric-mcp --version

      - name: Verify externalBin artifact exists
        run: test -x src-tauri/binaries/agaric-mcp-x86_64-unknown-linux-gnu

  # ---------------------------------------------------------------------------
  # validate-all — the single aggregate gate. Branch protection and the
  # ci.yml / release.yml callers treat this as "did all validate work pass?".
  # Required so adding/removing a sibling job doesn't churn the protected-
  # check list.
  #
  # ===========================================================================
  # SECURITY-SENSITIVE LOGIC (#805 strict gate + #833 docs fast-path).
  # This is the part the maintainer reviews. Read it slowly.
  # ===========================================================================
  #
  # `if: always()` is load-bearing (#805): with a plain `needs:`, GitHub
  # SKIPS this job when a sibling fails — and a skipped REQUIRED status check
  # counts as PASSING for branch protection, so a red sibling would still
  # yield a mergeable PR. So this job ALWAYS runs and ALWAYS makes an explicit
  # pass/fail decision from the sibling `result`s.
  #
  # #805's original rule was simply: every sibling must be `success`; anything
  # else (failure/cancelled/skipped) fails the gate. That rule assumed NO
  # sibling is ever path-filtered. #833 introduces a docs-only fast path that
  # DOES skip siblings — so we relax the rule in exactly one controlled way,
  # and ONLY when the fail-closed classifier proves the diff is docs-only:
  #
  #   * detect-docs-only must itself have SUCCEEDED. If the classifier did not
  #     succeed we cannot trust `docs_only`, so we fall through to the strict
  #     full-suite rule (fail-closed). The classifier already emits
  #     docs_only=false on any internal git error, so "classifier succeeded
  #     but couldn't compute a diff" already means full-suite.
  #
  #   * HEAVY jobs (lint, vitest, playwright, cargo-tests, mcp-tests) run on
  #     code PRs and are skipped on docs-only PRs. They may be `skipped` ONLY
  #     when docs_only == true; otherwise they MUST be `success` (#805 intact).
  #     A `failure`/`cancelled` is NEVER acceptable, even on docs-only.
  #
  #   * docs-lint is the COMPLEMENT: it runs on docs-only PRs and is skipped on
  #     code PRs. So its allowed states are mirrored — `success` when
  #     docs_only, `skipped` when not.
  #
  # Net effect (proved by the truth table in the PR):
  #   - code PR  → docs_only=false → every heavy job must be success, docs-lint
  #                skipped. Identical to the pre-#833 #805 gate. No bypass.
  #   - docs PR  → docs_only=true  → heavy jobs skipped (OK), docs-lint must be
  #                success. A docs PR passes; a broken docs PR (markdownlint /
  #                lychee red) fails.
  #   - any classifier/diff error → docs_only=false (fail-closed) → strict rule.
  #
  # A code change cannot ride in under docs_only=true: the classifier is
  # allowlist-based + fail-closed (any .rs/.ts/lockfile/non-doc-workflow path
  # ⇒ docs_only=false), so the heavy jobs are never legitimately skippable for
  # a code diff.
  # ---------------------------------------------------------------------------
  validate-all:
    needs: [detect-docs-only, lint, docs-lint, vitest, playwright, cargo-tests, cargo-coverage, mcp-tests]
    if: always()
    runs-on: ubuntu-24.04
    # PEND-41 R1 — trivial jq/bash assertion (~2s observed); 5-min floor.
    timeout-minutes: 5
    steps:
      - name: Assert validate gate (docs-only-aware, fail-closed)
        env:
          # The full needs context, e.g. {"lint": {"result": "success"}, ...}.
          # Passed via env (not inline interpolation) so the JSON can never
          # be parsed as shell.
          NEEDS_JSON: ${{ toJSON(needs) }}
          # Read the classifier output directly (NOT from NEEDS_JSON — outputs
          # live under .outputs there, but reading the resolved value here is
          # clearer). Empty/anything-but-"true" is treated as NOT docs-only.
          DOCS_ONLY: ${{ needs.detect-docs-only.outputs.docs_only }}
        run: |
          set -euo pipefail

          fail=0
          gate_fail() { echo "::error::$1"; fail=1; }

          result_of() { jq -r --arg k "$1" '.[$k].result // "missing"' <<< "$NEEDS_JSON"; }

          classifier="$(result_of detect-docs-only)"
          echo "detect-docs-only result=$classifier docs_only=${DOCS_ONLY:-<empty>}"

          # ---- Fail-closed on the classifier itself -------------------------
          # If the classifier did not succeed we cannot trust DOCS_ONLY; force
          # the strict full-suite rule by pinning docs_only to "false".
          docs_only="false"
          if [ "$classifier" = "success" ] && [ "$DOCS_ONLY" = "true" ]; then
            docs_only="true"
          fi
          if [ "$classifier" != "success" ]; then
            gate_fail "detect-docs-only did not succeed (result=$classifier) — failing gate (fail-closed)."
          fi

          # ---- Heavy jobs: skip-allowed ONLY under docs_only ----------------
          # success            → always OK
          # skipped            → OK iff docs_only == true (#833 fast path)
          # failure/cancelled  → NEVER OK
          # anything else      → NEVER OK
          heavy="lint vitest playwright cargo-tests cargo-coverage mcp-tests"
          for j in $heavy; do
            r="$(result_of "$j")"
            if [ "$r" = "success" ]; then
              continue
            elif [ "$r" = "skipped" ] && [ "$docs_only" = "true" ]; then
              echo "$j skipped (allowed under docs_only)."
              continue
            else
              gate_fail "heavy job '$j' result=$r is not acceptable (docs_only=$docs_only)."
            fi
          done

          # ---- docs-lint: the complement (runs on docs-only PRs) ------------
          # success → OK only under docs_only (it should have run)
          # skipped → OK only under !docs_only (it is path-gated off)
          dl="$(result_of docs-lint)"
          if [ "$docs_only" = "true" ]; then
            if [ "$dl" != "success" ]; then
              gate_fail "docs-lint result=$dl but a docs-only PR requires it to pass."
            fi
          else
            if [ "$dl" != "skipped" ]; then
              gate_fail "docs-lint result=$dl but a non-docs PR expects it skipped."
            fi
          fi

          if [ "$fail" -ne 0 ]; then
            echo "::error::validate-all gate FAILED (see above)."
            exit 1
          fi
          echo "validate-all gate PASSED (docs_only=$docs_only)."
