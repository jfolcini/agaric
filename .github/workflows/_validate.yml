name: Validate (prek-equivalent)

# Reusable workflow that runs the same checks as `prek run --all-files`
# locally, plus the full vitest + cargo nextest + Playwright suites and the
# externalBin / sqlx-offline-cache smoke checks.
#
# Invoked by ci.yml (every push/PR) and release.yml (every tag).
#
# PEND-39 C3 + C5 + C8: the historical monolithic `validate` job was split
# into four parallel worker jobs (lint, vitest [3-shard matrix], playwright
# [2-shard matrix], cargo-tests) plus a trivial `validate-all` aggregate
# whose only job is to give branch-protection rules a single stable check
# name to depend on. Wall clock drops from ~25-30 min sequential to
# ~7-10 min (limited by the slowest single job, typically cargo-tests).
# Callers that `needs: validate` on the workflow-call as a whole continue
# to work — GitHub propagates per-job failures up to the caller.

on:
  workflow_call:

# Read-only by default. The workers only check out the code, run prek + the
# full test suites, and upload the playwright report on failure (which uses
# its own scoped token via actions/upload-artifact).
permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always

jobs:
  # ---------------------------------------------------------------------------
  # lint — prek hook suite (excluding vitest/cargo-test/no-commit-to-branch),
  # npm audit signatures (warn-only), cargo audit (warn-only), and the sqlx
  # offline-cache drift check. Needs the full Node + Rust + mold + cargo
  # plugins stack because prek's hooks invoke clippy, cargo-deny, sqruff,
  # zizmor, etc.
  # ---------------------------------------------------------------------------
  lint:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          # gitleaks (run via prek) inspects git history, so we need the
          # full commit graph rather than the default shallow checkout.
          fetch-depth: 0
          persist-credentials: false

      - name: Install system dependencies
        # `mold` is added to speed up the linker step on the Rust builds
        # (clippy, cargo-deny, sqlx prepare's compile pass, etc).
        # Activated via the .cargo/config.toml under the linux runner.
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            libssl-dev \
            librsvg2-dev \
            libsoup-3.0-dev \
            pkg-config \
            mold

      - name: Enable mold linker (CI-only .cargo/config.toml)
        # Project ships `.cargo/config.toml.example` staged so local builds
        # don't break if a contributor hasn't installed mold yet; CI always
        # has mold available (apt step above), so we materialise the
        # active config at runtime.
        run: |
          mkdir -p .cargo
          cp .cargo/config.toml.example .cargo/config.toml

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable

      - name: Rust cache
        uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
        with:
          workspaces: src-tauri
          # Cache `~/.cargo/bin/` so cargo-installed plugins (prek, sqlx-cli)
          # persist across runs.
          cache-bin: 'true'
          # PEND-39 C6: shared key with ci.yml's Linux desktop build job
          # and the cargo-tests sibling here (same `shared-key: rust-deps`).
          # Swatinem segregates internally by profile (test/release) and by
          # runner.os, so the Linux validate + Linux build slots dedupe
          # without colliding with macOS / Windows build slots or the
          # Android job (which uses a different shared-key for its
          # cross-compile target).
          shared-key: rust-deps
          # `save-if` gates which runs write to the cache. Only `main`
          # populates it; feature branches read from main's cache and
          # write only an ephemeral layer on top (expires at the standard
          # 7-day GH cache TTL). Prevents every feature branch from
          # poisoning the shared cache.
          save-if: ${{ github.ref == 'refs/heads/main' }}

      - name: Install Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 24
          cache: npm

      - name: Install npm dependencies
        run: npm ci

      - name: Verify npm package provenance signatures
        # Requires Node 22.5+; rejects packages whose registry-side Sigstore
        # provenance attestation is missing or invalid. Catches the
        # "compromised maintainer republishes from a different machine"
        # class of attack (Sigstore signs at publish time from CI, so a
        # local laptop republish has no valid attestation). Mode is `audit`
        # not `install` so missing attestations log a warning rather than
        # failing the build — many transitive deps don't yet publish with
        # provenance and we don't want to gate CI on that today.
        run: npm audit signatures || echo "::warning::npm audit signatures had findings (warn-only mode); review the log above"

      - name: Prepare externalBin placeholder (FEAT-4f)
        # Tauri's build.rs validates externalBin paths on every cargo
        # invocation — clippy, cargo-deny, machete all trigger it.
        run: node scripts/prepare-external-bins.mjs --placeholder-only

      - name: Install Rust-based dev tools via prebuilt binaries (PEND-39 C1)
        # taiki-e/install-action pulls prebuilt binaries from the upstream
        # GitHub Releases of each tool, side-stepping the per-binary
        # `cargo install` compile that previously dominated cold-cache
        # runs. Unlike `cargo install`, the binary cache here is not
        # invalidated by `Cargo.lock` changes — only by the explicit `@v2`
        # tag bump or a tool-version pin change. cargo-nextest lives on
        # the cargo-tests job (the only consumer); this job needs the
        # lint/audit set.
        uses: taiki-e/install-action@184183c2401be73c3bf42c2e61268aa5855379c1 # v2
        with:
          tool: cargo-deny,cargo-machete,cargo-audit,sqruff,typos-cli,zizmor,taplo-cli

      - name: Install sqlx-cli (custom features, cargo fallback)
        # sqlx-cli with the right features set isn't covered by
        # taiki-e/install-action's binary list — has to compile from source.
        # Cached across runs via Swatinem/rust-cache's cache-bin: 'true';
        # only recompiles when Cargo.lock invalidates that cache.
        run: |
          if ! command -v cargo-sqlx >/dev/null; then cargo install --locked sqlx-cli --no-default-features --features rustls,sqlite; fi

      - name: Install prek
        # prek is a Rust reimplementation of pre-commit; not yet covered by
        # taiki-e/install-action's binary list, so falls back to cargo install
        # + Swatinem cache-bin persistence. Source-of-truth for the checks
        # lives in prek.toml.
        run: |
          if ! command -v prek >/dev/null; then cargo install --locked prek; fi

      - name: Run prek (same as `prek run --all-files` locally)
        env:
          # `no-commit-to-branch` is a pre-push guard for local dev only.
          # `vitest` and `cargo-test` here run only the related test subset
          # (`scripts/test-related-*.sh`); the full suites run as dedicated
          # sibling jobs (vitest, cargo-tests) so a CI run never silently
          # misses tests outside the diff window.
          SKIP: no-commit-to-branch,vitest,cargo-test
        run: prek run --all-files

      - name: Cargo audit (RustSec advisory check, warn-only)
        # Complements `cargo deny check` (in the prek run above) by hitting
        # the upstream RustSec advisory DB directly — catches advisories
        # published since deny.toml's ignore list was last triaged. Warn-only
        # so a freshly-published advisory doesn't block CI before the
        # maintainer has had a chance to triage it; treat the log as a
        # weekly-review surface, not a gate. PEND-40 #4.
        working-directory: src-tauri
        run: cargo audit || echo "::warning::cargo audit had findings (warn-only mode); review the log above and update src-tauri/deny.toml's [advisories] ignore list if accepted."

      - name: sqlx offline cache check
        # `-- --tests` matches the local pre-push hook + the
        # MAINT-227 closure note in prek.toml: without it, query
        # drift in `#[cfg(test)]` modules slips through CI silently
        # (caught 5 such drifts in session 679's PEND-18 work).
        working-directory: src-tauri
        run: cargo sqlx prepare --check -- --tests

  # ---------------------------------------------------------------------------
  # vitest — frontend unit + integration suite, sharded 3-ways (PEND-39 C3).
  # Each shard pays its own jsdom-env-setup cost, so near-linear scaling.
  # Node-only; no Rust toolchain or apt deps needed.
  # ---------------------------------------------------------------------------
  vitest:
    runs-on: ubuntu-24.04
    strategy:
      fail-fast: false
      matrix:
        shard: [1, 2, 3]
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Install Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 24
          cache: npm

      - name: Install npm dependencies
        run: npm ci

      - name: Vitest (shard ${{ matrix.shard }}/3)
        run: npx vitest run --shard ${{ matrix.shard }}/3

  # ---------------------------------------------------------------------------
  # playwright — E2E browser tests, sharded 2-ways (PEND-39 C8). Per-shard
  # report uploaded on failure (artifact name includes the shard number so
  # the two shards don't collide). No merge step yet — deferred per the plan.
  # ---------------------------------------------------------------------------
  playwright:
    runs-on: ubuntu-24.04
    strategy:
      fail-fast: false
      matrix:
        shard: [1, 2]
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Install Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 24
          cache: npm

      - name: Install npm dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Playwright E2E tests (shard ${{ matrix.shard }}/2)
        id: playwright
        run: npx playwright test --shard ${{ matrix.shard }}/2

      - name: Upload Playwright report (on failure)
        if: failure() && steps.playwright.outcome == 'failure'
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          # `${{ matrix.shard }}` keeps shard artifacts from colliding —
          # GitHub rejects duplicate artifact names within a workflow run.
          name: playwright-report-shard-${{ matrix.shard }}
          path: |
            playwright-report/
            test-results/
          retention-days: 14
          if-no-files-found: ignore

  # ---------------------------------------------------------------------------
  # cargo-tests — full Rust test suite (nextest), agaric-mcp build + stub-
  # binary UDS smoke, and the externalBin staging smoke test. Shares the
  # `rust-deps` Swatinem cache key with the `lint` sibling and the Linux
  # desktop build job in ci.yml.
  # ---------------------------------------------------------------------------
  cargo-tests:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Install system dependencies
        # Same apt list as the `lint` sibling — both jobs compile Rust and
        # need the webkit/gtk/ssl/rsvg/soup stack plus mold for fast linking.
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            libssl-dev \
            librsvg2-dev \
            libsoup-3.0-dev \
            pkg-config \
            mold

      - name: Enable mold linker (CI-only .cargo/config.toml)
        run: |
          mkdir -p .cargo
          cp .cargo/config.toml.example .cargo/config.toml

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable

      - name: Rust cache
        uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
        with:
          workspaces: src-tauri
          cache-bin: 'true'
          # PEND-39 C6: shared with the `lint` sibling and ci.yml's Linux
          # desktop build. See the matching comment in the `lint` job for
          # the per-OS / per-profile segregation logic.
          shared-key: rust-deps
          save-if: ${{ github.ref == 'refs/heads/main' }}

      - name: Install Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 24
          cache: npm

      - name: Install npm dependencies
        # Needed for `scripts/prepare-external-bins.mjs` below (it imports
        # from node_modules to resolve the host triple).
        run: npm ci

      - name: Prepare externalBin placeholder (FEAT-4f)
        # Tauri's build.rs validates externalBin paths on every cargo
        # invocation — including nextest. The full-release agaric-mcp
        # build below replaces this placeholder with the real binary.
        run: node scripts/prepare-external-bins.mjs --placeholder-only

      - name: Install cargo-nextest via prebuilt binary (PEND-39 C1)
        uses: taiki-e/install-action@184183c2401be73c3bf42c2e61268aa5855379c1 # v2
        with:
          tool: cargo-nextest

      - name: Cargo test (nextest, full suite)
        working-directory: src-tauri
        run: cargo nextest run --profile ci

      - name: Build agaric-mcp binary (I-MCP-9)
        working-directory: src-tauri
        run: cargo build --bin agaric-mcp

      - name: MCP stub-binary smoke test (I-MCP-9)
        working-directory: src-tauri
        run: cargo nextest run --features ci-smoke --profile ci -E 'test(stub_binary_roundtrips_initialize_over_uds)'

      - name: Build agaric-mcp stub binary (FEAT-4f)
        # Smoke-check that the `agaric-mcp` sidecar still compiles and lands
        # at the externalBin path Tauri's bundler expects.
        run: node scripts/prepare-external-bins.mjs

      - name: Verify agaric-mcp smoke (--version)
        run: src-tauri/target/release/agaric-mcp --version

      - name: Verify externalBin artifact exists
        run: test -x src-tauri/binaries/agaric-mcp-x86_64-unknown-linux-gnu

  # ---------------------------------------------------------------------------
  # validate-all — trivial aggregate. Branch protection rules and the
  # ci.yml / release.yml callers should treat this as the single "did all
  # validate work pass?" gate. Required so adding/removing a sibling job
  # doesn't churn the protected-check list. `needs:` declares the
  # dependency; GitHub fails this job automatically if any sibling fails
  # (or is skipped/cancelled), so the echo only runs on full green.
  # ---------------------------------------------------------------------------
  validate-all:
    needs: [lint, vitest, playwright, cargo-tests]
    runs-on: ubuntu-24.04
    steps:
      - name: All validate jobs passed
        run: echo "all validate jobs passed"
