# PEND-41 R30 — Asserts that the `main` branch ruleset hasn't drifted (e.g.
# silently weakened via a UI toggle or `gh api` mistake). The spec mentions
# classic branch-protection's "required status checks"; this repo uses a
# ruleset instead, so we assert the set of *rule types* enforced on `main`.
#
# Expected ruleset shape (sorted), as of the 2026-05-17 second
# Scorecard-hardening pass (added `required_linear_history` +
# `strict_required_status_checks_policy: true` on top of the previous
# day's pass; see `docs/architecture/ci-and-tooling.md` §13):
#   ["deletion", "non_fast_forward", "pull_request", "required_linear_history",
#    "required_signatures", "required_status_checks"]
#
# Beyond rule types, the job also asserts the required status-check
# CONTEXTS (`dco`, `validate-all`) and the strict up-to-date-branch flag
# (#819 (1)) — type-only asserting passed even after a context removal.
#
# If a maintainer intentionally changes the ruleset, update the EXPECTED
# lists below in the same PR that adjusts the ruleset.
name: Branch Protection Assert

on:
  schedule:
    # Daily at 12:00 UTC. Drift is unlikely to occur and the failure cost is
    # low (a single annotated CI failure) — daily granularity is sufficient.
    - cron: '0 12 * * *'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  assert:
    runs-on: ubuntu-24.04
    timeout-minutes: 5
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false

      - name: Assert main-branch ruleset has not drifted
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
        run: |
          set -euo pipefail

          EXPECTED='["deletion","non_fast_forward","pull_request","required_linear_history","required_signatures","required_status_checks"]'
          # Required status-check CONTEXTS + the strict (up-to-date-branch)
          # flag are asserted too (#819 (1), pairs with #805): asserting
          # rule TYPES alone would still pass after someone removed
          # `validate-all` from the required contexts or flipped strict
          # off — exactly the silent-weakening drift this job exists to
          # catch.
          EXPECTED_CONTEXTS='["dco","validate-all"]'

          RULES="$(gh api "repos/${REPO}/rules/branches/main")"
          ACTUAL="$(jq -c '[.[] | .type] | sort' <<<"${RULES}")"
          ACTUAL_CONTEXTS="$(jq -c '[.[] | select(.type == "required_status_checks") | .parameters.required_status_checks[].context] | sort' <<<"${RULES}")"
          ACTUAL_STRICT="$(jq -c '[.[] | select(.type == "required_status_checks") | .parameters.strict_required_status_checks_policy] | first' <<<"${RULES}")"

          failed=0

          if [ "${ACTUAL}" = "${EXPECTED}" ]; then
            echo "OK: main-branch ruleset rule types match: ${EXPECTED}"
          else
            failed=1
            echo "ERROR: main-branch ruleset rule types have drifted." >&2
            echo "  expected: ${EXPECTED}" >&2
            echo "  actual:   ${ACTUAL}" >&2
            # Compute missing / extra rule types for a clearer error message.
            missing="$(jq -cn --argjson e "${EXPECTED}" --argjson a "${ACTUAL}" '$e - $a')"
            extra="$(jq -cn   --argjson e "${EXPECTED}" --argjson a "${ACTUAL}" '$a - $e')"
            echo "  missing rules: ${missing}" >&2
            echo "  extra rules:   ${extra}" >&2
          fi

          if [ "${ACTUAL_CONTEXTS}" = "${EXPECTED_CONTEXTS}" ]; then
            echo "OK: required status-check contexts match: ${EXPECTED_CONTEXTS}"
          else
            failed=1
            echo "ERROR: required status-check contexts have drifted." >&2
            echo "  expected: ${EXPECTED_CONTEXTS}" >&2
            echo "  actual:   ${ACTUAL_CONTEXTS}" >&2
          fi

          if [ "${ACTUAL_STRICT}" = "true" ]; then
            echo "OK: strict_required_status_checks_policy is true"
          else
            failed=1
            echo "ERROR: strict_required_status_checks_policy drifted (expected true, got ${ACTUAL_STRICT})." >&2
          fi

          exit "${failed}"
