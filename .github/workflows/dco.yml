# DCO check — every commit in a pull request MUST carry a Signed-off-by:
# trailer whose email matches the commit author's email. Implements the
# Developer Certificate of Origin policy documented in
# CONTRIBUTING.md § Developer Certificate of Origin and GOVERNANCE.md §
# Licensing. Wire-protocol level enforcement of what those docs say.
#
# Why this workflow and not a third-party action:
#   - Self-contained, no external dependency to audit (the Linux-kernel
#     equivalents use a similar shell pattern).
#   - Uses `gh api repos/.../pulls/N/commits` which is paginated and
#     scoped to the PR — no broad ACL, no token-permission widening
#     beyond `pull-requests: read`.
#   - Renders a per-commit "ok / missing sign-off / email mismatch"
#     summary on the run page so a contributor can fix in one re-push.
#
# Maintainer direct pushes to main are unaffected: this workflow runs
# only on the `pull_request` trigger and the maintainer-bypass actor on
# the branch ruleset means direct-pushed commits don't enter this code
# path. Required-status-checks for PRs is updated separately to include
# `dco` so the gate is enforced server-side.
name: DCO

on:
  pull_request:
    branches: [main]

permissions:
  contents: read
  pull-requests: read

jobs:
  dco:
    runs-on: ubuntu-24.04
    timeout-minutes: 3
    steps:
      - name: Verify Signed-off-by on every PR commit
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        shell: bash
        run: |
          set -euo pipefail

          # Paginated; each entry has .sha, .commit.message, .commit.author.{name,email}.
          # Compact-JSON one-commit-per-line so awk/jq can stream.
          #
          # Capture output + exit code FIRST (issue #809): a `mapfile < <(gh
          # api ...)` process substitution swallows API failures under
          # `set -euo pipefail` — a rate-limited/5xx response yielded an
          # empty array, the loop never ran, and this required check went
          # green having scanned zero commits. A PR always has >= 1 commit,
          # so empty output is asserted as an error too.
          if ! commits_raw=$(
            gh api -X GET \
              "repos/${REPO}/pulls/${PR_NUMBER}/commits" \
              --paginate \
              --jq '.[] | {sha, msg: .commit.message, name: .commit.author.name, email: .commit.author.email} | @base64'
          ); then
            echo "::error::gh api repos/${REPO}/pulls/${PR_NUMBER}/commits failed — cannot verify DCO sign-offs."
            exit 1
          fi
          if [ -z "$commits_raw" ]; then
            echo "::error::gh api returned zero commits for PR #${PR_NUMBER} — a PR always has at least one; refusing to report success."
            exit 1
          fi
          mapfile -t commits <<< "$commits_raw"

          fail=0
          {
            echo "## DCO sign-off check"
            echo
            echo "| Commit | Author | Status |"
            echo "| --- | --- | --- |"
          } >> "$GITHUB_STEP_SUMMARY"

          for c in "${commits[@]}"; do
            json=$(printf '%s' "$c" | base64 -d)
            sha=$(printf '%s' "$json" | jq -r .sha)
            msg=$(printf '%s' "$json" | jq -r .msg)
            name=$(printf '%s' "$json" | jq -r .name)
            email=$(printf '%s' "$json" | jq -r .email)

            # Match any `Signed-off-by: NAME <EMAIL>` trailer (case-insensitive
            # on the key per RFC 5322 conventions). The trailer value must
            # contain the author's email — typo'd emails are rejected so a
            # forgotten `git commit -s` after a `git config user.email` change
            # surfaces as a failure rather than silently passing.
            short_sha="${sha:0:8}"
            cell_msg=$(printf '%s' "$msg" | head -1 | cut -c1-60)
            label="\`${short_sha}\` ${cell_msg}"

            # Dependabot exemption: dependabot commits author as
            # `<id>+dependabot[bot]@users.noreply.github.com` but sign off as
            # `dependabot[bot] <support@github.com>` — the trailer email is
            # fixed by GitHub and intentionally does not match the per-bot
            # noreply author email, so the strict author-email match below
            # would reject every weekly bump PR (and historically did,
            # forcing maintainer-bypass merges). Accept the `support@github.com`
            # trailer only when the commit author matches the dependabot
            # bot's noreply pattern; every human author still has to match
            # their own email exactly.
            if [ "$name" = "dependabot[bot]" ] \
               && printf '%s' "$email" | grep -qE '^[0-9]+\+dependabot\[bot\]@users\.noreply\.github\.com$'; then
              expected_email="support@github.com"
            else
              expected_email="$email"
            fi

            # Two-stage match (issue #809 bonus): the trailer-shaped lines are
            # selected with a fixed regex, then the email is matched with
            # `grep -iF` — interpolating the author email into an ERE meant a
            # `+` in a valid address became a quantifier and rejected a
            # legitimate sign-off. `-i` preserves the original single-stage
            # match's case-insensitivity (a trailer email differing from the
            # author email only in case was accepted before and still is).
            if printf '%s' "$msg" | grep -iE "^[[:space:]]*signed-off-by:[[:space:]]" | grep -qiF "<${expected_email}>"; then
              echo "| ${label} | ${name} <${email}> | ✓ signed off |" >> "$GITHUB_STEP_SUMMARY"
            elif printf '%s' "$msg" | grep -qiE "^[[:space:]]*signed-off-by:[[:space:]]"; then
              echo "::error file=PR commit ${sha}::DCO sign-off present but email does not match commit author ${email}. Re-sign with \`git commit --amend -s --no-edit && git push --force-with-lease\` (or \`git rebase --signoff <base>\` for older commits)."
              echo "| ${label} | ${name} <${email}> | ✗ email mismatch on Signed-off-by |" >> "$GITHUB_STEP_SUMMARY"
              fail=1
            else
              echo "::error file=PR commit ${sha}::Missing Signed-off-by trailer. Run \`git commit --amend -s --no-edit && git push --force-with-lease\` (or \`git rebase --signoff <base>\` for older commits) per CONTRIBUTING.md § Developer Certificate of Origin."
              echo "| ${label} | ${name} <${email}> | ✗ missing sign-off |" >> "$GITHUB_STEP_SUMMARY"
              fail=1
            fi
          done

          if [ "$fail" -ne 0 ]; then
            {
              echo
              echo "**One or more commits are missing a valid \`Signed-off-by\` trailer.**"
              echo
              echo "See [CONTRIBUTING.md § Developer Certificate of Origin](https://github.com/${REPO}/blob/main/CONTRIBUTING.md#developer-certificate-of-origin-dco) for the fix recipe."
            } >> "$GITHUB_STEP_SUMMARY"
            exit 1
          fi

          echo "All ${#commits[@]} commit(s) carry a valid Signed-off-by trailer."
