name: Scheduled deep checks

# Heavy correctness/perf tooling that is too slow for the per-PR critical
# path (the PR gate is `ci.yml` → `_validate.yml`). Runs weekly + on manual
# dispatch. None of these jobs is a required check; they surface signal via
# step summaries and uploaded artifacts, and a maintainer triages survivors.
#
# Lanes:
#   clippy-clean   — cache-busting full-workspace `cargo fmt --all --check` +
#                    `cargo clippy`: no rust-cache, cold compile, `--workspace`.
#                    The warm per-PR cache never re-lints unchanged targets when
#                    a lint is newly added to a Cargo.toml, so violations stay
#                    latent (this masked #1875's pedantic lints in the
#                    diagnostics bins + an app-lib test); the per-PR fmt/clippy
#                    hooks also omit --all/--workspace, skipping the diagnostics
#                    member entirely. This lane fails on that drift weekly.
#   bench-smoke    — #639/#978: SHARDED across N runners. Each shard compiles
#                    ONLY its slice of the criterion benches (single cohesive
#                    `cargo bench --no-run --bench …` invocation) then SMOKE-RUNS
#                    that slice once (`--test`) so a drifted seed/fixture fails
#                    CI instead of rotting silently. Sharding keeps the combined
#                    compile+smoke wall-clock under budget (the old single-runner
#                    `bench-compile` job blew the 90 min cap mid-smoke — #2122).
#   bench-slo      — #639: RUNS the interactive_slo SLO gate + the `#[ignore]`d
#                    20k-row perf gates, which nothing else exercises. Split out
#                    of the smoke shards so a smoke timeout can never skip the
#                    SLO gate again. `workflow_dispatch` can flip
#                    `slo_include_problem` to also measure the problem-tier
#                    probes (list_page_links / list_projected_agenda, #2178).
#   mutants        — #649: cargo-mutants scoped to the invariant core
#                    (op, op_log, reverse, loro/engine). Non-blocking; the
#                    survivor list is the deliverable to triage into tests.
#   mutants-frontend — #886: StrykerJS scoped to a handful of pure,
#                    deterministic frontend libs (search-query's pure
#                    modules, agenda-sort, filters/model, date-utils,
#                    tree-utils — never components or Tauri IPC).
#                    Non-blocking, same triage-signal posture as `mutants`.
#   fuzz           — #650/#2590: short coverage-guided fuzz runs over the
#                    raw-input parsers (snapshot decode, deeplink parse,
#                    Markdown/Obsidian import parse). Smoke-length here (the
#                    per-target time budget is small); a real fuzzing campaign
#                    runs longer out-of-band.
on:
  schedule:
    # Mondays 04:17 UTC — off-peak, odd minute to avoid the top-of-hour
    # scheduler stampede. Weekly is enough for trend/triage tooling.
    - cron: '17 4 * * 1'
  workflow_dispatch:
    inputs:
      mutants_timeout:
        description: 'Per-mutant timeout (seconds) for the mutants lane'
        required: false
        default: '300'
      fuzz_seconds:
        description: 'Per-target fuzz time budget (seconds)'
        required: false
        default: '120'
      slo_include_problem:
        description: 'Also run the interactive_slo problem-tier probes (list_page_links / list_projected_agenda @ 100K, #2178) — off by default so the scheduled gate tracks only in-budget commands'
        required: false
        type: boolean
        default: false

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always

jobs:
  # ---------------------------------------------------------------------------
  # clippy-clean — cache-busting full-workspace clippy. The per-PR clippy hook
  # restores the Swatinem rust-cache, which never re-lints already-compiled,
  # unchanged targets when a lint is newly added to a Cargo.toml — so the new
  # lint's violations stay latent until a cache-miss. This masked #1875's
  # pedantic lints in the diagnostics bins + an app-lib test. This lane builds
  # COLD (no rust-cache) and lints every workspace member (`--workspace`, which
  # the per-PR hook also omits), so latent drift fails here weekly instead of
  # ambushing the next unrelated Rust PR.
  # ---------------------------------------------------------------------------
  clippy-clean:
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            libssl-dev \
            librsvg2-dev \
            libsoup-3.0-dev \
            pkg-config \
            mold

      - name: Enable mold linker (CI-only .cargo/config.toml)
        run: |
          mkdir -p .cargo
          cp .cargo/config.toml.example .cargo/config.toml

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@4cda84d5c5c54efe2404f9d843567869ab1699d4 # stable
        with:
          toolchain: 1.95.0
          components: clippy,rustfmt

      - name: Check formatting over the whole workspace
        working-directory: src-tauri
        # `--all`: check every member, incl. agaric-diagnostics (the per-PR
        # fmt hook omits it, so that crate's formatting is otherwise never
        # enforced). No compile needed, so it runs before the clippy build.
        run: cargo fmt --all --check

      # No Swatinem/rust-cache here ON PURPOSE: a warm cache is exactly what
      # masks newly-added lints on unchanged targets. This lane must compile
      # cold so clippy re-checks everything.

      - name: Install Node.js
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: 24
          cache: npm

      - name: Install npm dependencies
        run: npm ci

      - name: Prepare externalBin placeholder (FEAT-4f)
        # Tauri's build.rs validates externalBin paths on every cargo
        # invocation, including the clippy compile below.
        run: node scripts/prepare-external-bins.mjs --placeholder-only

      - name: Clean-compile clippy over the whole workspace
        working-directory: src-tauri
        # `--workspace`: lint every member, incl. agaric-diagnostics (the
        # per-PR hook omits it, so those bins are otherwise never linted).
        # `-D warnings`: any lint is a failure. Cold build → no cache masking.
        run: cargo clippy --workspace --all-targets -- -D warnings

  # ---------------------------------------------------------------------------
  # bench-smoke (#639/#978) — SHARDED compile + seed/fixture smoke-run.
  #
  # A single `bench-compile` job used to compile all 29 benches (~36 min) then
  # smoke-run them (~53 min) on ONE runner; the combined walk blew the 90 min
  # cap and got cancelled mid-smoke (#2122), which ALSO skipped the
  # interactive_slo SLO gate that ran as a later step in the same job. This job
  # shards the compile+smoke across N runners: each shard compiles ONLY its
  # slice of the benches and smoke-runs exactly that slice, so no single runner
  # carries the whole suite. The SLO gate + ignored perf gates moved to the
  # separate `bench-slo` job below, immune to a smoke timeout.
  # ---------------------------------------------------------------------------
  bench-smoke:
    runs-on: ubuntu-24.04
    # Per-shard budget. The heavy 100K-seed benches cluster in the odd shards
    # (deterministic `index % 4` split): shards 0/2 smoke in ~1 min, but shard 1
    # (7 benches incl. the heavy cache/pagination seeds) has been observed to
    # need compile (~21 min) + smoke (~25+ min) — over the old 45-min cap, which
    # cancelled the shard mid-smoke (a false red, not a real bench failure). 70
    # gives headroom while staying well under the 90-min GitHub job ceiling.
    timeout-minutes: 70
    strategy:
      # Don't cancel sibling shards when one bench's seed drifts — we want every
      # shard's verdict in a single run, not a fail-fast that hides the rest.
      fail-fast: false
      matrix:
        shard: [0, 1, 2, 3]
    env:
      SHARD_INDEX: ${{ matrix.shard }}
      SHARD_TOTAL: 4
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            libssl-dev \
            librsvg2-dev \
            libsoup-3.0-dev \
            pkg-config \
            mold

      - name: Enable mold linker (CI-only .cargo/config.toml)
        run: |
          mkdir -p .cargo
          cp .cargo/config.toml.example .cargo/config.toml

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@4cda84d5c5c54efe2404f9d843567869ab1699d4 # stable
        with:
          toolchain: 1.95.0

      - name: Rust cache
        uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
        with:
          workspaces: src-tauri
          # ONE shared bench cache across all shards (own key — the bench/test
          # profile tree matches neither the lint nor the llvm-cov instrumented
          # tree, issue #813). The expensive, shard-invariant cost is the agaric
          # lib + deps + cargo-registry downloads; caching it once and having
          # every shard RESTORE it is the real win. Only shard 0 SAVES (on main)
          # so the four shards never race to write the same key — the per-shard
          # bench objects that differ are cheap to recompile on top of the warm
          # lib.
          shared-key: rust-bench
          save-if: ${{ github.ref == 'refs/heads/main' && matrix.shard == 0 }}

      - name: Install Node.js
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: 24
          cache: npm

      - name: Install npm dependencies
        run: npm ci

      - name: Prepare externalBin placeholder (FEAT-4f)
        # Tauri's build.rs validates externalBin paths on every cargo
        # invocation, including the `cargo bench` build below.
        run: node scripts/prepare-external-bins.mjs --placeholder-only

      - name: Compile this shard's bench slice (no-run)
        working-directory: src-tauri
        shell: bash
        # Deterministic sharding: list every `[[bench]]` (minus interactive_slo,
        # which the bench-slo job warm-runs), sort for a stable order, and keep
        # the names where `index % SHARD_TOTAL == SHARD_INDEX`. A bench newly
        # added to Cargo.toml automatically lands in some shard — no matrix edit
        # needed, so the #978 coverage guarantee can't silently regress.
        #
        # The slice compiles in a SINGLE `cargo bench --no-run --bench a
        # --bench b …` invocation. That is still ONE cohesive build: the cargo
        # #6313 libagaric_lib link race only bites SEPARATE per-bench cargo
        # invocations (see benches/AGENTS.md), so the prebuilt-binary approach
        # the smoke step relies on stays race-free.
        run: |
          set -euo pipefail
          mapfile -t all < <(grep -A1 '^\[\[bench\]\]' Cargo.toml \
            | sed -n 's/^name = "\(.*\)"/\1/p' \
            | grep -vx interactive_slo | sort)
          mine=()
          for i in "${!all[@]}"; do
            if (( i % SHARD_TOTAL == SHARD_INDEX )); then mine+=("${all[i]}"); fi
          done
          if (( ${#mine[@]} == 0 )); then
            echo "shard $SHARD_INDEX/$SHARD_TOTAL has no benches — nothing to do"
            : > "$RUNNER_TEMP/shard-benches.txt"
            exit 0
          fi
          echo "shard $SHARD_INDEX/$SHARD_TOTAL benches: ${mine[*]}"
          # Persist the slice so the smoke step runs exactly what we compiled.
          printf '%s\n' "${mine[@]}" > "$RUNNER_TEMP/shard-benches.txt"
          args=(); for b in "${mine[@]}"; do args+=(--bench "$b"); done
          cargo bench --no-run "${args[@]}"

      - name: Smoke-run this shard's benches (--test) — #978 seed/fixture guard
        working-directory: src-tauri
        # WHAT THIS VALIDATES: that every bench's SEED/FIXTURE is still valid
        # against the live schema — NOT performance. Criterion's `--test` runs
        # each benchmark function exactly ONCE (a cold single shot, no timing
        # budget), so a bench whose hand-seeded raw-SQL fixture drifted from the
        # schema PANICS here and fails the shard. We run the PREBUILT binaries
        # from the `--no-run` build above (no per-bench recompile → race-free),
        # discovering them dynamically (no hardcoded hashes): each `[[bench]]`
        # becomes a `target/release/deps/<name>-<hash>` executable; we pick the
        # newest non-metadata file (`.d`/`.so`/`.dwp` filtered out).
        #
        # Concurrency 3 (`wait -n` gate) within the shard cuts wall-clock while
        # keeping peak memory sane on the 100K-seed benches. Each bench is
        # backgrounded with output BUFFERED to a per-bench `.log` and its verdict
        # to a per-bench `.status`; after the barrier we replay logs in order
        # (folding intact) and reduce. A MISSING `.status` (subshell killed
        # mid-run, e.g. OOM) is a FAILURE, never a silent pass.
        shell: bash
        run: |
          set -uo pipefail
          fail=0
          newest_bench_bin() {
            local name="$1" newest="" f
            for f in "target/release/deps/${name}-"*; do
              [[ -f "$f" && -x "$f" ]] || continue
              case "$f" in *.d|*.so|*.dwp) continue ;; esac
              if [[ -z "$newest" || "$f" -nt "$newest" ]]; then
                newest="$f"
              fi
            done
            printf '%s' "$newest"
          }
          # The exact slice this shard compiled (written by the step above).
          mapfile -t benches < "$RUNNER_TEMP/shard-benches.txt"
          if (( ${#benches[@]} == 0 )); then
            echo "no benches for this shard — skipping smoke"
            exit 0
          fi
          status_dir="$(mktemp -d)"
          smoke_one() {
            local name="$1" bin
            bin="$(newest_bench_bin "$name")"
            if [ -z "$bin" ]; then
              echo "::error::no prebuilt binary for bench '$name' (did --no-run compile it?)"
              echo fail > "$status_dir/$name.status"
              return
            fi
            echo "running: $bin --test"
            if "$bin" --test; then
              echo "smoke OK: $name"
              echo ok > "$status_dir/$name.status"
            else
              echo "::error::bench '$name' FAILED its --test smoke run (seed/fixture drift?)"
              echo fail > "$status_dir/$name.status"
            fi
          }
          jobs=$(( $(nproc) < 3 ? $(nproc) : 3 ))
          echo "smoke-running ${#benches[@]} benches at concurrency $jobs"
          running=0
          for name in "${benches[@]}"; do
            smoke_one "$name" > "$status_dir/$name.log" 2>&1 &
            running=$((running + 1))
            if (( running >= jobs )); then
              wait -n
              running=$((running - 1))
            fi
          done
          wait
          for name in "${benches[@]}"; do
            echo "::group::smoke $name"
            [ -f "$status_dir/$name.log" ] && cat "$status_dir/$name.log"
            echo "::endgroup::"
            if [ ! -f "$status_dir/$name.status" ]; then
              echo "::error::bench '$name' wrote no status — killed before completion (OOM?)"
              fail=1
            elif [ "$(cat "$status_dir/$name.status")" = fail ]; then
              fail=1
            fi
          done
          exit "$fail"

  # ---------------------------------------------------------------------------
  # bench-slo (#639) — the interactive_slo SLO gate + the `#[ignore]`d 20k-row
  # perf gates, split out of the smoke shards so a smoke timeout can never skip
  # them (the old single-job layout ran the SLO gate AFTER the whole smoke walk,
  # so the #2122 mid-smoke cancellation took the gate down with it). A
  # `workflow_dispatch` can also flip `slo_include_problem` to measure the
  # problem-tier probes (#2178).
  # ---------------------------------------------------------------------------
  bench-slo:
    runs-on: ubuntu-24.04
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            libssl-dev \
            librsvg2-dev \
            libsoup-3.0-dev \
            pkg-config \
            mold

      - name: Enable mold linker (CI-only .cargo/config.toml)
        run: |
          mkdir -p .cargo
          cp .cargo/config.toml.example .cargo/config.toml

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@4cda84d5c5c54efe2404f9d843567869ab1699d4 # stable
        with:
          toolchain: 1.95.0

      - name: Rust cache
        uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
        with:
          workspaces: src-tauri
          # Own bench-profile cache (separate key from the smoke shards so this
          # job's single writer never races them). Caches the agaric lib + deps
          # + cargo registry + the interactive_slo bench + the nextest perf-gate
          # test binaries, so week-over-week this job restores warm.
          shared-key: rust-bench-slo
          save-if: ${{ github.ref == 'refs/heads/main' }}

      - name: Install Node.js
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: 24
          cache: npm

      - name: Install npm dependencies
        run: npm ci

      - name: Prepare externalBin placeholder (FEAT-4f)
        # Tauri's build.rs validates externalBin paths on every cargo
        # invocation, including `cargo bench` / nextest below.
        run: node scripts/prepare-external-bins.mjs --placeholder-only

      - name: Run interactive_slo SLO gate (#639)
        working-directory: src-tauri
        # The bench self-`panic!`s if any command's mean latency exceeds its
        # ARCHITECTURE.md §25 budget, so a non-zero exit IS the gate.
        #
        # By default the already-breaching `list_page_links` /
        # `list_projected_agenda` problem-tier probes stay gated OUT
        # (SLO_INCLUDE_PROBLEM unset) so the scheduled gate tracks only the
        # commands currently within budget. A `workflow_dispatch` with
        # `slo_include_problem=true` exports SLO_INCLUDE_PROBLEM=1 to MEASURE
        # those probes @ 100K (#2178). We export it ONLY when asked, because the
        # bench treats ANY value (even an empty string) as "on".
        #
        # #978: tee stdout so the SLO summary step can capture the per-command
        # observed-mean-vs-budget lines. `pipefail` preserves the bench's exit
        # code through the pipe so a budget breach still fails the run.
        shell: bash
        env:
          SLO_INCLUDE_PROBLEM_INPUT: ${{ github.event.inputs.slo_include_problem || 'false' }}
        run: |
          set -o pipefail
          if [ "$SLO_INCLUDE_PROBLEM_INPUT" = "true" ]; then
            echo "SLO_INCLUDE_PROBLEM=1 — problem-tier probes ENABLED via dispatch (#2178)"
            export SLO_INCLUDE_PROBLEM=1
          fi
          cargo bench --bench interactive_slo 2>&1 | tee interactive_slo.log

      - name: SLO summary + threshold flagging (#978)
        if: always()
        working-directory: src-tauri
        # MEASURE-not-imagine: every number here is read back from the bench
        # itself — the observed mean and the budget both come from the
        # `interactive_slo:` lines the bench `println!`s (format defined in
        # benches/interactive_slo.rs::assert_under_budget). We invent no
        # thresholds; we surface the bench's own pass/fail per command and
        # flag any line the bench did not mark PASS. Robust to no data:
        # if the log is missing or matches nothing, we say so and exit 0.
        shell: bash
        run: |
          {
            echo "## interactive_slo (#978) — observed vs budget @ 100K"
            echo
            if [ ! -f interactive_slo.log ]; then
              echo "_No interactive_slo.log produced (bench step did not run) — see job log._"
              exit 0
            fi
            # Stable lines, e.g.:
            #   interactive_slo: get_block @ 100K = 0.42 ms <= budget 1 ms (PASS)
            #   interactive_slo: foo SKIPPED (set SLO_INCLUDE_PROBLEM=1 ...)
            if ! grep -q '^interactive_slo:' interactive_slo.log; then
              echo "_No \`interactive_slo:\` lines found in the bench output._"
              echo "_(The bench format may have changed — see benches/interactive_slo.rs.)_"
              exit 0
            fi
            echo "| command | observed | budget | status |"
            echo "|---------|---------:|-------:|:------:|"
            # PASS lines carry both numbers; emit them as a row. Any
            # interactive_slo: line that is neither PASS nor SKIPPED is a
            # FLAG (the bench would normally panic first, but if a future
            # tier reports without asserting we still surface it).
            grep '^interactive_slo:' interactive_slo.log | while IFS= read -r line; do
              body="${line#interactive_slo: }"
              if printf '%s' "$body" | grep -q '(PASS)$'; then
                cmd="${body%% = *}"
                rest="${body#* = }"
                obs="${rest%% <= budget *}"
                bud="${rest#* <= budget }"; bud="${bud% (PASS)}"
                echo "| \`$cmd\` | $obs | $bud | PASS |"
              elif printf '%s' "$body" | grep -q 'SKIPPED'; then
                cmd="${body%% SKIPPED*}"
                echo "| \`$cmd\` | — | — | SKIPPED |"
              else
                echo "| (raw) | | | FLAG |"
                echo "| \`$body\` | | | |"
              fi
            done
            echo
            echo "_Budgets are sourced from the bench (ARCHITECTURE.md §25); a"
            echo "breach \`panic!\`s the gate above. Track these rows across"
            echo "weekly runs for drift._"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Upload SLO results (log + criterion estimates)
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: interactive-slo
          # The raw log (stable observed/budget lines) plus criterion's own
          # JSON estimates (medians/MAD per benchmark id) for finer-grained
          # over-time trend analysis beyond the mean-vs-budget gate.
          path: |
            src-tauri/interactive_slo.log
            src-tauri/target/criterion/**/estimates.json
            src-tauri/target/criterion/**/benchmark.json
          if-no-files-found: ignore
          retention-days: 90

      - name: Install cargo-nextest via prebuilt binary
        uses: taiki-e/install-action@a6b2e2dcd845ddd7f509ce4f3ed3d922b80cc5d9 # v2.84.0
        with:
          tool: cargo-nextest

      - name: Run the #[ignore]d perf gates (#639)
        working-directory: src-tauri
        # The 20k-row perf gates are `#[ignore]`d so the per-PR suite doesn't
        # pay for 20k-row seeding; they assert wall-clock budgets and fail on
        # regression. BUT `--run-ignored=only` runs EVERY `#[ignore]`d test, not
        # just the perf gates — so it also sweeps in intentionally-failing
        # documented oracles kept `#[ignore]`d AND failing on purpose as
        # greppable design-divergence markers (see `src/reverse/tests.rs`'s
        # `create_block_apply_then_reverse_round_trip_i_lifecycle_3`: reverse of
        # a create is a soft-delete, so a strict identity round-trip cannot hold
        # — a deliberate design choice, not a bug). Those must NOT red this gate,
        # so exclude them via `-E`. Add any future such failing oracle here too.
        run: >-
          cargo nextest run --run-ignored=only --no-fail-fast
          -E 'not test(create_block_apply_then_reverse_round_trip_i_lifecycle_3)'

  # ---------------------------------------------------------------------------
  # mutants (#649) — cargo-mutants scoped (via mutants.toml `examine_globs`)
  # to the invariant core. Non-blocking: the deliverable is the survivor list
  # in the step summary + uploaded artifact, which a maintainer triages into
  # test gaps. `|| true` is intentional — a surviving mutant is signal, not a
  # CI failure (this lane is not a required check and is never gated).
  # ---------------------------------------------------------------------------
  mutants:
    runs-on: ubuntu-24.04
    timeout-minutes: 120
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            libssl-dev \
            librsvg2-dev \
            libsoup-3.0-dev \
            pkg-config \
            mold

      - name: Enable mold linker (CI-only .cargo/config.toml)
        run: |
          mkdir -p .cargo
          cp .cargo/config.toml.example .cargo/config.toml

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@4cda84d5c5c54efe2404f9d843567869ab1699d4 # stable
        with:
          toolchain: 1.95.0

      - name: Rust cache
        uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
        with:
          workspaces: src-tauri
          shared-key: rust-mutants
          save-if: ${{ github.ref == 'refs/heads/main' }}

      - name: Install Node.js
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: 24
          cache: npm

      - name: Install npm dependencies
        run: npm ci

      - name: Prepare externalBin placeholder (FEAT-4f)
        run: node scripts/prepare-external-bins.mjs --placeholder-only

      - name: Install cargo-mutants + cargo-nextest via prebuilt binary
        uses: taiki-e/install-action@a6b2e2dcd845ddd7f509ce4f3ed3d922b80cc5d9 # v2.84.0
        with:
          tool: cargo-mutants,cargo-nextest

      - name: Run cargo-mutants (scoped to invariant core)
        working-directory: src-tauri
        # Scope, test-tool (nextest), and timeouts come from mutants.toml.
        # `--in-place` avoids the default copy-to-tmp (faster; the runner is
        # ephemeral). Never gate: surviving mutants are triage signal.
        # The dispatch input rides via `env:` (not inline `${{ }}`) so it
        # can't expand into the shell as code (zizmor template-injection).
        env:
          MUTANTS_TIMEOUT: ${{ github.event.inputs.mutants_timeout || '300' }}
        run: |
          cargo mutants --in-place --timeout "$MUTANTS_TIMEOUT" \
            --output mutants-out || true

      - name: Mutants summary
        if: always()
        working-directory: src-tauri
        run: |
          {
            echo "## cargo-mutants (invariant core)"
            echo
            if [ -f mutants-out/outcomes.json ]; then
              echo '```'
              # caught / missed / unviable / timeout tallies
              for f in caught missed unviable timeout; do
                if [ -f "mutants-out/$f.txt" ]; then
                  echo "$f: $(wc -l < "mutants-out/$f.txt")"
                fi
              done
              echo '```'
              echo
              if [ -s mutants-out/missed.txt ]; then
                echo "### Surviving (missed) mutants — triage into test gaps"
                echo '```'
                cat mutants-out/missed.txt
                echo '```'
              fi
            else
              echo "_No outcomes produced (build or config error) — see job log._"
            fi
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Upload mutants report
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: mutants-out
          path: src-tauri/mutants-out/
          if-no-files-found: ignore
          retention-days: 30

  # ---------------------------------------------------------------------------
  # mutants-frontend (#886) — StrykerJS scoped to a handful of pure,
  # deterministic frontend libs (search-query's pure modules, agenda-sort,
  # filters/model, date-utils, tree-utils — never components or Tauri IPC).
  # Mirrors the `mutants` (Rust) lane above: non-blocking, survivor list is
  # the deliverable to triage into tests. See `stryker.modules.mjs` /
  # `stryker.config.mjs` / `stryker.vitest.config.mjs` and
  # `docs/BUILD.md`'s "Mutation testing (nightly)" section for the recipe
  # (why each module runs in its own Stryker invocation, scoped to just its
  # own test file(s) — vitest's default "related" test-selection resolves
  # through barrel re-exports like `search-query/index.ts` and drags in
  # 271+ unrelated component tests otherwise).
  # ---------------------------------------------------------------------------
  mutants-frontend:
    runs-on: ubuntu-24.04
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Install Node.js
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: 24
          cache: npm

      - name: Install npm dependencies
        run: npm ci

      - name: Run Stryker mutation testing (scoped frontend libs)
        # Never gate: surviving mutants are triage signal, not a merge
        # blocker. `npm run mutation` loops `stryker run` once per module
        # (see `scripts/run-mutation.mjs`); a non-zero exit here means an
        # actual Stryker crash, not a low mutation score (no
        # `thresholds.break` is configured).
        run: npm run mutation || true

      - name: Mutation summary
        if: always()
        run: |
          node - <<'NODE' >> "$GITHUB_STEP_SUMMARY"
          const fs = require('node:fs')
          const path = require('node:path')

          const root = 'reports/mutation'
          let lines = ['## StrykerJS mutation testing (frontend, #886)', '']
          if (!fs.existsSync(root)) {
            lines.push('_No reports produced (Stryker crashed before writing JSON) — see job log._')
            console.log(lines.join('\n'))
            process.exit(0)
          }

          const modules = fs.readdirSync(root).sort()
          // "Score" here is Stryker's "covered" mutation score — (killed +
          // timeout) / (killed + timeout + survived) — i.e. excluding
          // no-coverage mutants from the denominator, same as the "covered"
          // column Stryker itself prints to the job log.
          lines.push('| Module | Score (covered) | Killed | Timeout | Survived | No cov | Errors |')
          lines.push('|---|--:|--:|--:|--:|--:|--:|')

          let totals = { killed: 0, timeout: 0, survived: 0, noCov: 0, errors: 0 }
          const survivors = []

          for (const mod of modules) {
            const jsonPath = path.join(root, mod, 'mutation.json')
            if (!fs.existsSync(jsonPath)) {
              lines.push(`| ${mod} | _no report_ | | | | | |`)
              continue
            }
            const report = JSON.parse(fs.readFileSync(jsonPath, 'utf-8'))
            const counts = { killed: 0, timeout: 0, survived: 0, noCov: 0, errors: 0 }
            for (const [file, entry] of Object.entries(report.files ?? {})) {
              for (const mutant of entry.mutants ?? []) {
                switch (mutant.status) {
                  case 'Killed':
                    counts.killed++
                    break
                  case 'Timeout':
                    counts.timeout++
                    break
                  case 'Survived':
                    counts.survived++
                    survivors.push(`${mod}: ${file}:${mutant.location.start.line} [${mutant.mutatorName}]`)
                    break
                  case 'NoCoverage':
                    counts.noCov++
                    break
                  case 'CompileError':
                  case 'RuntimeError':
                    counts.errors++
                    break
                  default:
                    break
                }
              }
            }
            const scored = counts.killed + counts.timeout + counts.survived
            const score = scored > 0 ? ((counts.killed + counts.timeout) / scored) * 100 : 0
            lines.push(
              `| ${mod} | ${score.toFixed(1)}% | ${counts.killed} | ${counts.timeout} | ${counts.survived} | ${counts.noCov} | ${counts.errors} |`,
            )
            for (const k of Object.keys(totals)) totals[k] += counts[k]
          }

          const totalScored = totals.killed + totals.timeout + totals.survived
          const totalScore = totalScored > 0 ? ((totals.killed + totals.timeout) / totalScored) * 100 : 0
          lines.push(
            `| **All modules** | **${totalScore.toFixed(1)}%** | ${totals.killed} | ${totals.timeout} | ${totals.survived} | ${totals.noCov} | ${totals.errors} |`,
          )

          if (survivors.length > 0) {
            lines.push('', '### Surviving mutants — triage into test gaps', '```')
            lines.push(...survivors)
            lines.push('```')
          }

          console.log(lines.join('\n'))
          NODE

      - name: Upload mutation reports
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: mutation-frontend-report
          path: reports/mutation/
          if-no-files-found: ignore
          retention-days: 30

  # ---------------------------------------------------------------------------
  # fuzz (#650/#2590) — short coverage-guided fuzz of the raw-input parsers. The
  # fuzz crate (src-tauri/fuzz) builds under stable for compile-checking but
  # `cargo fuzz run` needs nightly (libFuzzer instrumentation). Smoke-length
  # budget here; a longer campaign runs out-of-band. Non-blocking.
  # ---------------------------------------------------------------------------
  fuzz:
    runs-on: ubuntu-24.04
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            libssl-dev \
            librsvg2-dev \
            libsoup-3.0-dev \
            pkg-config \
            mold

      - name: Enable mold linker (CI-only .cargo/config.toml)
        run: |
          mkdir -p .cargo
          cp .cargo/config.toml.example .cargo/config.toml

      - name: Install nightly Rust toolchain
        # cargo-fuzz requires nightly for the libFuzzer sanitizer coverage
        # instrumentation (`-Z sanitizer`). The production toolchain stays
        # pinned at 1.95.0; only this lane uses nightly.
        uses: dtolnay/rust-toolchain@4cda84d5c5c54efe2404f9d843567869ab1699d4 # stable
        with:
          toolchain: nightly

      - name: Rust cache
        uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
        with:
          workspaces: src-tauri/fuzz
          shared-key: rust-fuzz
          save-if: ${{ github.ref == 'refs/heads/main' }}

      - name: Install Node.js
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: 24
          cache: npm

      - name: Install npm dependencies
        run: npm ci

      - name: Prepare externalBin placeholder (FEAT-4f)
        run: node scripts/prepare-external-bins.mjs --placeholder-only

      - name: Install cargo-fuzz via prebuilt binary
        uses: taiki-e/install-action@a6b2e2dcd845ddd7f509ce4f3ed3d922b80cc5d9 # v2.84.0
        with:
          tool: cargo-fuzz

      - name: Fuzz each parser target (smoke length)
        working-directory: src-tauri/fuzz
        # `-max_total_time` keeps each target to a smoke budget so the weekly
        # lane stays bounded; a crash exits non-zero and the artifact upload
        # below preserves the reproducer. Seeds come from the checked-in
        # corpora under fuzz/corpus/<target>/. The dispatch input rides via
        # `env:` (not inline `${{ }}`) per zizmor template-injection.
        env:
          FUZZ_SECONDS: ${{ github.event.inputs.fuzz_seconds || '120' }}
          # cargo-fuzz builds with `-Zsanitizer=address`, which rustc rejects
          # when libc is statically linked ("sanitizer is incompatible with
          # statically linked libc"). Disable crt-static for the fuzz build;
          # cargo-fuzz reads RUSTFLAGS and appends its own sanitizer flags, so
          # both survive. gnu defaults to dynamic libc, so the gnu target pinned
          # below is ASan-compatible.
          RUSTFLAGS: "-C target-feature=-crt-static"
        run: |
          set -euo pipefail
          for target in snapshot_decode deeplink_parse import_parse; do
            echo "::group::fuzz $target"
            # `--target x86_64-unknown-linux-gnu` pins the gnu HOST target.
            # Recent cargo-fuzz defaults `--target` to
            # x86_64-unknown-linux-musl (for a statically-linked fuzzer), but
            # the nightly toolchain installed here only ships the host (gnu)
            # std, so the musl default fails to build with
            # `error[E0463]: can't find crate for std` (#2123). Pinning the
            # host target builds against the installed std and keeps the
            # dynamic-libc that ASan requires.
            cargo +nightly fuzz run "$target" \
              --target x86_64-unknown-linux-gnu -- \
              -max_total_time="$FUZZ_SECONDS" -rss_limit_mb=4096
            echo "::endgroup::"
          done

      - name: Upload fuzz artifacts (crashes / corpus)
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: fuzz-artifacts
          path: |
            src-tauri/fuzz/artifacts/
            src-tauri/fuzz/corpus/
          if-no-files-found: ignore
          retention-days: 30

  # ---------------------------------------------------------------------------
  # full-suite — the WHOLE-TREE BACKSTOP that makes per-PR category gating safe.
  #
  # ci/path-conditional-jobs: the per-PR `_validate.yml` lint job and the local
  # `scripts/verify-ci-equivalent.sh` Phase A now SKIP the prek hooks whose
  # category (frontend/backend/ci/docs) a given push did not touch — trading
  # whole-tree coverage of the ABSENT categories for a faster gate. This job is
  # the counterweight: on the weekly schedule (and on demand) it runs the FULL,
  # UNSKIPPED prek suite (both pre-commit and pre-push stages) plus the FULL
  # vitest / playwright / nextest / doc-test suites over the entire tree, so a
  # latent breach in an untouched, unchanged-category file is caught here even
  # when no PR re-linted it. Nothing is category-gated: every hook and every
  # test runs. Not a required check — a maintainer triages any failure.
  # ---------------------------------------------------------------------------
  full-suite:
    runs-on: ubuntu-24.04
    # The slow exhaustive lane: cold-ish compile + the full prek suite (both
    # stages) + full vitest + full playwright + full nextest + doc-tests.
    timeout-minutes: 60
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          # gitleaks (run via prek) inspects git history; fetch the full graph.
          fetch-depth: 0
          persist-credentials: false

      - name: Free disk space on runner
        # The full test + coverage-free nextest tree plus the Playwright browser
        # download are heavy; drop the unused preinstalled toolchains first
        # (same rationale as the cargo-tests job in _validate.yml).
        run: |
          set -euo pipefail
          echo "Before:" && df -h /
          sudo rm -rf /usr/share/dotnet \
                      /usr/local/lib/android \
                      /opt/ghc \
                      /usr/local/share/boost \
                      /usr/local/share/powershell \
                      /usr/share/swift \
                      "$AGENT_TOOLSDIRECTORY"
          echo "After:" && df -h /

      - name: Prepare apt (free dpkg lock, bound downloads)
        uses: ./.github/actions/prepare-apt

      - name: Cache apt archives (Tauri system deps)
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: /var/cache/apt/archives/*.deb
          key: apt-tauri-${{ runner.os }}-v1

      - name: Install system dependencies
        # Same Tauri stack as the lint / cargo-tests / mcp-tests jobs in
        # _validate.yml — webkit/gtk/ssl/rsvg/soup + mold for fast linking.
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            libssl-dev \
            librsvg2-dev \
            libsoup-3.0-dev \
            pkg-config \
            mold

      - name: Enable mold linker (CI-only .cargo/config.toml)
        run: |
          mkdir -p .cargo
          cp .cargo/config.toml.example .cargo/config.toml

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@4cda84d5c5c54efe2404f9d843567869ab1699d4 # stable
        with:
          # #640: exact toolchain pin — keep in lockstep with
          # rust-toolchain.toml and src-tauri/Cargo.toml `rust-version`.
          toolchain: 1.95.0
          # The prek cargo hooks run `cargo clippy -- -D warnings` and
          # `cargo fmt --check`; dtolnay installs `--profile minimal`, which
          # ships neither component, so request them explicitly (mirrors lint).
          components: clippy,rustfmt

      - name: Rust cache
        uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
        with:
          workspaces: src-tauri
          # Cache ~/.cargo/bin so the cargo-installed plugins (sqlx-cli) persist.
          cache-bin: 'true'
          # Own per-job-class key (issue #813): the full unskipped prek + plain
          # nextest tree matches none of the lint/cov/mcp/bench trees.
          shared-key: rust-full-suite
          save-if: ${{ github.ref == 'refs/heads/main' }}

      - name: Install Node.js
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: 24
          cache: npm

      - name: Install npm dependencies
        run: npm ci

      - name: Prepare externalBin placeholder (FEAT-4f)
        # Tauri's build.rs validates externalBin paths on every cargo
        # invocation (clippy hook, nextest, doc-tests).
        run: node scripts/prepare-external-bins.mjs --placeholder-only

      - name: Install prek + non-Rust lint tools via prebuilt binaries
        # Mirrors the lint job's first (ungated) tool install: prek runs the
        # whole suite; zizmor/taplo/typos/sqruff are invoked by prek hooks.
        uses: taiki-e/install-action@a6b2e2dcd845ddd7f509ce4f3ed3d922b80cc5d9 # v2.84.0
        with:
          # sqruff pinned to 0.38.x: >=0.39 needs rustc 1.96 while this repo
          # pins 1.95.0 (see the lint job in _validate.yml). Bump in lockstep.
          tool: prek,zizmor,taplo-cli,typos-cli,sqruff@0.38.0

      - name: Install cargo plugins via prebuilt binaries
        # cargo-deny/cargo-machete are invoked by prek Rust hooks; cargo-nextest
        # backs both the cargo-test hook and the explicit nextest step below.
        uses: taiki-e/install-action@a6b2e2dcd845ddd7f509ce4f3ed3d922b80cc5d9 # v2.84.0
        with:
          tool: cargo-deny,cargo-machete,cargo-audit,cargo-nextest

      - name: Install sqlx-cli (custom features, cargo fallback)
        # Same as the lint job: sqlx-cli's feature set isn't in taiki-e's binary
        # list, so compile from source (cached via rust-cache cache-bin).
        run: |
          if ! command -v cargo-sqlx >/dev/null; then cargo install --locked sqlx-cli --no-default-features --features rustls,sqlite; fi

      - name: Install lychee (prebuilt binary)
        # The `lychee` prek hook is a `local` hook calling the system binary;
        # install it the same pinned+checksummed way the lint job does.
        run: |
          set -euo pipefail
          VERSION=lychee-v0.24.2
          DIR=lychee-x86_64-unknown-linux-gnu
          TARBALL="${DIR}.tar.gz"
          SHA256=1f4e0ef7f6554a6ed33dd7ac144fb2e1bbed98598e7af973042fc5cd43951c9a
          curl -fsSL -o /tmp/lychee.tar.gz \
            "https://github.com/lycheeverse/lychee/releases/download/${VERSION}/${TARBALL}"
          echo "${SHA256}  /tmp/lychee.tar.gz" | sha256sum -c -
          mkdir -p "${HOME}/.local/bin"
          tar -xzf /tmp/lychee.tar.gz -C /tmp "${DIR}/lychee"
          install -m 0755 "/tmp/${DIR}/lychee" "${HOME}/.local/bin/lychee"
          echo "${HOME}/.local/bin" >> "${GITHUB_PATH}"
          "${HOME}/.local/bin/lychee" --version

      - name: Restore lychee link-check cache
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: .lycheecache
          key: lychee-${{ runner.os }}-${{ hashFiles('**/*.md', '!node_modules/**') }}
          restore-keys: |
            lychee-${{ runner.os }}-

      - name: Restore Playwright browser cache
        id: playwright-cache
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('package-lock.json') }}
          restore-keys: |
            playwright-${{ runner.os }}-

      - name: Install Playwright system deps
        run: npx playwright install-deps chromium

      - name: Install Playwright browser binaries (on cache miss)
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: npx playwright install chromium

      - name: Run the FULL prek suite — pre-commit stage (no SKIP, whole tree)
        # The whole-tree backstop for the per-PR category-gated Phase A: NO SKIP,
        # so every category's hooks run against every file.
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: prek run --all-files

      - name: Run the FULL prek suite — pre-push stage (whole tree)
        # Pre-push-staged hooks (knip, npm-audit, lychee, cargo-clippy) do NOT
        # run in the pre-commit invocation above — run them whole-tree here so
        # the backstop covers them too.
        #
        # SKIP carries only the pre-push hooks that are meaningless / broken in
        # a whole-tree CI-on-main context, exactly like the `lint` job:
        #   * no-commit-to-branch — the `--branch=main` protected-branch guard
        #     is a LOCAL-dev push guard; this scheduled job runs ON main, so it
        #     would HARD-FAIL the whole step every run.
        #   * verify-ci-equivalent — the pre-push verifier itself; letting it
        #     run here re-invokes the entire Phase A prek suite + range tests
        #     NESTED inside this prek process (recursion / wasted wall-clock,
        #     and it fail-exits when the on-main push range is empty).
        #   * vitest / cargo-test — the range-scoped test hooks; the FULL
        #     vitest + nextest suites run as their own explicit steps below, so
        #     these would only re-read `--cached` (nothing staged) and add noise.
        # Every REAL category hook still runs unskipped — the backstop holds.
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SKIP: no-commit-to-branch,verify-ci-equivalent,vitest,cargo-test
        run: prek run --all-files --hook-stage pre-push

      - name: Vitest (full suite)
        run: npx vitest run

      - name: Playwright E2E tests (full suite)
        run: npx playwright test

      - name: Cargo nextest (full suite) + doc-tests
        working-directory: src-tauri
        # nextest does NOT run doc-tests (they compile as their own per-example
        # binaries), so run both to keep executable doc examples honest (#2555).
        run: |
          cargo nextest run --profile ci
          cargo test --doc
