name: Scheduled deep checks

# Heavy correctness/perf tooling that is too slow for the per-PR critical
# path (the PR gate is `ci.yml` → `_validate.yml`). Runs weekly + on manual
# dispatch. None of these jobs is a required check; they surface signal via
# step summaries and uploaded artifacts, and a maintainer triages survivors.
#
# Lanes:
#   clippy-clean   — cache-busting full-workspace `cargo fmt --all --check` +
#                    `cargo clippy`: no rust-cache, cold compile, `--workspace`.
#                    The warm per-PR cache never re-lints unchanged targets when
#                    a lint is newly added to a Cargo.toml, so violations stay
#                    latent (this masked #1875's pedantic lints in the
#                    diagnostics bins + an app-lib test); the per-PR fmt/clippy
#                    hooks also omit --all/--workspace, skipping the diagnostics
#                    member entirely. This lane fails on that drift weekly.
#   bench-compile  — #639: compile all criterion benches (clippy already
#                    `--all-targets`-lints them per-PR), then #978: SMOKE-RUN
#                    every bench once (`--test`) so a drifted seed/fixture
#                    fails CI instead of rotting silently (previously only
#                    interactive_slo ran; the rest were compile-only). Also
#                    RUNS the interactive_slo SLO gate + the `#[ignore]`d
#                    20k-row perf gates, which nothing else exercises.
#   mutants        — #649: cargo-mutants scoped to the invariant core
#                    (op, op_log, reverse, loro/engine). Non-blocking; the
#                    survivor list is the deliverable to triage into tests.
#   fuzz           — #650: short coverage-guided fuzz runs over the three
#                    byte-level parsers (snapshot decode, deeplink parse).
#                    Smoke-length here (the per-target time budget is small);
#                    a real fuzzing campaign runs longer out-of-band.
on:
  schedule:
    # Mondays 04:17 UTC — off-peak, odd minute to avoid the top-of-hour
    # scheduler stampede. Weekly is enough for trend/triage tooling.
    - cron: '17 4 * * 1'
  workflow_dispatch:
    inputs:
      mutants_timeout:
        description: 'Per-mutant timeout (seconds) for the mutants lane'
        required: false
        default: '300'
      fuzz_seconds:
        description: 'Per-target fuzz time budget (seconds)'
        required: false
        default: '120'

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always

jobs:
  # ---------------------------------------------------------------------------
  # clippy-clean — cache-busting full-workspace clippy. The per-PR clippy hook
  # restores the Swatinem rust-cache, which never re-lints already-compiled,
  # unchanged targets when a lint is newly added to a Cargo.toml — so the new
  # lint's violations stay latent until a cache-miss. This masked #1875's
  # pedantic lints in the diagnostics bins + an app-lib test. This lane builds
  # COLD (no rust-cache) and lints every workspace member (`--workspace`, which
  # the per-PR hook also omits), so latent drift fails here weekly instead of
  # ambushing the next unrelated Rust PR.
  # ---------------------------------------------------------------------------
  clippy-clean:
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            libssl-dev \
            librsvg2-dev \
            libsoup-3.0-dev \
            pkg-config \
            mold

      - name: Enable mold linker (CI-only .cargo/config.toml)
        run: |
          mkdir -p .cargo
          cp .cargo/config.toml.example .cargo/config.toml

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
        with:
          toolchain: 1.95.0
          components: clippy,rustfmt

      - name: Check formatting over the whole workspace
        working-directory: src-tauri
        # `--all`: check every member, incl. agaric-diagnostics (the per-PR
        # fmt hook omits it, so that crate's formatting is otherwise never
        # enforced). No compile needed, so it runs before the clippy build.
        run: cargo fmt --all --check

      # No Swatinem/rust-cache here ON PURPOSE: a warm cache is exactly what
      # masks newly-added lints on unchanged targets. This lane must compile
      # cold so clippy re-checks everything.

      - name: Install Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 24
          cache: npm

      - name: Install npm dependencies
        run: npm ci

      - name: Prepare externalBin placeholder (FEAT-4f)
        # Tauri's build.rs validates externalBin paths on every cargo
        # invocation, including the clippy compile below.
        run: node scripts/prepare-external-bins.mjs --placeholder-only

      - name: Clean-compile clippy over the whole workspace
        working-directory: src-tauri
        # `--workspace`: lint every member, incl. agaric-diagnostics (the
        # per-PR hook omits it, so those bins are otherwise never linted).
        # `-D warnings`: any lint is a failure. Cold build → no cache masking.
        run: cargo clippy --workspace --all-targets -- -D warnings

  # ---------------------------------------------------------------------------
  # bench-compile (#639) — compile every bench target and run the gates that
  # are otherwise never executed by automation: the #978 seed/fixture
  # smoke-run (`--test` once per bench — validates fixtures, not perf), the
  # interactive_slo SLO bench (it `panic!`s on a per-command budget breach —
  # already pass/fail) and the `#[ignore]`d 20k-row perf gates.
  # ---------------------------------------------------------------------------
  bench-compile:
    runs-on: ubuntu-24.04
    # 45 → 90: the #978 smoke phase RUNS every bench once. `--test` is a cold
    # single shot (no warmup), which inflates the heavy 100K-seed benches
    # (e.g. cache_bench's rebuild_* probes) 10×+ per AGENTS.md, so the suite
    # walk needs materially more wall-clock than the compile + interactive_slo
    # run alone.
    timeout-minutes: 90
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            libssl-dev \
            librsvg2-dev \
            libsoup-3.0-dev \
            pkg-config \
            mold

      - name: Enable mold linker (CI-only .cargo/config.toml)
        run: |
          mkdir -p .cargo
          cp .cargo/config.toml.example .cargo/config.toml

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
        with:
          toolchain: 1.95.0

      - name: Rust cache
        uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
        with:
          workspaces: src-tauri
          # Own cache key — the bench/test profile tree matches neither the
          # lint nor the llvm-cov instrumented tree (issue #813 rationale).
          shared-key: rust-bench
          save-if: ${{ github.ref == 'refs/heads/main' }}

      - name: Install Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 24
          cache: npm

      - name: Install npm dependencies
        run: npm ci

      - name: Prepare externalBin placeholder (FEAT-4f)
        # Tauri's build.rs validates externalBin paths on every cargo
        # invocation, including `cargo bench` / nextest below.
        run: node scripts/prepare-external-bins.mjs --placeholder-only

      - name: Compile all bench targets (no-run)
        working-directory: src-tauri
        # `--no-run` compiles every `[[bench]]` (all 26) without executing
        # them — the cheap half of #639. `--all-targets` clippy already
        # guards this per-PR; this is the belt-and-braces compile under the
        # bench profile (criterion harness linked in).
        run: cargo bench --no-run

      - name: Smoke-run every bench once (--test) — #978 seed/fixture guard
        working-directory: src-tauri
        # WHAT THIS VALIDATES: that every bench's SEED/FIXTURE is still valid
        # against the live schema — NOT performance. Criterion's `--test`
        # runs each benchmark function exactly ONCE (a cold single shot, no
        # measurement, no timing budget), so a bench whose hand-seeded raw-SQL
        # fixture has drifted from the schema (a migration renamed/retyped a
        # column, a CHECK now forbids a value, …) PANICS here and fails the
        # job. Before #978 only `interactive_slo` actually ran; the other 28
        # benches were compile-only (`--no-run`), so a broken seed was
        # false-green and could rot silently (the #1233 whole-suite drift
        # class). This loop closes that gap by *running* them all.
        #
        # HOW (cargo #6313 — see benches/AGENTS.md): we do NOT `cargo bench
        # --bench <name>` per bench — agaric's multi-crate-type [lib] races to
        # write libagaric_lib.* and a per-bench recompile intermittently links
        # the wrong `sqlx` (E0308 `Pool<Sqlite>`). Instead we run the PREBUILT
        # binaries from the single cohesive `--no-run` build above, discovering
        # them dynamically (no hardcoded hashes): each `[[bench]]` becomes a
        # `target/release/deps/<name>-<hash>` executable. We pick the newest
        # non-metadata file (`.d`/`.so`/`.dwp` filtered out) per AGENTS.md.
        #
        # `interactive_slo` is SKIPPED here on purpose: it gets a full WARM
        # run in the next step (its `assert_under_budget` would false-fail on
        # cold `--test` timings — AGENTS.md "--test timings are COLD"). The
        # smoke gate asserts seeds are valid, not that they meet a budget.
        shell: bash
        run: |
          set -uo pipefail
          fail=0
          # Newest executable for a bench: glob its candidates (a real binary
          # has no extension; drop dep-info/shared-obj/split-debug), then pick
          # the most recent by mtime. A glob + loop (not `ls | grep`) avoids
          # the SC2010 lint and is robust to odd filenames.
          newest_bench_bin() {
            local name="$1" newest="" f
            for f in "target/release/deps/${name}-"*; do
              [[ -f "$f" && -x "$f" ]] || continue
              case "$f" in *.d|*.so|*.dwp) continue ;; esac
              if [[ -z "$newest" || "$f" -nt "$newest" ]]; then
                newest="$f"
              fi
            done
            printf '%s' "$newest"
          }
          # Bench target names from Cargo.toml's [[bench]] stanzas, minus
          # interactive_slo (warm-gated separately below).
          benches=$(grep -A1 '^\[\[bench\]\]' Cargo.toml \
            | sed -n 's/^name = "\(.*\)"/\1/p' \
            | grep -vx interactive_slo)
          for name in $benches; do
            bin=$(newest_bench_bin "$name")
            if [ -z "$bin" ]; then
              echo "::error::no prebuilt binary for bench '$name' (did --no-run compile it?)"
              fail=1
              continue
            fi
            echo "::group::smoke $name ($bin --test)"
            if "$bin" --test; then
              echo "smoke OK: $name"
            else
              echo "::error::bench '$name' FAILED its --test smoke run (seed/fixture drift?)"
              fail=1
            fi
            echo "::endgroup::"
          done
          exit "$fail"

      - name: Run interactive_slo SLO gate (#639)
        working-directory: src-tauri
        # The bench self-`panic!`s if any command's mean latency exceeds its
        # ARCHITECTURE.md §25 budget, so a non-zero exit IS the gate. The
        # already-breaching `list_page_links` / `list_projected_agenda`
        # probes stay env-gated out (SLO_INCLUDE_PROBLEM unset) so the gate
        # tracks the commands currently within budget; flip the env to
        # surface the known-slow ones.
        #
        # #978: tee stdout so the SLO summary step below can capture the
        # per-command observed-mean-vs-budget lines for over-time tracking.
        # `pipefail` (set by the shell) preserves the bench's exit code
        # through the pipe so a budget breach still fails the run.
        shell: bash
        run: |
          set -o pipefail
          cargo bench --bench interactive_slo 2>&1 | tee interactive_slo.log

      - name: SLO summary + threshold flagging (#978)
        if: always()
        working-directory: src-tauri
        # MEASURE-not-imagine: every number here is read back from the bench
        # itself — the observed mean and the budget both come from the
        # `interactive_slo:` lines the bench `println!`s (format defined in
        # benches/interactive_slo.rs::assert_under_budget). We invent no
        # thresholds; we surface the bench's own pass/fail per command and
        # flag any line the bench did not mark PASS. Robust to no data:
        # if the log is missing or matches nothing, we say so and exit 0.
        shell: bash
        run: |
          {
            echo "## interactive_slo (#978) — observed vs budget @ 100K"
            echo
            if [ ! -f interactive_slo.log ]; then
              echo "_No interactive_slo.log produced (bench step did not run) — see job log._"
              exit 0
            fi
            # Stable lines, e.g.:
            #   interactive_slo: get_block @ 100K = 0.42 ms <= budget 1 ms (PASS)
            #   interactive_slo: foo SKIPPED (set SLO_INCLUDE_PROBLEM=1 ...)
            if ! grep -q '^interactive_slo:' interactive_slo.log; then
              echo "_No \`interactive_slo:\` lines found in the bench output._"
              echo "_(The bench format may have changed — see benches/interactive_slo.rs.)_"
              exit 0
            fi
            echo "| command | observed | budget | status |"
            echo "|---------|---------:|-------:|:------:|"
            # PASS lines carry both numbers; emit them as a row. Any
            # interactive_slo: line that is neither PASS nor SKIPPED is a
            # FLAG (the bench would normally panic first, but if a future
            # tier reports without asserting we still surface it).
            grep '^interactive_slo:' interactive_slo.log | while IFS= read -r line; do
              body="${line#interactive_slo: }"
              if printf '%s' "$body" | grep -q '(PASS)$'; then
                cmd="${body%% = *}"
                rest="${body#* = }"
                obs="${rest%% <= budget *}"
                bud="${rest#* <= budget }"; bud="${bud% (PASS)}"
                echo "| \`$cmd\` | $obs | $bud | PASS |"
              elif printf '%s' "$body" | grep -q 'SKIPPED'; then
                cmd="${body%% SKIPPED*}"
                echo "| \`$cmd\` | — | — | SKIPPED |"
              else
                echo "| (raw) | | | FLAG |"
                echo "| \`$body\` | | | |"
              fi
            done
            echo
            echo "_Budgets are sourced from the bench (ARCHITECTURE.md §25); a"
            echo "breach \`panic!\`s the gate above. Track these rows across"
            echo "weekly runs for drift._"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Upload SLO results (log + criterion estimates)
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: interactive-slo
          # The raw log (stable observed/budget lines) plus criterion's own
          # JSON estimates (medians/MAD per benchmark id) for finer-grained
          # over-time trend analysis beyond the mean-vs-budget gate.
          path: |
            src-tauri/interactive_slo.log
            src-tauri/target/criterion/**/estimates.json
            src-tauri/target/criterion/**/benchmark.json
          if-no-files-found: ignore
          retention-days: 90

      - name: Install cargo-nextest via prebuilt binary
        uses: taiki-e/install-action@9e1e5806d4a4822de933115878265be9aaa786d9 # v2.82.2
        with:
          tool: cargo-nextest

      - name: Run the #[ignore]d perf gates (#639)
        working-directory: src-tauri
        # The 20k-row perf gates are `#[ignore]`d so the per-PR suite doesn't
        # pay for 20k-row seeding. `--run-ignored=only` runs exactly those;
        # they assert wall-clock budgets and fail on regression.
        run: cargo nextest run --run-ignored=only --no-fail-fast

  # ---------------------------------------------------------------------------
  # mutants (#649) — cargo-mutants scoped (via mutants.toml `examine_globs`)
  # to the invariant core. Non-blocking: the deliverable is the survivor list
  # in the step summary + uploaded artifact, which a maintainer triages into
  # test gaps. `|| true` is intentional — a surviving mutant is signal, not a
  # CI failure (this lane is not a required check and is never gated).
  # ---------------------------------------------------------------------------
  mutants:
    runs-on: ubuntu-24.04
    timeout-minutes: 120
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            libssl-dev \
            librsvg2-dev \
            libsoup-3.0-dev \
            pkg-config \
            mold

      - name: Enable mold linker (CI-only .cargo/config.toml)
        run: |
          mkdir -p .cargo
          cp .cargo/config.toml.example .cargo/config.toml

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
        with:
          toolchain: 1.95.0

      - name: Rust cache
        uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
        with:
          workspaces: src-tauri
          shared-key: rust-mutants
          save-if: ${{ github.ref == 'refs/heads/main' }}

      - name: Install Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 24
          cache: npm

      - name: Install npm dependencies
        run: npm ci

      - name: Prepare externalBin placeholder (FEAT-4f)
        run: node scripts/prepare-external-bins.mjs --placeholder-only

      - name: Install cargo-mutants + cargo-nextest via prebuilt binary
        uses: taiki-e/install-action@9e1e5806d4a4822de933115878265be9aaa786d9 # v2.82.2
        with:
          tool: cargo-mutants,cargo-nextest

      - name: Run cargo-mutants (scoped to invariant core)
        working-directory: src-tauri
        # Scope, test-tool (nextest), and timeouts come from mutants.toml.
        # `--in-place` avoids the default copy-to-tmp (faster; the runner is
        # ephemeral). Never gate: surviving mutants are triage signal.
        # The dispatch input rides via `env:` (not inline `${{ }}`) so it
        # can't expand into the shell as code (zizmor template-injection).
        env:
          MUTANTS_TIMEOUT: ${{ github.event.inputs.mutants_timeout || '300' }}
        run: |
          cargo mutants --in-place --timeout "$MUTANTS_TIMEOUT" \
            --output mutants-out || true

      - name: Mutants summary
        if: always()
        working-directory: src-tauri
        run: |
          {
            echo "## cargo-mutants (invariant core)"
            echo
            if [ -f mutants-out/outcomes.json ]; then
              echo '```'
              # caught / missed / unviable / timeout tallies
              for f in caught missed unviable timeout; do
                if [ -f "mutants-out/$f.txt" ]; then
                  echo "$f: $(wc -l < "mutants-out/$f.txt")"
                fi
              done
              echo '```'
              echo
              if [ -s mutants-out/missed.txt ]; then
                echo "### Surviving (missed) mutants — triage into test gaps"
                echo '```'
                cat mutants-out/missed.txt
                echo '```'
              fi
            else
              echo "_No outcomes produced (build or config error) — see job log._"
            fi
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Upload mutants report
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: mutants-out
          path: src-tauri/mutants-out/
          if-no-files-found: ignore
          retention-days: 30

  # ---------------------------------------------------------------------------
  # fuzz (#650) — short coverage-guided fuzz of the byte-level parsers. The
  # fuzz crate (src-tauri/fuzz) builds under stable for compile-checking but
  # `cargo fuzz run` needs nightly (libFuzzer instrumentation). Smoke-length
  # budget here; a longer campaign runs out-of-band. Non-blocking.
  # ---------------------------------------------------------------------------
  fuzz:
    runs-on: ubuntu-24.04
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            libssl-dev \
            librsvg2-dev \
            libsoup-3.0-dev \
            pkg-config \
            mold

      - name: Enable mold linker (CI-only .cargo/config.toml)
        run: |
          mkdir -p .cargo
          cp .cargo/config.toml.example .cargo/config.toml

      - name: Install nightly Rust toolchain
        # cargo-fuzz requires nightly for the libFuzzer sanitizer coverage
        # instrumentation (`-Z sanitizer`). The production toolchain stays
        # pinned at 1.95.0; only this lane uses nightly.
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
        with:
          toolchain: nightly

      - name: Rust cache
        uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
        with:
          workspaces: src-tauri/fuzz
          shared-key: rust-fuzz
          save-if: ${{ github.ref == 'refs/heads/main' }}

      - name: Install Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 24
          cache: npm

      - name: Install npm dependencies
        run: npm ci

      - name: Prepare externalBin placeholder (FEAT-4f)
        run: node scripts/prepare-external-bins.mjs --placeholder-only

      - name: Install cargo-fuzz via prebuilt binary
        uses: taiki-e/install-action@9e1e5806d4a4822de933115878265be9aaa786d9 # v2.82.2
        with:
          tool: cargo-fuzz

      - name: Fuzz each parser target (smoke length)
        working-directory: src-tauri/fuzz
        # `-max_total_time` keeps each target to a smoke budget so the weekly
        # lane stays bounded; a crash exits non-zero and the artifact upload
        # below preserves the reproducer. Seeds come from the checked-in
        # corpora under fuzz/corpus/<target>/. The dispatch input rides via
        # `env:` (not inline `${{ }}`) per zizmor template-injection.
        env:
          FUZZ_SECONDS: ${{ github.event.inputs.fuzz_seconds || '120' }}
          # cargo-fuzz builds with `-Zsanitizer=address`, which rustc rejects
          # when libc is statically linked ("sanitizer is incompatible with
          # statically linked libc"). Disable crt-static for the fuzz build;
          # cargo-fuzz reads RUSTFLAGS and appends its own sanitizer flags, so
          # both survive. (gnu defaults to dynamic libc, but the nightly + ASan
          # combo enables crt-static implicitly here — see rust-fuzz/cargo-fuzz.)
          RUSTFLAGS: "-C target-feature=-crt-static"
        run: |
          set -euo pipefail
          for target in snapshot_decode deeplink_parse; do
            echo "::group::fuzz $target"
            cargo +nightly fuzz run "$target" -- \
              -max_total_time="$FUZZ_SECONDS" -rss_limit_mb=4096
            echo "::endgroup::"
          done

      - name: Upload fuzz artifacts (crashes / corpus)
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: fuzz-artifacts
          path: |
            src-tauri/fuzz/artifacts/
            src-tauri/fuzz/corpus/
          if-no-files-found: ignore
          retention-days: 30
