name: Claude Code

on:
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]
  issues:
    types: [opened, assigned]
  pull_request_review:
    types: [submitted]

# Least-privilege default token (Scorecard Token-Permissions): the job below
# sets its own explicit `permissions:` block; this read-only baseline locks
# down any job that doesn't.
permissions:
  contents: read

# One in-flight run per issue/PR (issue #814): a burst of `@claude` mentions
# on the same thread otherwise stacks parallel agent runs, burning tokens and
# runner minutes. `issue.number` covers issue_comment + issues (PR comments
# arrive as issue_comment too); `pull_request.number` covers the two review
# events.
concurrency:
  group: claude-${{ github.event.issue.number || github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  claude:
    if: |
      (github.event_name == 'issue_comment' && contains(github.event.comment.body, '@claude')) ||
      (github.event_name == 'pull_request_review_comment' && contains(github.event.comment.body, '@claude')) ||
      (github.event_name == 'pull_request_review' && contains(github.event.review.body, '@claude')) ||
      (github.event_name == 'issues' && (contains(github.event.issue.body, '@claude') || contains(github.event.issue.title, '@claude')))
    runs-on: ubuntu-latest
    # Issue #814: cap the agent run — without this a hung run holds the
    # runner for the 360-min default.
    timeout-minutes: 30
    permissions:
      contents: read
      pull-requests: read
      issues: read
      id-token: write
      actions: read # Required for Claude to read CI results on PRs
    steps:
      - name: Checkout repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          fetch-depth: 1
          persist-credentials: false

      - name: Run Claude Code
        id: claude
        # SECURITY (claude-code-action GHSA, fixed v1.0.94 — checkHumanActor
        # write-permission validation, env scrubbing, gh-arg validation). We
        # pin a patched version by commit SHA. This job is read-only
        # defence-in-depth: every `permissions:` is read except the OIDC
        # `id-token: write`, so even a prompt-injection via an `@claude`
        # comment can't push code or write issues/PRs with the workflow token.
        uses: anthropics/claude-code-action@fbda2eb1bdc90d319b8d853f5deb53bca199a7c1 # v1.0.140
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}

          # This is an optional setting that allows Claude to read CI results on PRs
          additional_permissions: |
            actions: read

          # Optional: Give a custom prompt to Claude. If this is not specified, Claude will perform the instructions specified in the comment that tagged it.
          # prompt: 'Update the pull request description to include a summary of changes.'

          # Optional: Add claude_args to customize behavior and configuration
          # See https://github.com/anthropics/claude-code-action/blob/main/docs/usage.md
          # or https://code.claude.com/docs/en/cli-reference for available options
          # claude_args: '--allowed-tools Bash(gh pr *)'
