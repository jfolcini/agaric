name: CI

on:
  # Push to main is the post-merge sanity check (linux smoke + android).
  # Feature-branch CI runs through the pull_request trigger below — this
  # keeps GitHub from dispatching two parallel workflow runs on the same
  # SHA every time a feature branch is pushed while its PR is open, and
  # gives outside-contributor forks a CI signal (push events from forks
  # don't trigger workflows in the parent repo).
  #
  # Tag pushes are handled by release.yml (which owns the full
  # macOS/Windows/Android matrix and produces shippable artifacts).
  push:
    branches: [main]
    tags-ignore: ['**']
  pull_request:
    branches: [main]

# Cancel an in-flight CI run when a new push lands on the same ref. Saves
# minutes on rapid push-then-fix cycles. NOT applied to `main` (the
# `!= 'main'` guard) so a push that triggers a release-adjacent CI run
# always completes — we never want the validate result for a commit on
# main to be silently overwritten by a follow-up commit's run.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

# Default to read-only for the workflow's GITHUB_TOKEN. Individual jobs do
# not need to write back to the repo (artifact uploads use separate scopes
# inside `actions/upload-artifact`), so the principle-of-least-privilege
# applies. Release-time write access lives in `release.yml`, which is
# triggered separately by tag pushes.
permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always

jobs:
  # ---------------------------------------------------------------------------
  # Lint, format, audit, type-check, test — the same checks `prek run
  # --all-files` runs locally, plus the full test/E2E/bundle smoke suites.
  # Source of truth: prek.toml.
  #
  # Always runs — `validate` includes markdownlint + lychee, which
  # docs-only PRs still benefit from.
  # ---------------------------------------------------------------------------
  validate:
    uses: ./.github/workflows/_validate.yml

  # ---------------------------------------------------------------------------
  # Skip-the-heavy-bits gate. Inspects the diff and emits two booleans —
  # `desktop` (Linux bundle-relevant paths changed) and `android`
  # (Android-package-relevant paths changed). The `build` and
  # `android-build` jobs path-gate on these so frontend-only / docs-only
  # PRs stop paying the ~24 min Linux slot and ~28 min Android slot.
  # Logic correctness is already covered by `validate`; these two jobs
  # only add value for bundling / packaging / cross-compile drift, and
  # `release.yml` is the full-matrix catch-all at tag time. Skipped jobs
  # count as success for branch protection per GitHub's docs, so this
  # is safe to wire on required checks.
  #
  # Implemented inline with `git diff` (no extra action dependency) so
  # the workflow has no new SHA-pin to maintain. The base ref for the
  # comparison comes from the pull-request payload or `github.event.before`
  # for push events; new-branch / force-push / unreachable-base edge cases
  # fall back to "assume both changed" to avoid masking real bundling drift.
  # ---------------------------------------------------------------------------
  detect-changes:
    runs-on: ubuntu-24.04
    timeout-minutes: 3
    outputs:
      desktop: ${{ steps.diff.outputs.desktop }}
      android: ${{ steps.diff.outputs.android }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          # Full history so the three-dot `base...head` diff below can resolve
          # the merge-base. A shallow clone (the old `fetch-depth: 2`) lacks the
          # branch point for PRs whose head is behind `main`, which would make
          # the symmetric-difference diff fail or fall back to a stale base.
          fetch-depth: 0
          persist-credentials: false
      - id: diff
        shell: bash
        env:
          EVENT_NAME: ${{ github.event_name }}
          PR_BASE_SHA: ${{ github.event.pull_request.base.sha }}
          PR_HEAD_SHA: ${{ github.event.pull_request.head.sha }}
          PUSH_BEFORE: ${{ github.event.before }}
          PUSH_AFTER: ${{ github.sha }}
        run: |
          set -euo pipefail

          if [ "$EVENT_NAME" = "pull_request" ]; then
            base="$PR_BASE_SHA"
            head="$PR_HEAD_SHA"
          else
            base="$PUSH_BEFORE"
            head="$PUSH_AFTER"
          fi

          # New-branch / orphan-push: github.event.before is all-zeros and
          # there's nothing to diff against. Assume both bundles relevant so
          # we never silently skip the first push of a new branch.
          if [ -z "$base" ] || [ "$base" = "0000000000000000000000000000000000000000" ]; then
            echo "Base sha unresolved — assuming desktop+android changed."
            echo "desktop=true" >> "$GITHUB_OUTPUT"
            echo "android=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          # Force-pushes can leave `base` unreachable in the runner clone
          # (the old tip was rewritten upstream). `git cat-file -e` confirms
          # the object is reachable; if not, conservatively run both builds.
          if ! git cat-file -e "$base" 2>/dev/null; then
            echo "Base sha $base unreachable in shallow clone — assuming desktop+android changed."
            echo "desktop=true" >> "$GITHUB_OUTPUT"
            echo "android=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          # Three-dot (symmetric-difference) diff: compare from the
          # merge-base of base..head to head, i.e. ONLY the files this branch
          # changed — not files where `main` (base) moved ahead while the
          # branch sat behind. A two-dot `git diff base head` reports those
          # base-side changes too, so a frontend-only PR that was branched
          # before an unrelated `src-tauri/` merge would spuriously match
          # `desktop_re` and run the ~24 min build. (Bug from the original
          # path-gate; fixed here.)
          # Capture into a variable and check the exit code explicitly — a
          # `mapfile < <(git diff ...)` process substitution swallows diff
          # failures under `set -euo pipefail`, which previously converted a
          # transient git error into an empty array and the "skip both
          # builds" branch below. Only an empty diff that exited 0 may skip;
          # a failed diff must fail the job (the bundle gates depend on it).
          if ! diff_out=$(git diff --name-only "$base"..."$head"); then
            echo "::error::git diff $base...$head failed — cannot determine changed paths."
            exit 1
          fi

          changed=()
          if [ -n "$diff_out" ]; then
            mapfile -t changed <<< "$diff_out"
          fi

          if [ "${#changed[@]}" -eq 0 ]; then
            echo "Empty diff — skipping both bundle jobs."
            echo "desktop=false" >> "$GITHUB_OUTPUT"
            echo "android=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "Changed files:"
          printf '  %s\n' "${changed[@]}"

          # Path sets, anchored at repo root. A changed file matching
          # `desktop_re` makes the Linux `build` run; one matching
          # `android_re` makes `android-build` run (push-to-main only).
          # Logic correctness lives in `validate`; these jobs guard only
          # bundling/packaging/cross-compile drift, so the sets are narrow.
          #
          # Android is deliberately NOT triggered by every `src-tauri/**`
          # change — host-side Rust that compiles almost always cross-
          # compiles, and triggering on all backend PRs would defeat the
          # gate. Android breakage comes from the scaffold/override/conf
          # files, the cross-compile dependency graph (`Cargo.toml` +
          # `Cargo.lock` — the `[target.'cfg(target_os = "android")']` deps
          # live in the manifest), the Rust files carrying
          # `cfg(target_os = "android")` / `cfg(mobile)` gates (lib.rs,
          # db.rs, lifecycle.rs, and the sync_daemon multicast shim +
          # mod/orchestrator), and the patch script; `release.yml` covers
          # the rest at tag time.
          desktop_re='^(src-tauri/|\.cargo/config\.toml\.example$|scripts/(fix-appimage-icons\.sh|prepare-external-bins\.mjs)$|package(-lock)?\.json$|\.github/workflows/ci\.yml$)'
          android_re='^(src-tauri/gen/android/|src-tauri/tauri\.android\.conf\.json$|src-tauri/tauri\.conf\.json$|src-tauri/Cargo\.(toml|lock)$|src-tauri/src/(lib|db|lifecycle)\.rs$|src-tauri/src/sync_daemon/(android_multicast|mod|orchestrator)\.rs$|scripts/patch-android-build\.sh$|scripts/prepare-external-bins\.mjs$|\.github/workflows/ci\.yml$)'

          desktop=false
          android=false
          for f in "${changed[@]}"; do
            [[ "$f" =~ $desktop_re ]] && desktop=true
            [[ "$f" =~ $android_re ]] && android=true
          done

          echo "desktop=$desktop"
          echo "android=$android"
          echo "desktop=$desktop" >> "$GITHUB_OUTPUT"
          echo "android=$android" >> "$GITHUB_OUTPUT"

  # ---------------------------------------------------------------------------
  # Linux smoke build. Catches Tauri-config drift early without burning
  # macOS/Windows runner minutes (~10× the Linux cost) on every PR. The
  # full desktop matrix is built only at release time by `release.yml`
  # on tag push, which is the only place macOS/Windows artifacts must
  # actually ship.
  #
  # Path-gated on `detect-changes.outputs.desktop == 'true'` — only diffs
  # touching desktop bundle-relevant paths (`src-tauri/**`, bundling
  # scripts, JS manifests, this workflow) pay the ~24 min runner slot.
  # Frontend-only and docs-only PRs skip it entirely.
  #
  # If a Tauri / wry / cargo-tauri bump breaks a non-Linux target, the
  # tag-push release will surface it — the solo maintainer tagging the
  # release notices immediately and either patches forward or rolls
  # back the bump. Multi-maintainer projects that want PR-time signal
  # on non-Linux platforms can add a label-gated re-add or a scheduled
  # nightly job (see the README for the rationale).
  #
  # `needs: [validate]` is a DELIBERATE fail-fast-vs-latency choice
  # (#819 (5)): the build consumes nothing from validate, so removing
  # the edge would start the ~24-min slot in parallel and cut wall
  # clock. We keep the serialization anyway — a PR that fails the
  # cheap validate stage should not burn the expensive runner slot,
  # and the bundle signal is not on the review critical path (logic
  # correctness lives in `validate`). Revisit only if bundle-drift
  # feedback latency starts hurting.
  # ---------------------------------------------------------------------------
  build:
    needs: [validate, detect-changes]
    if: needs.detect-changes.outputs.desktop == 'true'
    # PEND-41 R1 — observed Linux wall-clock 24.3 min (run 25966040732,
    # 2026-05-16, n=1). +50% headroom + round up → 50.
    timeout-minutes: 50
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Install system dependencies
        # patchelf and libappindicator3-dev are required for the AppImage
        # bundling step (linuxdeploy uses patchelf to rewrite RPATH on the
        # bundled .so files). Without patchelf, tauri-bundler fails the
        # AppImage step with a generic "failed to run linuxdeploy" error
        # after ~60s of churn — match the apt list in release.yml so both
        # workflows produce identical bundles.
        # `mold` is added for faster linking on the cargo tauri build below
        # (PEND-37). Activated via `.cargo/config.toml.example` copy below.
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            libssl-dev \
            librsvg2-dev \
            libsoup-3.0-dev \
            libappindicator3-dev \
            patchelf \
            pkg-config \
            mold

      - name: Enable mold linker (CI-only .cargo/config.toml)
        run: |
          mkdir -p .cargo
          cp .cargo/config.toml.example .cargo/config.toml

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
        with:
          # #640: exact toolchain pin — keep in lockstep with
          # rust-toolchain.toml and src-tauri/Cargo.toml `rust-version`.
          # Without an explicit `toolchain:` this SHA-pinned action
          # installs the floating latest stable, and rustup would then
          # re-download the rust-toolchain.toml pin at first cargo run.
          toolchain: 1.95.0

      - name: Rust cache
        uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
        with:
          workspaces: src-tauri
          # Per-job-class key (issue #813): rust-cache keeps ONE immutable
          # entry per (os, shared-key, lockfile), so sharing `rust-deps`
          # with the validate-side jobs meant whichever job finished first
          # on main won the save and everyone else's `target/` tree was
          # rebuilt from scratch every run. This job's release-profile
          # `cargo tauri build` tree gets its own `rust-release` key. The
          # Android job below keeps its separate `rust-android` key
          # (different cross-compile targets).
          shared-key: rust-release
          # `cache-bin: 'true'` so this job's main-only `save-if` writes
          # `~/.cargo/bin/` — including the cargo-installed `tauri-cli`
          # below — into the `rust-release` entry. Without this, every warm
          # run would pay the ~5-6 min tauri-cli source compile again.
          cache-bin: 'true'
          # Only `main` writes to the cache (other branches read it
          # without saving) to stop feature-branch churn from evicting
          # the canonical baseline.
          save-if: ${{ github.ref == 'refs/heads/main' }}

      - name: Install Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 24
          cache: npm

      - name: Install npm dependencies
        run: npm ci

      - name: Install Tauri CLI
        # Skip the ~5-6 min source compile when the Swatinem cache restored
        # a previously-built `cargo-tauri` into `~/.cargo/bin`. The cache
        # is only populated by main-branch runs (`save-if` above); feature
        # branches restore from main and reuse it.
        run: |
          if ! command -v cargo-tauri >/dev/null; then cargo install tauri-cli --locked; fi

      - name: Build Tauri app
        # `-v` raises tauri-bundler's log level so the real stdout/stderr
        # of linuxdeploy / candle / light / codesign is captured in CI
        # logs. Without it, every bundling failure surfaces only the
        # generic `failed to run <tool>` wrapper from `output_ok()` in
        # tauri-bundler, with no underlying error text. See the
        # equivalent comment in release.yml.
        run: cargo tauri build -v

      - name: Fix AppImage icon symlinks
        run: bash scripts/fix-appimage-icons.sh

      # ---------------------------------------------------------------------
      # FEAT-4f — verify the `agaric-mcp` sidecar binary is staged for, and
      # landed in, the bundled artifact. Missing here breaks MCP clients
      # that rely on the installed stub.
      # ---------------------------------------------------------------------
      - name: Verify externalBin staging
        run: test -x src-tauri/binaries/agaric-mcp-x86_64-unknown-linux-gnu

      - name: Verify agaric-mcp inside .deb
        run: |
          # Use a glob (instead of `ls | head -n 1`) so shellcheck SC2012 is happy
          # and filenames with spaces / newlines parse correctly. Bundle dir
          # only contains a single .deb per build but still — defensive.
          shopt -s nullglob
          debs=(src-tauri/target/release/bundle/deb/*.deb)
          if [ ${#debs[@]} -eq 0 ]; then
            echo "ERROR: no .deb produced in src-tauri/target/release/bundle/deb/" >&2
            exit 1
          fi
          deb="${debs[0]}"
          echo "Inspecting $deb"
          dpkg-deb -c "$deb" | grep -E '(^|/)agaric-mcp( |$)'

      - name: Upload Linux bundles
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: bundle-linux
          path: |
            src-tauri/target/release/bundle/deb/*.deb
            src-tauri/target/release/bundle/appimage/*.AppImage
          # Smoke-build output, ~100 MB per main push — only ever
          # inspected within days of the run. Shippable artifacts come
          # from release.yml; the 90-day default just accumulated
          # storage (#819 (4)).
          retention-days: 7

  # ---------------------------------------------------------------------------
  # Android APK build. Skipped on `pull_request` events entirely — the
  # ~28-min Android slot dominates PR wall-clock and the typical PR never
  # touches Android-specific paths. On push (the merge commit on `main`,
  # feature-branch pushes) it additionally path-gates on
  # `detect-changes.outputs.android`, so it only runs when an
  # Android-relevant path changed (scaffold/override/conf files, the
  # cross-compile dependency graph, the multicast shim, the patch script,
  # or this workflow). `release.yml` builds the signed Android artifact at
  # tag time independently, covering everything this gate skips.
  # ---------------------------------------------------------------------------
  android-build:
    needs: [validate, detect-changes]
    if: github.event_name != 'pull_request' && needs.detect-changes.outputs.android == 'true'
    runs-on: ubuntu-24.04
    # PEND-41 R1 — observed wall-clock 27.8 min (run 25966040732, 2026-05-16,
    # n=1). +50% headroom + round up → 45 min.
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Free up runner disk space
        # The two-arch Android build (x86_64 debug + aarch64 release) plus the
        # NDK and the Rust release `target/` trees exhausted the ~14 GB the
        # default ubuntu-24.04 runner leaves free → "No space left on device"
        # (run 26804729629, android-build). Reclaim the large preinstalled
        # toolchains this job never uses BEFORE the SDK/NDK install and the
        # builds. The preinstalled Android NDKs are removed too — `setup-android`
        # below reinstalls the single pinned NDK this build needs. ~20-25 GB
        # recovered; `|| true` so a missing path never fails the build.
        run: |
          set -x
          df -h /
          sudo rm -rf /usr/share/dotnet || true
          sudo rm -rf /opt/ghc /usr/local/.ghcup || true
          sudo rm -rf /usr/local/share/powershell || true
          sudo rm -rf /usr/local/share/chromium || true
          sudo rm -rf /usr/local/lib/android/sdk/ndk || true
          sudo rm -rf /opt/hostedtoolcache/CodeQL || true
          sudo docker image prune --all --force || true
          df -h /

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
        with:
          # #640: exact toolchain pin — keep in lockstep with
          # rust-toolchain.toml and src-tauri/Cargo.toml `rust-version`.
          # Explicit here (not just rust-toolchain.toml) so the cross
          # `targets` below land on the pinned toolchain, not on a
          # floating latest-stable install.
          toolchain: 1.95.0
          targets: aarch64-linux-android,x86_64-linux-android

      - name: Rust cache
        uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
        with:
          workspaces: src-tauri
          # PEND-39 C6: separate `rust-android` key — Android cross-
          # compiles to aarch64-linux-android / x86_64-linux-android,
          # which means a different `target/` tree and different
          # rustup target installed. Sharing with the `rust-deps` key
          # (used by validate + Linux desktop build for the host triple)
          # would defeat both caches.
          shared-key: rust-android
          # Persist `~/.cargo/bin/` so the cargo-installed `tauri-cli`
          # below survives across runs (main writes, feature branches
          # read). Same pattern as the Linux `build` job; saves the
          # ~5-6 min source compile of tauri-cli on every warm run.
          cache-bin: 'true'
          save-if: ${{ github.ref == 'refs/heads/main' }}

      - name: Set up JDK 17
        uses: actions/setup-java@ad2b38190b15e4d6bdf0c97fb4fca8412226d287 # v5.3.0
        with:
          distribution: temurin
          java-version: 17

      - name: Set up Android SDK
        uses: android-actions/setup-android@40fd30fb8d7440372e1316f5d1809ec01dcd3699 # v4
        with:
          packages: >
            platforms;android-36
            build-tools;36.0.0
            ndk;27.2.12479018

      - name: Install Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 24
          cache: npm

      - name: Install npm dependencies
        run: npm ci

      - name: Prepare externalBin placeholder (FEAT-4f)
        # tauri-build validates `externalBin` paths on every cargo
        # invocation. Android builds don't ship the sidecar (see
        # tauri.android.conf.json override), but the host-triple
        # placeholder must exist so `cargo tauri android init` /
        # `build` can proceed past validation.
        run: node scripts/prepare-external-bins.mjs --placeholder-only

      - name: Install Tauri CLI
        # Skip the ~5-6 min source compile when the Swatinem cache restored
        # a previously-built `cargo-tauri` into `~/.cargo/bin` (see the
        # `cache-bin: 'true'` config on the Rust cache step above).
        run: |
          if ! command -v cargo-tauri >/dev/null; then cargo install tauri-cli --locked; fi

      - name: Initialize Tauri Android project
        # `src-tauri/gen/android/` is gitignored EXCEPT for a handful of
        # tracked override files (AndroidManifest.xml + the two res/xml
        # configs + proguard-rules.pro) that carry CAMERA / Wi-Fi-multicast
        # permissions, the FileProvider and AndroidTV LEANBACK_LAUNCHER
        # tweaks, and the network_security_config / file_paths overrides.
        # On a fresh CI checkout the directory therefore looks like a
        # *partially* initialised Android scaffold, which trips Tauri 2's
        # `android init` (it sees the existing files, then fails because
        # `app/src/main/java/com/agaric/app/` is missing — exactly the
        # state the user is asked to recreate from scratch).
        #
        # Solution: stash the tracked overrides, wipe `gen/android/`, run
        # init against a clean slate, then restore the overrides on top of
        # the freshly-generated scaffold so our customisations are
        # preserved. Tauri re-generates the directory on first build, but
        # doing it explicitly here gives the patch step below a stable
        # target file.
        shell: bash
        run: |
          set -euo pipefail

          OVERRIDES="$(mktemp -d)"
          if [ -d src-tauri/gen/android ]; then
            while IFS= read -r f; do
              rel="${f#src-tauri/gen/android/}"
              mkdir -p "$OVERRIDES/$(dirname "$rel")"
              cp "$f" "$OVERRIDES/$rel"
            done < <(git ls-files src-tauri/gen/android)
            rm -rf src-tauri/gen/android
          fi

          cargo tauri android init

          # Restore the tracked overrides on top of the regenerated scaffold.
          if find "$OVERRIDES" -mindepth 1 -print -quit | grep -q .; then
            cp -R "$OVERRIDES/." src-tauri/gen/android/
          fi
          rm -rf "$OVERRIDES"
        env:
          NDK_HOME: ${{ env.ANDROID_HOME }}/ndk/27.2.12479018

      - name: Apply platform-baseline overrides (minSdk 30, jvmTarget 17)
        run: bash scripts/patch-android-build.sh

      - name: Build Android APK (x86_64 debug)
        run: cargo tauri android build --target x86_64 --debug
        env:
          NDK_HOME: ${{ env.ANDROID_HOME }}/ndk/27.2.12479018

      - name: Build Android APK (aarch64 release, unsigned)
        run: cargo tauri android build --target aarch64
        env:
          NDK_HOME: ${{ env.ANDROID_HOME }}/ndk/27.2.12479018

      - name: Upload Android release APK (aarch64, unsigned)
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: agaric-android-aarch64-unsigned
          path: src-tauri/gen/android/app/build/outputs/apk/universal/release/app-universal-release-unsigned.apk
          if-no-files-found: error
          retention-days: 90
