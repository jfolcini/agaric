name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always

jobs:
  # ---------------------------------------------------------------------------
  # Lint, format, test (Linux only — these checks are platform-agnostic)
  # ---------------------------------------------------------------------------
  check:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            libssl-dev \
            librsvg2-dev \
            libsoup-3.0-dev \
            pkg-config

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install npm dependencies
        run: npm ci

      - name: Biome check
        run: npx biome check .

      - name: TypeScript check
        run: npx tsc -b --noEmit

      - name: Cargo fmt
        working-directory: src-tauri
        run: cargo fmt --check

      - name: Cargo clippy
        working-directory: src-tauri
        run: cargo clippy -- -D warnings

      - name: Install cargo-nextest
        uses: taiki-e/install-action@nextest

      - name: Cargo test (nextest)
        working-directory: src-tauri
        run: cargo nextest run --profile ci

      - name: Vitest
        run: npm test

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Playwright E2E tests
        id: playwright
        run: npx playwright test

      - name: Upload Playwright report (on failure)
        if: failure() && steps.playwright.outcome == 'failure'
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: |
            playwright-report/
            test-results/
          retention-days: 14
          if-no-files-found: ignore

      - name: sqlx offline cache check
        working-directory: src-tauri
        run: cargo sqlx prepare --check

      - name: npm audit (security)
        run: npx better-npm-audit audit

      - name: License check (npm)
        run: npx license-checker --onlyAllow 'MIT;ISC;Apache-2.0;BSD-3-Clause;BSD-2-Clause;MPL-2.0;MIT-0;CC0-1.0;Python-2.0;BlueOak-1.0.0;CC-BY-3.0;CC-BY-4.0;0BSD' --excludePackages 'agaric@0.1.0' --production

      - name: Depcheck (unused npm deps)
        run: npx depcheck --ignores='tailwindcss,@vitest/coverage-v8,better-npm-audit,depcheck,license-checker'

      - name: Cargo deny (advisories + licenses)
        working-directory: src-tauri
        run: cargo deny check

      - name: Cargo machete (unused Rust deps)
        working-directory: src-tauri
        run: cargo machete

  # ---------------------------------------------------------------------------
  # Desktop build matrix — Linux (.deb, .AppImage), Windows (.msi, .nsis),
  # macOS (.dmg, .app). Ensures the app compiles and bundles on all platforms.
  # ---------------------------------------------------------------------------
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-24.04
            label: linux
          - os: windows-latest
            label: windows
          - os: macos-latest
            label: macos
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Install system dependencies (Linux)
        if: matrix.label == 'linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            libssl-dev \
            librsvg2-dev \
            libsoup-3.0-dev \
            pkg-config

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install npm dependencies
        run: npm ci

      - name: Install Tauri CLI
        run: cargo install tauri-cli --locked

      - name: Build Tauri app
        run: cargo tauri build

      - name: Fix AppImage icon symlinks
        if: matrix.label == 'linux'
        run: bash scripts/fix-appimage-icons.sh

      - name: Upload Linux bundles
        if: matrix.label == 'linux'
        uses: actions/upload-artifact@v4
        with:
          name: bundle-linux
          path: |
            src-tauri/target/release/bundle/deb/*.deb
            src-tauri/target/release/bundle/appimage/*.AppImage

      - name: Upload Windows bundles
        if: matrix.label == 'windows'
        uses: actions/upload-artifact@v4
        with:
          name: bundle-windows
          path: |
            src-tauri/target/release/bundle/msi/*.msi
            src-tauri/target/release/bundle/nsis/*.exe

      - name: Upload macOS bundles
        if: matrix.label == 'macos'
        uses: actions/upload-artifact@v4
        with:
          name: bundle-macos
          path: |
            src-tauri/target/release/bundle/dmg/*.dmg
            src-tauri/target/release/bundle/macos/*.app

  android-build:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-linux-android,x86_64-linux-android

      - name: Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3
        with:
          packages: >
            platforms;android-36
            build-tools;36.0.0
            ndk;27.2.12479018

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install npm dependencies
        run: npm ci

      - name: Install Tauri CLI
        run: cargo install tauri-cli --locked

      - name: Initialize Tauri Android project
        # Tauri re-generates src-tauri/gen/android/ on first build, but doing
        # it explicitly here gives the patch step below a stable target file.
        run: cargo tauri android init
        env:
          NDK_HOME: ${{ env.ANDROID_HOME }}/ndk/27.2.12479018

      - name: Apply platform-baseline overrides (minSdk 30, jvmTarget 17)
        run: bash scripts/patch-android-build.sh

      - name: Build Android APK (x86_64 debug)
        run: cargo tauri android build --target x86_64 --debug
        env:
          NDK_HOME: ${{ env.ANDROID_HOME }}/ndk/27.2.12479018

      - name: Build Android APK (aarch64 release, unsigned)
        run: cargo tauri android build --target aarch64
        env:
          NDK_HOME: ${{ env.ANDROID_HOME }}/ndk/27.2.12479018

      - name: Upload Android release APK (aarch64, unsigned)
        uses: actions/upload-artifact@v4
        with:
          name: agaric-android-aarch64-unsigned
          path: src-tauri/gen/android/app/build/outputs/apk/universal/release/app-universal-release-unsigned.apk
          if-no-files-found: error
          retention-days: 14
