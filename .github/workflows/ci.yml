name: CI

on:
  # Run validation + per-platform builds on every push to any branch. Tag
  # pushes are handled by release.yml (which also runs the full validation
  # via the shared _validate.yml callable).
  push:
    branches: ['**']
    tags-ignore: ['**']
  pull_request:
    branches: [main]

# Default to read-only for the workflow's GITHUB_TOKEN. Individual jobs do
# not need to write back to the repo (artifact uploads use separate scopes
# inside `actions/upload-artifact`), so the principle-of-least-privilege
# applies. Release-time write access lives in `release.yml`, which is
# triggered separately by tag pushes.
permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always

jobs:
  # ---------------------------------------------------------------------------
  # Lint, format, audit, type-check, test — the same checks `prek run
  # --all-files` runs locally, plus the full test/E2E/bundle smoke suites.
  # Source of truth: prek.toml.
  # ---------------------------------------------------------------------------
  validate:
    uses: ./.github/workflows/_validate.yml

  # ---------------------------------------------------------------------------
  # Desktop build matrix — Linux (.deb, .AppImage), Windows (.msi, .nsis),
  # macOS (.dmg, .app). Ensures the app compiles and bundles on all platforms.
  # ---------------------------------------------------------------------------
  build:
    needs: validate
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-24.04
            label: linux
          - os: windows-latest
            label: windows
          - os: macos-latest
            label: macos
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Install system dependencies (Linux)
        if: matrix.label == 'linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            libssl-dev \
            librsvg2-dev \
            libsoup-3.0-dev \
            pkg-config

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install npm dependencies
        run: npm ci

      - name: Install Tauri CLI
        run: cargo install tauri-cli --locked

      - name: Build Tauri app
        run: cargo tauri build

      - name: Fix AppImage icon symlinks
        if: matrix.label == 'linux'
        run: bash scripts/fix-appimage-icons.sh

      # ---------------------------------------------------------------------
      # FEAT-4f — verify the `agaric-mcp` sidecar binary is staged for, and
      # landed in, the bundled artifact on each desktop target. Missing on
      # any platform breaks MCP clients that rely on the installed stub.
      # ---------------------------------------------------------------------
      - name: Verify externalBin staging (Linux)
        if: matrix.label == 'linux'
        run: test -x src-tauri/binaries/agaric-mcp-x86_64-unknown-linux-gnu

      - name: Verify agaric-mcp inside .deb
        if: matrix.label == 'linux'
        run: |
          deb=$(ls src-tauri/target/release/bundle/deb/*.deb | head -n 1)
          echo "Inspecting $deb"
          dpkg-deb -c "$deb" | grep -E '(^|/)agaric-mcp( |$)'

      - name: Verify externalBin staging (macOS)
        if: matrix.label == 'macos'
        run: |
          # The host triple on the macOS runner determines the filename.
          triple=$(rustc -vV | awk '/^host: /{print $2}')
          test -x "src-tauri/binaries/agaric-mcp-$triple"

      - name: Verify agaric-mcp inside .app
        if: matrix.label == 'macos'
        run: test -x "src-tauri/target/release/bundle/macos/Agaric.app/Contents/MacOS/agaric-mcp"

      - name: Verify externalBin staging (Windows)
        if: matrix.label == 'windows'
        shell: pwsh
        run: |
          $triple = (rustc -vV | Select-String '^host: ').Line.Split(' ')[1]
          $path = "src-tauri/binaries/agaric-mcp-$triple.exe"
          if (-not (Test-Path $path)) { throw "Missing staged binary: $path" }

      - name: Upload Linux bundles
        if: matrix.label == 'linux'
        uses: actions/upload-artifact@v4
        with:
          name: bundle-linux
          path: |
            src-tauri/target/release/bundle/deb/*.deb
            src-tauri/target/release/bundle/appimage/*.AppImage

      - name: Upload Windows bundles
        if: matrix.label == 'windows'
        uses: actions/upload-artifact@v4
        with:
          name: bundle-windows
          path: |
            src-tauri/target/release/bundle/msi/*.msi
            src-tauri/target/release/bundle/nsis/*.exe

      - name: Upload macOS bundles
        if: matrix.label == 'macos'
        uses: actions/upload-artifact@v4
        with:
          name: bundle-macos
          path: |
            src-tauri/target/release/bundle/dmg/*.dmg
            src-tauri/target/release/bundle/macos/*.app

  android-build:
    needs: validate
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-linux-android,x86_64-linux-android

      - name: Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3
        with:
          packages: >
            platforms;android-36
            build-tools;36.0.0
            ndk;27.2.12479018

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install npm dependencies
        run: npm ci

      - name: Prepare externalBin placeholder (FEAT-4f)
        # tauri-build validates `externalBin` paths on every cargo
        # invocation. Android builds don't ship the sidecar (see
        # tauri.android.conf.json override), but the host-triple
        # placeholder must exist so `cargo tauri android init` /
        # `build` can proceed past validation.
        run: node scripts/prepare-external-bins.mjs --placeholder-only

      - name: Install Tauri CLI
        run: cargo install tauri-cli --locked

      - name: Initialize Tauri Android project
        # Tauri re-generates src-tauri/gen/android/ on first build, but doing
        # it explicitly here gives the patch step below a stable target file.
        run: cargo tauri android init
        env:
          NDK_HOME: ${{ env.ANDROID_HOME }}/ndk/27.2.12479018

      - name: Apply platform-baseline overrides (minSdk 30, jvmTarget 17)
        run: bash scripts/patch-android-build.sh

      - name: Build Android APK (x86_64 debug)
        run: cargo tauri android build --target x86_64 --debug
        env:
          NDK_HOME: ${{ env.ANDROID_HOME }}/ndk/27.2.12479018

      - name: Build Android APK (aarch64 release, unsigned)
        run: cargo tauri android build --target aarch64
        env:
          NDK_HOME: ${{ env.ANDROID_HOME }}/ndk/27.2.12479018

      - name: Upload Android release APK (aarch64, unsigned)
        uses: actions/upload-artifact@v4
        with:
          name: agaric-android-aarch64-unsigned
          path: src-tauri/gen/android/app/build/outputs/apk/universal/release/app-universal-release-unsigned.apk
          if-no-files-found: error
          retention-days: 14
