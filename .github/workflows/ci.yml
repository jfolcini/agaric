name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always

jobs:
  check:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            libssl-dev \
            librsvg2-dev \
            libsoup-3.0-dev \
            pkg-config

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install npm dependencies
        run: npm ci

      - name: Biome check
        run: npx biome check .

      - name: TypeScript check
        run: npx tsc -b --noEmit

      - name: Cargo fmt
        working-directory: src-tauri
        run: cargo fmt --check

      - name: Cargo clippy
        working-directory: src-tauri
        run: cargo clippy -- -D warnings -A dead_code

      - name: Install cargo-nextest
        uses: taiki-e/install-action@nextest

      - name: Cargo test (nextest)
        working-directory: src-tauri
        run: cargo nextest run --profile ci

      - name: Vitest
        run: npm test

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Playwright E2E tests
        run: npx playwright test

      - name: sqlx offline cache check
        working-directory: src-tauri
        run: cargo sqlx prepare --check

  android-build:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-linux-android,x86_64-linux-android

      - name: Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3
        with:
          packages: >
            platforms;android-36
            build-tools;36.0.0
            ndk;27.2.12479018

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install npm dependencies
        run: npm ci

      - name: Install Tauri CLI
        run: cargo install tauri-cli --locked

      - name: Build Android APK (x86_64 debug)
        run: cargo tauri android build --target x86_64 --debug
        env:
          NDK_HOME: ${{ env.ANDROID_HOME }}/ndk/27.2.12479018
