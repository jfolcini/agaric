name: Release

on:
  # A release is driven entirely by pushing a version tag (e.g. `0.2.0`),
  # whose commit must already carry the bumped manifests. Cut releases with
  # `scripts/release.sh <version>` (see docs/BUILD.md § Releasing) — it runs the
  # local build check, bumps every manifest in lockstep, commits, tags, and
  # pushes for you. There is deliberately NO `workflow_dispatch` bump button:
  # bumping means pushing a commit to `main`, which the in-workflow
  # GITHUB_TOKEN cannot do under the branch ruleset (it is not a bypass actor,
  # and its pushes don't trigger workflows anyway). So the bump is cut locally
  # by the maintainer (an admin bypass actor) and only the resulting tag fires
  # this workflow — keeping branch protection intact with no long-lived PAT.
  push:
    tags:
      - 'v*'
      - '[0-9]*'

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always

jobs:
  # Guard against version drift between the git tag and the in-repo
  # manifests. tauri-action names release bundles + the in-app version
  # from tauri.conf.json, while the GitHub Release uses `github.ref_name`
  # (the tag). If they disagree, the published release page says one
  # thing while the .deb/.AppImage/.msi/.dmg/About-dialog/Cargo
  # `--version` strings say another, and the Tauri updater compares the
  # wrong number against the manifest. Fail fast before any heavy build
  # job spins up. Tag may be `0.1.14` or `v0.1.14`; strip a leading `v`
  # before comparing. This is the FIRST job — a release is driven solely by a
  # tag push (scripts/release.sh), so there is no bump job upstream of it.
  verify-version:
    runs-on: ubuntu-24.04
    # PEND-41 R1 — no historical sample. Trivial jq / grep / awk over the 5
    # manifests + fail-fast comparison; 5-min budget is generous.
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false
      - name: Verify tag matches manifest versions
        run: |
          set -euo pipefail
          TAG="${GITHUB_REF_NAME#v}"
          CONF=$(jq -r .version src-tauri/tauri.conf.json)
          CARGO=$(grep -m1 '^version' src-tauri/Cargo.toml | cut -d'"' -f2)
          PKG=$(jq -r .version package.json)
          PKG_LOCK=$(jq -r .version package-lock.json)
          CARGO_LOCK=$(awk '/^name = "agaric"$/{getline; print; exit}' src-tauri/Cargo.lock | cut -d'"' -f2)
          echo "tag=$TAG conf=$CONF cargo=$CARGO cargo.lock=$CARGO_LOCK pkg=$PKG pkg.lock=$PKG_LOCK"
          fail=0
          for v in "$CONF" "$CARGO" "$CARGO_LOCK" "$PKG" "$PKG_LOCK"; do
            if [ "$v" != "$TAG" ]; then fail=1; fi
          done
          if [ "$fail" -ne 0 ]; then
            echo "::error::Version drift — tag=$TAG but tauri.conf.json=$CONF, Cargo.toml=$CARGO, Cargo.lock=$CARGO_LOCK, package.json=$PKG, package-lock.json=$PKG_LOCK. Bump all of them in lockstep before tagging."
            exit 1
          fi

  # Run the same validation as `prek run --all-files` locally before letting
  # the release matrix build any artifacts. Source of truth: prek.toml.
  validate:
    needs: verify-version
    if: ${{ !cancelled() && needs.verify-version.result == 'success' }}
    uses: ./.github/workflows/_validate.yml

  build-and-release:
    needs: [verify-version, validate]
    if: ${{ !cancelled() && needs.verify-version.result == 'success' && needs.validate.result == 'success' }}
    # PEND-41 R1 — based on ci.yml build observations (run 25966040732,
    # 2026-05-16, n=1) + ~10 min signing/attest/upload overhead per platform:
    # linux 50 + 10 = 60, macos 50 + 10 = 60, windows 65 + 10 = 75.
    timeout-minutes: ${{ matrix.platform == 'windows-2025-vs2026' && 75 || 60 }}
    permissions:
      contents: write # tauri-action uploads release bundles
      id-token: write # actions/attest-build-provenance — Sigstore OIDC token
      attestations: write # actions/attest-build-provenance — write to GH attestations API
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: ubuntu-24.04
            target: x86_64-unknown-linux-gnu
          # Explicit version pins (`windows-2025-vs2026` GA mid-2026,
          # `macos-15` GA late 2025) instead of `*-latest` aliases —
          # the floating tags move silently and have caused
          # actions-side deprecation warnings + image-rebuild lag on
          # past transitions. Pinning lets Dependabot bump us
          # explicitly when the next major image cuts.
          # windows-2025-vs2026 cuts ~15-25% off WiX bundler + Rust
          # release builds vs windows-2022 per the runner-image release
          # notes. The plain `windows-2025` label is being redirected
          # to `windows-2025-vs2026` by 2026-06-15 (announced as a job
          # NOTICE annotation on every windows-2025 run on 2026-05-17);
          # we pin to the destination label now so any vs2026
          # compatibility breakage lands in CI before the redirect cuts
          # over, not in a release on 2026-06-16.
          - platform: windows-2025-vs2026
            target: x86_64-pc-windows-msvc
          # macos-15 is Apple Silicon natively. The x86_64-apple-darwin
          # target stays a cross-compile via the SDK (Rosetta-free),
          # which is supported and faster than the older Intel runner.
          # The aarch64 build is native on macos-15.
          - platform: macos-15
            target: x86_64-apple-darwin
          - platform: macos-15
            target: aarch64-apple-darwin

    runs-on: ${{ matrix.platform }}

    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
        with:
          # #640: exact toolchain pin — keep in lockstep with
          # rust-toolchain.toml and src-tauri/Cargo.toml `rust-version`.
          # Explicit here (not just rust-toolchain.toml) so the cross
          # `targets` below land on the pinned toolchain, not on a
          # floating latest-stable install.
          toolchain: 1.95.0
          targets: ${{ matrix.target }}

      - name: Rust cache
        uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
        # Linux-only (#819 (6)): with `save-if: false` here and no other
        # workflow saving on macOS / Windows runners (Swatinem keys per
        # runner OS), the restore on those rows was a guaranteed miss —
        # pure dead weight. Only the Linux row can hit ci.yml's
        # `rust-release` entry.
        if: matrix.platform == 'ubuntu-24.04'
        with:
          workspaces: src-tauri
          # Restore from `rust-release` — the key ci.yml's Linux desktop
          # build writes on main pushes (issue #813 split the old shared
          # `rust-deps` key into per-job-class keys; nothing writes
          # `rust-deps` anymore, so keeping it here would mean a permanent
          # cache miss once old entries expire). That job's profile is the
          # exact match for this matrix's Linux row (release-profile
          # `cargo tauri build`, host triple), warming the `target/` tree
          # for the tauri-action build below. (The Tauri CLI itself is NOT
          # warmed from this cache: tauri-action runs the lockfile-pinned
          # `@tauri-apps/cli` via `tauriScript: npm run tauri` — #822.)
          shared-key: rust-release
          # `cache-bin: true` matches the shape of the entry ci.yml's
          # build job writes (its save includes `~/.cargo/bin/`).
          cache-bin: 'true'
          # The Windows tar.exe / release `target/` save flake (0.1.16
          # run 24999938882) is still real, and the per-tag cache key
          # makes the save itself useless on the next tag. Keep restore
          # (free, hits ci.yml's warm `rust-release` entry above),
          # disable save so a flake can never block a release.
          save-if: false

      - name: Install system dependencies (Linux)
        if: matrix.platform == 'ubuntu-24.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            libssl-dev \
            librsvg2-dev \
            libsoup-3.0-dev \
            libappindicator3-dev \
            patchelf \
            pkg-config

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 24
          cache: npm

      - name: Install Node dependencies
        run: npm ci

      # Secret-scoping (#815): run tauri.conf.json's `beforeBuildCommand`
      # (`node scripts/prepare-external-bins.mjs && npm run build`) HERE,
      # in a step whose env carries no secrets, instead of inside the
      # tauri-action step below. tauri-action's step env holds the
      # write-scoped GITHUB_TOKEN, so any npm dependency code executing
      # during the frontend build would inherit it and could upload
      # modified release assets. The tauri-action step disables the hook
      # via `--config` (see its `args:`), so no JS runs with secrets in
      # scope. CARGO_BUILD_TARGET is needed for the same reason as on the
      # tauri-action step: prepare-external-bins.mjs falls back to the
      # host triple without it and stages the externalBin placeholder
      # under the wrong name on cross-compiled targets.
      - name: Build frontend (no secrets in env)
        env:
          CARGO_BUILD_TARGET: ${{ matrix.target }}
        shell: bash
        run: |
          set -euo pipefail
          node scripts/prepare-external-bins.mjs
          npm run build

      # Ensure the draft release exists before tauri-action runs.
      #
      # tauri-action's `releaseDraft: true` flow looks for a draft release
      # matching the tag; if none exists, it tries to create one. The
      # `createRelease` REST call has intermittently failed with "Resource
      # not accessible by integration" on this repo (run 25986402862 hit
      # this on Linux + both macOS in 0.1.31) despite the runtime token
      # showing `Contents: write`. The exact root cause is uncertain, but
      # pre-creating the draft sidesteps the call entirely — tauri-action
      # finds the existing draft and proceeds to the upload phase.
      #
      # Race-tolerant: when 4 matrix workers hit `gh release create`
      # concurrently, only one wins; the rest get a 422 "already_exists"
      # which we swallow. The result is the same draft for all of them.
      - name: Ensure draft release exists
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ github.ref_name }}
        shell: bash
        run: |
          set -euo pipefail
          if gh release view "$TAG" --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1; then
            echo "Draft release for tag $TAG already exists; reusing."
          else
            echo "Creating draft release for tag $TAG..."
            # `--generate-notes` asks GitHub to auto-generate the
            # "What's Changed" changelog from PR titles merged since
            # the previous tag. Before this, the step set
            # `--notes "Release notes will be finalized by the
            # workflow."` as literal text, but no later step actually
            # finalised it — every release (0.1.37, 0.1.38) shipped
            # with that placeholder + the appended SLSA recipe and
            # nothing else, so consumers saw no changelog. The
            # `finalize-release-notes` job at the bottom of this
            # workflow appends the SLSA recipe to whatever body lands
            # here, so swapping the placeholder for `--generate-notes`
            # produces a `<auto-changelog> --- <SLSA recipe>` body
            # without any other workflow changes.
            gh release create "$TAG" \
              --repo "$GITHUB_REPOSITORY" \
              --draft \
              --title "Agaric $TAG" \
              --generate-notes \
              || gh release view "$TAG" --repo "$GITHUB_REPOSITORY" >/dev/null
          fi

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@84b9d35b5fc46c1e45415bdb6144030364f7ebc5 # v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Make the cross-compile target visible to the
          # `beforeBuildCommand` hook (`scripts/prepare-external-bins.mjs`).
          # tauri-action passes `--target` to `cargo tauri build`, but
          # Tauri's beforeBuildCommand environment does not expose
          # `TAURI_ENV_TARGET_TRIPLE` until cargo's build-script phase, so
          # without this env var the script falls back to the host triple
          # and stages the externalBin placeholder under the wrong name.
          # On the macOS arm64 runner cross-building x86_64-apple-darwin,
          # that produced "resource path
          # `binaries/agaric-mcp-x86_64-apple-darwin` doesn't exist" and
          # broke every x86_64 release. Setting CARGO_BUILD_TARGET makes
          # both cargo and the script agree on the same triple and the
          # same `target/<triple>/release/` output directory, even on
          # native-target builds where it is a no-op.
          CARGO_BUILD_TARGET: ${{ matrix.target }}
          # TAURI_SIGNING_PRIVATE_KEY(_PASSWORD) are intentionally NOT in
          # this step's env (#815). They only matter for updater-artifact
          # signing, which is currently not produced at all
          # (`bundle.createUpdaterArtifacts` is unset — #808), so exposing
          # the key to everything `cargo tauri build` executes bought
          # nothing and risked the key leaking to dependency code. When
          # #808 enables updater artifacts, sign them in a separate
          # minimal step (`cargo tauri signer sign`) whose env holds ONLY
          # the key — never re-add the key here.
          # macOS code signing + notarization is intentionally NOT wired.
          # The maintainer has opted out of Apple Developer Program membership
          # (paid, recurring) for this open-source project. With no APPLE_*
          # env vars exposed, `tauri-action` skips the codesign + notarytool
          # path entirely and produces unsigned .dmg / .app bundles.
          # Gatekeeper will warn on first install ("Apple could not verify
          # this app is free of malware"); users bypass via right-click →
          # Open the first time, or via `xattr -dr com.apple.quarantine
          # /Applications/Agaric.app`. See BUILD.md → "macOS unsigned
          # bundles" for the user-facing install instructions.
        with:
          tagName: ${{ github.ref_name }}
          releaseName: 'Agaric ${{ github.ref_name }}'
          releaseBody: 'See the assets to download and install this version.'
          releaseDraft: true
          prerelease: false
          # Run the lockfile-pinned local CLI (`@tauri-apps/cli` exact-
          # pinned in package.json, installed by the secretless `npm ci`
          # step above) instead of tauri-action's default behaviour of
          # `npm install -g @tauri-apps/cli@v2` INSIDE this step — an
          # unpinned registry fetch executing with the write-scoped
          # GITHUB_TOKEN in env (#822).
          tauriScript: npm run tauri
          # `-v` raises tauri-bundler's log level from Info to Debug, which
          # is the only way to surface the real stdout/stderr of the
          # external bundlers (linuxdeploy on Linux, candle/light on
          # Windows, codesign on macOS). Without it, every bundling
          # failure shows only the generic `failed to run <tool>` wrapper
          # from `output_ok()` in tauri-bundler — no underlying error
          # text. The release matrix only fires on tag pushes, so the
          # extra log volume is acceptable for the diagnostic value.
          # `--config .github/tauri.skip-before-build.conf.json` merges
          # `"beforeBuildCommand": null` over tauri.conf.json (JSON Merge
          # Patch — null deletes the key), so NO JS runs inside this
          # secret-bearing step; the frontend was already built by the
          # "Build frontend (no secrets in env)" step above (#815). A
          # checked-in file rather than inline JSON because tauri-action
          # tokenizes `args` with string-argv, which strips the quotes
          # inline JSON needs.
          args: --target ${{ matrix.target }} -v --config .github/tauri.skip-before-build.conf.json

      # UX-233: Tauri 2's AppImage bundler emits a .DirIcon symlink with an
      # absolute path into the build machine's file tree (broken on every other
      # machine) and points the AppDir-root agaric.png at the 16×16 icon
      # (ignored by Ubuntu 24's file manager/dock). tauri-action@v0 has already
      # uploaded the broken AppImage as a draft release asset at this point; we
      # repair the AppDir symlinks, repack the AppImage with
      # linuxdeploy-plugin-appimage, and then replace the asset on the draft
      # release via `gh release upload --clobber`.
      #
      # tauri-action runs `cargo tauri build` internally, which downloads
      # linuxdeploy-plugin-appimage to ~/.cache/tauri/, so the tool is already
      # present when the fix script runs. FIX_APPIMAGE_STRICT=1 makes the
      # script fail (rather than warn-and-continue) if the tool is missing, so
      # a broken upstream cache blocks the release instead of silently shipping
      # the un-repacked AppImage.
      # tauri-action passes `--target` so the bundle output lives under
      # `src-tauri/target/<triple>/release/bundle/...`, not the unprefixed
      # `src-tauri/target/release/bundle/...` we'd see on a no-target build.
      # Every step below has to use the triple-prefixed path or it sees an
      # empty bundle directory and fails.
      - name: Snapshot pre-fix AppImage size
        if: matrix.platform == 'ubuntu-24.04'
        id: prefix_size
        env:
          BUNDLE_DIR: src-tauri/target/${{ matrix.target }}/release/bundle/appimage
        shell: bash
        run: |
          set -euo pipefail
          shopt -s nullglob
          appimages=("$BUNDLE_DIR"/Agaric_*_amd64.AppImage)
          if [ ${#appimages[@]} -eq 0 ]; then
            echo "ERROR: No pre-fix Agaric_*_amd64.AppImage found in $BUNDLE_DIR" >&2
            exit 1
          fi
          size=$(stat -c %s "${appimages[0]}")
          echo "Pre-fix AppImage: ${appimages[0]} ($size bytes)"
          echo "size=$size" >> "$GITHUB_OUTPUT"
          echo "path=${appimages[0]}" >> "$GITHUB_OUTPUT"

      - name: Fix AppImage icon symlinks and repack
        if: matrix.platform == 'ubuntu-24.04'
        env:
          FIX_APPIMAGE_STRICT: '1'
        run: |
          # Pass the triple-prefixed AppDir explicitly; the script's default
          # only works for a no-target host build.
          bash scripts/fix-appimage-icons.sh \
            "src-tauri/target/${{ matrix.target }}/release/bundle/appimage/Agaric.AppDir"

      - name: Verify repacked AppImage
        if: matrix.platform == 'ubuntu-24.04'
        env:
          PRE_FIX_SIZE: ${{ steps.prefix_size.outputs.size }}
          BUNDLE_DIR: src-tauri/target/${{ matrix.target }}/release/bundle/appimage
        shell: bash
        run: |
          set -euo pipefail
          APPDIR="$BUNDLE_DIR/Agaric.AppDir"

          # 1. .DirIcon must be a relative symlink to Agaric.png.
          if [ ! -L "$APPDIR/.DirIcon" ]; then
            echo "ERROR: $APPDIR/.DirIcon is not a symlink" >&2
            exit 1
          fi
          link_target="$(readlink "$APPDIR/.DirIcon")"
          if [ "$link_target" != "Agaric.png" ]; then
            echo "ERROR: .DirIcon points to '$link_target', expected 'Agaric.png' (relative)" >&2
            exit 1
          fi
          echo "OK: .DirIcon → Agaric.png"

          # 2. agaric.png at AppDir root must exist (follow the symlink).
          if [ ! -f "$APPDIR/agaric.png" ]; then
            echo "ERROR: $APPDIR/agaric.png does not resolve to a regular file" >&2
            exit 1
          fi

          # 3. agaric.png must be at least 128×128 (128 / 256 / 512 accepted).
          # `agaric.png` is a relative symlink that fix-appimage-icons.sh
          # points at usr/share/icons/hicolor/256x256/apps/agaric.png, so
          # `file` without `-L` reports "symbolic link to ..." instead of
          # the resolved PNG dimensions. `file -L` (capital L) follows the
          # symlink and reports the target's PNG image header.
          info="$(file -L "$APPDIR/agaric.png")"
          echo "agaric.png: $info"
          if ! echo "$info" | grep -Eq '(128 x 128|256 x 256|512 x 512)'; then
            echo "ERROR: agaric.png is not ≥128×128 (got: $info)" >&2
            exit 1
          fi
          echo "OK: agaric.png is WM-friendly size"

          # 4. The repacked AppImage must exist and be at least as large as the
          # pre-fix one (a repack smaller than the original almost always means
          # linuxdeploy-plugin-appimage silently produced a stub).
          shopt -s nullglob
          appimages=("$BUNDLE_DIR"/Agaric_*_amd64.AppImage)
          if [ ${#appimages[@]} -eq 0 ]; then
            echo "ERROR: No repacked Agaric_*_amd64.AppImage found" >&2
            exit 1
          fi
          post_size=$(stat -c %s "${appimages[0]}")
          echo "Post-fix AppImage: ${appimages[0]} ($post_size bytes, pre-fix was $PRE_FIX_SIZE bytes)"
          if [ "$post_size" -lt "$PRE_FIX_SIZE" ]; then
            echo "ERROR: repacked AppImage ($post_size bytes) is smaller than pre-fix ($PRE_FIX_SIZE bytes)" >&2
            exit 1
          fi
          echo "OK: repacked AppImage ≥ pre-fix size"

      - name: Replace AppImage on draft release with repacked build
        if: matrix.platform == 'ubuntu-24.04'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          BUNDLE_DIR: src-tauri/target/${{ matrix.target }}/release/bundle/appimage
        shell: bash
        run: |
          set -euo pipefail
          shopt -s nullglob
          appimages=("$BUNDLE_DIR"/Agaric_*_amd64.AppImage)
          if [ ${#appimages[@]} -eq 0 ]; then
            echo "ERROR: No repacked AppImage to upload" >&2
            exit 1
          fi
          echo "Uploading (clobber) ${appimages[0]} to release ${GITHUB_REF_NAME}"
          gh release upload "${GITHUB_REF_NAME}" "${appimages[0]}" --clobber

      # #808 — produce the signed updater payload for each desktop platform.
      # The in-app updater (tauri.conf.json plugins.updater) downloads the raw
      # bundle and verifies a detached minisign `.sig` against the configured
      # pubkey, then the fan-in `generate-latest-json` job stitches the four
      # signatures into the `latest.json` manifest the endpoint serves.
      #
      # Signing is done HERE, in dedicated steps whose env holds ONLY the two
      # TAURI_SIGNING_* secrets — never co-located with GITHUB_TOKEN or any JS
      # build (#815). `bundle.createUpdaterArtifacts` is intentionally left
      # false so the key never reaches `cargo tauri build`; we sign the
      # already-built bundles out-of-band with `tauri signer sign` (the
      # lockfile-pinned CLI via `npm run tauri`). Each `.sig` is uploaded in a
      # SEPARATE step whose env holds only GITHUB_TOKEN, so each secret lives
      # in exactly one step.
      #
      # Order matters: these run AFTER the AppImage repack-and-clobber above so
      # Linux signs the FINAL repacked AppImage, and BEFORE the SBOM/attest
      # block below so the macOS `.app.tar.gz` is signed before the SBOM /
      # attestation steps reference the bundle.
      - name: Sign updater payload (Linux AppImage)
        if: matrix.platform == 'ubuntu-24.04'
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
          BUNDLE_DIR: src-tauri/target/${{ matrix.target }}/release/bundle/appimage
        shell: bash
        run: |
          set -euo pipefail
          shopt -s nullglob
          appimages=("$BUNDLE_DIR"/Agaric_*_amd64.AppImage)
          [ ${#appimages[@]} -eq 1 ] || { echo "::error::expected exactly 1 AppImage, found ${#appimages[@]}"; exit 1; }
          npm run tauri -- signer sign "${appimages[0]}"
          test -f "${appimages[0]}.sig"

      - name: Upload Linux updater signature
        if: matrix.platform == 'ubuntu-24.04'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          BUNDLE_DIR: src-tauri/target/${{ matrix.target }}/release/bundle/appimage
        shell: bash
        run: |
          set -euo pipefail
          shopt -s nullglob
          sigs=("$BUNDLE_DIR"/Agaric_*_amd64.AppImage.sig)
          [ ${#sigs[@]} -eq 1 ] || { echo "::error::expected exactly 1 AppImage .sig, found ${#sigs[@]}"; exit 1; }
          gh release upload "${GITHUB_REF_NAME}" "${sigs[0]}" --clobber

      - name: Sign updater payload (Windows NSIS)
        if: matrix.platform == 'windows-2025-vs2026'
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
          BUNDLE_DIR: src-tauri/target/${{ matrix.target }}/release/bundle/nsis
        shell: bash
        run: |
          set -euo pipefail
          shopt -s nullglob
          setups=("$BUNDLE_DIR"/*-setup.exe)
          [ ${#setups[@]} -eq 1 ] || { echo "::error::expected exactly 1 NSIS setup, found ${#setups[@]}"; exit 1; }
          npm run tauri -- signer sign "${setups[0]}"
          test -f "${setups[0]}.sig"

      - name: Upload Windows updater signature
        if: matrix.platform == 'windows-2025-vs2026'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          BUNDLE_DIR: src-tauri/target/${{ matrix.target }}/release/bundle/nsis
        shell: bash
        run: |
          set -euo pipefail
          shopt -s nullglob
          sigs=("$BUNDLE_DIR"/*-setup.exe.sig)
          [ ${#sigs[@]} -eq 1 ] || { echo "::error::expected exactly 1 NSIS .sig, found ${#sigs[@]}"; exit 1; }
          gh release upload "${GITHUB_REF_NAME}" "${sigs[0]}" --clobber

      # macOS: the bundler ALREADY emits the updater archive
      # `bundle/macos/Agaric_<arch>.app.tar.gz` (arch = `x64` | `aarch64`) even
      # with `createUpdaterArtifacts=false` — verified against the real 0.6.6
      # release assets — it just never gets a `.sig`. So we sign Tauri's own
      # canonical tarball in place rather than re-rolling our own (avoids a
      # duplicate asset and guarantees the archive layout the updater unpacks).
      # The arch token already disambiguates the two macos-15 matrix cells.
      - name: Sign updater payload (macOS app.tar.gz)
        if: matrix.platform == 'macos-15'
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
          BUNDLE_DIR: src-tauri/target/${{ matrix.target }}/release/bundle/macos
        shell: bash
        run: |
          set -euo pipefail
          shopt -s nullglob
          tarballs=("$BUNDLE_DIR"/Agaric_*.app.tar.gz)
          [ ${#tarballs[@]} -eq 1 ] || { echo "::error::expected exactly 1 bundler app.tar.gz, found ${#tarballs[@]}"; exit 1; }
          npm run tauri -- signer sign "${tarballs[0]}"
          test -f "${tarballs[0]}.sig"

      - name: Upload macOS updater signature
        if: matrix.platform == 'macos-15'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          BUNDLE_DIR: src-tauri/target/${{ matrix.target }}/release/bundle/macos
        shell: bash
        run: |
          set -euo pipefail
          shopt -s nullglob
          # Only the `.sig` is uploaded here; tauri-action already uploaded the
          # `.app.tar.gz` payload itself during its bundle step.
          sigs=("$BUNDLE_DIR"/Agaric_*.app.tar.gz.sig)
          [ ${#sigs[@]} -eq 1 ] || { echo "::error::expected exactly 1 app.tar.gz .sig, found ${#sigs[@]}"; exit 1; }
          gh release upload "${GITHUB_REF_NAME}" "${sigs[0]}" --clobber

      # PEND-40 #5: SLSA build provenance attestations for every released
      # desktop bundle. Each `subject-path` glob is narrowed to the file
      # extensions that actually ship on this platform — a single broad
      # `bundle/**/*` would also pick up build intermediates (e.g. the
      # uncompressed Agaric.AppDir tree, .json bundle manifests) that we
      # don't release. The `v3` action shells out to @actions/glob, so the
      # globs work identically on Linux/macOS/Windows runners.
      # Order: runs AFTER `tauri-action` (which uploads the bundles
      # itself) and AFTER the AppImage repack-and-clobber on Linux, so
      # the attestation hash matches the file actually on the release.
      # Attestations get pushed to Sigstore + GitHub's attestations API
      # (not as release assets), verifiable via `gh attestation verify
      # <file> --repo jfolcini/agaric`.
      # Detached `.sig` files (Tauri updater signatures) are intentionally
      # NOT attested — they are verification metadata for the parent
      # bundle, not standalone artifacts. The in-app updater payloads (#808)
      # are the raw `.AppImage` (Linux), the raw NSIS `-setup.exe` (Windows),
      # and the bundler-produced `.app.tar.gz` (macOS); all three ARE attested via
      # the platform globs below because they ship as distributable binaries
      # to end users via the in-app updater. (`createUpdaterArtifacts` stays
      # false, so no bundler-produced `.AppImage.tar.gz` / `.msi.zip` /
      # `.exe.zip` exist to attest.)
      # PEND-41 R9 — SBOM generation per platform. Two formats so downstream
      # consumers (Flathub, Homebrew tap, security scanners) get whichever
      # they support: SPDX-JSON (Linux Foundation standard) and CycloneDX-JSON
      # (OWASP standard). Anchore's `sbom-action` wraps Syft; runs in <30 s
      # against a directory. Output files are temp-paths so the subsequent
      # attest + upload steps can reference them by predictable name; the
      # rust target triple keeps the per-matrix-cell filenames unique.
      - name: Generate SBOM (SPDX-JSON)
        uses: anchore/sbom-action@e22c389904149dbc22b58101806040fa8d37a610 # v0.24.0
        with:
          path: src-tauri/target/${{ matrix.target }}/release/bundle
          format: spdx-json
          artifact-name: agaric-${{ matrix.target }}.spdx.json
          output-file: ${{ runner.temp }}/agaric-${{ matrix.target }}.spdx.json
          upload-release-assets: false

      - name: Generate SBOM (CycloneDX-JSON)
        uses: anchore/sbom-action@e22c389904149dbc22b58101806040fa8d37a610 # v0.24.0
        with:
          path: src-tauri/target/${{ matrix.target }}/release/bundle
          format: cyclonedx-json
          artifact-name: agaric-${{ matrix.target }}.cyclonedx.json
          output-file: ${{ runner.temp }}/agaric-${{ matrix.target }}.cyclonedx.json
          upload-release-assets: false

      # PEND-41 R29 — build-time secret scan against the produced bundles.
      # `gitleaks` catches secrets in source; this catches the orthogonal
      # case where a secret embedded in a CI env var (e.g.,
      # TAURI_SIGNING_PRIVATE_KEY) silently leaks into the compiled binary.
      # Linux-only for now (uses GNU `strings` + `grep -E`); cross-platform
      # promotion via TruffleHog is a follow-up.
      - name: Build-time secret scan (Linux)
        if: matrix.platform == 'ubuntu-24.04'
        shell: bash
        run: |
          set -euo pipefail
          BUNDLE_DIR="src-tauri/target/${{ matrix.target }}/release/bundle"
          # High-confidence patterns. The list deliberately favours
          # signature/prefix anchors over generic "looks like a base64
          # blob" heuristics to keep the false-positive rate near zero.
          #
          # The PEM `-----BEGIN ... PRIVATE KEY-----` header alone is NOT
          # a reliable signal in a compiled binary — Agaric embeds the
          # header as a *validation literal* in `src-tauri/src/sync_cert.rs`
          # (used to assert that runtime-generated cert PEMs start with the
          # expected magic). Real embedded keys carry the header + base64
          # body + matching footer in one contiguous run; the regex below
          # requires the header AND footer to appear together so the
          # validation-only literal doesn't trip the scan. PEM keys leaked
          # into source files (the much more common attack surface) are
          # already caught by the gitleaks prek hook before they ever
          # reach a release branch.
          #
          # Minisign / Tauri updater key (#815): the very secret this
          # comment block cites was previously undetectable — the
          # patterns covered AWS/GitHub/OpenAI/PEM only. A leaked
          # TAURI_SIGNING_PRIVATE_KEY shows up in one of two shapes:
          # decoded, as the key file's `untrusted comment: ... secret
          # key` header line; or as the base64 the env var actually
          # holds, whose prefix encodes the `untrusted comment:` header.
          # Two base64 anchors because the header text depends on the
          # generator: the C minisign tool writes `untrusted comment:
          # minisign encrypted secret key`, while `cargo tauri signer
          # generate` (rust-minisign crate, SECRETKEY_DEFAULT_COMMENT)
          # writes `untrusted comment: rsign encrypted secret key` —
          # this repo's key is Tauri-generated, so the rsign anchor is
          # the one that matters. Both anchors are cut at a 3-byte
          # boundary (33/36 chars) so they are stable base64 prefixes,
          # and both end in `...IGVuY3J5cHRl` (` encrypte`) so they can
          # NOT match the updater *public* key (`...IHB1YmxpYyBr` =
          # ` public k`), which is legitimately embedded in every binary
          # via tauri.conf.json's `plugins.updater.pubkey`.
          PATTERNS='(AKIA[0-9A-Z]{16}|ghp_[0-9A-Za-z]{36}|gho_[0-9A-Za-z]{36}|ghu_[0-9A-Za-z]{36}|ghr_[0-9A-Za-z]{36}|github_pat_[0-9A-Za-z_]{82}|sk-[0-9A-Za-z]{48}|-----BEGIN (RSA |EC |DSA |OPENSSH |ENCRYPTED |)PRIVATE KEY-----[A-Za-z0-9+/= ]+-----END (RSA |EC |DSA |OPENSSH |ENCRYPTED |)PRIVATE KEY-----|untrusted comment: [A-Za-z ]*secret key|dW50cnVzdGVkIGNvbW1lbnQ6IG1pbmlzaWduIGVuY3J5cHRl|dW50cnVzdGVkIGNvbW1lbnQ6IHJzaWduIGVuY3J5cHRl)'
          found=0
          while IFS= read -r f; do
            if strings "$f" 2>/dev/null | grep -E -m 1 "$PATTERNS" > /dev/null; then
              echo "::error file=$f::Potential secret embedded in release bundle"
              found=1
            fi
          done < <(find "$BUNDLE_DIR" -type f \( -name '*.AppImage' -o -name '*.deb' -o -executable \) 2>/dev/null || true)
          if [ "$found" -ne 0 ]; then
            echo "::error::One or more release bundles match a secret pattern. Investigate before publishing."
            exit 1
          fi
          echo "No secret patterns matched in release bundles."

      - name: Attest desktop bundles (Linux)
        id: attest_linux
        if: matrix.platform == 'ubuntu-24.04'
        uses: actions/attest-build-provenance@a2bbfa25375fe432b6a289bc6b6cd05ecd0c4c32 # v4.1.0
        with:
          subject-path: |
            src-tauri/target/${{ matrix.target }}/release/bundle/appimage/*.AppImage
            src-tauri/target/${{ matrix.target }}/release/bundle/deb/*.deb
            ${{ runner.temp }}/agaric-${{ matrix.target }}.spdx.json
            ${{ runner.temp }}/agaric-${{ matrix.target }}.cyclonedx.json

      - name: Attest desktop bundles (Windows)
        id: attest_windows
        if: matrix.platform == 'windows-2025-vs2026'
        uses: actions/attest-build-provenance@a2bbfa25375fe432b6a289bc6b6cd05ecd0c4c32 # v4.1.0
        with:
          subject-path: |
            src-tauri/target/${{ matrix.target }}/release/bundle/msi/*.msi
            src-tauri/target/${{ matrix.target }}/release/bundle/nsis/*.exe
            ${{ runner.temp }}/agaric-${{ matrix.target }}.spdx.json
            ${{ runner.temp }}/agaric-${{ matrix.target }}.cyclonedx.json

      - name: Attest desktop bundles (macOS)
        id: attest_macos
        if: matrix.platform == 'macos-15'
        uses: actions/attest-build-provenance@a2bbfa25375fe432b6a289bc6b6cd05ecd0c4c32 # v4.1.0
        with:
          subject-path: |
            src-tauri/target/${{ matrix.target }}/release/bundle/dmg/*.dmg
            src-tauri/target/${{ matrix.target }}/release/bundle/macos/*.app.tar.gz
            ${{ runner.temp }}/agaric-${{ matrix.target }}.spdx.json
            ${{ runner.temp }}/agaric-${{ matrix.target }}.cyclonedx.json

      # OpenSSF Scorecard's `Signed-Releases` check only inspects the
      # release-page asset list — it does not query the Sigstore
      # transparency log. It scores per release purely by asset-name suffix:
      #   * a `.sigstore.json` / `.sig` / `.asc` asset → SIGNED (8/10)
      #   * a `.intoto.jsonl` provenance asset         → PROVENANCE (10/10)
      # (verified against the scorecard binary v5.3.0 that action v2.4.3
      # pins; the provenance probe matches ONLY the `.intoto.jsonl` suffix,
      # so a `.sigstore.json` bundle alone caps the release at 8).
      #
      # The Attest steps above expose a `bundle-path` output pointing at the
      # local Sigstore bundle. We attach it under a per-platform name (so
      # Linux/Windows/macOS bundles don't clash on one asset slot) for the
      # signature dimension, AND (next step) decode its DSSE payload — itself
      # the in-toto SLSA statement — into a sibling `.intoto.jsonl` for the
      # provenance dimension. `gh attestation verify` keeps working via the
      # Sigstore log; both uploads are purely additive.
      - name: Upload SLSA attestation bundle to release (Linux)
        if: matrix.platform == 'ubuntu-24.04' && steps.attest_linux.outputs.bundle-path != ''
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Pull the action output into env: rather than inlining the
          # ${{ }} expression in the `run:` body — defuses zizmor's
          # template-injection rule by construction (R18 pattern).
          BUNDLE_SRC: ${{ steps.attest_linux.outputs.bundle-path }}
          TARGET: ${{ matrix.target }}
        shell: bash
        run: |
          set -euo pipefail
          dest="${RUNNER_TEMP}/agaric-${TARGET}.sigstore.json"
          cp "$BUNDLE_SRC" "$dest"
          gh release upload "${GITHUB_REF_NAME}" "$dest" --clobber

      - name: Upload in-toto provenance to release (Linux)
        if: matrix.platform == 'ubuntu-24.04' && steps.attest_linux.outputs.bundle-path != ''
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          BUNDLE_SRC: ${{ steps.attest_linux.outputs.bundle-path }}
          TARGET: ${{ matrix.target }}
        shell: bash
        run: |
          set -euo pipefail
          # Decode the bundle's base64 DSSE payload(s) into one in-toto
          # statement per line. jq streams the file, so this handles both a
          # single-subject bundle and a JSONL multi-subject bundle; the
          # `// .payload` fallback covers older flat bundle shapes.
          dest="${RUNNER_TEMP}/agaric-${TARGET}.intoto.jsonl"
          jq -r '(.dsseEnvelope.payload // .payload) | @base64d' "$BUNDLE_SRC" > "$dest"
          gh release upload "${GITHUB_REF_NAME}" "$dest" --clobber

      - name: Upload SLSA attestation bundle to release (Windows)
        if: matrix.platform == 'windows-2025-vs2026' && steps.attest_windows.outputs.bundle-path != ''
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          BUNDLE_SRC: ${{ steps.attest_windows.outputs.bundle-path }}
          TARGET: ${{ matrix.target }}
        shell: bash
        run: |
          set -euo pipefail
          dest="${RUNNER_TEMP}/agaric-${TARGET}.sigstore.json"
          cp "$BUNDLE_SRC" "$dest"
          gh release upload "${GITHUB_REF_NAME}" "$dest" --clobber

      # Provenance counterpart of the .sigstore.json above (see Linux step).
      - name: Upload in-toto provenance to release (Windows)
        if: matrix.platform == 'windows-2025-vs2026' && steps.attest_windows.outputs.bundle-path != ''
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          BUNDLE_SRC: ${{ steps.attest_windows.outputs.bundle-path }}
          TARGET: ${{ matrix.target }}
        shell: bash
        run: |
          set -euo pipefail
          dest="${RUNNER_TEMP}/agaric-${TARGET}.intoto.jsonl"
          jq -r '(.dsseEnvelope.payload // .payload) | @base64d' "$BUNDLE_SRC" > "$dest"
          gh release upload "${GITHUB_REF_NAME}" "$dest" --clobber

      - name: Upload SLSA attestation bundle to release (macOS)
        if: matrix.platform == 'macos-15' && steps.attest_macos.outputs.bundle-path != ''
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          BUNDLE_SRC: ${{ steps.attest_macos.outputs.bundle-path }}
          TARGET: ${{ matrix.target }}
        shell: bash
        run: |
          set -euo pipefail
          dest="${RUNNER_TEMP}/agaric-${TARGET}.sigstore.json"
          cp "$BUNDLE_SRC" "$dest"
          gh release upload "${GITHUB_REF_NAME}" "$dest" --clobber

      # Provenance counterpart of the .sigstore.json above (see Linux step).
      - name: Upload in-toto provenance to release (macOS)
        if: matrix.platform == 'macos-15' && steps.attest_macos.outputs.bundle-path != ''
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          BUNDLE_SRC: ${{ steps.attest_macos.outputs.bundle-path }}
          TARGET: ${{ matrix.target }}
        shell: bash
        run: |
          set -euo pipefail
          dest="${RUNNER_TEMP}/agaric-${TARGET}.intoto.jsonl"
          jq -r '(.dsseEnvelope.payload // .payload) | @base64d' "$BUNDLE_SRC" > "$dest"
          gh release upload "${GITHUB_REF_NAME}" "$dest" --clobber

      # PEND-41 R9 — attach the per-platform SBOMs to the draft release
      # so downstream consumers (Flathub, Homebrew, Nix, security scanners)
      # can pull them alongside the bundles. The provenance attestation
      # above already covers each SBOM file's integrity. `--clobber` lets
      # a re-run after a transient failure overwrite a partial upload.
      - name: Upload SBOMs to release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          set -euo pipefail
          gh release upload "${GITHUB_REF_NAME}" \
            "${{ runner.temp }}/agaric-${{ matrix.target }}.spdx.json" \
            "${{ runner.temp }}/agaric-${{ matrix.target }}.cyclonedx.json" \
            --clobber

      # Windows code signing is intentionally NOT wired. The maintainer
      # has opted out of paid OV/EV certificates and SignPath OSS
      # sponsorship for this open-source project. tauri-action's output
      # (`.msi` and `.exe`) is uploaded unsigned to the draft release.
      # SmartScreen will warn on first install ("Windows protected your
      # PC"); users bypass via "More info" → "Run anyway". See
      # BUILD.md → "Windows unsigned bundles" for user-facing install
      # instructions.

  # ---------------------------------------------------------------------------
  # Android — separate job because tauri-action@v0 has no Android support.
  # Mirrors the structure of ci.yml's `android-build` (same scaffold-reset
  # + override-restore + patch-android-build + aarch64 release build), but
  # uploads the resulting unsigned APK to the GitHub Release as a permanent
  # asset (instead of as a 90-day workflow artifact). The desktop matrix
  # above creates the draft release first via tauri-action; we attach the
  # APK to that same release with `gh release upload`.
  # ---------------------------------------------------------------------------
  android-build-and-release:
    needs: [verify-version, validate, build-and-release]
    if: ${{ !cancelled() && needs.verify-version.result == 'success' && needs.validate.result == 'success' && needs.build-and-release.result == 'success' }}
    runs-on: ubuntu-24.04
    # PEND-41 R1 — based on ci.yml android-build observations (27.8 min,
    # run 25966040732, n=1) + ~10 min signing/attest/upload overhead → 60 min.
    timeout-minutes: 60
    permissions:
      contents: write # gh release upload attaches the APK to the existing release
      id-token: write # actions/attest-build-provenance — Sigstore OIDC token
      attestations: write # actions/attest-build-provenance — write to GH attestations API
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
        with:
          # #640: exact toolchain pin — keep in lockstep with
          # rust-toolchain.toml and src-tauri/Cargo.toml `rust-version`.
          # Explicit here (not just rust-toolchain.toml) so the cross
          # `targets` below land on the pinned toolchain, not on a
          # floating latest-stable install.
          toolchain: 1.95.0
          targets: aarch64-linux-android

      - name: Rust cache
        uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
        with:
          workspaces: src-tauri
          # Mirror ci.yml's android-build cache shape: separate
          # `rust-android` key because the target-graph differs
          # (`aarch64-linux-android`), but `cache-bin: true` still warms
          # `~/.cargo/bin/cargo-tauri` so the conditional install below
          # can skip the ~5-6 min source compile when ci.yml's
          # android-build has populated the cache from main.
          shared-key: rust-android
          cache-bin: 'true'
          # Same rationale as the desktop matrix above: release tags get
          # a fresh cache key every time, so `save` adds risk (silent
          # post-step failure marks the whole job failed) without any
          # restore benefit on the next tag. Keep restore, skip save.
          save-if: false

      - name: Set up JDK 17
        uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # v5.2.0
        with:
          distribution: temurin
          java-version: 17

      - name: Set up Android SDK
        uses: android-actions/setup-android@40fd30fb8d7440372e1316f5d1809ec01dcd3699 # v4
        with:
          packages: >
            platforms;android-36
            build-tools;36.0.0
            ndk;27.2.12479018

      - name: Install Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 24
          cache: npm

      - name: Install npm dependencies
        run: npm ci

      - name: Prepare externalBin placeholder (FEAT-4f)
        # tauri-build validates `externalBin` paths on every cargo
        # invocation. Android builds don't ship the sidecar (see
        # tauri.android.conf.json override), but the host-triple
        # placeholder must exist so `cargo tauri android init` /
        # `build` can proceed past validation.
        run: node scripts/prepare-external-bins.mjs --placeholder-only

      - name: Install Tauri CLI
        # Skip the ~5-6 min source compile when the Swatinem cache
        # restored a previously-built `cargo-tauri` into `~/.cargo/bin`
        # (see `cache-bin: 'true'` on the Rust cache step above; matches
        # ci.yml's android-build pattern).
        run: |
          if ! command -v cargo-tauri >/dev/null; then cargo install tauri-cli --locked; fi

      - name: Initialize Tauri Android project
        # Same scaffold-reset dance as ci.yml's android-build: stash the
        # tracked overrides under src-tauri/gen/android/, wipe the dir,
        # let Tauri regenerate from scratch, then restore the overrides
        # on top so our CAMERA / Wi-Fi-multicast / FileProvider /
        # network_security_config customisations survive.
        shell: bash
        run: |
          set -euo pipefail

          OVERRIDES="$(mktemp -d)"
          if [ -d src-tauri/gen/android ]; then
            while IFS= read -r f; do
              rel="${f#src-tauri/gen/android/}"
              mkdir -p "$OVERRIDES/$(dirname "$rel")"
              cp "$f" "$OVERRIDES/$rel"
            done < <(git ls-files src-tauri/gen/android)
            rm -rf src-tauri/gen/android
          fi

          cargo tauri android init

          if find "$OVERRIDES" -mindepth 1 -print -quit | grep -q .; then
            cp -R "$OVERRIDES/." src-tauri/gen/android/
          fi
          rm -rf "$OVERRIDES"
        env:
          NDK_HOME: ${{ env.ANDROID_HOME }}/ndk/27.2.12479018

      - name: Apply platform-baseline overrides (minSdk 30, jvmTarget 17)
        run: bash scripts/patch-android-build.sh

      - name: Build Android APK (aarch64 release, unsigned)
        run: cargo tauri android build --target aarch64
        env:
          NDK_HOME: ${{ env.ANDROID_HOME }}/ndk/27.2.12479018

      - name: Sign Android APK
        # If the four ANDROID_KEYSTORE_* secrets are configured, this step
        # zipaligns and signs the APK with apksigner (APK signing scheme
        # v2/v3 + v4 idsig) and stages it as agaric-<tag>-android-aarch64.apk.
        # If the secrets are NOT set, it stages the unsigned APK as
        # agaric-<tag>-android-aarch64-unsigned.apk so the workflow keeps
        # working before the keystore is provisioned. See BUILD.md →
        # "Release signing in CI" for the keystore generation + secret
        # setup steps.
        #
        # The destination path is emitted as the `apk` step output so the
        # downstream attest + upload steps can reference the same file —
        # PEND-40 #5 split this step into sign / attest / upload so the
        # SLSA provenance attestation can land BEFORE the asset hits the
        # release.
        id: sign_apk
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        shell: bash
        run: |
          set -euo pipefail

          src="src-tauri/gen/android/app/build/outputs/apk/universal/release/app-universal-release-unsigned.apk"
          if [ ! -f "$src" ]; then
            echo "ERROR: expected APK not found at $src" >&2
            exit 1
          fi

          if [ -n "${ANDROID_KEYSTORE_BASE64:-}" ]; then
            echo "Keystore secret present — signing release APK"
            # `find … | sort -V | tail -1` picks the highest-versioned
            # build-tools dir (shellcheck SC2012 — don't parse `ls`).
            BUILD_TOOLS=$(find "$ANDROID_HOME/build-tools" -mindepth 1 -maxdepth 1 -type d | sort -V | tail -1)
            keystore="$RUNNER_TEMP/release.jks"
            aligned="$RUNNER_TEMP/aligned.apk"
            dest="$RUNNER_TEMP/agaric-${GITHUB_REF_NAME}-android-aarch64.apk"

            # Use a here-string + env-var refs so the password and the raw
            # base64 keystore never appear in /proc/PID/cmdline. GH Actions
            # masks secrets in logs anyway, but defence-in-depth is cheap.
            base64 -d <<<"$ANDROID_KEYSTORE_BASE64" > "$keystore"

            "$BUILD_TOOLS/zipalign" -p -f 4 "$src" "$aligned"
            "$BUILD_TOOLS/apksigner" sign \
              --ks "$keystore" \
              --ks-key-alias "$ANDROID_KEY_ALIAS" \
              --ks-pass "env:ANDROID_KEYSTORE_PASSWORD" \
              --key-pass "env:ANDROID_KEY_PASSWORD" \
              --out "$dest" \
              "$aligned"
            "$BUILD_TOOLS/apksigner" verify --verbose "$dest"

            # Best-effort secure wipe of the decoded keystore. The runner
            # is ephemeral, but no reason to leave the .jks readable for
            # the rest of the job.
            shred -u "$keystore" 2>/dev/null || rm -f "$keystore"
          else
            echo "ANDROID_KEYSTORE_BASE64 secret is not set — staging unsigned APK."
            echo "Add ANDROID_KEYSTORE_BASE64 / _PASSWORD / KEY_ALIAS / KEY_PASSWORD"
            echo "secrets in repo Settings → Secrets and variables → Actions to enable signing."
            dest="$RUNNER_TEMP/agaric-${GITHUB_REF_NAME}-android-aarch64-unsigned.apk"
            cp "$src" "$dest"
          fi

          echo "apk=$dest" >> "$GITHUB_OUTPUT"

      # PEND-41 R9 — SBOM for the Android APK in both standard formats.
      # Anchore's `sbom-action` extracts dependency metadata from the APK
      # archive (Syft understands JAR/APK structure). Same per-platform
      # pattern as the desktop matrix above.
      - name: Generate SBOM (SPDX-JSON, Android)
        uses: anchore/sbom-action@e22c389904149dbc22b58101806040fa8d37a610 # v0.24.0
        with:
          file: ${{ steps.sign_apk.outputs.apk }}
          format: spdx-json
          artifact-name: agaric-android-aarch64.spdx.json
          output-file: ${{ runner.temp }}/agaric-android-aarch64.spdx.json
          upload-release-assets: false

      - name: Generate SBOM (CycloneDX-JSON, Android)
        uses: anchore/sbom-action@e22c389904149dbc22b58101806040fa8d37a610 # v0.24.0
        with:
          file: ${{ steps.sign_apk.outputs.apk }}
          format: cyclonedx-json
          artifact-name: agaric-android-aarch64.cyclonedx.json
          output-file: ${{ runner.temp }}/agaric-android-aarch64.cyclonedx.json
          upload-release-assets: false

      # PEND-40 #5: SLSA build provenance attestation for the Android APK.
      # Runs against the final signed (or unsigned) APK emitted by the
      # previous step, BEFORE the asset is uploaded to the release —
      # downstream consumers (Play Store reviewer per PEND-36, end users
      # sideloading directly) can verify provenance via
      # `gh attestation verify <apk> --repo jfolcini/agaric`.
      # PEND-41 R9 — same attest now also covers the SBOM files.
      - name: Attest Android APK
        id: attest_android
        uses: actions/attest-build-provenance@a2bbfa25375fe432b6a289bc6b6cd05ecd0c4c32 # v4.1.0
        with:
          subject-path: |
            ${{ steps.sign_apk.outputs.apk }}
            ${{ runner.temp }}/agaric-android-aarch64.spdx.json
            ${{ runner.temp }}/agaric-android-aarch64.cyclonedx.json

      # Mirror the desktop pattern (see same step in the build-and-release
      # job): attach the Sigstore bundle as a release asset so Scorecard's
      # `Signed-Releases` heuristic, which scans the release asset list
      # (not the Sigstore log), detects the signature. `gh attestation
      # verify` continues to work via the Sigstore log; this is additive.
      - name: Upload SLSA attestation bundle to release (Android)
        if: steps.attest_android.outputs.bundle-path != ''
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          BUNDLE_SRC: ${{ steps.attest_android.outputs.bundle-path }}
        shell: bash
        run: |
          set -euo pipefail
          dest="${RUNNER_TEMP}/agaric-android-aarch64.sigstore.json"
          cp "$BUNDLE_SRC" "$dest"
          gh release upload "${GITHUB_REF_NAME}" "$dest" --clobber

      # Provenance counterpart of the .sigstore.json above (see the Linux
      # build-and-release step for the full rationale).
      - name: Upload in-toto provenance to release (Android)
        if: steps.attest_android.outputs.bundle-path != ''
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          BUNDLE_SRC: ${{ steps.attest_android.outputs.bundle-path }}
        shell: bash
        run: |
          set -euo pipefail
          dest="${RUNNER_TEMP}/agaric-android-aarch64.intoto.jsonl"
          jq -r '(.dsseEnvelope.payload // .payload) | @base64d' "$BUNDLE_SRC" > "$dest"
          gh release upload "${GITHUB_REF_NAME}" "$dest" --clobber

      - name: Upload Android APK to release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          APK_PATH: ${{ steps.sign_apk.outputs.apk }}
        shell: bash
        run: |
          set -euo pipefail
          echo "Uploading (clobber) $(basename "$APK_PATH") to release ${GITHUB_REF_NAME}"
          gh release upload "${GITHUB_REF_NAME}" "$APK_PATH" --clobber

      # PEND-41 R9 — attach Android SBOMs to the release alongside the APK.
      - name: Upload Android SBOMs to release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          set -euo pipefail
          gh release upload "${GITHUB_REF_NAME}" \
            "${{ runner.temp }}/agaric-android-aarch64.spdx.json" \
            "${{ runner.temp }}/agaric-android-aarch64.cyclonedx.json" \
            --clobber

  # ---------------------------------------------------------------------------
  # PEND-47 — emit one OpenVEX 0.2.0 document per release, attest it under
  # SLSA build provenance, and upload it to the release as
  # `agaric-<tag>.openvex.json`. VEX statements are platform-independent
  # (they describe *which CVEs do/don't affect the source code*, not the
  # bundle layout), so a single non-matrix job is the right shape — emitting
  # one per platform like the SBOMs would produce 4× identical files. The
  # source of truth is `src-tauri/deny.toml [advisories].ignore`; the
  # generator script translates each waived advisory into a `not_affected`
  # statement with the appropriate justification. Closes OSPS-VM-04.02.
  # ---------------------------------------------------------------------------
  generate-vex:
    needs: [verify-version, validate]
    if: ${{ !cancelled() && needs.verify-version.result == 'success' && needs.validate.result == 'success' }}
    runs-on: ubuntu-24.04
    # Pure node script + one attest call + one gh upload. No build, no
    # cache restore. 5-min budget is generous.
    timeout-minutes: 5
    permissions:
      contents: write # gh release upload attaches the VEX JSON to the release
      id-token: write # actions/attest-build-provenance — Sigstore OIDC token
      attestations: write # actions/attest-build-provenance — write to GH attestations API
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 24

      - name: Generate OpenVEX statements
        env:
          # Strip optional leading "v" from the tag — keeps the asset
          # filename + OpenVEX `@id` aligned with the in-manifest
          # version (which verify-version already proved matches the
          # tag). Routed via env: rather than direct ${{ }} in the
          # `run:` body to defuse zizmor's template-injection rule
          # (same env-indirection pattern used throughout this workflow).
          TAG: ${{ github.ref_name }}
        shell: bash
        run: |
          set -euo pipefail
          VERSION="${TAG#v}"
          node scripts/generate-vex.mjs \
            --version "$VERSION" \
            --output "agaric-${VERSION}.openvex.json"
          echo "OPENVEX_FILE=agaric-${VERSION}.openvex.json" >> "$GITHUB_ENV"

      - name: Attest OpenVEX document
        id: attest_vex
        uses: actions/attest-build-provenance@a2bbfa25375fe432b6a289bc6b6cd05ecd0c4c32 # v4.1.0
        with:
          subject-path: ${{ env.OPENVEX_FILE }}

      # `generate-vex` runs in parallel with `build-and-release`, which
      # owns the canonical "Ensure draft release exists" step. If this
      # job's upload races ahead of the build matrix's first runner,
      # `gh release upload` fails with `release not found` (observed on
      # run #26161723232). Run the same idempotent
      # check-or-create-or-reuse here so the upload below has a release
      # to attach to regardless of ordering. Same swallow-422 shape as
      # build-and-release uses for the 4-way matrix race.
      - name: Ensure draft release exists
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ github.ref_name }}
        shell: bash
        run: |
          set -euo pipefail
          if gh release view "$TAG" --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1; then
            echo "Draft release for tag $TAG already exists; reusing."
          else
            echo "Creating draft release for tag $TAG..."
            # `--generate-notes` asks GitHub to auto-generate the
            # "What's Changed" changelog from PR titles merged since
            # the previous tag. Before this, the step set
            # `--notes "Release notes will be finalized by the
            # workflow."` as literal text, but no later step actually
            # finalised it — every release (0.1.37, 0.1.38) shipped
            # with that placeholder + the appended SLSA recipe and
            # nothing else, so consumers saw no changelog. The
            # `finalize-release-notes` job at the bottom of this
            # workflow appends the SLSA recipe to whatever body lands
            # here, so swapping the placeholder for `--generate-notes`
            # produces a `<auto-changelog> --- <SLSA recipe>` body
            # without any other workflow changes.
            gh release create "$TAG" \
              --repo "$GITHUB_REPOSITORY" \
              --draft \
              --title "Agaric $TAG" \
              --generate-notes \
              || gh release view "$TAG" --repo "$GITHUB_REPOSITORY" >/dev/null
          fi

      # Mirror the per-platform Sigstore-bundle upload pattern from
      # build-and-release: attach the bundle as a release asset so
      # Scorecard's `Signed-Releases` heuristic sees a matching
      # `*.sigstore.json` alongside every signed artefact. `gh
      # attestation verify` keeps working via the Sigstore log; this
      # is purely additive.
      - name: Upload SLSA attestation bundle to release (VEX)
        if: steps.attest_vex.outputs.bundle-path != ''
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          BUNDLE_SRC: ${{ steps.attest_vex.outputs.bundle-path }}
          TAG: ${{ github.ref_name }}
        shell: bash
        run: |
          set -euo pipefail
          VERSION="${TAG#v}"
          dest="${RUNNER_TEMP}/agaric-${VERSION}.openvex.sigstore.json"
          cp "$BUNDLE_SRC" "$dest"
          gh release upload "${GITHUB_REF_NAME}" "$dest" --clobber

      # Provenance counterpart of the .sigstore.json above (see the Linux
      # build-and-release step for the full rationale).
      - name: Upload in-toto provenance to release (VEX)
        if: steps.attest_vex.outputs.bundle-path != ''
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          BUNDLE_SRC: ${{ steps.attest_vex.outputs.bundle-path }}
          TAG: ${{ github.ref_name }}
        shell: bash
        run: |
          set -euo pipefail
          VERSION="${TAG#v}"
          dest="${RUNNER_TEMP}/agaric-${VERSION}.intoto.jsonl"
          jq -r '(.dsseEnvelope.payload // .payload) | @base64d' "$BUNDLE_SRC" > "$dest"
          gh release upload "${GITHUB_REF_NAME}" "$dest" --clobber

      - name: Upload OpenVEX document to release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          set -euo pipefail
          gh release upload "${GITHUB_REF_NAME}" "${OPENVEX_FILE}" --clobber

  # ---------------------------------------------------------------------------
  # PEND-41 R18 — append a copy-pasteable verify-recipe section to the draft
  # release notes after all bundles + SBOMs have been attested + uploaded.
  # End users (and downstream packagers / security-conscious tinkerers) get
  # an in-line invocation showing exactly how to verify SLSA provenance on
  # what they just downloaded; the same content also lands on the workflow
  # run's step-summary page for the maintainer's at-a-glance check.
  # ---------------------------------------------------------------------------
  # #808 — fan-in: stitch the four per-platform updater signatures (uploaded
  # as `.sig` draft-release assets by the build-and-release matrix) into the
  # `latest.json` manifest the configured updater endpoint serves, then upload
  # it to the draft release. Without this, every installed app's update check
  # 404s on `releases/latest/download/latest.json`. Runs after all four desktop
  # cells finish; Android is excluded (it updates via the Play Store / APK, not
  # Tauri's updater).
  generate-latest-json:
    needs: [verify-version, validate, build-and-release]
    if: ${{ !cancelled() && needs.verify-version.result == 'success' && needs.validate.result == 'success' && needs.build-and-release.result == 'success' }}
    runs-on: ubuntu-24.04
    permissions:
      contents: write # gh release download + upload of .sig assets / latest.json
    # Pure gh-API download + jq assembly + upload; trivial. 10-min budget.
    timeout-minutes: 10
    steps:
      - name: Build and upload latest.json
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
          TAG: ${{ github.ref_name }}
        shell: bash
        run: |
          set -euo pipefail
          version="${TAG#v}"
          base_url="https://github.com/${REPO}/releases/download/${TAG}"
          tmp="$(mktemp -d)"
          # Pull every updater signature uploaded by the build matrix.
          gh release download "$TAG" --repo "$REPO" --dir "$tmp" --pattern '*.sig'

          # Map each `.sig` (named `<payload-basename>.sig`) to its Tauri
          # platform key. The macOS tarballs carry an explicit arch token so
          # the two darwin cells never collide.
          declare -A PLAT
          shopt -s nullglob
          for sig in "$tmp"/*.sig; do
            base="$(basename "${sig%.sig}")"
            # Payload basenames as Tauri actually names them (verified against
            # the real 0.6.6 release): Agaric_<v>_amd64.AppImage,
            # Agaric_<v>_x64-setup.exe, Agaric_x64.app.tar.gz,
            # Agaric_aarch64.app.tar.gz.
            case "$base" in
              *_amd64.AppImage)    key="linux-x86_64" ;;
              *-setup.exe)         key="windows-x86_64" ;;
              *_x64.app.tar.gz)    key="darwin-x86_64" ;;
              *_aarch64.app.tar.gz) key="darwin-aarch64" ;;
              *) echo "::error::unrecognised updater payload: $base"; exit 1 ;;
            esac
            PLAT["$key"]="$(jq -n --arg s "$(cat "$sig")" --arg u "${base_url}/${base}" \
              '{signature:$s, url:$u}')"
          done

          for k in linux-x86_64 windows-x86_64 darwin-x86_64 darwin-aarch64; do
            [ -n "${PLAT[$k]:-}" ] || { echo "::error::missing updater signature for platform $k"; exit 1; }
          done

          pub_date="$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          notes="See the release page for the changelog and install instructions."
          jq -n \
            --arg version "$version" \
            --arg notes "$notes" \
            --arg pub_date "$pub_date" \
            --argjson linux   "${PLAT[linux-x86_64]}" \
            --argjson windows "${PLAT[windows-x86_64]}" \
            --argjson dx86    "${PLAT[darwin-x86_64]}" \
            --argjson darm    "${PLAT[darwin-aarch64]}" \
            '{version:$version, notes:$notes, pub_date:$pub_date,
              platforms:{ "linux-x86_64":$linux, "windows-x86_64":$windows,
                          "darwin-x86_64":$dx86, "darwin-aarch64":$darm }}' \
            > "$tmp/latest.json"

          gh release upload "$TAG" "$tmp/latest.json" --repo "$REPO" --clobber

      # Smoke-assert the manifest landed and is internally consistent. NOTE the
      # public `releases/latest/download/latest.json` endpoint only resolves
      # AFTER the draft is published (a draft is never "latest"), so this reads
      # the draft assets directly rather than hitting the public URL.
      - name: Smoke-assert updater manifest
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
          TAG: ${{ github.ref_name }}
        shell: bash
        run: |
          set -euo pipefail
          version="${TAG#v}"
          assets="$(gh release view "$TAG" --repo "$REPO" --json assets --jq '.assets[].name')"
          grep -qx 'latest.json' <<<"$assets" || { echo "::error::latest.json not on release"; exit 1; }
          sig_count="$(grep -c '\.sig$' <<<"$assets" || true)"
          [ "$sig_count" -ge 4 ] || { echo "::error::expected >=4 .sig assets, found $sig_count"; exit 1; }
          tmp="$(mktemp -d)"
          gh release download "$TAG" --repo "$REPO" --dir "$tmp" --pattern 'latest.json'
          got="$(jq -r .version "$tmp/latest.json")"
          [ "$got" = "$version" ] || { echo "::error::latest.json.version=$got != tag $version"; exit 1; }
          jq -e '.platforms
                 | (keys|sort) == ["darwin-aarch64","darwin-x86_64","linux-x86_64","windows-x86_64"]
                   and (to_entries|all(.value.signature != "" and .value.url != ""))' \
            "$tmp/latest.json" >/dev/null \
            || { echo "::error::latest.json platforms incomplete"; exit 1; }
          echo "latest.json smoke check passed."

  finalize-release-notes:
    needs: [verify-version, validate, build-and-release, android-build-and-release, generate-vex, generate-latest-json]
    if: ${{ !cancelled() && needs.verify-version.result == 'success' && needs.validate.result == 'success' && needs.build-and-release.result == 'success' && needs.android-build-and-release.result == 'success' && needs.generate-vex.result == 'success' && needs.generate-latest-json.result == 'success' }}
    runs-on: ubuntu-24.04
    permissions:
      contents: write # gh release edit appends to the draft release notes
    # PEND-41 R1 — pure gh-API edits; trivial. 5-min budget.
    timeout-minutes: 5
    steps:
      - name: Append SLSA-verify recipe to release notes
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
          TAG: ${{ github.ref_name }}
          # The recipe template is a YAML multi-line string so we don't
          # have to fight bash heredoc indentation inside a `run: |` block.
          # `__REPO__` is a placeholder substituted by the step below.
          RECIPE_TEMPLATE: |
            ## Verifying this release

            Every bundle, updater payload, SBOM, and APK in this release is signed
            with [SLSA build provenance](https://slsa.dev/) via GitHub's
            [`actions/attest-build-provenance`](https://github.com/actions/attest-build-provenance)
            → Sigstore transparency log. Verify any downloaded asset with the
            [GitHub CLI](https://cli.github.com/):

            ```bash
            gh attestation verify <asset> --repo __REPO__
            ```

            Examples (substitute the version in the filename):

            ```bash
            # Linux .AppImage
            gh attestation verify agaric_*_amd64.AppImage --repo __REPO__

            # Windows .msi
            gh attestation verify agaric_*_x64_en-US.msi --repo __REPO__

            # macOS .dmg
            gh attestation verify agaric_*_aarch64.dmg --repo __REPO__

            # Android APK
            gh attestation verify agaric-*-android-aarch64.apk --repo __REPO__

            # SBOM (SPDX-JSON or CycloneDX-JSON)
            gh attestation verify agaric-*.spdx.json --repo __REPO__

            # OpenVEX statements (machine-readable VEX for waived advisories)
            gh attestation verify agaric-*.openvex.json --repo __REPO__
            ```

            For air-gapped verification, use
            [`slsa-verifier`](https://github.com/slsa-framework/slsa-verifier)
            against the Sigstore transparency log directly.
        shell: bash
        run: |
          set -euo pipefail
          # Substitute __REPO__ → actual `owner/repo`.
          recipe="${RECIPE_TEMPLATE//__REPO__/$REPO}"
          # Fetch the existing draft notes (whatever tauri-action wrote),
          # guard against double-append on rerun, then edit.
          #
          # `gh release view` / `gh release edit` auto-detect the repo
          # from `.git/config` when `--repo` is unset, but this job
          # doesn't run `actions/checkout` (it operates on artefacts
          # already attached to the release), so the implicit lookup
          # would fail with `fatal: not a git repository`. Pass
          # `--repo "$REPO"` explicitly to keep the job stateless.
          existing=$(gh release view "$TAG" --repo "$REPO" --json body --jq '.body // ""')
          if grep -q '^## Verifying this release' <<<"$existing"; then
            echo "Verify-recipe already present in release notes; skipping append."
          else
            combined=$(printf '%s\n\n---\n\n%s\n' "$existing" "$recipe")
            gh release edit "$TAG" --repo "$REPO" --notes "$combined"
            echo "Appended verify-recipe to release ${TAG} notes."
          fi
          # Also surface to step summary for the maintainer.
          {
            echo "## Release notes appended"
            echo
            printf '%s\n' "$recipe"
          } >> "$GITHUB_STEP_SUMMARY"
