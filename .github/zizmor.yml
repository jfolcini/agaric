# zizmor configuration — security audit for GitHub Actions workflows.
# https://docs.zizmor.sh/configuration/
#
# This file is a BASELINE: it suppresses every finding zizmor reports
# today so the hook only catches *new* findings going forward. Existing
# findings are tracked as MAINT items in REVIEW-LATER.md and should be
# triaged off the baseline over time — fix the underlying issue (or
# document why it's safe in the threat-model sense), then drop the
# matching entry from this file.
#
# Triage progress (closed entries appear elsewhere, not here):
#   - template-injection × 6 — defused by MAINT-114 (release-tag.yml
#     fold routed inputs.version through env: + $INPUT_VERSION).
#   - artipacked × 6 — fixed by MAINT-193 (added `persist-credentials:
#     false` to non-pushing checkouts; the bump-version checkout in
#     release.yml keeps `persist-credentials: true` explicitly to drive
#     the tag push, see inline comment there).
#   - excessive-permissions × 1 — fixed by MAINT-193 (workflow-level
#     `contents: write` in release.yml tightened to `read`; per-job
#     `contents: write` scoped to bump-version, build-and-release,
#     android-build-and-release).
#
# Threat-model context (AGENTS.md): Agaric is single-user, no cloud,
# no adversarial peers.

rules:
  cache-poisoning:
    ignore:
      - ci.yml:192
      - ci.yml:193
      - ci.yml:211
      - ci.yml:212
      - ci.yml:213
      - ci.yml:3
      - ci.yml:78
      - ci.yml:79
      - ci.yml:83
      - ci.yml:84
      - ci.yml:85
      - release.yml:169
      - release.yml:170
      - release.yml:200
      - release.yml:201
      - release.yml:202
      - release.yml:3
      - release.yml:415
      - release.yml:416
      - release.yml:439
      - release.yml:440
      - release.yml:441
      - release.yml:57
      - release.yml:58
  unpinned-uses:
    # Re-baselined 2026-05-16 after PEND-37/PEND-39 CI edits shifted line
    # numbers (added concurrency block + mold install steps in ci.yml,
    # taiki-e/install-action + mold setup in _validate.yml). zizmor's
    # ignore syntax is line-pinned, so any line shift requires this list
    # to be regenerated. Same trust model as before: actions from `actions/*`,
    # `dtolnay/*`, `taiki-e/*`, `Swatinem/*`, `android-actions/*`,
    # `tauri-apps/*` pinned to release tags rather than SHAs.
    ignore:
      - _validate.yml:25
      - _validate.yml:59
      - _validate.yml:62
      - _validate.yml:70
      - _validate.yml:94
      - _validate.yml:148
      - ci.yml:60
      - ci.yml:94
      - ci.yml:97
      - ci.yml:102
      - ci.yml:172
      - ci.yml:181
      - ci.yml:190
      - ci.yml:201
      - ci.yml:206
      - ci.yml:211
      - ci.yml:216
      - ci.yml:222
      - ci.yml:230
      - ci.yml:305
      - release.yml:40
      - release.yml:58
      - release.yml:106
      - release.yml:160
      - release.yml:165
      - release.yml:170
      - release.yml:201
      - release.yml:210
      - release.yml:406
      - release.yml:411
      - release.yml:416
      - release.yml:426
      - release.yml:432
      - release.yml:440
