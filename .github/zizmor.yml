# zizmor configuration — security audit for GitHub Actions workflows.
# https://docs.zizmor.sh/configuration/
#
# This file is a BASELINE: it suppresses every finding zizmor reports
# today so the hook only catches *new* findings going forward. Existing
# findings are tracked as MAINT items in REVIEW-LATER.md and should be
# triaged off the baseline over time — fix the underlying issue (or
# document why it's safe in the threat-model sense), then drop the
# matching entry from this file.
#
# Triage progress (closed entries appear elsewhere, not here):
#   - template-injection × 6 — closed: workflow inputs are routed through
#     `env:` + `$INPUT_*` instead of being interpolated directly into
#     `run:` scripts.
#   - artipacked × 6 — closed: every checkout across .github/workflows/
#     passes `persist-credentials: false` (verified by grep — there is no
#     longer any checkout that keeps credentials for a tag push).
#   - excessive-permissions × 1 — closed: release.yml uses workflow-level
#     `contents: read` with per-job `contents: write` scoped only to the
#     jobs that actually push.
#
# Threat-model context (AGENTS.md): Agaric is single-user, no cloud,
# no adversarial peers.

rules:
  cache-poisoning:
    # Re-anchored 2026-07-16 (#2736). The previous baseline pinned to
    # ci.yml/release.yml line numbers from 2026-05 that had since drifted
    # onto unrelated content (comment blocks, the AppImage verify step),
    # and two `:3` entries silently anchored on the `on:` block, acting as
    # blanket file-wide suppressions of the whole rule. Re-derived by
    # running `zizmor` with an EMPTY cache-poisoning ignore list: exactly
    # these 9 cache steps (Swatinem/rust-cache + actions/setup-node with
    # `cache: npm`) fire, and anchoring to their current lines suppresses
    # them with none left over. If cache steps move, re-run with an empty
    # ignore list and re-anchor rather than editing line numbers blind.
    ignore:
      - ci.yml:267
      - ci.yml:290
      - ci.yml:410
      - ci.yml:442
      - release.yml:132
      - release.yml:177
      - release.yml:894
      - release.yml:926
      - release.yml:1175
  # unpinned-uses: empty — closed 2026-05-16 by SHA-pinning every
  # `uses: org/action@vX` reference across _validate.yml, ci.yml, and
  # release.yml to a 40-char commit SHA + `# vX` comment. Dependabot
  # (.github/dependabot.yml) opens weekly PRs to bump SHAs when new
  # release tags land. Any *new* unpinned reference will now fire, as
  # intended for a baseline-then-tighten workflow.
