# zizmor configuration — security audit for GitHub Actions workflows.
# https://docs.zizmor.sh/configuration/
#
# This file is a BASELINE: it suppresses every finding zizmor reports
# today so the hook only catches *new* findings going forward. Existing
# findings are tracked as MAINT items in REVIEW-LATER.md and should be
# triaged off the baseline over time — fix the underlying issue (or
# document why it's safe in the threat-model sense), then drop the
# matching entry from this file.
#
# Triage progress (closed entries appear elsewhere, not here):
#   - template-injection × 6 — defused by MAINT-114 (release-tag.yml
#     fold routed inputs.version through env: + $INPUT_VERSION).
#   - artipacked × 6 — fixed by MAINT-193 (added `persist-credentials:
#     false` to non-pushing checkouts; the bump-version checkout in
#     release.yml keeps `persist-credentials: true` explicitly to drive
#     the tag push, see inline comment there).
#   - excessive-permissions × 1 — fixed by MAINT-193 (workflow-level
#     `contents: write` in release.yml tightened to `read`; per-job
#     `contents: write` scoped to bump-version, build-and-release,
#     android-build-and-release).
#
# Threat-model context (AGENTS.md): Agaric is single-user, no cloud,
# no adversarial peers.

rules:
  cache-poisoning:
    ignore:
      - ci.yml:192
      - ci.yml:193
