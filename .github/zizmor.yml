# zizmor configuration — security audit for GitHub Actions workflows.
# https://docs.zizmor.sh/configuration/
#
# This file is a BASELINE: it suppresses every finding zizmor reported
# the day the hook was first wired into prek.toml. The hook will catch
# *new* findings introduced after that point. Existing findings are
# tracked as MAINT items in REVIEW-LATER.md and should be triaged off
# the baseline over time — fix the underlying issue (or document why
# it's safe in the threat-model sense), then drop the matching entry
# from this file.
#
# Counts at baseline creation:
#   - 63 total locations across 5 rule(s)
#   - artipacked: 7
#   - cache-poisoning: 14
#   - excessive-permissions: 1
#   - template-injection: 6
#   - unpinned-uses: 35
#
# Threat-model context (AGENTS.md): Agaric is single-user, no cloud,
# no adversarial peers. The MAINT-114 fold of `release-tag.yml` into
# `release.yml`'s `bump-version` job (workflow_dispatch entrypoint)
# defused the 6 original `template-injection` findings on
# `${{ inputs.version }}` by routing the input through `env:` and
# referencing it as `$INPUT_VERSION` in the run script — the
# mitigation is cheap and removes the entries entirely instead of
# baselining them.

rules:
  artipacked:
    ignore:
      - _validate.yml:25
      - ci.yml:181
      - ci.yml:51
      - release.yml:37
      - release.yml:88
      - release.yml:132
      - release.yml:374
  cache-poisoning:
    ignore:
      - ci.yml:189
      - ci.yml:208
      - ci.yml:209
