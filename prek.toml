# Configuration file for `prek`, a git hook framework written in Rust.
# See https://prek.j178.dev for more information.

# All five git shims this config relies on (#819 (7) / #817): a plain
# `prek install` only writes `.git/hooks/pre-commit` by default, so
# without this list the prepare-commit-msg (dco-signoff), pre-push
# (verify-ci-equivalent), post-commit (commit-sentinel), and commit-msg
# (conventional-pre-commit) stages would silently never fire on a fresh
# clone. The `commit-msg` shim was missing before #817, so the
# Conventional-Commits hook never actually ran locally. Verified against
# prek 0.3.8: `prek install` with this key writes all five shims; run
# `prek install -f` once on an existing clone to add the new commit-msg
# shim.
default_install_hook_types = ["pre-commit", "commit-msg", "prepare-commit-msg", "pre-push", "post-commit"]

[[repos]]
repo = "builtin"
# Stage pinning (#817): every stage-less hook below is re-run by Phase A
# of the pre-push verifier (`prek run --all-files --hook-stage pre-commit`),
# so pinning each to `stages = ["pre-commit"]` makes it run once at commit
# AND exactly once per push (via Phase A) instead of the previous up-to-3×
# (pre-commit shim + pre-push shim + Phase A re-run).
hooks = [
    { id = "trailing-whitespace", exclude = "\\.(png|ico|icns|svg)$", stages = ["pre-commit"] },
    { id = "end-of-file-fixer", exclude = "\\.(png|ico|icns|svg)$", stages = ["pre-commit"] },
    { id = "check-yaml", stages = ["pre-commit"] },
    { id = "check-toml", stages = ["pre-commit"] },
    { id = "check-json", exclude = "(tsconfig.*\\.json$|\\.sqlx/)", stages = ["pre-commit"] },
    { id = "check-merge-conflict", stages = ["pre-commit"] },
    { id = "check-added-large-files", args = [
        "--maxkb=500",
    ], exclude = "^docs/session-log/", stages = ["pre-commit"] },
    { id = "no-commit-to-branch", args = [
        "--branch=main",
    ], stages = [
        "pre-push",
    ] },
    { id = "detect-private-key", exclude = "^src-tauri/src/(sync_cert\\.rs|sync_net/tests\\.rs|sync_daemon/tests\\.rs)$|^SESSION-LOG\\.md$|^docs/session-log/", stages = ["pre-commit"] },
    # Catch the "I added a script but forgot chmod +x" / "I marked a non-executable as +x" class of mistake.
    # scripts/ mixes .sh, .mjs, and .py files that all rely on shebangs + +x bits. `*.rs` is excluded
    # because Rust's inner-attribute syntax `#![...]` looks like a shebang to this builtin and gives
    # unactionable false positives on every test module under src-tauri/src/commands/tests/.
    { id = "check-shebang-scripts-are-executable", exclude = "\\.rs$", stages = ["pre-commit"] },
    { id = "check-executables-have-shebangs", stages = ["pre-commit"] },
    # Normalise CRLF leakage from non-Linux contributors.
    { id = "mixed-line-ending", args = [
        "--fix=lf",
    ], stages = ["pre-commit"] },
]

# Secret scanning (gitleaks)
[[repos]]
repo = "https://github.com/gitleaks/gitleaks"
rev = "v8.30.1"
hooks = [{ id = "gitleaks", stages = ["pre-commit"] }]

# Conventional Commits enforcement on commit-msg stage.
[[repos]]
repo = "https://github.com/compilerla/conventional-pre-commit"
rev = "v4.4.0"
hooks = [{ id = "conventional-pre-commit", stages = ["commit-msg"], args = [] }]

# DCO sign-off auto-append. Mirrors `git commit -s` so the DCO check on
# CI (.github/workflows/dco.yml) never rejects a PR for a forgotten
# `-s`. Runs at prepare-commit-msg so the trailer lands before the
# editor opens (or before the commit lands for `-m`). The framework
# passes the commit message file as the single argument when
# `pass_filenames = true` at this stage.
[[repos]]
repo = "local"
[[repos.hooks]]
id = "dco-signoff"
name = "DCO sign-off (auto-append)"
entry = "bash scripts/dco-signoff.sh"
language = "system"
stages = ["prepare-commit-msg"]
pass_filenames = true
always_run = true

# GitHub Actions workflow lint (catches missing `permissions:` blocks,
# bad uses syntax, deprecated set-output usage, etc.). Closes the
# `actions/missing-workflow-permissions` class of CodeQL findings
# locally instead of letting them surface on push.
[[repos]]
repo = "https://github.com/rhysd/actionlint"
rev = "v1.7.12"
hooks = [{ id = "actionlint", stages = ["pre-commit"] }]

# OXC: lint (oxlint) + format check (oxfmt) for JS/TS
[[repos]]
repo = "local"
[[repos.hooks]]
id = "oxlint"
name = "oxlint"
entry = "npx oxlint --report-unused-disable-directives-severity=error"
language = "system"
types_or = ["javascript", "jsx", "ts", "tsx"]
exclude = "(src/lib/bindings\\.ts$|\\.sqlx/)"
pass_filenames = true
stages = ["pre-commit"]
# Auto-fix formatter (#817): `oxfmt` writes in place (its default mode) so a
# formatting miss is mechanically corrected + re-staged instead of aborting
# the commit with a manual fixup step. This matches the prek "fixer" contract
# used by the builtin trailing-whitespace / end-of-file-fixer hooks: the hook
# mutates the file, prek detects the modification and fails the run, and the
# user re-stages the now-formatted file. (taplo stays `--check` below — writing
# it conflicts with the repo's .taplo.toml style overrides.)
[[repos.hooks]]
id = "oxfmt"
name = "oxfmt (write)"
entry = "npx oxfmt --write"
language = "system"
types_or = ["javascript", "jsx", "ts", "tsx", "json", "css"]
# oxfmt errors (exit 2) when every passed file is internally ignored, which
# breaks lockfile-only commits: package(-lock).json matches `json` here but
# oxfmt won't format it. Exclude them so a deps-only commit has ≥1 target.
exclude = "(src/lib/bindings\\.ts$|\\.sqlx/|^package(-lock)?\\.json$)"
pass_filenames = true
stages = ["pre-commit"]

# TypeScript type checking — tsgo (@typescript/native-preview, the Go port of
# tsc). ~8x faster than `tsc -b` (≈2.5s vs ≈19.5s cold) and agrees with it on
# this project under the strict flags. Binary ships prebuilt via platform
# optionalDependencies, so it resolves under `.npmrc` ignore-scripts=true.
[[repos]]
repo = "local"
[[repos.hooks]]
id = "tsc"
name = "typescript check (tsgo)"
entry = "npx tsgo -b --noEmit"
language = "system"
pass_filenames = false
types_or = ["ts", "tsx"]
stages = ["pre-commit"]

# CSS variable wrapper guard — theme uses oklch(), so hsl()/rgb() wrappers are invalid
[[repos]]
repo = "local"
[[repos.hooks]]
id = "no-hsl-rgb-var-wrap"
name = "no hsl/rgb wrapping css vars"
entry = "bash -c 'if grep -rn \"hsl(var(--\\|rgb(var(--\" src/ --include=\"*.tsx\" --include=\"*.ts\" --include=\"*.css\"; then echo \"ERROR: Use var(--name) directly, not hsl(var(--name)) — theme uses oklch values\"; exit 1; fi'"
language = "system"
pass_filenames = false
types_or = ["ts", "tsx", "css"]
stages = ["pre-commit"]

# Sonner chokepoint guard — every production toast call must route through
# `src/lib/notify.ts` so the wrapper (Phase 3a, design-system-maintainability)
# stays the single source of truth. Allowed direct importers: the wrapper
# itself, the `Toaster` UI primitive that mounts the sonner provider, the
# test mock, and the global vitest setup that wires the mock.
[[repos]]
repo = "local"
[[repos.hooks]]
id = "no-direct-sonner-import"
name = "no direct sonner import outside lib/notify + Toaster + tests"
entry = "bash -c 'if grep -rnE \"from ['\\''\\\"]sonner['\\''\\\"]\" src/ --include=\"*.ts\" --include=\"*.tsx\" --exclude-dir=__tests__ --exclude=\"*.test.ts\" --exclude=\"*.test.tsx\" | grep -vE \"^src/lib/notify\\.ts:|^src/components/ui/sonner\\.tsx:|^src/test-setup\\.ts:\"; then echo \"ERROR: import sonner via @/lib/notify instead — Phase 3a chokepoint (design-system-maintainability)\"; exit 1; fi'"
language = "system"
pass_filenames = false
types_or = ["ts", "tsx"]
stages = ["pre-commit"]

# Layer-boundary guard — UI primitives in `src/components/ui/` must be
# stateless. They are atomic building blocks (AGENTS.md "Component
# hierarchy") and must never reach into zustand stores: any feature
# requiring app state belongs in `src/components/` (shared) or higher
# layers. Catches the drift class where someone wires a primitive
# directly to `useNavigationStore` etc. — the next reviewer would
# otherwise have to spot the violation by eye on every PR.
[[repos]]
repo = "local"
[[repos.hooks]]
id = "no-ui-store-imports"
name = "ui primitives must not import zustand stores"
entry = "bash -c 'if grep -rnE \"from ['\\''\\\"](\\@/stores|\\.\\./stores|\\.\\./\\.\\./stores)\" src/components/ui/ --include=\"*.ts\" --include=\"*.tsx\" --exclude-dir=__tests__; then echo \"ERROR: src/components/ui/ primitives must be stateless — move state-dependent logic up to src/components/ (shared) or src/hooks/. See AGENTS.md \\\"Component hierarchy\\\".\"; exit 1; fi'"
language = "system"
pass_filenames = false
types_or = ["ts", "tsx"]
stages = ["pre-commit"]

# Elevation-tier drift guard (#1810, follow-up to #1654). #1654 routed the
# hand-rolled component surfaces through the elevation-tier tokens
# (`--shadow-resting/floating/overlay`, registered in src/index.css, #1098),
# applied as the `shadow-(--shadow-<tier>)` utility. This hook stops a NEW
# raw `shadow-(sm|md|lg)` (with any variant prefix, e.g. `focus:shadow-lg`)
# from silently re-drifting a container surface under src/components/ off the
# tiers. A small set of intentional non-tier shadows (badge legibility,
# pressed-state insets, control affordances, the floating-sidebar variant)
# are allowlisted with reasons inside the script. Comments are stripped first
# so a shadow class mentioned only in a code comment never fires. Rules +
# allowlist live in scripts/check-elevation-tiers.py.
[[repos]]
repo = "local"
[[repos.hooks]]
id = "check-elevation-tiers"
name = "elevation-tier guard (#1810 no raw shadow-sm/md/lg on surfaces)"
entry = "python3 scripts/check-elevation-tiers.py"
language = "system"
files = '^src/components/.*\.(tsx|ts)$'
stages = ["pre-commit", "pre-push"]

# Companion: run the guard's own fixture suite (`--self-test`) so the match
# contract (variant prefixes, tier-utility/longer-token boundary,
# comment-stripping, allowlist exemption) cannot silently regress. No file
# args.
[[repos.hooks]]
id = "check-elevation-tiers-self-test"
name = "elevation-tier guard self-test (#1810 fixtures)"
entry = "python3 scripts/check-elevation-tiers.py --self-test"
language = "system"
pass_filenames = false
always_run = true
stages = ["pre-commit", "pre-push"]

# Legacy React API guard — block re-introduction of APIs we migrated away from
# (React 19, TypeScript 6, follow-up MutableRefObject removal).
# Two legitimate `React.JSX.IntrinsicElements` uses in RichContentRenderer.tsx are
# the correct React-19 form and are excluded by the `[^.]` prefix in the pattern.
[[repos]]
repo = "local"
[[repos.hooks]]
id = "no-legacy-react-apis"
name = "no legacy react apis"
entry = "bash -c 'set -e; if grep -rnE \"\\bforwardRef\\b|\\bReact\\.forwardRef\\b|\\bMutableRefObject\\b|\\bReact\\.ComponentRef\\b\" src/ --include=\"*.ts\" --include=\"*.tsx\" --exclude-dir=mocks --exclude=bindings.ts; then echo \"ERROR: legacy React API detected — forwardRef / MutableRefObject / React.ComponentRef were removed during the React 19 / TS 6 migration\"; exit 1; fi; if grep -rnE \"(^|[^.])JSX\\.(IntrinsicElements|Element)\" src/ --include=\"*.ts\" --include=\"*.tsx\" --exclude-dir=mocks --exclude=bindings.ts; then echo \"ERROR: ambient JSX.* namespace detected — use React.JSX.IntrinsicElements / React.ReactElement instead (React 19 dropped the global JSX namespace)\"; exit 1; fi'"
language = "system"
pass_filenames = false
types_or = ["ts", "tsx"]
stages = ["pre-commit"]

# Vitest: smart related-only tests. Pre-push only (#817): test-related-ts.sh
# collects the changed .ts/.tsx files (skipping bindings.ts), and — when any
# match — runs `npx vitest related --run` on them. vitest's `related` then
# expands that set to every test that transitively imports those files. There
# is no foundational-module fallback to the full suite (unlike the Rust
# selector below); the fan-out is purely driven by the import graph, so a
# widely-imported shared module can still pull in most of the suite — far too
# slow for the commit path. The pre-push verifier runs it once, scoped to the
# push range, in Phase C of scripts/verify-ci-equivalent.sh; Phase A
# additionally passes SKIP=vitest so this hook is not re-run there.
[[repos]]
repo = "local"
[[repos.hooks]]
id = "vitest"
name = "vitest"
entry = "scripts/test-related-ts.sh"
language = "system"
pass_filenames = false
types_or = ["ts", "tsx"]
stages = ["pre-push"]

# Tauri-mock parity: ensures every IPC command emitted from
# `src/lib/bindings.ts` (the auto-generated tauri-specta surface) has a
# handler in the in-browser tauri mock at `src/lib/tauri-mock/handlers.ts`.
# Catches the Phase 2 class of bug where a new backend command
# ships without a mock entry; e2e flows then silently get `null` and
# fail in unrelated places. Allowlist for genuinely-not-mockable
# commands (OAuth, OS sockets) lives inside the script.
[[repos]]
repo = "local"
[[repos.hooks]]
id = "tauri-mock-parity"
name = "tauri-mock parity"
entry = "node scripts/check-tauri-mock-parity.mjs"
language = "system"
pass_filenames = false
files = "^src/lib/(bindings\\.ts|tauri-mock/handlers\\.ts)$"
stages = ["pre-commit"]

# Tauri bindings ↔ wrapper parity: ensures every `commands.*` export from
# `src/lib/bindings.ts` (auto-generated tauri-specta surface) has either a
# matching ergonomics wrapper in `src/lib/tauri.ts` or sits on an explicit
# allowlist. Catches the drift class where a Rust command signature changes,
# `bindings.ts` regenerates, but the hand-written wrapper is missed.
[[repos]]
repo = "local"
[[repos.hooks]]
id = "tauri-bindings-parity"
name = "tauri bindings ↔ wrapper parity"
entry = "node scripts/check-tauri-bindings-parity.mjs"
language = "system"
pass_filenames = false
files = "^src/lib/(bindings\\.ts|tauri\\.ts)$"
stages = ["pre-commit"]

# Tracked-file Markdown link integrity. Verifies that every relative
# `](path.md)` link in tracked Markdown files points to a file that's
# also tracked by git. Lychee can't catch this locally because an
# untracked working-tree copy of the target shadows the gap; CI's
# fresh checkout sees the real state. This script asks
# `git ls-files`, matching CI semantics.
[[repos]]
repo = "local"
[[repos.hooks]]
id = "md-link-targets"
name = "markdown link targets are tracked"
entry = "node scripts/check-md-link-targets.mjs"
language = "system"
pass_filenames = false
types = ["markdown"]
stages = ["pre-commit"]

# doc-vs-code drift detector (ui-improvements 2026-05-16 §Maintenance /
# tooling). Complements `md-link-targets`: this hook scans inline-code
# spans + markdown link targets in narrative docs for `src/…`,
# `src-tauri/…`, `scripts/…`, `e2e/…`, `docs/…`, `pending/…`, or
# `.github/…` repo-rooted paths and fails when the cited path is missing
# from the tracked tree. Catches the case where a doc cites a file that
# has been renamed, refactored away, or moved without a sweep.
# `docs/session-log/*` (archive of past state) and `pending/*` (forward-
# looking plans) are excluded; gitignored build-output paths are skipped
# in the script.
[[repos]]
repo = "local"
[[repos.hooks]]
id = "doc-vs-code-paths"
name = "doc citations point at tracked code"
entry = "node scripts/check-doc-code-paths.mjs"
language = "system"
pass_filenames = false
types = ["markdown"]
stages = ["pre-commit"]

# Frontend import-cycle guard (#761). The `src/` module graph was driven to
# zero cycles (Tarjan SCC over ~600 first-party modules); this hook keeps it
# there. A new value- or type-import cycle confuses bundlers (init-order
# hazards, e.g. the original logger<->tauri cycle that could log during a
# partially-initialized IPC module) and humans. Runs on any `src/` TS/TSX
# change since a cycle can be introduced by an edit far from the new edge's
# other end.
[[repos]]
repo = "local"
[[repos.hooks]]
id = "import-cycles"
name = "frontend import cycles (zero)"
entry = "node scripts/check-import-cycles.mjs"
language = "system"
pass_filenames = false
files = "^src/.*\\.(ts|tsx|js|jsx|mjs|cjs)$"
stages = ["pre-commit"]

# axe-presence: every `src/components/__tests__/*.test.tsx` must include
# at least one axe(...) audit, per src/__tests__/AGENTS.md:227. Without
# this, accessibility regressions slip through component additions
# because reviewers can't catch the missing audit by eye on every PR.
# Easy half.
[[repos]]
repo = "local"
[[repos.hooks]]
id = "axe-presence"
name = "axe-presence in component tests"
entry = "bash scripts/check-axe-presence.sh"
language = "system"
pass_filenames = false
files = "^src/components/__tests__/.*\\.test\\.tsx$"
stages = ["pre-commit"]

# test-file-naming: enforce the convention from src/__tests__/AGENTS.md:81
# (Vitest → .test.ts/.test.tsx in src/, Playwright → .spec.ts in e2e/).
# Mixing the suffixes silently routes a file to the wrong runner.
# Rust tests are out of scope (rule is frontend-only). Easy half.
[[repos]]
repo = "local"
[[repos.hooks]]
id = "test-file-naming"
name = "test file naming convention"
entry = "bash scripts/check-test-file-naming.sh"
language = "system"
pass_filenames = false
types_or = ["ts", "tsx"]
stages = ["pre-commit"]

# ipc-error-path-coverage: every `src/components/**/*.tsx` (recursive,
# excluding `ui/` and `__tests__/`) that imports from `@/lib/tauri` (or
# pulls `invoke` directly from `@tauri-apps/api/core`) must have at
# least one error-path test in either its sibling `__tests__/<name>.test.tsx`
# or the top-level `src/components/__tests__/<name>.test.tsx` fallback.
# Catches the silent-`.catch` / missing-toast class of regression that
# AGENTS.md:198 is aimed at. Hard half; recursive walk
# Closed by (the `files` regex below is intentionally broad —
# the `ui/` and `__tests__/` exclusions live in the script's
# `listAllComponents()` walk, not in the regex).
[[repos]]
repo = "local"
[[repos.hooks]]
id = "ipc-error-path-coverage"
name = "IPC error-path coverage"
entry = "node scripts/check-ipc-error-path.mjs"
language = "system"
pass_filenames = false
files = "^src/components/.*\\.tsx$"
stages = ["pre-commit"]

# #1270 — self-test the IPC error-path guard's own exit behavior
# (no-test IPC component FAILS, covered/allowlisted PASSES, stale
# allowlist FAILS) whenever the guard script itself changes, so a
# regression that re-vacuums the guard can't land unnoticed.
[[repos.hooks]]
id = "ipc-error-path-coverage-selftest"
name = "IPC error-path coverage self-test"
entry = "node scripts/check-ipc-error-path.mjs --self-test"
language = "system"
pass_filenames = false
files = "^scripts/check-ipc-error-path\\.mjs$"
stages = ["pre-commit"]

# snapshot-redaction: scan every `*.snap` file under `src/` and
# `src-tauri/` for unredacted ULIDs (26-char Crockford base32),
# blake3 hashes (64-char lowercase hex), ISO-8601 timestamps with a
# time component, and base64url cursors. Values that appear verbatim
# in any `src-tauri/src/**/*.rs` source file are auto-allowlisted as
# deterministic test fixtures (per src-tauri/tests/AGENTS.md:319 —
# "For deterministic data, no redaction needed"). Inline
# `# snapshot-allow-<kind>: <reason>` comments support the rare known-
# Fixed-generated-value case. Hard half.
[[repos]]
repo = "local"
[[repos.hooks]]
id = "snapshot-redaction"
name = "snapshot redaction"
entry = "node scripts/check-snapshot-redaction.mjs"
language = "system"
pass_filenames = false
files = "(\\.snap$|^src-tauri/src/.*\\.rs$)"
stages = ["pre-commit"]

# JS: better-npm-audit (security advisories). Pre-push only (#817, #1087):
# `better-npm-audit audit` shells out to `npm audit`, a network round-trip to
# the registry advisory endpoint, so a dependency-bump commit would block on
# the network and go red when flaky/offline — the same rationale that moved
# knip and lychee off the commit path. As a pre-push-staged hook it runs once,
# directly from the pre-push git shim (not via Phase A, which is
# pre-commit-stage only), so CI must invoke it explicitly with
# `--hook-stage pre-push npm-audit` (see .github/workflows/_validate.yml);
# `npm audit signatures` there is a different, warn-only provenance check.
[[repos]]
repo = "local"
[[repos.hooks]]
id = "npm-audit"
name = "npm audit"
entry = "npx better-npm-audit audit"
language = "system"
pass_filenames = false
files = "(^package\\.json$|^package-lock\\.json$)"
stages = ["pre-push"]

# JS: license-checker (license compliance). The repo is
# GPL-3.0-or-later, so every accepted license below must be one-way-
# compatible with GPL-3 (permissive or weak-copyleft compatible). The
# Rust side enforces the equivalent allowlist in `src-tauri/deny.toml`
# `[licenses].allow`; see the comment block there for the full
# compatibility rationale.
[[repos]]
repo = "local"
[[repos.hooks]]
id = "license-checker"
name = "license check"
entry = "npx license-checker --onlyAllow 'MIT;ISC;Apache-2.0;BSD-3-Clause;BSD-2-Clause;MPL-2.0;MIT-0;CC0-1.0;Python-2.0;BlueOak-1.0.0;CC-BY-3.0;CC-BY-4.0;0BSD;Unlicense' --excludePrivatePackages --production"
language = "system"
pass_filenames = false
files = "(^package\\.json$|^package-lock\\.json$)"
stages = ["pre-commit"]

# JS: knip (dead export detection — also covers unused-dep detection, so
# R19 retired the separate `depcheck` hook in favour of knip-only). Pre-push
# only (#817): knip is a whole-repo analysis that goes red on stale branches
# for diffs unrelated to the commit, so it doesn't belong in the commit path.
# As a pre-push-staged hook it runs once, directly from the pre-push git shim
# (not via Phase A, which is pre-commit-stage only).
[[repos]]
repo = "local"
[[repos.hooks]]
id = "knip"
name = "knip"
entry = "npx knip"
language = "system"
pass_filenames = false
types = ["ts", "tsx"]
stages = ["pre-push"]

# Markdown lint (style + structure)
[[repos]]
repo = "local"
[[repos.hooks]]
id = "markdownlint"
name = "markdownlint-cli2"
entry = "npx markdownlint-cli2"
language = "system"
pass_filenames = true
types = ["markdown"]
exclude = "^(SESSION-LOG\\.md|node_modules/|dist/)"
stages = ["pre-commit"]

# Broken link check
#
# Uses a locally-installed `lychee` binary instead of the upstream
# pre-commit hook from `lycheeverse/lychee`. The upstream hook is
# broken on a normal dev box (verified 2026-05-27): both the
# `lychee-v0.24.2` script (`git describe --tags --exact-match` fails
# because prek's shallow clone strips tags) and the `lychee-v0.24.0`
# fallback (`cargo-binstall` extracted without an executable bit →
# Permission denied) fail in different ways, with no easy workaround.
#
# A `local`-language hook calling the system `lychee` binary
# sidesteps both failure modes entirely. Install via
# `cargo install lychee` if missing. CI installs lychee explicitly
# in the workflow, so this stays consistent across environments.
[[repos]]
repo = "local"
[[repos.hooks]]
id = "lychee"
name = "lychee"
entry = "lychee"
args = ["--no-progress", "--max-concurrency=4", "--cache"]
language = "system"
types = ["markdown"]
pass_filenames = true
# Pre-push only (#817): lychee resolves links over the NETWORK, which is
# slow and flaky on the commit path; network checks don't belong in
# `git commit`. As a pre-push-staged hook it runs once, directly from the
# pre-push git shim (not via Phase A, which is pre-commit-stage only).
stages = ["pre-push"]

# SQL: sqruff (SQLite migrations lint)
# Scope: src-tauri/migrations/*.sql only. Inline `sqlx::query!` strings in Rust
# are not linted (covered by sqlx compile-time validation against .sqlx/ cache).
# Rule set picked to match all currently-shipped migrations without triggering
# any fixes (shipped migrations are append-only per AGENTS.md invariant #1;
# sqlx tracks their checksums in _sqlx_migrations).
[[repos]]
repo = "local"
[[repos.hooks]]
id = "sqruff"
name = "sqruff"
entry = "bash -c '. \"$HOME/.cargo/env\" && sqruff lint \"$@\"' --"
language = "system"
pass_filenames = true
files = "^src-tauri/migrations/.*\\.sql$"
stages = ["pre-commit"]

# Tauri command IPC error-sanitization check. Every
# `#[tauri::command]` wrapper that returns `Result<_, AppError>` and
# propagates errors via `?` should funnel them through
# `.map_err(sanitize_internal_error)` so the IPC boundary never leaks
# bare `AppError::Sqlx` / `AppError::Internal` payloads to the
# frontend. A code-level wrapper macro would obstruct specta's type
# extraction, so the convention is enforced as a regex check instead.
# Pre-existing violations are grandfathered via an explicit allowlist
# inside the script — adjust there, not here.
[[repos]]
repo = "local"
[[repos.hooks]]
id = "tauri-command-sanitize"
name = "tauri command sanitize"
entry = "node scripts/check-tauri-command-sanitize.mjs"
language = "system"
pass_filenames = false
files = "^src-tauri/src/commands/.*\\.rs$"
stages = ["pre-commit"]

# Rust: raw write-tx guard (#110). replaced ad-hoc
# `pool.begin_with("BEGIN IMMEDIATE")` write transactions on user-edit
# paths with the `CommandTx` convention (open via
# `crate::db::begin_immediate_logged`, couple the commit with post-commit
# materializer dispatch). This hook stops the convention from silently
# regressing: it flags any NEW raw write-tx opened outside the audited
# allowlist (cache rebuilds, FTS/tag-inheritance derived indexes,
# snapshot/recovery/sync system paths, external-integration internals)
# or the per-site `// allow-raw-tx: <reason>` escape hatch. `#[cfg(test)]`
# modules and whole test files are skipped — fixtures legitimately open
# raw transactions. Runs at both pre-commit and pre-push so a raw site
# can't slip in via either path. Allowlist + escape-hatch rules live in
# scripts/check-raw-tx.py.
[[repos]]
repo = "local"
[[repos.hooks]]
id = "check-raw-tx"
name = "raw write-tx guard (#110 CommandTx convention)"
entry = "python3 scripts/check-raw-tx.py"
language = "system"
files = '^src-tauri/src/.*\.rs$'
stages = ["pre-commit", "pre-push"]

# #653: the raw-tx guard now also flags a bare `pool.begin()` (DEFERRED)
# in any file that calls `append_local_op_in_tx` — that pairing breaks the
# `SELECT MAX(seq)+1`+`INSERT` BEGIN IMMEDIATE contract. This companion
# hook runs the guard's own fixture suite (`--self-test`) so the proximity
# logic and false-positive exemptions (CommandTx path, read-only `.begin()`,
# `// allow-raw-tx:`, `#[cfg(test)]`) cannot silently regress. No file args.
[[repos.hooks]]
id = "check-raw-tx-self-test"
name = "raw write-tx guard self-test (#653 deferred-tx fixtures)"
entry = "python3 scripts/check-raw-tx.py --self-test"
language = "system"
pass_filenames = false
always_run = true
stages = ["pre-commit", "pre-push"]

# Rust: dynamic-SQL justification guard (#646). docs/architecture/tooling.md
# claims every runtime `sqlx::query()` (non-macro) site carries a comment
# justifying the runtime form — until #646 that claim was unenforced (unlike
# every sibling invariant: check-raw-tx, unsafe-allowlist, migrations-
# immutable). This hook counts runtime `sqlx::query(`/`query_as(`/
# `query_scalar(` sites per production file (the macro forms are compile-
# checked and exempt) and compares against a checked-in baseline
# (src-tauri/dynamic-sql-baseline.txt). Existing sites are grandfathered;
# a file that grows PAST its baseline must carry a `// dynamic-sql: <reason>`
# marker at every dynamic site, applying back-pressure toward the compile-
# checked macros. Comment-/string-stripping and `#[cfg(test)]`-module skipping
# are shared with check-raw-tx.py. Regenerate the baseline with
# `python3 scripts/check-dynamic-sql.py --update-baseline`. Allowlist/rules
# live in scripts/check-dynamic-sql.py.
[[repos.hooks]]
id = "check-dynamic-sql"
name = "dynamic-SQL justification guard (#646)"
entry = "python3 scripts/check-dynamic-sql.py"
language = "system"
files = '^src-tauri/src/.*\.rs$'
stages = ["pre-commit", "pre-push"]

# #1188: the guard's detection regex must tolerate a turbofish between the
# method name and the call parens (`sqlx::query_scalar::<_, Option<i64>>(`) —
# in fact the dominant runtime-query spelling here, which the pre-#1188 regex
# silently skipped. This companion hook runs the guard's own fixture suite
# (`--self-test`) so the match contract (turbofish + nested-generic close,
# macro-form exemption) cannot silently regress. No file args.
[[repos.hooks]]
id = "check-dynamic-sql-self-test"
name = "dynamic-SQL guard self-test (#1188 turbofish fixtures)"
entry = "python3 scripts/check-dynamic-sql.py --self-test"
language = "system"
pass_filenames = false
always_run = true
stages = ["pre-commit", "pre-push"]

# Rust: tauri-specta 10-argument ceiling guard (#1317). The tauri-specta IPC
# bridge codegen has a HARD 10-argument limit per `#[tauri::command]`, and a
# `State<'_, T>` param counts toward it (it costs a Rust signature slot even
# though it doesn't appear in bindings.ts). This ceiling is documented in
# src-tauri/src/commands/AGENTS.md § "tauri-specta 10-argument ceiling" with
# the WriteCtx bundling solution (#1056) — but until #1317 NOTHING enforced
# it: an 11-param command compiled cleanly and failed only later, at specta-
# export / IPC time. This hook scans `src-tauri/src/commands/**/*.rs` for
# every `#[tauri::command]` fn, counts ALL declared params (conservatively
# including State, parsed across multiline sigs with bracket-depth counting),
# and fails any command over 10. Comment-stripping is shared with
# check-raw-tx.py. Rules live in scripts/check-command-arity.py.
[[repos.hooks]]
id = "check-command-arity"
name = "tauri-specta 10-arg ceiling guard (#1317)"
entry = "python3 scripts/check-command-arity.py"
language = "system"
files = '^src-tauri/src/commands/.*\.rs$'
stages = ["pre-commit", "pre-push"]

# #1317: the arity parser must survive multiline signatures, nested generics /
# tuples / closures (which must NOT inflate the param count), attribute args,
# and commented-out attributes. This companion hook runs the guard's own
# fixture suite (`--self-test`) so the 10-vs-11 boundary and the bracket-depth
# param counter cannot silently regress. No file args.
[[repos.hooks]]
id = "check-command-arity-self-test"
name = "tauri-specta arity guard self-test (#1317 fixtures)"
entry = "python3 scripts/check-command-arity.py --self-test"
language = "system"
pass_filenames = false
always_run = true
stages = ["pre-commit", "pre-push"]

# Rust: space-filter drift guard (#139). Space membership is a first-class
# `blocks.space_id` column (#533, migration 0086), so the active-space read
# filter is the canonical guard fragment `(?N IS NULL OR b.space_id = ?N)`
# (same bind index on both sides), inlined at ~30 paginated-read call sites.
# The maintainer deferred the build.rs / include_str! consolidation that
# would dedupe it (blocked on sqlx#3388) and adopted this cheap drift-guard
# instead: it fails when an inlined copy is mangled — a mismatched `?N`, a
# wrong column, or the `?N IS NULL OR` guard dropped (degrading it to a bare
# `b.space_id = ?N`), the last caught via a per-file count baseline
# (src-tauri/space-filter-baseline.txt) since a bare `b.space_id = ?` is
# legitimate at single-space query sites. Re-anchor the baseline with
# `python3 scripts/check-space-filter-drift.py --update-baseline`. Mirrors
# the `space_filter_canonical.rs` parity test at pre-commit stage. Rules
# live in scripts/check-space-filter-drift.py.
[[repos.hooks]]
id = "check-space-filter-drift"
name = "space-filter drift guard (#139)"
entry = "python3 scripts/check-space-filter-drift.py"
language = "system"
files = '^src-tauri/src/.*\.rs$'
stages = ["pre-commit", "pre-push"]

# Rust: cargo fmt. Auto-fix formatter (#817): drops `--check` so a
# formatting miss is rewritten in place + re-staged mechanically instead
# of aborting the commit with a manual `cargo fmt` step. Matches the prek
# "fixer" contract used by the builtin trailing-whitespace hook — the hook
# mutates the file, prek detects the modification and fails the run, and
# the author re-stages the now-formatted file.
[[repos]]
repo = "local"
[[repos.hooks]]
id = "cargo-fmt"
name = "cargo fmt"
entry = "bash -c '. \"$HOME/.cargo/env\" && cd src-tauri && cargo fmt'"
language = "system"
pass_filenames = false
types = ["rust"]
stages = ["pre-commit"]

# Rust: cargo clippy
[[repos]]
repo = "local"
[[repos.hooks]]
id = "cargo-clippy"
name = "cargo clippy"
# `--all-targets` (#639): the bare invocation lints only the default
# target set (lib + bins), so the 26 criterion benches and the
# interactive_slo SLO gate (~1,271 lines) were never even COMPILED by
# clippy or CI — a refactor of agaric_lib internals could break every
# bench file silently. `--all-targets` adds benches/tests/examples to the
# lint set, turning "benches compile" into a checked contract on the fast
# (per-PR) path at near-zero marginal cost.
#
# `--workspace`: without it, `cargo clippy` in the workspace root lints only
# the root `agaric` package, silently skipping the `agaric-diagnostics`
# member (its 2 bins were never linted, so pedantic lints added to its
# Cargo.toml had unfixed violations CI never saw). `--workspace` lints every
# member.
#
# Pre-push only (#817): clippy compiles the whole workspace (+ all targets)
# and surfaces latent warnings in untouched files, so it's too slow and too
# broad for the commit path. As a pre-push-staged hook it runs once,
# directly from the pre-push git shim (not via Phase A, which is
# pre-commit-stage only).
entry = "bash -c '. \"$HOME/.cargo/env\" && cd src-tauri && cargo clippy --workspace --all-targets -- -D warnings'"
language = "system"
pass_filenames = false
types = ["rust"]
stages = ["pre-push"]

# Rust: smart related-only tests. Pre-push only (#817): the related-test
# selector falls back to the FULL nextest suite whenever a foundational
# module is touched (lib.rs/db.rs/op.rs/error.rs/pagination.rs — see
# test-related-rust.sh), so at commit time this routinely ran the entire
# suite and dominated commit latency. The pre-push verifier runs nextest
# once, scoped to the push range, in Phase D of verify-ci-equivalent.sh;
# Phase A passes SKIP=cargo-test so it is not re-run there. (As a
# pre-push-staged prek hook it would invoke the script with the default
# `--cached` source against an empty index → a no-op at push; the genuine
# run is Phase D's `--range`.)
[[repos]]
repo = "local"
[[repos.hooks]]
id = "cargo-test"
name = "cargo nextest run"
entry = "scripts/test-related-rust.sh"
language = "system"
pass_filenames = false
types = ["rust"]
stages = ["pre-push"]

# Rust: cargo-deny (advisories + licenses + bans + sources)
[[repos]]
repo = "local"
[[repos.hooks]]
id = "cargo-deny"
name = "cargo deny"
entry = "bash -c '. \"$HOME/.cargo/env\" && cd src-tauri && cargo deny check'"
language = "system"
pass_filenames = false
files = "^src-tauri/Cargo\\.(toml|lock)$"
stages = ["pre-commit"]

# Cargo-audit accept-list sync (#11). `cargo audit` (run as a
# warn-only step in `_validate.yml`) does NOT consult `deny.toml`, so
# every advisory already triaged in `deny.toml`'s `[advisories].ignore`
# re-surfaces in the CI log. The sync script projects those entries
# into `src-tauri/.cargo/audit.toml` (where cargo-audit actually
# reads from). This hook re-runs the script on every change to
# `deny.toml` or `audit.toml` and fails if the working copy of
# audit.toml is out of sync — telling the author to run
# `node scripts/sync-audit-from-deny.mjs`. `deny.toml` stays the
# single source of truth; `audit.toml` is generated.
[[repos]]
repo = "local"
[[repos.hooks]]
id = "audit-toml-in-sync"
name = "audit.toml in sync with deny.toml"
entry = "node scripts/sync-audit-from-deny.mjs --check"
language = "system"
pass_filenames = false
files = "^src-tauri/(deny\\.toml|\\.cargo/audit\\.toml)$"
stages = ["pre-commit"]

# Rust: unsafe-code allowlist. Workspace lint is
# `unsafe_code = "deny"`; the only escape hatch is a per-file
# `#![allow(unsafe_code)]`. This hook fails when a file carries that
# attribute without an explicit entry in
# `src-tauri/unsafe-allowlist.txt`, ensuring every escape hatch is
# reviewed centrally. See the allowlist file and `scripts/check-
# unsafe-allowlist.sh` for the audit procedure.
[[repos]]
repo = "local"
[[repos.hooks]]
id = "unsafe-allowlist"
name = "unsafe-code allowlist"
entry = "bash scripts/check-unsafe-allowlist.sh"
language = "system"
pass_filenames = false
files = "^(src-tauri/src/.*\\.rs|src-tauri/unsafe-allowlist\\.txt)$"
stages = ["pre-commit"]

# Rust: cargo-machete (unused dependency detection)
[[repos]]
repo = "local"
[[repos.hooks]]
id = "cargo-machete"
name = "cargo machete"
entry = "bash -c '. \"$HOME/.cargo/env\" && cd src-tauri && cargo machete'"
language = "system"
pass_filenames = false
files = "^src-tauri/Cargo\\.(toml|lock)$"
stages = ["pre-commit"]

# typos: language-agnostic typo checker (crate-ci/typos). Catches
# misspellings in code, comments, identifiers, snapshot fixtures,
# AGENTS.md — the surface markdownlint never
# touches. Allow-list and excluded paths live in `_typos.toml`.
# `pass_filenames = false` lets typos walk the repo itself and
# apply its built-in binary detection (PNG/ICO icons, etc., which
# typos would otherwise treat as text when explicitly handed
# their paths).
# Install: `cargo install typos-cli --locked`.
[[repos]]
repo = "local"
[[repos.hooks]]
id = "typos"
name = "typos"
entry = "bash -c '. \"$HOME/.cargo/env\" && typos'"
language = "system"
pass_filenames = false
stages = ["pre-commit"]

# shellcheck: lint shell scripts under scripts/. `--severity=warning`
# skips the `info` / `style` notices (e.g. SC2012 "use find instead
# of ls", SC2001 "use ${var//pat/repl} instead of sed") which are
# minor stylistic preferences; we still catch real bugs and probable
# bugs. Out of scope: the inline `bash -c '...'` strings inside this
# file (shellcheck cannot parse TOML-embedded bash).
# Install via system package manager (e.g. `apt-get install shellcheck`).
[[repos]]
repo = "local"
[[repos.hooks]]
id = "shellcheck"
name = "shellcheck"
entry = "shellcheck --severity=warning"
language = "system"
files = "^scripts/.*\\.sh$"
stages = ["pre-commit"]

# Migration immutability — enforces the AGENTS.md "append-only,
# never modify shipped migrations" invariant. The sqlx runtime
# detects checksum drift via `_sqlx_migrations`, but only on the
# next app boot; this hook fails fast at commit time. Allows
# additions only; modifications, deletions, renames, copies, and
# type changes under src-tauri/migrations/ are rejected.
# `always_run = true` (#806): prek's changed-file set EXCLUDES
# deletions, so a staged `git rm migrations/0001*.sql` alone would
# never match a `files` filter and the hook would silently skip.
# The script (~10ms) rescans the staged index itself, so running it
# unconditionally costs nothing. The `--all-files` vacuousness
# (staged index is empty in CI / pre-push) is backstopped by the
# script's `--range` mode, invoked from _validate.yml's lint job and
# scripts/verify-ci-equivalent.sh Phase A.
[[repos]]
repo = "local"
[[repos.hooks]]
id = "migrations-immutable"
name = "migrations append-only"
entry = "bash scripts/check-migrations-immutable.sh"
language = "system"
pass_filenames = false
always_run = true
stages = ["pre-commit"]

# STRICT tables policy. Every new `CREATE TABLE` in a
# SQLite migration must use STRICT mode (SQLite 3.37+) so silent
# type coercion fails at insert time instead of corrupting reads
# later. Pre-policy migrations 0001..0041 are skipped by a
# migration-number floor inside the script — they're immutable
# per `migrations-immutable` and will not be retrofitted. FTS5 /
# virtual tables are carved out (SQLite forbids STRICT there).
[[repos]]
repo = "local"
[[repos.hooks]]
id = "migrations-strict-tables"
name = "migrations: STRICT tables required for new schema"
entry = "node scripts/check-migrations-strict.mjs"
language = "system"
pass_filenames = true
files = "^src-tauri/migrations/.*\\.sql$"
stages = ["pre-commit"]

# Blocks-rebuild cascade guard (#606). `DROP TABLE blocks` under
# `foreign_keys = ON` immediately cascade-deletes every child row
# with an ON DELETE CASCADE FK into blocks — inside the migration
# tx, before the `_new_blocks` rename. page_aliases (no op_log
# entries) and block_drafts (device-local) do NOT re-materialize
# at boot, so the shipped rebuilds 0073/0080/0085 destroyed both
# (those are exempt via a floor in the script — immutable, damage
# done). Any NEW migration dropping blocks must reference both
# satellites (the copy-aside/restore recipe in
# src-tauri/migrations/AGENTS.md §Table-rebuild). Deep verification
# lives in the db.rs seed-then-migrate harness (`*_606` tests).
[[repos]]
repo = "local"
[[repos.hooks]]
id = "migrations-rebuild-cascade"
name = "migrations: blocks rebuilds must preserve cascade satellites"
entry = "node scripts/check-migrations-rebuild-cascade.mjs"
language = "system"
pass_filenames = true
files = "^src-tauri/migrations/.*\\.sql$"
stages = ["pre-commit"]

# zizmor: GitHub Actions security audit. Complements actionlint
# (which is style/correctness only) by catching unpinned `uses:`,
# missing `persist-credentials: false`, env-injection in
# `${{ github.* }}` interpolation, the `pull_request_target`
# exfil class, and similar workflow-security smells. Existing
# findings are baselined in `.github/zizmor.yml`; the hook fires
# on new findings only.
# Install: `cargo install zizmor --locked`.
[[repos]]
repo = "local"
[[repos.hooks]]
id = "zizmor"
name = "zizmor"
entry = "bash -c '. \"$HOME/.cargo/env\" && zizmor \"$@\"' --"
language = "system"
files = "^\\.github/workflows/.*\\.ya?ml$"
stages = ["pre-commit"]

# taplo: TOML lint + format. The `check-toml` builtin only validates
# parseability; taplo enforces consistent formatting across
# prek.toml, src-tauri/Cargo.toml, src-tauri/deny.toml, lychee.toml,
# .gitleaks.toml, and src-tauri/.config/nextest.toml. Repo-specific
# style overrides live in `.taplo.toml` (4-space indent, 200-col
# width, no auto-collapse). `fmt --check` is read-only — it never
# rewrites the file in the index.
# Install: `cargo install taplo-cli --locked`.
[[repos]]
repo = "local"
[[repos.hooks]]
id = "taplo-fmt"
name = "taplo fmt --check"
# #817 EXCEPTION: taplo stays `--check` (read-only). Switching it to write
# mode reformats all TOML in a style the repo's .taplo.toml overrides reject,
# producing mass unrelated diffs — known issue, so this fmt hook is NOT
# converted to the auto-fix contract.
entry = "bash -c '. \"$HOME/.cargo/env\" && taplo fmt --check \"$@\"' --"
language = "system"
types = ["toml"]
stages = ["pre-commit"]
[[repos]]
repo = "local"
[[repos.hooks]]
id = "taplo-lint"
name = "taplo lint"
entry = "bash -c '. \"$HOME/.cargo/env\" && taplo lint \"$@\"' --"
language = "system"
types = ["toml"]
stages = ["pre-commit"]

# ─── pre-push only ────────────────────────────────────────────────
#
# A single chokepoint hook runs `scripts/verify-ci-equivalent.sh`,
# which parallelizes every check `_validate.yml` runs in CI (full
# vitest, full Playwright, cargo nextest + agaric-mcp build + sqlx
# prepare check, MCP UDS smoke, externalBin verification, plus
# warn-only `cargo audit` and `npm audit signatures`).
#
# The script wraps everything in one prek slot so we can fan out
# across cores via background jobs instead of letting prek serialize
# per-hook. Total wall clock on a warm cache: ≈3-4 min (was ≈5-8 min
# when each hook ran sequentially via prek).
#
# PREFERRED PUSH PATH: `scripts/push.sh` runs this verification BEFORE
# `git push` opens any SSH connection, then pushes with a
# `SKIP_CI_VERIFY=<reason>` so this hook short-circuits and the fresh
# connection is used immediately. Plain `git push` still auto-verifies
# here, but holds the SSH connection open for the whole run — on a slow
# verify GitHub closes the idle connection and the pack send fails
# ("Connection closed by remote host"). Use `scripts/push.sh`.
#
# Escape hatch (CI-R16): `SKIP_CI_VERIFY='<reason>' git push` short-circuits
# the script. The reason must be a descriptive string (≥8 chars) — a bare
# `SKIP_CI_VERIFY=1` is REJECTED so the hatch stays a deliberate one-off
# (docs-only typo fixes, etc.) rather than the default push path. Anything
# that touches source code should let the verifier run.
#
# Release pre-flight (cargo tauri bundle build for the local OS) is
# NOT here — too slow for daily push cadence. Run
# `scripts/verify-release-build.sh` manually before tagging a release.

# skip-ci-verify-guard (CI-R16): whenever the bypass guard or its caller
# changes, re-run the guard's reject/accept smoke test so a regression
# (e.g. accidentally re-allowing `SKIP_CI_VERIFY=1`) is caught at commit
# time. Fast — only the guard's early-exit branches are exercised.
[[repos]]
repo = "local"
[[repos.hooks]]
id = "skip-ci-verify-guard"
name = "SKIP_CI_VERIFY bypass guard test"
entry = "bash scripts/test-skip-ci-verify-guard.sh"
language = "system"
pass_filenames = false
files = '^scripts/(verify-ci-equivalent|push|test-skip-ci-verify-guard)\.sh$'
stages = ["pre-commit"]

[[repos]]
repo = "local"
[[repos.hooks]]
id = "verify-ci-equivalent"
name = "verify CI-equivalent (parallel)"
entry = "bash scripts/verify-ci-equivalent.sh"
language = "system"
pass_filenames = false
stages = ["pre-push"]

# ─── post-commit ──────────────────────────────────────────────────
#
# Loud commit sentinel (#819 (7)). rtk's git-commit filter prints
# "ok N files changed" even when a pre-commit hook ABORTS the commit
# (HEAD does not move), which has repeatedly masked failed commits.
# Until rtk checks git's exit status upstream, this post-commit hook
# prints an unmistakable `COMMITTED <sha>` line that only appears
# when a commit actually landed — its absence after a commit attempt
# means the commit was rejected. Re-run `prek install` once so the
# post-commit git shim gets installed (`default_install_hook_types`
# at the top of this file makes plain `prek install` write it).
#
# `verbose = true` is load-bearing: prek swallows a PASSING hook's
# stdout, so without it only the static hook name prints and the
# actual sha never appears (verified against prek 0.3.8).
#
# Known limit (verified): `rtk git commit` collapses SUCCESS output
# to "ok N files changed", swallowing this line too — the sentinel
# is visible via bare `git commit` / `rtk proxy git commit`. On a
# hook ABORT, rtk passes the raw Failed output through and exits 1,
# so absence-of-COMMITTED plus exit status still disambiguates.
[[repos]]
repo = "local"
[[repos.hooks]]
id = "commit-sentinel"
name = "commit sentinel (COMMITTED <sha>)"
entry = "bash -c 'echo \"COMMITTED $(git rev-parse --short=12 HEAD)\"'"
language = "system"
stages = ["post-commit"]
always_run = true
pass_filenames = false
verbose = true
