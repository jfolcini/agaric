# Configuration file for `prek`, a git hook framework written in Rust.
# See https://prek.j178.dev for more information.

[[repos]]
repo = "builtin"
hooks = [
    { id = "trailing-whitespace", exclude = "\\.(png|ico|icns|svg)$" },
    { id = "end-of-file-fixer", exclude = "\\.(png|ico|icns|svg)$" },
    { id = "check-yaml" },
    { id = "check-toml" },
    { id = "check-json", exclude = "(tsconfig.*\\.json$|\\.sqlx/)" },
    { id = "check-merge-conflict" },
    { id = "check-added-large-files", args = ["--maxkb=500"], exclude = "^docs/session-log/" },
    { id = "no-commit-to-branch", args = ["--branch=main"], stages = ["pre-push"] },
    { id = "detect-private-key", exclude = "^src-tauri/src/(sync_cert\\.rs|sync_net/tests\\.rs|sync_daemon/tests\\.rs)$|^SESSION-LOG\\.md$" },
    # Catch the "I added a script but forgot chmod +x" / "I marked a non-executable as +x" class of mistake.
    # scripts/ mixes .sh, .mjs, and .py files that all rely on shebangs + +x bits. `*.rs` is excluded
    # because Rust's inner-attribute syntax `#![...]` looks like a shebang to this builtin and gives
    # unactionable false positives on every test module under src-tauri/src/commands/tests/.
    { id = "check-shebang-scripts-are-executable", exclude = "\\.rs$" },
    { id = "check-executables-have-shebangs" },
    # Normalise CRLF leakage from non-Linux contributors.
    { id = "mixed-line-ending", args = ["--fix=lf"] },
]

# Secret scanning (gitleaks)
[[repos]]
repo = "https://github.com/gitleaks/gitleaks"
rev = "v8.30.1"
hooks = [
    { id = "gitleaks" },
]

# Conventional Commits enforcement on commit-msg stage (PEND-41 R8).
[[repos]]
repo = "https://github.com/compilerla/conventional-pre-commit"
rev = "v4.4.0"
hooks = [
    { id = "conventional-pre-commit", stages = ["commit-msg"], args = [] },
]

# GitHub Actions workflow lint (catches missing `permissions:` blocks,
# bad uses syntax, deprecated set-output usage, etc.). Closes the
# `actions/missing-workflow-permissions` class of CodeQL findings
# locally instead of letting them surface on push.
[[repos]]
repo = "https://github.com/rhysd/actionlint"
rev = "v1.7.12"
hooks = [
    { id = "actionlint" },
]

# Biome: lint + format for JS/TS
[[repos]]
repo = "local"
[[repos.hooks]]
id = "biome-check"
name = "biome check"
entry = "npx biome check"
language = "system"
types_or = ["javascript", "jsx", "ts", "tsx", "json"]
exclude = "(src/lib/bindings\\.ts$|\\.sqlx/)"
pass_filenames = true

# TypeScript type checking
[[repos]]
repo = "local"
[[repos.hooks]]
id = "tsc"
name = "typescript check"
entry = "npx tsc -b --noEmit"
language = "system"
pass_filenames = false
types_or = ["ts", "tsx"]

# CSS variable wrapper guard — theme uses oklch(), so hsl()/rgb() wrappers are invalid
[[repos]]
repo = "local"
[[repos.hooks]]
id = "no-hsl-rgb-var-wrap"
name = "no hsl/rgb wrapping css vars"
entry = "bash -c 'if grep -rn \"hsl(var(--\\|rgb(var(--\" src/ --include=\"*.tsx\" --include=\"*.ts\" --include=\"*.css\"; then echo \"ERROR: Use var(--name) directly, not hsl(var(--name)) — theme uses oklch values\"; exit 1; fi'"
language = "system"
pass_filenames = false
types_or = ["ts", "tsx", "css"]

# Sonner chokepoint guard — every production toast call must route through
# `src/lib/notify.ts` so the wrapper (Phase 3a, design-system-maintainability)
# stays the single source of truth. Allowed direct importers: the wrapper
# itself, the `Toaster` UI primitive that mounts the sonner provider, the
# test mock, and the global vitest setup that wires the mock.
[[repos]]
repo = "local"
[[repos.hooks]]
id = "no-direct-sonner-import"
name = "no direct sonner import outside lib/notify + Toaster + tests"
entry = "bash -c 'if grep -rnE \"from ['\\''\\\"]sonner['\\''\\\"]\" src/ --include=\"*.ts\" --include=\"*.tsx\" --exclude-dir=__tests__ --exclude=\"*.test.ts\" --exclude=\"*.test.tsx\" | grep -vE \"^src/lib/notify\\.ts:|^src/components/ui/sonner\\.tsx:|^src/test-setup\\.ts:\"; then echo \"ERROR: import sonner via @/lib/notify instead — Phase 3a chokepoint (design-system-maintainability)\"; exit 1; fi'"
language = "system"
pass_filenames = false
types_or = ["ts", "tsx"]

# Layer-boundary guard — UI primitives in `src/components/ui/` must be
# stateless. They are atomic building blocks (AGENTS.md "Component
# hierarchy") and must never reach into zustand stores: any feature
# requiring app state belongs in `src/components/` (shared) or higher
# layers. Catches the drift class where someone wires a primitive
# directly to `useNavigationStore` etc. — the next reviewer would
# otherwise have to spot the violation by eye on every PR.
[[repos]]
repo = "local"
[[repos.hooks]]
id = "no-ui-store-imports"
name = "ui primitives must not import zustand stores"
entry = "bash -c 'if grep -rnE \"from ['\\''\\\"](\\@/stores|\\.\\./stores|\\.\\./\\.\\./stores)\" src/components/ui/ --include=\"*.ts\" --include=\"*.tsx\" --exclude-dir=__tests__; then echo \"ERROR: src/components/ui/ primitives must be stateless — move state-dependent logic up to src/components/ (shared) or src/hooks/. See AGENTS.md \\\"Component hierarchy\\\".\"; exit 1; fi'"
language = "system"
pass_filenames = false
types_or = ["ts", "tsx"]

# Legacy React API guard — block re-introduction of APIs we migrated away from
# (MAINT-48 React 19, MAINT-49 TypeScript 6, follow-up MutableRefObject removal).
# Two legitimate `React.JSX.IntrinsicElements` uses in RichContentRenderer.tsx are
# the correct React-19 form and are excluded by the `[^.]` prefix in the pattern.
[[repos]]
repo = "local"
[[repos.hooks]]
id = "no-legacy-react-apis"
name = "no legacy react apis"
entry = "bash -c 'set -e; if grep -rnE \"\\bforwardRef\\b|\\bReact\\.forwardRef\\b|\\bMutableRefObject\\b|\\bReact\\.ComponentRef\\b\" src/ --include=\"*.ts\" --include=\"*.tsx\" --exclude-dir=mocks --exclude=bindings.ts; then echo \"ERROR: legacy React API detected — forwardRef / MutableRefObject / React.ComponentRef were removed during the React 19 / TS 6 migration\"; exit 1; fi; if grep -rnE \"(^|[^.])JSX\\.(IntrinsicElements|Element)\" src/ --include=\"*.ts\" --include=\"*.tsx\" --exclude-dir=mocks --exclude=bindings.ts; then echo \"ERROR: ambient JSX.* namespace detected — use React.JSX.IntrinsicElements / React.ReactElement instead (React 19 dropped the global JSX namespace)\"; exit 1; fi'"
language = "system"
pass_filenames = false
types_or = ["ts", "tsx"]

# Vitest: smart related-only tests (run on TS changes)
[[repos]]
repo = "local"
[[repos.hooks]]
id = "vitest"
name = "vitest"
entry = "scripts/test-related-ts.sh"
language = "system"
pass_filenames = false
types_or = ["ts", "tsx"]

# Tauri-mock parity: ensures every IPC command emitted from
# `src/lib/bindings.ts` (the auto-generated tauri-specta surface) has a
# handler in the in-browser tauri mock at `src/lib/tauri-mock/handlers.ts`.
# Catches the FEAT-3 Phase 2 class of bug where a new backend command
# ships without a mock entry; e2e flows then silently get `null` and
# fail in unrelated places. Allowlist for genuinely-not-mockable
# commands (OAuth, OS sockets) lives inside the script.
[[repos]]
repo = "local"
[[repos.hooks]]
id = "tauri-mock-parity"
name = "tauri-mock parity"
entry = "node scripts/check-tauri-mock-parity.mjs"
language = "system"
pass_filenames = false
files = "^src/lib/(bindings\\.ts|tauri-mock/handlers\\.ts)$"

# Tauri bindings ↔ wrapper parity: ensures every `commands.*` export from
# `src/lib/bindings.ts` (auto-generated tauri-specta surface) has either a
# matching ergonomics wrapper in `src/lib/tauri.ts` or sits on an explicit
# allowlist. Catches the drift class where a Rust command signature changes,
# `bindings.ts` regenerates, but the hand-written wrapper is missed.
[[repos]]
repo = "local"
[[repos.hooks]]
id = "tauri-bindings-parity"
name = "tauri bindings ↔ wrapper parity"
entry = "node scripts/check-tauri-bindings-parity.mjs"
language = "system"
pass_filenames = false
files = "^src/lib/(bindings\\.ts|tauri\\.ts)$"

# Tracked-file Markdown link integrity. Verifies that every relative
# `](path.md)` link in tracked Markdown files points to a file that's
# also tracked by git. Lychee can't catch this locally because an
# untracked working-tree copy of the target shadows the gap; CI's
# fresh checkout sees the real state. This script asks
# `git ls-files`, matching CI semantics.
[[repos]]
repo = "local"
[[repos.hooks]]
id = "md-link-targets"
name = "markdown link targets are tracked"
entry = "node scripts/check-md-link-targets.mjs"
language = "system"
pass_filenames = false
types = ["markdown"]

# axe-presence: every `src/components/__tests__/*.test.tsx` must include
# at least one axe(...) audit, per src/__tests__/AGENTS.md:227. Without
# this, accessibility regressions slip through component additions
# because reviewers can't catch the missing audit by eye on every PR.
# Easy half of MAINT-99.
[[repos]]
repo = "local"
[[repos.hooks]]
id = "axe-presence"
name = "axe-presence in component tests"
entry = "bash scripts/check-axe-presence.sh"
language = "system"
pass_filenames = false
files = "^src/components/__tests__/.*\\.test\\.tsx$"

# test-file-naming: enforce the convention from src/__tests__/AGENTS.md:81
# (Vitest → .test.ts/.test.tsx in src/, Playwright → .spec.ts in e2e/).
# Mixing the suffixes silently routes a file to the wrong runner.
# Rust tests are out of scope (rule is frontend-only). Easy half of MAINT-99.
[[repos]]
repo = "local"
[[repos.hooks]]
id = "test-file-naming"
name = "test file naming convention"
entry = "bash scripts/check-test-file-naming.sh"
language = "system"
pass_filenames = false
types_or = ["ts", "tsx"]

# ipc-error-path-coverage: every `src/components/**/*.tsx` (recursive,
# excluding `ui/` and `__tests__/`) that imports from `@/lib/tauri` (or
# pulls `invoke` directly from `@tauri-apps/api/core`) must have at
# least one error-path test in either its sibling `__tests__/<name>.test.tsx`
# or the top-level `src/components/__tests__/<name>.test.tsx` fallback.
# Catches the silent-`.catch` / missing-toast class of regression that
# AGENTS.md:198 is aimed at. Hard half of MAINT-99; recursive walk
# closed by MAINT-159 (the `files` regex below is intentionally broad —
# the `ui/` and `__tests__/` exclusions live in the script's
# `listAllComponents()` walk, not in the regex).
[[repos]]
repo = "local"
[[repos.hooks]]
id = "ipc-error-path-coverage"
name = "IPC error-path coverage"
entry = "node scripts/check-ipc-error-path.mjs"
language = "system"
pass_filenames = false
files = "^src/components/.*\\.tsx$"

# snapshot-redaction: scan every `*.snap` file under `src/` and
# `src-tauri/` for unredacted ULIDs (26-char Crockford base32),
# blake3 hashes (64-char lowercase hex), ISO-8601 timestamps with a
# time component, and base64url cursors. Values that appear verbatim
# in any `src-tauri/src/**/*.rs` source file are auto-allowlisted as
# deterministic test fixtures (per src-tauri/tests/AGENTS.md:319 —
# "For deterministic data, no redaction needed"). Inline
# `# MAINT-99-allow-<kind>: <reason>` comments support the rare known-
# fixed-generated-value case. Hard half of MAINT-99.
[[repos]]
repo = "local"
[[repos.hooks]]
id = "snapshot-redaction"
name = "snapshot redaction"
entry = "node scripts/check-snapshot-redaction.mjs"
language = "system"
pass_filenames = false
files = "(\\.snap$|^src-tauri/src/.*\\.rs$)"

# JS: better-npm-audit (security advisories)
[[repos]]
repo = "local"
[[repos.hooks]]
id = "npm-audit"
name = "npm audit"
entry = "npx better-npm-audit audit"
language = "system"
pass_filenames = false
files = "(^package\\.json$|^package-lock\\.json$)"

# JS: license-checker (license compliance)
[[repos]]
repo = "local"
[[repos.hooks]]
id = "license-checker"
name = "license check"
entry = "npx license-checker --onlyAllow 'MIT;ISC;Apache-2.0;BSD-3-Clause;BSD-2-Clause;MPL-2.0;MIT-0;CC0-1.0;Python-2.0;BlueOak-1.0.0;CC-BY-3.0;CC-BY-4.0;0BSD;Unlicense' --excludePrivatePackages --production"
language = "system"
pass_filenames = false
files = "(^package\\.json$|^package-lock\\.json$)"

# JS: depcheck (unused dependency detection — like cargo-machete for JS)
[[repos]]
repo = "local"
[[repos.hooks]]
id = "depcheck"
name = "depcheck"
entry = "npx depcheck --ignores='tailwindcss,@vitest/coverage-v8,better-npm-audit,depcheck,knip,license-checker,markdownlint-cli2'"
language = "system"
pass_filenames = false
files = "(^package\\.json$|^package-lock\\.json$)"

# JS: knip (dead export detection)
[[repos]]
repo = "local"
[[repos.hooks]]
id = "knip"
name = "knip"
entry = "npx knip"
language = "system"
pass_filenames = false
types = ["ts", "tsx"]

# Markdown lint (style + structure)
[[repos]]
repo = "local"
[[repos.hooks]]
id = "markdownlint"
name = "markdownlint-cli2"
entry = "npx markdownlint-cli2"
language = "system"
pass_filenames = true
types = ["markdown"]
exclude = "^(SESSION-LOG\\.md|node_modules/|dist/)"

# Broken link check
[[repos]]
repo = "https://github.com/lycheeverse/lychee"
rev = "lychee-v0.23.0"
hooks = [
    { id = "lychee", args = ["--no-progress", "--max-concurrency=8"], types = ["markdown"] },
]

# SQL: sqruff (SQLite migrations lint — MAINT-88)
# Scope: src-tauri/migrations/*.sql only. Inline `sqlx::query!` strings in Rust
# are not linted (covered by sqlx compile-time validation against .sqlx/ cache).
# Rule set picked to match all currently-shipped migrations without triggering
# any fixes (shipped migrations are append-only per AGENTS.md invariant #1;
# sqlx tracks their checksums in _sqlx_migrations).
[[repos]]
repo = "local"
[[repos.hooks]]
id = "sqruff"
name = "sqruff"
entry = "bash -c '. \"$HOME/.cargo/env\" && sqruff lint \"$@\"' --"
language = "system"
pass_filenames = true
files = "^src-tauri/migrations/.*\\.sql$"

# Tauri command IPC error-sanitization check (MAINT-147 (c)). Every
# `#[tauri::command]` wrapper that returns `Result<_, AppError>` and
# propagates errors via `?` should funnel them through
# `.map_err(sanitize_internal_error)` so the IPC boundary never leaks
# bare `AppError::Sqlx` / `AppError::Internal` payloads to the
# frontend. A code-level wrapper macro would obstruct specta's type
# extraction, so the convention is enforced as a regex check instead.
# Pre-existing violations are grandfathered via an explicit allowlist
# inside the script — adjust there, not here.
[[repos]]
repo = "local"
[[repos.hooks]]
id = "tauri-command-sanitize"
name = "tauri command sanitize"
entry = "node scripts/check-tauri-command-sanitize.mjs"
language = "system"
pass_filenames = false
files = "^src-tauri/src/commands/.*\\.rs$"

# Rust: cargo fmt
[[repos]]
repo = "local"
[[repos.hooks]]
id = "cargo-fmt"
name = "cargo fmt"
entry = "bash -c '. \"$HOME/.cargo/env\" && cd src-tauri && cargo fmt --check'"
language = "system"
pass_filenames = false
types = ["rust"]

# Rust: cargo clippy
[[repos]]
repo = "local"
[[repos.hooks]]
id = "cargo-clippy"
name = "cargo clippy"
entry = "bash -c '. \"$HOME/.cargo/env\" && cd src-tauri && cargo clippy -- -D warnings'"
language = "system"
pass_filenames = false
types = ["rust"]

# Rust: smart related-only tests (run on .rs changes)
[[repos]]
repo = "local"
[[repos.hooks]]
id = "cargo-test"
name = "cargo nextest run"
entry = "scripts/test-related-rust.sh"
language = "system"
pass_filenames = false
types = ["rust"]

# Rust: cargo-deny (advisories + licenses + bans + sources)
[[repos]]
repo = "local"
[[repos.hooks]]
id = "cargo-deny"
name = "cargo deny"
entry = "bash -c '. \"$HOME/.cargo/env\" && cd src-tauri && cargo deny check'"
language = "system"
pass_filenames = false
files = "^src-tauri/Cargo\\.(toml|lock)$"

# cargo-audit accept-list sync (PEND-40 #11). `cargo audit` (run as a
# warn-only step in `_validate.yml`) does NOT consult `deny.toml`, so
# every advisory already triaged in `deny.toml`'s `[advisories].ignore`
# re-surfaces in the CI log. The sync script projects those entries
# into `src-tauri/.cargo/audit.toml` (where cargo-audit actually
# reads from). This hook re-runs the script on every change to
# `deny.toml` or `audit.toml` and fails if the working copy of
# audit.toml is out of sync — telling the author to run
# `node scripts/sync-audit-from-deny.mjs`. `deny.toml` stays the
# single source of truth; `audit.toml` is generated.
[[repos]]
repo = "local"
[[repos.hooks]]
id = "audit-toml-in-sync"
name = "audit.toml in sync with deny.toml"
entry = "node scripts/sync-audit-from-deny.mjs --check"
language = "system"
pass_filenames = false
files = "^src-tauri/(deny\\.toml|\\.cargo/audit\\.toml)$"

# Rust: cargo-machete (unused dependency detection)
[[repos]]
repo = "local"
[[repos.hooks]]
id = "cargo-machete"
name = "cargo machete"
entry = "bash -c '. \"$HOME/.cargo/env\" && cd src-tauri && cargo machete'"
language = "system"
pass_filenames = false
files = "^src-tauri/Cargo\\.(toml|lock)$"

# typos: language-agnostic typo checker (crate-ci/typos). Catches
# misspellings in code, comments, identifiers, snapshot fixtures,
# AGENTS.md, REVIEW-LATER.md — the surface markdownlint never
# touches. Allow-list and excluded paths live in `_typos.toml`.
# `pass_filenames = false` lets typos walk the repo itself and
# apply its built-in binary detection (PNG/ICO icons, etc., which
# typos would otherwise treat as text when explicitly handed
# their paths).
# Install: `cargo install typos-cli --locked`.
[[repos]]
repo = "local"
[[repos.hooks]]
id = "typos"
name = "typos"
entry = "bash -c '. \"$HOME/.cargo/env\" && typos'"
language = "system"
pass_filenames = false

# shellcheck: lint shell scripts under scripts/. `--severity=warning`
# skips the `info` / `style` notices (e.g. SC2012 "use find instead
# of ls", SC2001 "use ${var//pat/repl} instead of sed") which are
# minor stylistic preferences; we still catch real bugs and probable
# bugs. Out of scope: the inline `bash -c '...'` strings inside this
# file (shellcheck cannot parse TOML-embedded bash).
# Install via system package manager (e.g. `apt-get install shellcheck`).
[[repos]]
repo = "local"
[[repos.hooks]]
id = "shellcheck"
name = "shellcheck"
entry = "shellcheck --severity=warning"
language = "system"
files = "^scripts/.*\\.sh$"

# Migration immutability — enforces the AGENTS.md "append-only,
# never modify shipped migrations" invariant. The sqlx runtime
# detects checksum drift via `_sqlx_migrations`, but only on the
# next app boot; this hook fails fast at commit time. Allows
# additions only; modifications, deletions, renames, copies, and
# type changes under src-tauri/migrations/ are rejected.
[[repos]]
repo = "local"
[[repos.hooks]]
id = "migrations-immutable"
name = "migrations append-only"
entry = "bash scripts/check-migrations-immutable.sh"
language = "system"
pass_filenames = false
files = "^src-tauri/migrations/.*\\.sql$"

# STRICT tables policy (PEND-07). Every new `CREATE TABLE` in a
# SQLite migration must use STRICT mode (SQLite 3.37+) so silent
# type coercion fails at insert time instead of corrupting reads
# later. Pre-policy migrations 0001..0041 are skipped by a
# migration-number floor inside the script — they're immutable
# per `migrations-immutable` and will not be retrofitted. FTS5 /
# virtual tables are carved out (SQLite forbids STRICT there).
[[repos]]
repo = "local"
[[repos.hooks]]
id = "migrations-strict-tables"
name = "migrations: STRICT tables required for new schema"
entry = "node scripts/check-migrations-strict.mjs"
language = "system"
pass_filenames = true
files = "^src-tauri/migrations/.*\\.sql$"

# zizmor: GitHub Actions security audit. Complements actionlint
# (which is style/correctness only) by catching unpinned `uses:`,
# missing `persist-credentials: false`, env-injection in
# `${{ github.* }}` interpolation, the `pull_request_target`
# exfil class, and similar workflow-security smells. Existing
# findings are baselined in `.github/zizmor.yml`; the hook fires
# on new findings only.
# Install: `cargo install zizmor --locked`.
[[repos]]
repo = "local"
[[repos.hooks]]
id = "zizmor"
name = "zizmor"
entry = "bash -c '. \"$HOME/.cargo/env\" && zizmor \"$@\"' --"
language = "system"
files = "^\\.github/workflows/.*\\.ya?ml$"

# taplo: TOML lint + format. The `check-toml` builtin only validates
# parseability; taplo enforces consistent formatting across
# prek.toml, src-tauri/Cargo.toml, src-tauri/deny.toml, lychee.toml,
# .gitleaks.toml, and src-tauri/.config/nextest.toml. Repo-specific
# style overrides live in `.taplo.toml` (4-space indent, 200-col
# width, no auto-collapse). `fmt --check` is read-only — it never
# rewrites the file in the index.
# Install: `cargo install taplo-cli --locked`.
[[repos]]
repo = "local"
[[repos.hooks]]
id = "taplo-fmt"
name = "taplo fmt --check"
entry = "bash -c '. \"$HOME/.cargo/env\" && taplo fmt --check \"$@\"' --"
language = "system"
types = ["toml"]
[[repos]]
repo = "local"
[[repos.hooks]]
id = "taplo-lint"
name = "taplo lint"
entry = "bash -c '. \"$HOME/.cargo/env\" && taplo lint \"$@\"' --"
language = "system"
types = ["toml"]

# ─── pre-push only ────────────────────────────────────────────────
#
# A single chokepoint hook runs `scripts/verify-ci-equivalent.sh`,
# which parallelizes every check `_validate.yml` runs in CI (full
# vitest, full Playwright, cargo nextest + agaric-mcp build + sqlx
# prepare check, MCP UDS smoke, externalBin verification, plus
# warn-only `cargo audit` and `npm audit signatures`).
#
# The script wraps everything in one prek slot so we can fan out
# across cores via background jobs instead of letting prek serialize
# per-hook. Total wall clock on a warm cache: ≈3-4 min (was ≈5-8 min
# when each hook ran sequentially via prek).
#
# Escape hatch: `SKIP_CI_VERIFY=1 git push` short-circuits the
# script. Use sparingly — for docs-only typo fixes that obviously
# cannot affect CI behaviour. Anything that touches source code
# should let the verifier run.
#
# Release pre-flight (cargo tauri bundle build for the local OS) is
# NOT here — too slow for daily push cadence. Run
# `scripts/verify-release-build.sh` manually before tagging a release.
[[repos]]
repo = "local"
[[repos.hooks]]
id = "verify-ci-equivalent"
name = "verify CI-equivalent (parallel)"
entry = "bash scripts/verify-ci-equivalent.sh"
language = "system"
pass_filenames = false
stages = ["pre-push"]
