# Configuration file for `prek`, a git hook framework written in Rust.
# See https://prek.j178.dev for more information.

[[repos]]
repo = "builtin"
hooks = [
    { id = "trailing-whitespace", exclude = "\\.(png|ico|icns|svg)$" },
    { id = "end-of-file-fixer", exclude = "\\.(png|ico|icns|svg)$" },
    { id = "check-yaml" },
    { id = "check-toml" },
    { id = "check-json", exclude = "(tsconfig.*\\.json$|\\.sqlx/)" },
    { id = "check-merge-conflict" },
    { id = "check-added-large-files", args = ["--maxkb=500"] },
    { id = "no-commit-to-branch", args = ["--branch=main"], stages = ["pre-push"] },
]

# Biome: lint + format for JS/TS
[[repos]]
repo = "local"
[[repos.hooks]]
id = "biome-check"
name = "biome check"
entry = "npx biome check"
language = "system"
types_or = ["javascript", "jsx", "ts", "tsx", "json"]
exclude = "(src/lib/bindings\\.ts$|\\.sqlx/)"
pass_filenames = true

# TypeScript type checking
[[repos]]
repo = "local"
[[repos.hooks]]
id = "tsc"
name = "typescript check"
entry = "npx tsc -b --noEmit"
language = "system"
pass_filenames = false
types_or = ["ts", "tsx"]

# CSS variable wrapper guard — theme uses oklch(), so hsl()/rgb() wrappers are invalid
[[repos]]
repo = "local"
[[repos.hooks]]
id = "no-hsl-rgb-var-wrap"
name = "no hsl/rgb wrapping css vars"
entry = "bash -c 'if grep -rn \"hsl(var(--\\|rgb(var(--\" src/ --include=\"*.tsx\" --include=\"*.ts\" --include=\"*.css\"; then echo \"ERROR: Use var(--name) directly, not hsl(var(--name)) — theme uses oklch values\"; exit 1; fi'"
language = "system"
pass_filenames = false
types_or = ["ts", "tsx", "css"]

# Vitest (run on TS changes)
[[repos]]
repo = "local"
[[repos.hooks]]
id = "vitest"
name = "vitest"
entry = "npx vitest run --reporter=dot"
language = "system"
pass_filenames = false
types_or = ["ts", "tsx"]

# JS: better-npm-audit (security advisories)
[[repos]]
repo = "local"
[[repos.hooks]]
id = "npm-audit"
name = "npm audit"
entry = "npx better-npm-audit audit"
language = "system"
pass_filenames = false
files = "(^package\\.json$|^package-lock\\.json$)"

# JS: license-checker (license compliance)
[[repos]]
repo = "local"
[[repos.hooks]]
id = "license-checker"
name = "license check"
entry = "npx license-checker --onlyAllow 'MIT;ISC;Apache-2.0;BSD-3-Clause;BSD-2-Clause;MPL-2.0;MIT-0;CC0-1.0;Python-2.0;BlueOak-1.0.0;CC-BY-3.0;CC-BY-4.0;0BSD' --excludePackages 'agaric@0.1.0' --production"
language = "system"
pass_filenames = false
files = "(^package\\.json$|^package-lock\\.json$)"

# JS: depcheck (unused dependency detection — like cargo-machete for JS)
[[repos]]
repo = "local"
[[repos.hooks]]
id = "depcheck"
name = "depcheck"
entry = "npx depcheck --ignores='tailwindcss,@vitest/coverage-v8,better-npm-audit,depcheck,license-checker'"
language = "system"
pass_filenames = false
files = "(^package\\.json$|^package-lock\\.json$)"

# Rust: cargo fmt
[[repos]]
repo = "local"
[[repos.hooks]]
id = "cargo-fmt"
name = "cargo fmt"
entry = "bash -c '. \"$HOME/.cargo/env\" && cd src-tauri && cargo fmt --check'"
language = "system"
pass_filenames = false
types = ["rust"]

# Rust: cargo clippy
[[repos]]
repo = "local"
[[repos.hooks]]
id = "cargo-clippy"
name = "cargo clippy"
entry = "bash -c '. \"$HOME/.cargo/env\" && cd src-tauri && cargo clippy -- -D warnings'"
language = "system"
pass_filenames = false
types = ["rust"]

# Rust: cargo test
[[repos]]
repo = "local"
[[repos.hooks]]
id = "cargo-test"
name = "cargo nextest run"
entry = "bash -c '. \"$HOME/.cargo/env\" && cd src-tauri && cargo nextest run'"
language = "system"
pass_filenames = false
types = ["rust"]

# Rust: cargo-deny (advisories + licenses + bans + sources)
[[repos]]
repo = "local"
[[repos.hooks]]
id = "cargo-deny"
name = "cargo deny"
entry = "bash -c '. \"$HOME/.cargo/env\" && cd src-tauri && cargo deny check'"
language = "system"
pass_filenames = false
files = "^src-tauri/Cargo\\.(toml|lock)$"

# Rust: cargo-machete (unused dependency detection)
[[repos]]
repo = "local"
[[repos.hooks]]
id = "cargo-machete"
name = "cargo machete"
entry = "bash -c '. \"$HOME/.cargo/env\" && cd src-tauri && cargo machete'"
language = "system"
pass_filenames = false
files = "^src-tauri/Cargo\\.(toml|lock)$"
