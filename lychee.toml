# Lychee config for broken-link checking in markdown docs.
# Only true false positives / placeholder URLs belong here.

# Do not fail on transient network errors (timeouts, DNS) or transient
# upstream-server errors. Accept common rate-limit codes on well-known
# hosts (GitHub returns 429 under bursty unauthenticated traffic, and
# 5xx — most often 502 Bad Gateway, occasionally 503/504 — when their
# edge has a hiccup mid-run, which has now broken validate twice in a
# row on links to https://github.com/jfolcini/agaric/issues).
#
# We intentionally do NOT accept 4xx other than 403/429 — a real 404 on
# a doc link is the failure mode this hook exists to catch.
accept = [
    "200..=299",
    "301",
    "302",
    "307",
    "308",
    "403",
    "429",
    "500",
    "502",
    "503",
    "504",
]

# Retry network-level failures (TCP resets, DNS hiccups, timeouts) before
# failing the hook. The `accept` list only matches HTTP status codes — it
# doesn't cover pre-HTTP socket errors like "connection reset by peer",
# which broke validate run 25922288914 on a Tauri docs URL. Five retries
# with exponential backoff is enough to ride out the typical edge flake.
max_retries = 5
retry_wait_time = 2

# Per-request timeout. lychee defaults to 20s; flathub.org's homepage (a
# non-load-bearing "eventual submission target" link in
# packaging/flathub/README.md) intermittently responds past that and tripped
# the hook on CI run 26357889108 (391 total, 0 errors, 1 timeout → exit 2).
# 30s gives headroom for a slow-but-up host without masking real dead links;
# combined with the 5 retries above it rides out a transient blip.
timeout = 30

# Skip the request if the URL matches any of these patterns.
exclude = [
    # Future publish target — agaric-app GitHub org doesn't exist yet (PUB-5).
    "^https?://github\\.com/agaric-app/",
    # Local dev server references in docs (PROMPT.md, playwright config examples).
    "^http://localhost(:\\d+)?(/|$)",
    "^http://127\\.0\\.0\\.1(:\\d+)?(/|$)",
    # oxc.rs occasionally fails TLS handshake from GitHub Actions runners
    # (CI run 26502240317: "TLS handshake failed" on the oxfmt-beta blog
    # post despite the 5-retry/exp-backoff config above). The site is up —
    # `curl` from the maintainer's box and browsers reach it fine — but
    # lychee's reqwest+rustls combination handshakes inconsistently from
    # GHA. Narrowed to the one URL that's been flaky; other oxc.rs URLs
    # Cited in (docs/, blog) check fine and are not excluded.
    "^https?://oxc\\.rs/blog/2026-02-24-oxfmt-beta",
    # sqlx issue #3388 → 404. Cited once in archived
    # docs/session-log/2026-sessions-401-800.md (frozen historical record)
    # for context on a prior sqlx upgrade; the upstream issue was deleted
    # or transferred and no longer resolves. Archived session logs are
    # never edited, so the reference is excluded rather than rewritten.
    "^https?://github\\.com/launchbadge/sqlx/issues/3388$",
    # slsa.dev intermittently refuses connections / fails TLS handshake from
    # GitHub Actions runners (validate runs 26783271629 + rerun 78955874796:
    # "TLS handshake failed" on https://slsa.dev/ then "Connection failed" on
    # the https://slsa.dev/images/gh-badge-level3.svg SLSA badge). Same GHA
    # reqwest+rustls flake as oxc.rs above — the site is up from browsers and
    # `curl`. Both references (threat-model.md spec link + README badge) are
    # non-load-bearing, so the domain is excluded rather than churned.
    "^https?://slsa\\.dev/",
    # v2.tauri.app repeatedly times out from GitHub Actions runners even with
    # the 30s timeout + 5 retries above (validate run 26867985711: TIMEOUT on
    # /start/prerequisites, /plugin/updater, and the bare host in README.md,
    # SECURITY.md, docs/BUILD.md — 0 errors, only timeouts → exit 2). The
    # Tauri docs CDN is up from browsers/`curl`; same GHA edge flake that
    # motivated the timeout/retry tuning above. Canonical upstream docs,
    # non-load-bearing for link integrity.
    "^https?://v2\\.tauri\\.app(/|$)",
    # contributor-covenant.org times out from GHA runners (same validate run:
    # 4 TIMEOUTs on the homepage, /faq, /translations, and the v2.1 code of
    # conduct in CODE_OF_CONDUCT.md). Site is up from browsers; excluded as a
    # non-load-bearing upstream reference rather than churned.
    "^https?://(www\\.)?contributor-covenant\\.org(/|$)",
]
